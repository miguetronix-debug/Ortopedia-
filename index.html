            <input type="checkbox" id="tpn-${p.id}" ${p.tpn?.activa?'checked':''}
              onchange="App.setTPN('${p.id}','activa',this.checked)">
            <label for="tpn-${p.id}"><strong>Terapia de Presión Negativa (TPN / VAC)</strong></label>
          </div>
          ${p.tpn?.activa ? (() => {
            const dT = diasTPN(p);
            const dC = diasDesdeUltimoCambioTPN(p);
            const alertaCambio = dC !== null && dC >= 3;
            return `
              <div style="margin-top:8px">
                ${dT !== null ? `<span class="tag blue">Día ${dT} con TPN</span>` : ''}
                ${dC !== null ? `<span class="tag ${alertaCambio?'red':'green'}" style="margin-left:6px">${dC} día(s) desde último cambio${alertaCambio?' ⚠':''}</span>` : ''}
              </div>
              <div class="field-row" style="margin-top:8px">
                <div class="field" style="margin-bottom:0">
                  <label>Fecha de inicio</label>
                  <input type="date" value="${escapeHtml(p.tpn.fechaInicio||'')}"
                    onchange="App.setTPN('${p.id}','fechaInicio',this.value)">
                </div>
                <div class="field" style="margin-bottom:0">
                  <label>Último cambio de apósito</label>
                  <input type="date" value="${escapeHtml(p.tpn.ultimoCambio||'')}"
                    onchange="App.setTPN('${p.id}','ultimoCambio',this.value)">
                </div>
              </div>
              <div class="field-row" style="margin-top:8px">
                <div class="field" style="margin-bottom:0">
                  <label>Ubicación</label>
                  <input value="${escapeHtml(p.tpn.ubicacion||'')}"
                    placeholder="Ej. tibia derecha, muñón, etc."
                    oninput="App.setTPN('${p.id}','ubicacion',this.value)">
                </div>
                <div class="field" style="margin-bottom:0">
                  <label>Presión (mmHg)</label>
                  <input value="${escapeHtml(p.tpn.presion||'')}"
                    placeholder="Ej. 125"
                    oninput="App.setTPN('${p.id}','presion',this.value)">
                </div>
              </div>
              <div class="field" style="margin-top:8px;margin-bottom:0">
                <label>Notas</label>
                <input value="${escapeHtml(p.tpn.notas||'')}"
                  oninput="App.setTPN('${p.id}','notas',this.value)">
              </div>
            `;
          })() : ''}
        </div>
      </div>
    `;
  },

  /* Acciones nuevas: sustancias, curaciones, TPN */
  setSustancia(id, tipo, campo, valor) {
    const p = this._findP(id); if (!p) return;
    if (!p.sustancias) p.sustancias = { alcoholismo:{activo:false,detalle:''}, tabaquismo:{activo:false,detalle:''}, drogas:{activo:false,detalle:''} };
    if (!p.sustancias[tipo]) p.sustancias[tipo] = { activo:false, detalle:'' };
    p.sustancias[tipo][campo] = valor;
    State.save();
    if (campo === 'activo') this.renderModal(id);
  },
  setCuracion(id, campo, valor) {
    const p = this._findP(id); if (!p) return;
    if (!p.curaciones) p.curaciones = { requiere:false, frecuencia:'', ultimaFecha:'', notas:'' };
    p.curaciones[campo] = valor;
    State.save();
    if (campo === 'requiere') this.renderModal(id);
  },
  setTPN(id, campo, valor) {
    const p = this._findP(id); if (!p) return;
    if (!p.tpn) p.tpn = { activa:false, fechaInicio:'', ultimoCambio:'', ubicacion:'', presion:'', notas:'' };
    if (campo === 'activa' && valor && !p.tpn.fechaInicio) {
      p.tpn.fechaInicio = todayISO();
      p.tpn.ultimoCambio = todayISO();
      logCambio(p, 'TPN', 'Iniciada terapia de presión negativa');
    }
    if (campo === 'activa' && !valor) {
      logCambio(p, 'TPN', 'Suspendida terapia de presión negativa');
    }
    p.tpn[campo] = valor;
    State.save();
    if (campo === 'activa') this.renderModal(id);
  },

  /* -------- Preoperatorio -------- */
  tabPreop(p) {
    const apto = evaluarAptoCirugia(p);
    const edad = parseInt(p.edad,10);
    const requiereCompletos = (edad>=60) || tieneAntecedentes(p);
    const sano = !tieneAntecedentes(p);

    const ult = ultimaCirugia(p);
    const totalCir = (p.cirugiasRealizadas || []).length;
    let aptoBox;
    if (apto.listo) {
      aptoBox = `<div class="alert-box green"><strong>✓ Paciente listo para cirugía.</strong> ${escapeHtml(apto.motivo)}.</div>`;
    } else if (apto.operado) {
      // Paciente ya operado — sólo es candidato si se marca "Requiere otra cirugía"
      aptoBox = `
        <div class="alert-box green">
          <strong>✓ Paciente ya operado.</strong>
          ${totalCir>0?`Lleva ${totalCir} cirugía(s) durante esta hospitalización.`:''}
          Última cirugía: ${escapeHtml(ult.procedimiento||'')}${ult.lateralidad?' ('+escapeHtml(ult.lateralidad)+')':''} el ${fmtDate(ult.fecha)}.
        </div>
        <div class="card" style="border-left:4px solid #f59e0b">
          <div class="checkbox-row">
            <input type="checkbox" id="reqotra-preop-${p.id}" ${p.requiereOtraCirugia?'checked':''}
              onchange="App.toggleRequiereOtraCirugia('${p.id}',this.checked)">
            <label for="reqotra-preop-${p.id}"><strong>Requiere otra cirugía</strong></label>
          </div>
          <div class="muted" style="font-size:.85rem;margin-top:6px">
            Marca esta casilla si el paciente, ya operado, va a necesitar otra intervención (lavado quirúrgico, etapa siguiente, complicación, fractura expuesta, infección que requiere lavados seriados, etc.).
            <br>Mientras esté marcada, el paciente aparecerá nuevamente en la lista <em>Listos para cirugía</em> y podrá agregarse a un programa.
          </div>
        </div>
      `;
    } else if (tieneContraindicacion(p)) {
      aptoBox = `<div class="alert-box red"><strong>✗ No apto.</strong> ${escapeHtml(apto.motivo)}</div>`;
    } else if (apto.preopEstado === 'no_apto') {
      aptoBox = `<div class="alert-box red"><strong>✗ No apto por evaluación preoperatoria.</strong> ${escapeHtml(apto.motivo)}</div>`;
    } else if (apto.preopEstado === 'no_apto_temporal') {
      aptoBox = `<div class="alert-box red"><strong>✗ No apto temporalmente.</strong> Requiere optimización antes de proceder a cirugía. ${escapeHtml(apto.motivo)}</div>`;
    } else {
      aptoBox = apto.faltantes && apto.faltantes.length > 0
        ? `<div class="alert-box yellow"><strong>Faltan estudios o pasos:</strong> ${apto.faltantes.map(escapeHtml).join(', ')}</div>`
        : `<div class="alert-box yellow"><strong>Pendiente:</strong> ${escapeHtml(apto.motivo||'revisar preoperatorio')}</div>`;
    }

    const reglaTxt = requiereCompletos
      ? (sano && edad >= 60
          ? `Paciente sano pero <strong>≥60 años</strong>: requiere preoperatorio completo (Rx tórax, hemograma, tiempos de coagulación, química, EKG y evaluación preoperatoria por M.I., M.F., Geriatría o subespecialidad).`
          : `Por antecedentes patológicos, este paciente requiere <strong>preoperatorio completo</strong> (laboratorios, EKG, Rx tórax y evaluación preoperatoria por M.I., M.F., Geriatría o subespecialidad).`)
      : `Paciente sano (sin APP) y <strong>menor de 60 años</strong>: requiere <strong>estudios básicos</strong> (Rx tórax, hemograma, tiempos de coagulación, química sanguínea básica). NO requiere evaluación preoperatoria por especialidad.`;

    const estudio = (key, label, mostrar=true) => {
      if (!mostrar) return '';
      const e = p.estudios[key] || {realizado:false,fecha:'',resultado:''};
      return `
        <div class="card compact">
          <div class="row-between">
            <div class="row-gap">
              <input type="checkbox" ${e.realizado?'checked':''} onchange="App.toggleEstudio('${p.id}','${key}',this.checked)">
              <strong>${label}</strong>
            </div>
            ${e.realizado?`<span class="tag green">Realizado</span>`:`<span class="tag red">Pendiente</span>`}
          </div>
          ${e.realizado?`
            <div class="field-row" style="margin-top:8px">
              <div class="field" style="margin-bottom:0">
                <label>Fecha</label>
                <input type="date" value="${escapeHtml(e.fecha)}" onchange="App.setEstudioCampo('${p.id}','${key}','fecha',this.value)">
              </div>
              <div class="field" style="margin-bottom:0">
                <label>Resultado / observaciones</label>
                <input value="${escapeHtml(e.resultado)}" oninput="App.setEstudioCampo('${p.id}','${key}','resultado',this.value)">
              </div>
            </div>
          `:''}
        </div>
      `;
    };

    const evalPre = getEvalPreop(p);
    const epEstado = evalPre.estado || 'pendiente';
    const epCls = preopEstadoCls(epEstado);
    const epLabel = preopEstadoLabel(epEstado);
    const tieneFechaSol = !!evalPre.fechaSolicitud;
    const diasSolicitud = tieneFechaSol ? daysBetween(evalPre.fechaSolicitud) : 0;
    const muestraSolicitud = ['solicitada','apto','apto_condicional','no_apto_temporal','no_apto'].includes(epEstado);
    const muestraResultado = ['apto','apto_condicional','no_apto_temporal','no_apto'].includes(epEstado);
    const muestraPendientes = ['apto_condicional','no_apto_temporal'].includes(epEstado);
    const totalPend = (evalPre.pendientes||[]).length;
    const faltanPend = preopPendientesFaltan(evalPre);
    const cumplPend = totalPend - faltanPend;

    const opcionesEstado = PREOP_ESTADOS.map(e =>
      `<option value="${e.v}" ${epEstado===e.v?'selected':''}>${escapeHtml(e.label)}</option>`
    ).join('');

    const avisoDemora = (epEstado==='solicitada' && tieneFechaSol && diasSolicitud >= 3)
      ? `<div class="alert-box yellow" style="margin-top:8px">⏱ Evaluación solicitada hace <strong>${diasSolicitud} día(s)</strong> sin respuesta.</div>`
      : '';

    const pendientesHTML = muestraPendientes ? `
      <div class="card compact" style="margin-top:8px;background:#fffbeb;border-left:4px solid #f59e0b">
        <div class="row-between">
          <strong>Pendientes derivados de la evaluación</strong>
          <span class="tag ${faltanPend===0?'green':'yellow'}">${cumplPend}/${totalPend} cumplidos</span>
        </div>
        ${(evalPre.pendientes||[]).length===0
          ? '<div class="muted" style="margin-top:6px">Sin pendientes registrados. Agrega los items que el evaluador pidió cumplir antes de cirugía.</div>'
          : (evalPre.pendientes||[]).map(it => `
              <div class="checkbox-row" style="margin-top:6px;gap:6px">
                <input type="checkbox" ${it.cumplido?'checked':''}
                  onchange="App.togglePendientePreop('${p.id}','${it.id}',this.checked)">
                <input style="flex:1${it.cumplido?';text-decoration:line-through;opacity:.6':''}"
                  value="${escapeHtml(it.texto||'')}"
                  oninput="App.setPendientePreopTexto('${p.id}','${it.id}',this.value)">
                <button class="btn-icon" title="Eliminar pendiente" onclick="App.delPendientePreop('${p.id}','${it.id}')">✕</button>
              </div>
            `).join('')
        }
        <div class="row-gap" style="margin-top:8px;flex-wrap:wrap">
          <button class="btn small" onclick="App.addPendientePreop('${p.id}')">+ Pendiente</button>
          <button class="btn small ghost" onclick="App.openPlantillasPendientesPreop('${p.id}')">📋 Plantilla</button>
        </div>
      </div>
    ` : '';

    const evalBlock = `
      <div class="card compact">
        <div class="row-between">
          <strong>Evaluación preoperatoria</strong>
          <span class="tag ${epCls}">${escapeHtml(epLabel)}${epEstado==='apto_condicional'&&faltanPend>0?` · ${faltanPend} pend.`:''}</span>
        </div>
        <div class="field" style="margin-top:8px;margin-bottom:0">
          <label>Estado</label>
          <select onchange="App.setEstadoEvalPreop('${p.id}',this.value)">
            ${opcionesEstado}
          </select>
        </div>
        ${muestraSolicitud?`
          <div class="field-row" style="margin-top:8px">
            <div class="field" style="margin-bottom:0">
              <label>Fecha de solicitud</label>
              <input type="date" value="${escapeHtml(evalPre.fechaSolicitud||'')}"
                onchange="App.setEstudioCampo('${p.id}','evaluacionPreop','fechaSolicitud',this.value)">
            </div>
            <div class="field" style="margin-bottom:0">
              <label>Especialidad</label>
              <select onchange="App.setEstudioCampo('${p.id}','evaluacionPreop','especialidad',this.value)">
                <option value="">—</option>
                ${SPECIALIDADES_PREOP.map(s=>`<option ${evalPre.especialidad===s?'selected':''}>${escapeHtml(s)}</option>`).join('')}
              </select>
            </div>
          </div>
          ${avisoDemora}
        `:''}
        ${muestraResultado?`
          <div class="field-row" style="margin-top:8px">
            <div class="field" style="margin-bottom:0">
              <label>Fecha de respuesta</label>
              <input type="date" value="${escapeHtml(evalPre.fecha||'')}"
                onchange="App.setEstudioCampo('${p.id}','evaluacionPreop','fecha',this.value)">
            </div>
          </div>
          <div class="field" style="margin-top:8px;margin-bottom:0">
            <label>Conclusión / recomendaciones</label>
            <textarea rows="2" oninput="App.setEstudioCampo('${p.id}','evaluacionPreop','resultado',this.value)">${escapeHtml(evalPre.resultado||'')}</textarea>
          </div>
        `:''}
        ${pendientesHTML}
      </div>
    `;

    return `
      ${aptoBox}
      <div class="alert-box blue">${reglaTxt}</div>

      <div class="card">
        <h3>Estudios básicos</h3>
        ${estudio('rxTorax','Rx de tórax')}
        ${estudio('hemograma','Hemograma completo')}
        ${estudio('tiemposCoagulacion','Tiempos de coagulación (TP/TPT/INR)')}
        ${estudio('quimicaSanguinea','Química sanguínea básica')}
      </div>

      <div class="card">
        <h3>Estudios adicionales (≥50 años o con antecedentes)</h3>
        ${requiereCompletos?'':'<div class="muted">No requeridos para este paciente, pero pueden registrarse si se realizan.</div>'}
        ${estudio('ekg','Electrocardiograma (EKG)')}
        ${evalBlock}
      </div>

      <div class="card">
        <h3>Contraindicaciones / razones para no operar</h3>
        <div class="checkbox-row">
          <input type="checkbox" id="cgi-${p.id}" ${p.contraindicaciones.malEstadoGeneral?'checked':''}
            onchange="App.setContra('${p.id}','malEstadoGeneral',this.checked)">
          <label for="cgi-${p.id}">Mal estado general</label>
        </div>
        <div class="checkbox-row">
          <input type="checkbox" id="cti-${p.id}" ${p.contraindicaciones.malEstadoTejidos?'checked':''}
            onchange="App.setContra('${p.id}','malEstadoTejidos',this.checked)">
          <label for="cti-${p.id}">Mal estado de tejidos blandos</label>
        </div>
        <div class="field" style="margin-top:8px">
          <label>Otra contraindicación</label>
          <input value="${escapeHtml(p.contraindicaciones.otra||'')}" oninput="App.setContra('${p.id}','otra',this.value)">
        </div>
      </div>
    `;
  },

  /* -------- Programa Quirúrgico (sub-pestaña en la ficha) -------- */
  tabPrograma(p) {
    const cirugias = getCirugiasRealizadas(p).slice().sort((a,b) => (b.fecha||'').localeCompare(a.fecha||''));
    const ult = ultimaCirugia(p);
    const dpost = diasPostop(p);
    const enProgramas = (State.data.programas || [])
      .filter(prg => prg.pacientes.some(e => e.pacienteId === p.id))
      .sort((a,b) => (b.fecha||'').localeCompare(a.fecha||''));

    let html = '';

    if (ult) {
      // Encabezado: estado actual
      if (p.requiereOtraCirugia) {
        html += `<div class="alert-box yellow">
          <strong>⚠ Pendiente otra cirugía.</strong> El paciente fue operado el ${fmtDate(ult.fecha)} (${dpost} día(s) postop) y se marcó que requiere una nueva cirugía.<br>
          Ya aparece en la lista <em>Listos para cirugía</em> y se puede agregar a un programa.
        </div>`;
      } else {
        html += `<div class="alert-box green">
          <strong>✓ Paciente operado.</strong> ${cirugias.length>1?`${cirugias.length} cirugías realizadas. `:''}
          Última: ${escapeHtml(ult.procedimiento||'—')}${ult.lateralidad?' ('+escapeHtml(ult.lateralidad)+')':''}
          el ${fmtDate(ult.fecha)} · <strong>${dpost} día(s) postoperatorio</strong>.
        </div>`;
      }

      // Toggle "Requiere otra cirugía"
      html += `<div class="card">
        <div class="checkbox-row">
          <input type="checkbox" id="reqotra-${p.id}" ${p.requiereOtraCirugia?'checked':''}
            onchange="App.toggleRequiereOtraCirugia('${p.id}',this.checked)">
          <label for="reqotra-${p.id}"><strong>Requiere otra cirugía</strong></label>
        </div>
        <div class="muted" style="font-size:.85rem;margin-top:4px">
          Marca esta casilla cuando el paciente, ya operado, vaya a necesitar otra intervención (lavado quirúrgico, etapa siguiente, complicación, etc.). Mientras esté marcada, el paciente aparecerá en la lista <em>Listos para cirugía</em> si cumple los estudios preoperatorios. Al confirmar la nueva cirugía en la revisión del programa, la app te preguntará si aún requiere otra cirugía adicional antes de desmarcarla.
        </div>
      </div>`;

      // Historial de cirugías realizadas
      html += `<div class="card">
        <div class="row-between">
          <h3 style="margin:0">Historial de cirugías</h3>
          <button class="btn ghost small" onclick="App.agregarCirugiaManual('${p.id}')">+ Agregar manual</button>
        </div>
        ${cirugias.map((c, idx) => `
          <div class="card compact" style="margin-top:10px">
            <div class="row-between">
              <strong>${cirugias.length-idx}. ${fmtDate(c.fecha)}</strong>
              ${c.programaId?'<span class="tag blue" style="font-size:.7rem">Del programa</span>':'<span class="tag gray" style="font-size:.7rem">Manual</span>'}
            </div>
            <div class="field-row" style="margin-top:8px">
              <div class="field" style="margin-bottom:0">
                <label>Fecha</label>
                <input type="date" value="${escapeHtml(c.fecha||'')}" onchange="App.setCirugiaIdx('${p.id}',${idx},'fecha',this.value)">
              </div>
              <div class="field" style="margin-bottom:0">
                <label>Cirujano</label>
                <input value="${escapeHtml(c.cirujano||'')}" oninput="App.setCirugiaIdx('${p.id}',${idx},'cirujano',this.value)">
              </div>
            </div>
            <div class="field" style="margin-top:8px">
              <label>Procedimiento</label>
              <textarea rows="2" oninput="App.setCirugiaIdx('${p.id}',${idx},'procedimiento',this.value)">${escapeHtml(c.procedimiento||'')}</textarea>
            </div>
            <div class="field-row">
              <div class="field" style="margin-bottom:0">
                <label>Lateralidad</label>
                <input value="${escapeHtml(c.lateralidad||'')}" oninput="App.setCirugiaIdx('${p.id}',${idx},'lateralidad',this.value)">
              </div>
              <div class="field" style="margin-bottom:0">
                <label>Quirófano</label>
                <input value="${escapeHtml(c.quirofano||'')}" oninput="App.setCirugiaIdx('${p.id}',${idx},'quirofano',this.value)">
              </div>
            </div>
            <div class="field" style="margin-top:8px;margin-bottom:0">
              <label>Notas / hallazgos</label>
              <textarea rows="2" oninput="App.setCirugiaIdx('${p.id}',${idx},'notas',this.value)">${escapeHtml(c.notas||'')}</textarea>
            </div>
            <div style="text-align:right;margin-top:8px">
              <button class="btn ghost small" onclick="App.eliminarCirugiaIdx('${p.id}',${idx})">Eliminar esta cirugía</button>
            </div>
          </div>
        `).join('')}
      </div>`;
    } else {
      // No operado — estado preop
      const apto = evaluarAptoCirugia(p);
      html += apto.listo
        ? `<div class="alert-box green">Paciente <strong>listo para cirugía</strong>. Puedes agregarlo al programa quirúrgico desde la pestaña <em>Programa Qx</em>.</div>`
        : `<div class="alert-box yellow"><strong>Pendiente de preoperatorio.</strong> ${escapeHtml(apto.motivo)}${apto.faltantes&&apto.faltantes.length?': '+escapeHtml(apto.faltantes.join(', ')):''}</div>`;
    }

    // Historial de aparición en programas (planeación)
    if (enProgramas.length > 0) {
      html += `<div class="card">
        <h3>Aparece en programas</h3>
        ${enProgramas.map(prg => {
          const e = prg.pacientes.find(x => x.pacienteId === p.id);
          const opTag = e.operado === true ? '<span class="tag green">Operado</span>'
                      : e.operado === false ? '<span class="tag red">No operado</span>'
                      : '<span class="tag blue">Programado</span>';
          return `
            <div class="card compact" style="margin-top:8px;cursor:pointer" onclick="App.closeModal();App.switchTab('programa');App.abrirPrograma('${prg.id}')">
              <div class="row-between">
                <div>
                  <strong>${fmtDateLong(prg.fecha)}</strong> ${opTag}
                  ${e.motivoNoOperado?`<div class="muted" style="font-size:.8rem">Motivo: ${escapeHtml(e.motivoNoOperado)}</div>`:''}
                </div>
                <div class="muted" style="font-size:.85rem">→</div>
              </div>
              <div class="muted" style="font-size:.85rem;margin-top:4px">
                ${e.quirofano?`Q${escapeHtml(e.quirofano)}#${e.orden||1} · `:''}
                ${escapeHtml(e.procedimiento||'(sin procedimiento)')}${e.lateralidad?' ('+escapeHtml(e.lateralidad)+')':''}
              </div>
            </div>
          `;
        }).join('')}
      </div>`;
    } else if (!ult) {
      html += `<div class="card muted" style="text-align:center">
        Este paciente no está en ningún programa quirúrgico.<br>
        <button class="btn small" style="margin-top:8px" onclick="App.closeModal();App.switchTab('programa')">Ir a Programa Qx</button>
      </div>`;
    }

    return html;
  },

  toggleRequiereOtraCirugia(id, val) {
    const p = this._findP(id); if (!p) return;
    p.requiereOtraCirugia = !!val;
    logCambio(p, 'Cirugía', val ? 'Marcado: requiere otra cirugía' : 'Desmarcado: ya no requiere otra cirugía');
    State.save();
    this.renderModal(id);
  },

  setCirugiaIdx(id, idx, campo, val) {
    const p = this._findP(id); if (!p) return;
    const lista = getCirugiasRealizadas(p);
    // ordenar por fecha desc para indexar
    const ordenadas = lista.slice().sort((a,b) => (b.fecha||'').localeCompare(a.fecha||''));
    const target = ordenadas[idx];
    if (!target) return;
    target[campo] = val;
    sincronizarCirugiaLegacy(p);
    State.save();
  },

  eliminarCirugiaIdx(id, idx) {
    if (!confirm('¿Eliminar esta cirugía del historial? Esto NO afecta el programa quirúrgico de origen, sólo el registro en la ficha del paciente.')) return;
    const p = this._findP(id); if (!p) return;
    const lista = getCirugiasRealizadas(p);
    const ordenadas = lista.slice().sort((a,b) => (b.fecha||'').localeCompare(a.fecha||''));
    const target = ordenadas[idx];
    if (!target) return;
    p.cirugiasRealizadas = lista.filter(c => c !== target);
    sincronizarCirugiaLegacy(p);
    logCambio(p, 'Cirugía', `Eliminada del historial: ${target.fecha} ${target.procedimiento||''}`);
    State.save();
    this.renderModal(id);
  },

  agregarCirugiaManual(id) {
    const p = this._findP(id); if (!p) return;
    if (!p.cirugiasRealizadas) p.cirugiasRealizadas = [];
    p.cirugiasRealizadas.push({
      fecha: todayISO(),
      procedimiento: '',
      lateralidad: '',
      cirujano: p.cirujano || '',
      programaId: '',
      quirofano: '',
      notas: ''
    });
    sincronizarCirugiaLegacy(p);
    logCambio(p, 'Cirugía', 'Agregada manualmente al historial');
    State.save();
    this.renderModal(id);
  },

  /* -------- Evolución diaria -------- */

  addEvolucion(id) {
    const p = this._findP(id); if (!p) return;
    if (!p.evoluciones) p.evoluciones = [];
    p.evoluciones.push({
      id: 'ev_' + uid(),
      fecha: new Date().toISOString(),
      texto: '',
      autor: getCurrentUser() || '(sin identificar)',
      modificado: new Date().toISOString()
    });
    logCambio(p, 'Evolución', 'Nueva entrada');
    State.save();
    this.renderModal(id);
  },
  setEvolucion(id, evId, campo, valor) {
    const p = this._findP(id); if (!p) return;
    const ev = (p.evoluciones||[]).find(x => x.id === evId);
    if (!ev) return;
    ev[campo] = valor;
    ev.modificado = new Date().toISOString();
    State.save();
  },
  eliminarEvolucion(id, evId) {
    if (!confirm('¿Eliminar esta evolución?')) return;
    const p = this._findP(id); if (!p) return;
    p.evoluciones = (p.evoluciones||[]).filter(x => x.id !== evId);
    logCambio(p, 'Evolución', 'Entrada eliminada');
    State.save();
    this.renderModal(id);
  },
  copiarEvolucionAnterior(id, evId) {
    const p = this._findP(id); if (!p) return;
    const evs = (p.evoluciones||[]).slice().sort((a,b) => (b.fecha||'').localeCompare(a.fecha||''));
    const idx = evs.findIndex(x => x.id === evId);
    if (idx < 0 || idx >= evs.length - 1) { alert('No hay evolución anterior.'); return; }
    const ev = evs[idx];
    const anterior = evs[idx + 1];
    if (ev.texto && !confirm('Esto reemplazará el texto actual con el de la evolución anterior. ¿Continuar?')) return;
    ev.texto = anterior.texto || '';
    ev.modificado = new Date().toISOString();
    logCambio(p, 'Evolución', 'Copiada de la entrada anterior');
    State.save();
    this.renderModal(id);
  },

    const p = this._findP(pacienteId); if (!p) return;

    const plantilla = getCatalogo('plantillasEvolucion')[idxPlantilla];

  /* ===========================================================
     ACCIONES (mutaciones)
     =========================================================== */
  _findP(id) { return State.data.patients.find(x => x.id === id); },

  actualizar(id, campo, valor) {
    const p = this._findP(id); if (!p) return;
    if (p[campo] !== valor) {
      logCambio(p, 'Edición', `${campo}: ${valor}`);
    }
    p[campo] = valor;
    this._markPatientDirty(id);   // v3.25 (C3): proteger contra overwrite por snapshot
    State.save();
    // No re-render del modal completo para no perder foco; sólo refresca header sutilmente
    this._refreshHeader(id);
  },

  _refreshHeader(id) {
    // Actualiza badge y header de modal sin rerender pesado
    const p = this._findP(id); if (!p) return;
    const head = document.querySelector('.modal-head');
    if (head) {
      const apto = evaluarAptoCirugia(p);
      const dias = daysBetween(p.fechaIngreso);
      const erroresValidacionH = validarPaciente(p);
      const progPendH = getProgramacionPendiente(p);
      const aptoBadge = (erroresValidacionH.length > 0)
        ? `<span class="pill notready">⚠ Datos incompletos</span>`
        : (progPendH && !apto.operado)
          ? `<span class="pill" style="background:#dbeafe;color:#1e3a8a">📅 Programado · ${fmtDate(progPendH.programa.fecha)}${progPendH.entrada.quirofano?' · Q'+escapeHtml(progPendH.entrada.quirofano):''}</span>`
          : apto.listo
            ? `<span class="pill ready">✓ Listo cirugía</span>`
            : apto.operado
              ? (p.requiereOtraCirugia
                  ? (progPendH
                      ? `<span class="pill" style="background:#dbeafe;color:#1e3a8a">📅 Reoperación programada · ${fmtDate(progPendH.programa.fecha)}</span>`
                      : `<span class="pill pending">Operado · pendiente otra cirugía</span>`)
                  : `<span class="pill ready">✓ Operado</span>`)
              : (tieneContraindicacion(p) ? `<span class="pill notready">No apto</span>` : `<span class="pill pending">Pendiente</span>`);
      head.innerHTML = `
        <div>
          <div style="font-weight:600">${escapeHtml(p.nombre || '(Nuevo paciente)')}</div>
          <div style="font-size:.8rem;opacity:.9">
            Cama ${escapeHtml(p.cama||'?')} · ${escapeHtml(p.cedula||'sin cédula')} · ${dias} día(s) ${aptoBadge}
          </div>
        </div>
        <button class="close-x" onclick="App.closeModal()" aria-label="Cerrar">✕</button>
      `;
    }
  },

  actualizarDx(id, valor) {
    const p = this._findP(id); if (!p) return;

  /* ---------- Archivado de egresados antiguos ---------- */
  snoozeArchivar(dias) {

  archivarEgresadosAntiguos() {
    const cfg = getConfig();
    const meses = cfg.archivoMesesAntiguedad === undefined ? 6 : cfg.archivoMesesAntiguedad;
    const aArchivar = egresadosParaArchivar(meses);
    if (aArchivar.length === 0) {
      alert('No hay egresados con más de ' + meses + ' meses para archivar.');
      return;
    }
    const idsAArchivar = new Set(aArchivar.map(p => p.id));
    const egresosAsoc = (State.data.egresos || []).filter(eg => idsAArchivar.has(eg.pacienteId));

    // Mostrar confirmación con detalles
    const fechaMin = aArchivar.reduce((m,p) => p.fechaEgreso < m ? p.fechaEgreso : m, aArchivar[0].fechaEgreso);
    const fechaMax = aArchivar.reduce((m,p) => p.fechaEgreso > m ? p.fechaEgreso : m, aArchivar[0].fechaEgreso);
    const ok = confirm(
      'ARCHIVAR EGRESADOS ANTIGUOS\\n\\n' +
      'Se exportará un archivo JSON con:\\n' +
      '  • ' + aArchivar.length + ' paciente(s) egresado(s)\\n' +
      '  • ' + egresosAsoc.length + ' reporte(s) de egreso\\n' +
      '  • Egresos entre: ' + fechaMin + ' y ' + fechaMax + '\\n\\n' +
      'DESPUÉS de exportar, estos pacientes se ELIMINARÁN de la base de datos activa.\\n' +
      'Quedarán SOLO en el archivo JSON descargado.\\n\\n' +
      'Para recuperarlos en el futuro, importa el JSON desde el botón "Importar".\\n\\n' +
      '¿Proceder con el archivado?'
    );
    if (!ok) return;

    // Generar archivo JSON con la información de los archivados
    const archivo = {
      tipo: 'archivo_egresados_ortopedia',
      version: APP_VERSION,
      fecha_archivado: new Date().toISOString(),
      criterio: `Egresados de hace más de ${meses} mes(es)`,
      pacientes: aArchivar,
      egresos: egresosAsoc,
      // Cirugías y referencias adicionales por contexto
      programas_relacionados: (State.data.programas || []).filter(prg =>
        prg.pacientes && prg.pacientes.some(e => idsAArchivar.has(e.pacienteId))
      ).map(prg => ({
        ...prg,
        pacientes: prg.pacientes.filter(e => idsAArchivar.has(e.pacienteId))
      }))
    };

    const blob = new Blob([JSON.stringify(archivo, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `ortopedia_archivo_egresados_${todayISO()}.json`;
    document.body.appendChild(a); a.click(); a.remove();
    URL.revokeObjectURL(url);

    // Eliminar pacientes y egresos de la base activa
    State.data.patients = State.data.patients.filter(p => !idsAArchivar.has(p.id));
    State.data.egresos = (State.data.egresos || []).filter(eg => !idsAArchivar.has(eg.pacienteId));
    // Limpiar entradas de programas viejos asociados a esos pacientes (opcional pero aliviana)
    (State.data.programas || []).forEach(prg => {
      if (prg.pacientes) {
        prg.pacientes = prg.pacientes.filter(e => !idsAArchivar.has(e.pacienteId));
      }
    });
    // Eliminar programas que quedaron vacíos
    State.data.programas = (State.data.programas || []).filter(prg => prg.pacientes && prg.pacientes.length > 0);

    State.save();
    // Limpiar snooze para que pueda volver a aparecer cuando haya más viejos
    localStorage.removeItem(ARCHIVO_SNOOZE_KEY);

    alert('✓ ' + aArchivar.length + ' paciente(s) archivado(s).\\n\\n' +
      'Archivo descargado: ortopedia_archivo_egresados_' + todayISO() + '.json\\n\\n' +
      'Guárdalo en lugar seguro (Drive, USB, correo). Si necesitas recuperar a algún paciente, ' +
      'usa "Importar" con este archivo.');
    this.render();
  },

  exportData() {
    const blob = new Blob([JSON.stringify(State.data, null, 2)], { type:'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `ortopedia_${todayISO()}.json`;
    document.body.appendChild(a); a.click(); a.remove();
    URL.revokeObjectURL(url);
    setLastExportNow();
    // Refrescar para que desaparezca el banner si estaba visible
    if (State.currentTab === 'lista' || State.currentTab === 'todos') this.render();
  },

  importData(ev) {
    const f = ev.target.files[0];
    if (!f) return;
    const reader = new FileReader();
    reader.onload = e => {
      try {
        const obj = JSON.parse(e.target.result);
        if (!obj || typeof obj !== 'object') throw new Error('Formato no válido');
        if (!Array.isArray(obj.patients)) throw new Error('El archivo no contiene una lista válida de pacientes');
        if (!confirm(`Importar ${obj.patients.length} paciente(s)? Se reemplazarán los datos actuales.`)) return;
        // v3.24 (C2): hacer respaldo defensivo antes de sobrescribir, y migrar el dato nuevo
        try { Backups.guardar(State.data); } catch(e){}
        State.data = obj;
        // v3.24 (C2): completar campos faltantes y migrar a la versión actual
        State._migrar();
        State.save();
        this.render();
        alert('Importación completada. ' + obj.patients.length + ' paciente(s) cargado(s).');
      } catch(err) {
        alert('Error al importar: ' + err.message);
      }
    };
    reader.readAsText(f);
    ev.target.value = '';
  },

  /* ---------- Backups en la nube (v3.23) ---------- */
  async refreshCloudBackups() {
    const cont = document.getElementById('cloudBackupList');
    if (!cont) return;
    cont.innerHTML = 'Cargando…';
    if (!Sync.db) {
      cont.innerHTML = '<em>Firebase no está conectado. Configura la sincronización primero.</em>';
      return;
    }
    const lista = await CloudBackups.listar();
    if (lista.length === 0) {
      cont.innerHTML = '<em>No hay respaldos en la nube todavía. El primero se crea automáticamente al primer cambio del día.</em>';
      return;
    }
    cont.innerHTML = lista.map(b => {
      const r = b.resumen || {};
      const t = b.timestamp ? new Date(b.timestamp).toLocaleString('es') : b.fecha;
      return `<div class="card compact" style="margin-bottom:6px;display:flex;gap:8px;align-items:center;flex-wrap:wrap">
        <div style="flex:1;min-width:200px;font-size:.85rem">
          <strong>${escapeHtml(b.fecha)}</strong> · ${escapeHtml(t)}
          <div class="muted" style="font-size:.78rem">${r.pacientesActivos||0} activos · ${r.pacientes||0} totales · ${r.programas||0} programas · ${r.egresos||0} egresos · ${r.usuarios||0} usuarios${b.creadoPor?' · creado por '+escapeHtml(b.creadoPor):''}</div>
        </div>
        <button class="btn small" data-cloud-fecha="${escapeHtml(b.fecha)}" onclick="App._handleRestaurarNube(this)">Restaurar</button>
      </div>`;
    }).join('');
  },

  // v3.24 (C7): handler con data-attribute (evita inyección por nombre/fecha)
  _handleRestaurarNube(btn) {
    const fecha = btn.dataset.cloudFecha;
    if (!fecha || !/^\d{4}-\d{2}-\d{2}$/.test(fecha)) {
      alert('Fecha de respaldo inválida.');
      return;
    }
    return this.restaurarBackupNube(fecha);
  },

  async restaurarBackupNube(fecha) {
    if (!Sync.db) {
      alert('Firebase no está conectado.');
      return;
    }
    const restaurado = await CloudBackups.cargar(fecha);
    if (!restaurado) { alert('No se pudo cargar ese respaldo.'); return; }
    const r = {
      pacientes: (restaurado.patients||[]).length,
      activos: (restaurado.patients||[]).filter(p => !p.fechaEgreso).length,
      programas: (restaurado.programas||[]).length,
      egresos: (restaurado.egresos||[]).length,
      usuarios: (restaurado.config && restaurado.config.usuarios ? restaurado.config.usuarios.length : 0)
    };
    const msg = `¿Restaurar el respaldo del ${fecha}?\n\n` +
                `Contiene:\n` +
                `  • ${r.pacientes} pacientes (${r.activos} activos)\n` +
                `  • ${r.programas} programas\n` +
                `  • ${r.egresos} egresos\n` +
                `  • ${r.usuarios} usuarios\n\n` +
                `Esto va a REEMPLAZAR los datos actuales (también en la nube). ` +
                `Antes se guardará un respaldo local automático por si te arrepientes.`;
    if (!confirm(msg)) return;
    // Snapshot local defensivo
    Backups.guardar(State.data);
    State.data = restaurado;
    State._migrar();   // v3.24 (C2): migrar shape al actual (puede ser un respaldo viejo)
    State.save();
    this.closeModal();
    this.render();
    alert('Respaldo restaurado y publicado a la nube. Los demás dispositivos lo recibirán en unos segundos.');
  },

  async forzarBackupHoy() {
    CloudBackups._lastCheckedDay = null;
    await CloudBackups.asegurarBackupDeHoy();
    alert('Verificación de respaldo de hoy completada.');
    this.refreshCloudBackups();
  },

  /* ---------- Analizador de tamaño (v3.28) ---------- */
  analizarTamano() {
    const a = SizeAnalyzer.analizar();
    const cont = document.getElementById('sizeAnalysisBlock');
    if (!cont) return;
    const kb = (b) => (b/1024).toFixed(1) + ' KB';
    const pct = (b, total) => total > 0 ? ((b/total)*100).toFixed(1) + '%' : '0%';
    const limite = 1048576;
    const pctLimite = ((a.totalBytes/limite)*100).toFixed(1);
    const color = a.totalBytes > 950000 ? '#dc2626' : (a.totalBytes > 800000 ? '#92400e' : '#059669');

    let html = '<div style="border:1px solid #cbd5e1;padding:10px;border-radius:6px;margin-top:8px">';
    html += '<div style="font-size:1rem;font-weight:600;color:' + color + '">' +
            'Tamaño total: ' + kb(a.totalBytes) + ' (' + pctLimite + '% del límite de Firestore)' +
            '</div>';
    html += '<div style="margin-top:8px;font-size:.85rem">';
    html += '<div><strong>Pacientes:</strong> ' + kb(a.patientsBytes) + ' (' + pct(a.patientsBytes, a.totalBytes) + ') · ' + a.patientCount + ' pacientes</div>';
    html += '<div><strong>Programas:</strong> ' + kb(a.programasBytes) + ' (' + pct(a.programasBytes, a.totalBytes) + ')</div>';
    html += '<div><strong>Egresos:</strong> ' + kb(a.egresosBytes) + ' (' + pct(a.egresosBytes, a.totalBytes) + ')</div>';
    html += '<div><strong>IC Recibidas:</strong> ' + kb(a.icBytes) + ' (' + pct(a.icBytes, a.totalBytes) + ')</div>';
    html += '<div><strong>Configuración / catálogos:</strong> ' + kb(a.configBytes) + ' (' + pct(a.configBytes, a.totalBytes) + ')</div>';
    html += '</div>';

    // Top 10 pacientes más pesados
    const top10 = a.pacientes.slice(0, 10);
    html += '<h4 style="margin:12px 0 6px">Top 10 pacientes más pesados</h4>';
    html += '<table style="width:100%;font-size:.78rem;border-collapse:collapse">';
    html += '<thead><tr style="border-bottom:1px solid #cbd5e1"><th align="left">Paciente</th><th align="right">Total</th><th align="right">Historial</th><th align="right">Evol.</th><th align="right">Labs</th></tr></thead>';
    html += '<tbody>';
    top10.forEach(p => {
      html += '<tr style="border-bottom:1px solid #f1f5f9">' +
              '<td>' + escapeHtml(p.nombre) + (p.cama ? ' (' + escapeHtml(p.cama) + ')' : '') + (p.egresado ? ' <span class="tag gray">egresado</span>' : '') + '</td>' +
              '<td align="right">' + kb(p.totalBytes) + '</td>' +
              '<td align="right">' + kb(p.historialBytes) + ' (' + p.historialCount + ')</td>' +
              '<td align="right">' + kb(p.evolucionesBytes) + ' (' + p.evolucionesCount + ')</td>' +
              '<td align="right">' + kb(p.laboratoriosBytes) + ' (' + p.laboratoriosCount + ')</td>' +
              '</tr>';
    });
    html += '</tbody></table>';

    // Acciones recomendadas
    html += '<h4 style="margin:12px 0 6px">Acciones para liberar espacio</h4>';
    html += '<div style="display:flex;gap:8px;flex-wrap:wrap">';
    html += '<button class="btn small" onclick="App.compactarHistorialUI()">🗜 Compactar historial (cap 50/paciente)</button>';
    html += '<button class="btn small" onclick="App.compactarEgresadosUI()">📦 Compactar evoluciones de egresados</button>';
    html += '<button class="btn ghost small" onclick="App.archivarEgresadosAntiguos()">📥 Archivar egresados antiguos</button>';
    html += '<button class="btn ghost small" onclick="App.exportData()">⬇ Exportar JSON (respaldo)</button>';
    html += '</div>';
    html += '<div class="muted" style="margin-top:8px;font-size:.78rem">';
    html += 'Antes de cualquier compactación, exporta un JSON como respaldo manual. ';
    html += 'Los respaldos automáticos también se crean antes de cada operación.';
    html += '</div>';
    html += '</div>';
    cont.innerHTML = html;
  },

  compactarHistorialUI() {
    if (!confirm('Compactar historial:\n\n' +
                 '• Deduplica entradas consecutivas idénticas\n' +
                 '• Limita a 50 entradas más recientes por paciente\n' +
                 '• Se aplica a TODOS los pacientes (activos y egresados)\n\n' +
                 'Esto NO borra información clínica — sólo limpia ruido del historial de cambios. ' +
                 'Se hará un respaldo automático antes de aplicar. ¿Continuar?')) return;
    Backups.guardar(State.data);
    const r = SizeAnalyzer.compactarHistorial(50, true, true);
    State.save();
    const kb = (b) => (b/1024).toFixed(1) + ' KB';
    alert('Compactación completada:\n\n' +
          '• Pacientes afectados: ' + r.pacientesAfectados + '\n' +
          '• Espacio liberado: ' + kb(r.bytesAhorrados) + '\n' +
          '• Tamaño antes: ' + kb(r.antesBytes) + '\n' +
          '• Tamaño después: ' + kb(r.despuesBytes));
    this.analizarTamano();   // refrescar análisis
  },

  compactarEgresadosUI() {
    const cant = (State.data.patients || []).filter(p =>
      p.fechaEgreso && Array.isArray(p.evoluciones) && p.evoluciones.length > 5
    ).length;
    if (cant === 0) {
      alert('No hay pacientes egresados con más de 5 evoluciones. Nada que compactar.');
      return;
    }
    if (!confirm('Compactar evoluciones de pacientes egresados:\n\n' +
                 '• Afecta sólo a pacientes con fechaEgreso\n' +
                 '• Mantiene las 5 evoluciones más recientes (las cercanas al egreso)\n' +
                 '• ' + cant + ' paciente(s) tienen más de 5 evoluciones\n\n' +
                 '⚠ Las evoluciones antiguas se ELIMINARÁN. Asegúrate de tener un respaldo. ' +
                 'Se hará un respaldo automático antes. ¿Continuar?')) return;
    Backups.guardar(State.data);
    const r = SizeAnalyzer.compactarEgresados(5);
    State.save();
    const kb = (b) => (b/1024).toFixed(1) + ' KB';
    alert('Compactación completada:\n\n' +
          '• Pacientes egresados afectados: ' + r.pacientesAfectados + '\n' +
          '• Evoluciones eliminadas: ' + r.evolucionesEliminadas + '\n' +
          '• Espacio liberado: ' + kb(r.bytesAhorrados) + '\n' +
          '• Tamaño antes: ' + kb(r.antesBytes) + '\n' +
          '• Tamaño después: ' + kb(r.despuesBytes));
    this.analizarTamano();
  },

  /* ---------- Almacenamiento e IndexedDB (v3.26) ---------- */
  async refreshStorageStatus() {
    const cont = document.getElementById('storageStatusBlock');
    if (!cont) return;
    let html = '';
    // Persistencia
    if (navigator.storage && navigator.storage.persisted) {
      try {
        const persistido = await navigator.storage.persisted();
        html += '<div><strong>Persistencia:</strong> ' +
          (persistido ? '<span style="color:#059669">✓ otorgada</span>' : '<span style="color:#92400e">✗ no otorgada</span>') +
          '</div>';
      } catch(e) {}
    } else {
      html += '<div><strong>Persistencia:</strong> no soportada en este navegador</div>';
    }
    // Quota
    if (navigator.storage && navigator.storage.estimate) {
      try {
        const e = await navigator.storage.estimate();
        const usadoMB = (e.usage/1024/1024).toFixed(1);
        const quotaMB = (e.quota/1024/1024).toFixed(0);
        const pct = ((e.usage/e.quota)*100).toFixed(1);
        html += '<div><strong>Espacio usado:</strong> ' + usadoMB + ' MB de ' + quotaMB + ' MB (' + pct + '%)</div>';
      } catch(e) {}
    }
    // Service Worker
    if ('serviceWorker' in navigator) {
      try {
        const reg = await navigator.serviceWorker.getRegistration();
        html += '<div><strong>Service Worker:</strong> ' +
          (reg ? '<span style="color:#059669">✓ activo</span> (' + escapeHtml(reg.scope) + ')'
               : '<span style="color:#92400e">no registrado</span> — sube <code>sw.js</code> junto al index.html') +
          '</div>';
      } catch(e) {}
    } else {
      html += '<div><strong>Service Worker:</strong> no soportado</div>';
    }
    // Backups en IDB
    try {
      const lista = await Backups.listarIDB();
      html += '<div><strong>Respaldos en IndexedDB:</strong> ' + lista.length + ' snapshot(s)</div>';
    } catch(e) {}
    cont.innerHTML = html;
  },

  async pedirPersistenciaManual() {
    if (!navigator.storage || !navigator.storage.persist) {
      alert('Este navegador no soporta solicitar persistencia.');
      return;
    }
    try {
      const otorgado = await navigator.storage.persist();
      alert(otorgado
        ? 'Persistencia OTORGADA. Tus datos locales son más resistentes a eviction.'
        : 'No se pudo otorgar persistencia automáticamente.\n\nEn iOS / Safari, instala la app como PWA (Compartir → Añadir a pantalla de inicio) y vuelve a intentar.\n\nEn Chrome desktop, se otorga al usar la app con frecuencia.');
      this.refreshStorageStatus();
    } catch(e) {
      alert('Error: ' + e.message);
    }
  },

  async listarBackupsIDB() {
    const cont = document.getElementById('idbBackupList');
    if (!cont) return;
    cont.innerHTML = '<em class="muted" style="font-size:.85rem">Cargando…</em>';
    try {
      const lista = await Backups.listarIDB();
      if (lista.length === 0) {
        cont.innerHTML = '<em class="muted" style="font-size:.85rem">No hay respaldos en IndexedDB. Se crearán al editar pacientes.</em>';
        return;
      }
      this._idbBackupsCache = {};
      cont.innerHTML = lista.map(e => {
        this._idbBackupsCache[e.timestamp] = true;
        const t = new Date(e.timestamp).toLocaleString('es');
        const r = e.resumen || {};
        return '<div class="card compact" style="margin-bottom:6px;display:flex;gap:8px;align-items:center;flex-wrap:wrap">' +
          '<div style="flex:1;min-width:200px;font-size:.85rem">' +
            '<strong>' + escapeHtml(t) + '</strong> <span class="tag gray">' + escapeHtml(e.kind||'') + '</span>' +
            '<div class="muted" style="font-size:.78rem">' + (r.pacientesActivos||0) + ' activos · ' + (r.pacientes||0) + ' totales · ' + (r.programas||0) + ' programas · ' + (r.egresos||0) + ' egresos · ' + (r.usuarios||0) + ' usuarios · ' + (e.tamanoKB||0) + ' KB</div>' +
          '</div>' +
          '<button class="btn small" data-ts="' + escapeHtml(e.timestamp) + '" onclick="App._handleRestaurarIDB(this)">Restaurar</button>' +
        '</div>';
      }).join('');
    } catch(err) {
      cont.innerHTML = '<em class="muted" style="color:#dc2626">Error: ' + escapeHtml(err.message||'') + '</em>';
    }
  },

  async _handleRestaurarIDB(btn) {
    const ts = btn.dataset.ts;
    if (!ts) return;
    const restaurado = await Backups.restaurarIDB(ts);
    if (!restaurado) { alert('No se pudo cargar el respaldo de IndexedDB.'); return; }
    const r = {
      pacientes: (restaurado.patients||[]).length,
      activos: (restaurado.patients||[]).filter(p => !p.fechaEgreso).length,
      programas: (restaurado.programas||[]).length,
      egresos: (restaurado.egresos||[]).length,
      usuarios: (restaurado.config && restaurado.config.usuarios ? restaurado.config.usuarios.length : 0)
    };
    const fecha = new Date(ts).toLocaleString('es');
    const msg = '¿Restaurar el respaldo del ' + fecha + ' desde IndexedDB?\n\n' +
                'Contiene:\n' +
                '  • ' + r.pacientes + ' pacientes (' + r.activos + ' activos)\n' +
                '  • ' + r.programas + ' programas\n' +
                '  • ' + r.egresos + ' egresos\n' +
                '  • ' + r.usuarios + ' usuarios\n\n' +
                'Esto va a REEMPLAZAR los datos actuales (también en la nube). ' +
                'Antes se guardará un respaldo local automático por si te arrepientes.';
    if (!confirm(msg)) return;
    Backups.guardar(State.data);
    State.data = restaurado;
    State._migrar();   // C2
    State.save();
    this.closeModal();
    this.render();
    alert('Respaldo restaurado desde IndexedDB.');
  },

  /* ---------- Google Drive (v3.23) ---------- */
  guardarDriveClientId(id) {
    DriveBackup.setClientId((id||'').trim());
    this.openSetup();
  },

  async autorizarDrive() {
    try {
      await DriveBackup.autorizar();
      alert('Autorización exitosa. Se va a subir el respaldo de hoy.');
      try { await DriveBackup.subirBackupDeHoy(); } catch(e) { alert('Autorizado pero falló la primera subida: ' + e.message); }
      this.openSetup();
    } catch(e) {
      alert('Error autorizando Google Drive:\n' + e.message);
    }
  },

  desautorizarDrive() {
    if (!confirm('¿Desautorizar el acceso a Google Drive? Ya no se subirán respaldos automáticamente.')) return;
    DriveBackup.desautorizar();
    this.openSetup();
  },

  async subirBackupDriveAhora() {
    try {
      DriveBackup._lastUploadDay = null;
      const ok = await DriveBackup.subirBackupDeHoy();
      alert(ok ? 'Respaldo subido a Google Drive.' : 'No se subió (datos vacíos o ya estaba subido).');
    } catch(e) {
      alert('Error subiendo a Drive:\n' + e.message);
    }
  },

  async listarBackupsDrive() {
    const cont = document.getElementById('driveBackupList');
    if (!cont) return;
    cont.innerHTML = '<em class="muted" style="font-size:.85rem">Cargando…</em>';
    try {
      const files = await DriveBackup.listar();
      if (files.length === 0) {
        cont.innerHTML = '<em class="muted" style="font-size:.85rem">No hay respaldos en tu carpeta de Drive.</em>';
        return;
      }
      // v3.24 (C7): guardar lista en cache y renderizar usando data attributes,
      // sin meter nombres/ids dentro de strings de JS (evita XSS por nombre malicioso).
      this._driveFilesCache = {};
      cont.innerHTML = files.map(f => {
        this._driveFilesCache[f.id] = { name: f.name };
        return `
          <div class="card compact" style="margin-bottom:6px;display:flex;gap:8px;align-items:center;flex-wrap:wrap">
            <div style="flex:1;min-width:200px;font-size:.85rem">
              <strong>${escapeHtml(f.name)}</strong>
              <div class="muted" style="font-size:.78rem">${escapeHtml(new Date(f.modifiedTime).toLocaleString('es'))} · ${Math.round((f.size||0)/1024)} KB</div>
            </div>
            <button class="btn small" data-drive-id="${escapeHtml(f.id)}" onclick="App._handleRestaurarDrive(this)">Restaurar</button>
          </div>
        `;
      }).join('');
    } catch(e) {
      cont.innerHTML = '<em class="muted" style="color:#dc2626">Error: ' + escapeHtml(e.message||'') + '</em>';
    }
  },

  _handleRestaurarDrive(btn) {
    const fileId = btn.dataset.driveId;
    const meta = (this._driveFilesCache || {})[fileId];
    if (!fileId || !meta) { alert('No se pudo identificar el archivo.'); return; }
    return this.restaurarBackupDrive(fileId, meta.name);
  },

  // v3.24 (C7): handler con data-attributes
  _handleRestaurarLocal(btn) {
    const ts = btn.dataset.ts;
    const tipo = btn.dataset.tipo;
    if (!ts || (tipo !== 'recent' && tipo !== 'daily')) {
      alert('Respaldo inválido.');
      return;
    }
    return this.restaurarBackupLocal(ts, tipo);
  },

  async restaurarBackupDrive(fileId, nombre) {
    if (!confirm('¿Restaurar el respaldo "' + nombre + '"?\n\nEsto va a REEMPLAZAR los datos actuales. Antes se guardará un respaldo local automático.')) return;
    try {
      const wrap = await DriveBackup.descargar(fileId);
      if (!wrap) { alert('No se pudo descargar el archivo.'); return; }
      // El archivo nuevo trae {appVersion, data:{...}}. Detectar por presencia explícita de appVersion.
      const restaurado = (wrap.appVersion && wrap.data) ? wrap.data : wrap;
      if (!restaurado || !Array.isArray(restaurado.patients)) { alert('Archivo no contiene datos válidos.'); return; }
      Backups.guardar(State.data);
      State.data = restaurado;
      State._migrar();   // v3.24 (C2): migrar shape al actual
      State.save();
      this.closeModal();
      this.render();
      alert('Respaldo restaurado desde Google Drive.');
    } catch(e) {
      alert('Error restaurando: ' + e.message);
    }
  },

  restaurarBackupLocal(timestamp, tipo) {
    const restaurado = Backups.restaurar(timestamp, tipo);
    if (!restaurado) {
      alert('No se pudo cargar ese respaldo.');
      return;
    }
    const r = {
      pacientes: (restaurado.patients||[]).length,
      activos: (restaurado.patients||[]).filter(p => !p.fechaEgreso).length,
      programas: (restaurado.programas||[]).length,
      egresos: (restaurado.egresos||[]).length,
      usuarios: (restaurado.config && restaurado.config.usuarios ? restaurado.config.usuarios.length : 0)
    };
    const fecha = new Date(timestamp).toLocaleString('es');
    const msg = `¿Restaurar el respaldo del ${fecha}?\n\n` +
                `Contiene:\n` +
                `  • ${r.pacientes} pacientes (${r.activos} activos)\n` +
                `  • ${r.programas} programas\n` +
                `  • ${r.egresos} egresos\n` +
                `  • ${r.usuarios} usuarios\n\n` +
                `Esto va a REEMPLAZAR los datos actuales (también en la nube cuando se sincronice). ` +
                `Antes se va a crear un respaldo automático de los datos actuales por si te arrepientes.`;
    if (!confirm(msg)) return;
    // Snapshot defensivo de los datos actuales antes de sobrescribir
    Backups.guardar(State.data);
    State.data = restaurado;
    State._migrar();   // v3.24 (C2): migrar shape al actual
    State.save();
    this.closeModal();
    this.render();
    alert('Respaldo restaurado. Si tienes Firebase configurado, los demás dispositivos recibirán esta versión en unos segundos.');
  }
};

document.addEventListener('DOMContentLoaded', () => App.init());
</script>
</body>
</html>
