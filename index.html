  /* ---------- Acciones del programa ---------- */
  programasPendientesRevision() {
    const hoy = todayISO();
    return (State.data.programas || []).filter(prg =>
      prg.fecha < hoy &&
      !prg.revisado &&
      prg.pacientes.some(e => e.operado === null)
    );
  },

  abrirPrograma(id) {
    this._currentProgramaId = id;
    this.render();
    window.scrollTo({top:0});
  },
  cerrarPrograma() {
    this._currentProgramaId = null;
    this.render();
  },

  crearPrograma() {
    debounceAction('crearPrograma', () => {
      const fecha = prompt('Fecha del programa (YYYY-MM-DD):', todayISO());
      if (!fecha) return;
      if (!/^\d{4}-\d{2}-\d{2}$/.test(fecha)) {
        alert('Fecha inválida. Formato: YYYY-MM-DD (ej. 2026-05-12).');
        return;
      }
      const existente = (State.data.programas || []).find(p => p.fecha === fecha);
      if (existente) {
        if (confirm(`Ya existe un programa para el ${fmtDateLong(fecha)}. ¿Quieres abrirlo?`)) {
          this.abrirPrograma(existente.id);
        }
        return;
      }
      const prg = nuevoPrograma(fecha);
      State.data.programas.push(prg);
      State.save();
      this.abrirPrograma(prg.id);
    });
  },

  eliminarPrograma(id) {
    if (!confirm('¿Eliminar este programa? Si tenía cirugías ya marcadas como operadas, la información en cada paciente se conserva (queda en su ficha).')) return;
    State.data.programas = State.data.programas.filter(p => p.id !== id);
    State.save();
    this._currentProgramaId = null;
    this.render();
  },

  setProgramaCampo(id, campo, val) {
    const prg = State.data.programas.find(p => p.id === id);
    if (!prg) return;
    prg[campo] = val;
    State.save();
  },

  agregarAPrograma(programaId) {
    const prg = State.data.programas.find(p => p.id === programaId);
    if (!prg) return;
    // Candidatos: pacientes listos para cirugía (incluyendo operados con flag "requiere otra cirugía")
    // No filtramos operados explícitamente porque evaluarAptoCirugia ya maneja eso correctamente:
    //   - operado sin flag → listo:false
    //   - operado con flag + preop OK → listo:true (vuelve a aparecer)
    const yaEnPrg = new Set(prg.pacientes.map(e => e.pacienteId));
    const candidatos = State.data.patients
      .filter(p => !p.fechaEgreso)
      .filter(p => !yaEnPrg.has(p.id))
      .filter(p => evaluarAptoCirugia(p).listo)
      .sort((a,b) => {
        // Hospitalizados primero, luego ambulatorios
        const ah = a.enListaEspera ? 1 : 0;
        const bh = b.enListaEspera ? 1 : 0;
        if (ah !== bh) return ah - bh;
        return this._compararPacientes(a,b);
      });

    // Para informar al usuario cuántos pacientes hay pendientes (no aptos) y por qué
    const noAptos = State.data.patients
      .filter(p => !p.fechaEgreso)
      .filter(p => !yaEnPrg.has(p.id))
      .filter(p => !evaluarAptoCirugia(p).listo).length;

    const html = `
      <div class="modal-backdrop" onclick="if(event.target===this) App.closeModal()">
        <div class="modal" style="max-width:600px">
          <div class="modal-head">
            <div>
              <div style="font-weight:600">Agregar al programa</div>
              <div style="font-size:.8rem;opacity:.9">${fmtDateLong(prg.fecha)} · sólo pacientes listos para cirugía</div>
            </div>
            <button class="close-x" onclick="App.closeModal()">✕</button>
          </div>
          <div class="modal-body">
            ${candidatos.length === 0 ? `
              <div class="empty">
                <div class="ico">⏳</div>
                <div>No hay pacientes listos para cirugía disponibles.</div>
                ${noAptos > 0 ? `<div class="muted" style="margin-top:8px">Hay ${noAptos} paciente(s) hospitalizados pero aún no cumplen criterios. Completa su preoperatorio en la pestaña <em>Pase de visita</em> y aparecerán aquí.</div>` : ''}
              </div>
            ` : `
              ${noAptos > 0 ? `<div class="alert-box blue" style="font-size:.85rem">Mostrando los <strong>${candidatos.length}</strong> paciente(s) listo(s) para cirugía. Hay ${noAptos} más en el servicio que aún no cumplen criterios.</div>` : ''}
              ${candidatos.map(p => `
                <div class="patient-card ready" onclick="App.confirmarAgregarPrograma('${prg.id}','${p.id}')">
                  <div class="pc-row">
                    <div class="pc-bed">${p.enListaEspera ? '🚶' : escapeHtml(p.cama||'?')}</div>
                    <div class="pc-info">
                      <div class="pc-name">${escapeHtml(p.nombre||'(sin nombre)')}
                        <span class="tag green">Listo</span>
                        ${p.enListaEspera
                          ? '<span class="tag blue">Ambulatorio</span>'
                          : '<span class="tag gray">Hospitalizado</span>'}
                      </div>
                      <div class="pc-meta">${escapeHtml(p.cedula||'—')} · ${escapeHtml(p.edad||'?')} años</div>
                      <div class="pc-meta"><strong>Dx:</strong> ${escapeHtml((p.diagnosticos||[]).join(', ')||'—')}</div>
                      <div class="pc-meta"><strong>Cirujano:</strong> ${escapeHtml(p.cirujano||'—')}</div>
                    </div>
                  </div>
                </div>
              `).join('')}
            `}
          </div>
          <div class="modal-foot">
            <button class="btn ghost" onclick="App.closeModal()">Cancelar</button>
          </div>
        </div>
      </div>
    `;
    document.getElementById('modalRoot').innerHTML = html;
  },

  confirmarAgregarPrograma(programaId, pacienteId) {
    const prg = State.data.programas.find(p => p.id === programaId);
    const p = this._findP(pacienteId);
    if (!prg || !p) return;
    const defaults = {
      medicoCargo: p.cirujano || '',
      // Si el paciente tenía datos legacy en programaQx, los reusamos
      procedimiento: (p.programaQx && p.programaQx.procedimiento) || '',
      lateralidad: (p.programaQx && p.programaQx.lateralidad) || '',
      insumos: (p.programaQx && p.programaQx.insumos) || '',
      requerimientoSangre: (p.programaQx && p.programaQx.requerimientoSangre) || '',
      anestesia: (p.programaQx && p.programaQx.anestesia) || '',
      observaciones: (p.programaQx && p.programaQx.observaciones) || ''
    };
    prg.pacientes.push(nuevaEntradaPrograma(p.id, defaults));
    logCambio(p, 'Programa Qx', `Agregado al programa del ${prg.fecha}`);
    State.save();
    this.closeModal();
  },

  setEntrada(programaId, entradaId, campo, val) {
    const prg = State.data.programas.find(p => p.id === programaId);
    if (!prg) return;
    const e = prg.pacientes.find(x => x.id === entradaId);
    if (!e) return;
    e[campo] = val;
    State.save();
  },

  // Asigna un quirófano a una entrada y la coloca al final del orden de ese quirófano.
  // Renumera el quirófano viejo para que quede consistente.
  setEntradaQuirofano(programaId, entradaId, nuevoQuirofano) {
    const prg = State.data.programas.find(p => p.id === programaId);
    if (!prg) return;
    const e = prg.pacientes.find(x => x.id === entradaId);
    if (!e) return;
    const quirofanoViejo = e.quirofano || '';
    nuevoQuirofano = (nuevoQuirofano||'').trim();
    if (quirofanoViejo === nuevoQuirofano) return;
    e.quirofano = nuevoQuirofano;
    // Asignar orden al final del nuevo quirófano
    const otrosNuevo = prg.pacientes.filter(x => (x.quirofano||'') === nuevoQuirofano && x.id !== e.id);
    e.orden = otrosNuevo.length + 1;
    // Renumerar el quirófano viejo
    this._renumerarQuirofano(prg, quirofanoViejo);
    // Renumerar el nuevo (por si el orden quedó con huecos)
    this._renumerarQuirofano(prg, nuevoQuirofano);
    State.save();
    this.render();
  },

  setEntradaOrden(programaId, entradaId, nuevoOrden) {
    const prg = State.data.programas.find(p => p.id === programaId);
    if (!prg) return;
    const e = prg.pacientes.find(x => x.id === entradaId);
    if (!e) return;
    nuevoOrden = parseInt(nuevoOrden, 10);
    if (!nuevoOrden || nuevoOrden < 1) return;
    const ents = prg.pacientes.filter(x => (x.quirofano||'') === (e.quirofano||''))
      .sort((a,b) => (a.orden||999) - (b.orden||999));
    const idxActual = ents.findIndex(x => x.id === e.id);
    const idxNuevo = Math.min(Math.max(0, nuevoOrden-1), ents.length-1);
    if (idxActual === idxNuevo) return;
    // Mover en el array y renumerar
    ents.splice(idxActual, 1);
    ents.splice(idxNuevo, 0, e);
    ents.forEach((x, i) => { x.orden = i+1; });
    State.save();
    this.render();
  },

  moverEnQuirofano(programaId, entradaId, direccion) {  // -1 = subir, +1 = bajar
    const prg = State.data.programas.find(p => p.id === programaId);
    if (!prg) return;
    const e = prg.pacientes.find(x => x.id === entradaId);
    if (!e) return;
    const ents = prg.pacientes.filter(x => (x.quirofano||'') === (e.quirofano||''))
      .sort((a,b) => (a.orden||999) - (b.orden||999));
    const idx = ents.findIndex(x => x.id === e.id);
    const nuevoIdx = idx + direccion;
    if (nuevoIdx < 0 || nuevoIdx >= ents.length) return;
    // Swap
    [ents[idx], ents[nuevoIdx]] = [ents[nuevoIdx], ents[idx]];
    ents.forEach((x, i) => { x.orden = i+1; });
    State.save();
    this.render();
  },

  _renumerarQuirofano(prg, q) {
    const ents = prg.pacientes.filter(x => (x.quirofano||'') === (q||''))
      .sort((a,b) => (a.orden||999) - (b.orden||999));
    ents.forEach((x, i) => { x.orden = i+1; });
  },

  quitarDePrograma(programaId, entradaId) {
    if (!confirm('¿Quitar este paciente del programa?')) return;
    const prg = State.data.programas.find(p => p.id === programaId);
    if (!prg) return;
    const e = prg.pacientes.find(x => x.id === entradaId);
    if (!e) return;
    const p = this._findP(e.pacienteId);
    prg.pacientes = prg.pacientes.filter(x => x.id !== entradaId);
    if (p) logCambio(p, 'Programa Qx', `Quitado del programa del ${prg.fecha}`);
    State.save();
    this.render();
  },

  /* ---------- Revisión post-programa ---------- */
  abrirRevisionPrograma(id) {
    const prg = State.data.programas.find(p => p.id === id);
    if (!prg) return;
    const html = `
      <div class="modal-backdrop" onclick="if(event.target===this) App.closeModal()">
        <div class="modal" style="max-width:700px">
          <div class="modal-head">
            <div>
              <div style="font-weight:600">Revisar programa</div>
              <div style="font-size:.8rem;opacity:.9">${fmtDateLong(prg.fecha)} · ¿Qué pacientes fueron operados?</div>
            </div>
            <button class="close-x" onclick="App.closeModal()">✕</button>
          </div>
          <div class="modal-body" id="revBody">
            ${prg.pacientes.map(e => this.renderEntradaRevision(prg, e)).join('')}
          </div>
          <div class="modal-foot">
            <button class="btn ghost" onclick="App.closeModal()">Cerrar</button>
            <button class="btn success" onclick="App.finalizarRevision('${prg.id}')">Finalizar revisión</button>
          </div>
        </div>
      </div>
    `;
    document.getElementById('modalRoot').innerHTML = html;
  },

  renderEntradaRevision(prg, e) {
    const p = State.data.patients.find(x => x.id === e.pacienteId);
    if (!p) return `<div class="card compact muted">Paciente eliminado.</div>`;
    return `
      <div class="card compact" style="margin-bottom:10px">
        <div class="strong">
          ${e.quirofano?`<span class="tag blue">Q${escapeHtml(e.quirofano)}#${e.orden||1}</span> `:''}
          ${escapeHtml(p.nombre||'(sin nombre)')} · Cama ${escapeHtml(p.cama||'?')}
        </div>
        <div class="muted" style="font-size:.85rem">${escapeHtml(e.procedimiento||'(sin procedimiento)')}${e.lateralidad?' ('+escapeHtml(e.lateralidad)+')':''}</div>
        <div class="row-gap" style="margin-top:8px">
          <button class="btn ${e.operado===true?'success':'ghost'} small" onclick="App.marcarRevision('${prg.id}','${e.id}',true)">Sí, operado</button>
          <button class="btn ${e.operado===false?'danger':'ghost'} small" onclick="App.marcarRevision('${prg.id}','${e.id}',false)">No operado</button>
        </div>
        ${e.operado === false ? `
          <div class="field" style="margin-top:8px;margin-bottom:0">
            <label>Motivo (opcional)</label>
            <input value="${escapeHtml(e.motivoNoOperado||'')}" placeholder="Ej. Suspendido por mal estado, falta de sala…"
              oninput="App.setEntrada('${prg.id}','${e.id}','motivoNoOperado',this.value)">
          </div>
        ` : ''}
        ${e.operado === true ? `<div class="muted" style="font-size:.8rem;margin-top:4px">✓ Marcado como operado el ${fmtDate(prg.fecha)}</div>` : ''}
      </div>
    `;
  },

  marcarRevision(programaId, entradaId, operado) {
    const prg = State.data.programas.find(p => p.id === programaId);
    if (!prg) return;
    const e = prg.pacientes.find(x => x.id === entradaId);
    if (!e) return;
    e.operado = operado;
    const p = this._findP(e.pacienteId);
    if (p) {
      if (operado) {
        // Agregar a cirugiasRealizadas (o actualizar si ya existe para este programa)
        if (!p.cirugiasRealizadas) p.cirugiasRealizadas = [];
        const datos = {
          fecha: prg.fecha,
          procedimiento: e.procedimiento || '',
          lateralidad: e.lateralidad || '',
          cirujano: e.medicoCargo || p.cirujano || '',
          programaId: prg.id,
          quirofano: e.quirofano || '',
          notas: e.observaciones || ''
        };
        const idxExistente = p.cirugiasRealizadas.findIndex(c => c.programaId === prg.id);
        if (idxExistente >= 0) {
          p.cirugiasRealizadas[idxExistente] = datos;
        } else {
          p.cirugiasRealizadas.push(datos);
        }
        // Sincronizar legacy
        sincronizarCirugiaLegacy(p);
        // Si tenía marcado "Requiere otra cirugía", preguntar si todavía la necesita
        if (p.requiereOtraCirugia) {
          const totalCir = (p.cirugiasRealizadas || []).length;
          const sigueNecesitando = confirm(
            `${p.nombre || 'El paciente'} ya fue operado.\n` +
            `Lleva ${totalCir} cirugía(s) durante esta hospitalización.\n\n` +
            `¿Todavía requiere otra cirugía adicional?\n` +
            `(Útil en fracturas expuestas, lavados seriados por infección, cirugías por etapas, etc.)\n\n` +
            `Aceptar = Sí, mantener marcado "Requiere otra cirugía"\n` +
            `Cancelar = No, ya está completo, desmarcar la casilla`
          );
          p.requiereOtraCirugia = sigueNecesitando;
          logCambio(p, 'Cirugía',
            `Operado el ${prg.fecha} (cirugía #${totalCir}) — ${e.procedimiento}${e.lateralidad?' ('+e.lateralidad+')':''}` +
            (sigueNecesitando ? ' · Aún requiere otra cirugía' : ' · Casilla "requiere otra" desmarcada'));
        } else {
          const totalCir = (p.cirugiasRealizadas || []).length;
          logCambio(p, 'Cirugía', `Operado el ${prg.fecha} (cirugía #${totalCir}) — ${e.procedimiento}${e.lateralidad?' ('+e.lateralidad+')':''}`);
        }
      } else {
        // Quitar la cirugía de este programa si estaba registrada
        if (p.cirugiasRealizadas) {
          p.cirugiasRealizadas = p.cirugiasRealizadas.filter(c => c.programaId !== prg.id);
        }
        sincronizarCirugiaLegacy(p);
        logCambio(p, 'Cirugía', `No operado en programa del ${prg.fecha}`);
      }
    }
    State.save();
    document.getElementById('revBody').innerHTML =
      prg.pacientes.map(en => this.renderEntradaRevision(prg, en)).join('');
  },

  finalizarRevision(programaId) {
    const prg = State.data.programas.find(p => p.id === programaId);
    if (!prg) return;
    const sinDecidir = prg.pacientes.filter(e => e.operado === null).length;
    if (sinDecidir > 0) {
      if (!confirm(`Aún hay ${sinDecidir} paciente(s) sin marcar. ¿Cerrar revisión de todas formas?`)) return;
    }
    prg.revisado = true;
    State.save();
    this.closeModal();
    this.render();
  },

  /* ============================================================
     RESUMEN — pendientes por paciente, vista de pase de guardia
     ============================================================ */
  renderResumen() {
    const cfg = getConfig();
    const hospName = cfg.hospitalNombre ? `${escapeHtml(cfg.hospitalNombre)} — ` : '';
    const activos = State.data.patients
      .filter(p => !p.fechaEgreso)
      .sort((a,b) => this._compararPacientes(a,b));

    const conPendientes = activos.map(p => ({ p, pendientes: calcularPendientesPaciente(p) }));
    const totalPendientes = conPendientes.reduce((s,x) => s + x.pendientes.length, 0);
    const sinPendientes = conPendientes.filter(x => x.pendientes.length === 0).length;
    const conAlMenosUno = conPendientes.filter(x => x.pendientes.length > 0);

    let html = `
      <div class="print-only">
        <div class="print-title">${hospName}Pendientes / Pase de guardia</div>
        <div class="print-sub">${new Date().toLocaleString('es')} · ${activos.length} pacientes activos · ${totalPendientes} pendientes</div>
      </div>

      <div class="toolbar no-print">
        <h2 style="margin:0">Pendientes del servicio</h2>
        <div style="flex:1"></div>
        <button class="btn ghost small" onclick="window.print()">🖨 Imprimir pase de guardia</button>
      </div>

      <div class="kpi-grid">
        <div class="kpi"><div class="kpi-label">Pacientes activos</div><div class="kpi-value">${activos.length}</div></div>
        <div class="kpi yellow"><div class="kpi-label">Total pendientes</div><div class="kpi-value">${totalPendientes}</div></div>
        <div class="kpi green"><div class="kpi-label">Sin pendientes</div><div class="kpi-value">${sinPendientes}</div></div>
        <div class="kpi red"><div class="kpi-label">Pacientes con tareas</div><div class="kpi-value">${conAlMenosUno.length}</div></div>
      </div>
    `;

    if (conAlMenosUno.length === 0) {
      html += `<div class="empty">
        <div class="ico">✅</div>
        <div>Todos los pacientes activos están al día.</div>
      </div>`;
      return html;
    }

    // Iconos por tipo de pendiente
    const icono = { estudios:'🔬', ic:'📞', infeccion:'⚠', curacion:'🩹', tpn:'💉', evolucion:'📝' };

    html += conAlMenosUno.map(({p, pendientes}) => {
      const dias = daysBetween(p.fechaIngreso);
      const ubic = p.ubicacion ? p.ubicacion + ' · ' : '';
      return `
        <div class="patient-card warn" onclick="App.openPaciente('${p.id}')" style="margin-bottom:10px">
          <div class="pc-row">
            <div class="pc-bed">${escapeHtml(p.cama||'?')}</div>
            <div class="pc-info">
              <div class="pc-name">${escapeHtml(p.nombre || '(sin nombre)')}
                <span class="tag yellow">${pendientes.length} pendiente${pendientes.length!==1?'s':''}</span>
              </div>
              <div class="pc-meta">${ubic}${escapeHtml(p.cedula||'—')} · ${escapeHtml(p.edad||'?')} años · DIH: ${dias} ${p.cirujano?'· Cir: '+escapeHtml(p.cirujano):''}</div>
              <div class="pc-meta" style="margin-top:4px"><strong>Dx:</strong> ${escapeHtml((p.diagnosticos||[]).join(', ')||'—')}</div>
              <ul style="margin:8px 0 0 0;padding-left:0;list-style:none">
                ${pendientes.map(pe => `<li style="padding:3px 0;font-size:.88rem"><span style="margin-right:6px">${icono[pe.tipo]||'•'}</span>${escapeHtml(pe.desc)}</li>`).join('')}
              </ul>
            </div>
          </div>
        </div>
      `;
    }).join('');

    // Tabla compacta para impresión
    html += `<div class="print-only" style="margin-top:14px">
      <table>
        <thead><tr><th>Cama</th><th>Paciente</th><th>DIH</th><th>Pendientes</th></tr></thead>
        <tbody>
          ${conAlMenosUno.map(({p, pendientes}) => `
            <tr>
              <td><strong>${escapeHtml(p.cama||'—')}</strong></td>
              <td>${escapeHtml(p.nombre||'')}</td>
              <td>${daysBetween(p.fechaIngreso)}</td>
              <td>${pendientes.map(pe => escapeHtml(pe.desc)).join('; ')}</td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>`;

    return html;
  },

  /* ============================================================
     INTERCONSULTAS RECIBIDAS — solicitudes de otros servicios a ortopedia
     ============================================================ */
  _currentICEntranteId: null,
  _filtroICEntrante: 'todas',  // todas | pendientes | mias | urgentes | hoy | mes

  renderICRecibidas() {
    if (this._currentICEntranteId) {
      return this.renderICEntranteDetalle(this._currentICEntranteId);
    }

    const todas = (State.data.interconsultasEntrantes || []).slice()
      .sort((a,b) => {
        // Pendientes primero (ordenadas por fecha desc), luego respondidas/descartadas
        const ap = (a.estado === 'pendiente' || a.estado === 'en_evaluacion') ? 0 : 1;
        const bp = (b.estado === 'pendiente' || b.estado === 'en_evaluacion') ? 0 : 1;
        if (ap !== bp) return ap - bp;
        // Dentro del grupo, urgentes primero
        const au = a.urgencia === 'urgente' ? 0 : (a.urgencia === 'prioritario' ? 1 : 2);
        const bu = b.urgencia === 'urgente' ? 0 : (b.urgencia === 'prioritario' ? 1 : 2);
        if (au !== bu) return au - bu;
        return (b.fechaSolicitud || '').localeCompare(a.fechaSolicitud || '');
      });

    const counts = this._countsICEntrante(todas);
    const filtradas = todas.filter(ic => this._matchesICFilter(ic));

    let html = `
      <div class="toolbar no-print">
        <h2 style="margin:0">Interconsultas recibidas (${todas.length})</h2>
        <div style="flex:1"></div>
        <button class="btn small" onclick="App.crearICEntrante()">+ Nueva interconsulta</button>
        <button class="btn ghost small" onclick="window.print()">🖨</button>
      </div>

      <div class="filter-chips no-print">
        ${this._chipIC('todas','Todas',counts.todas)}
        ${this._chipIC('pendientes','Pendientes',counts.pendientes)}
        ${this._chipIC('urgentes','Urgentes',counts.urgentes)}
        ${this._chipIC('mias','Asignadas a mí',counts.mias)}
        ${this._chipIC('hoy','Hoy',counts.hoy)}
        ${this._chipIC('respondidas','Respondidas',counts.respondidas)}
      </div>

      <div class="kpi-grid">
        <div class="kpi red">
          <div class="kpi-label">Pendientes urgentes</div>
          <div class="kpi-value">${counts.urgentesPendientes}</div>
          <div class="kpi-sub">requieren atención inmediata</div>
        </div>
        <div class="kpi yellow">
          <div class="kpi-label">Total pendientes</div>
          <div class="kpi-value">${counts.pendientes}</div>
          <div class="kpi-sub">por responder</div>
        </div>
        <div class="kpi green">
          <div class="kpi-label">Respondidas hoy</div>
          <div class="kpi-value">${counts.respondidasHoy}</div>
          <div class="kpi-sub">en las últimas 24 h</div>
        </div>
        <div class="kpi">
          <div class="kpi-label">Total este mes</div>
          <div class="kpi-value">${counts.mes}</div>
          <div class="kpi-sub">solicitudes recibidas</div>
        </div>
      </div>
    `;

    if (filtradas.length === 0) {
      html += `<div class="empty">
        <div class="ico">📨</div>
        <div>${todas.length === 0 ? 'No hay interconsultas registradas.' : 'Sin resultados con este filtro.'}</div>
        ${todas.length === 0 ? `<div style="margin-top:10px"><button class="btn" onclick="App.crearICEntrante()">+ Registrar primera interconsulta</button></div>` : ''}
      </div>`;
      return html;
    }

    // Print: tabla compacta
    html += `<div class="card print-only">
      <table>
        <thead><tr>
          <th>Fecha</th><th>Servicio</th><th>Paciente</th><th>Cama</th>
          <th>Motivo</th><th>Urgencia</th><th>Asignado</th><th>Estado</th>
        </tr></thead>
        <tbody>
          ${filtradas.map(ic => `<tr>
            <td>${escapeHtml((ic.fechaSolicitud||'').slice(0,10))}</td>
            <td>${escapeHtml(ic.servicioSolicitante||'')}</td>
            <td>${escapeHtml(ic.paciente?.nombre||'')}</td>
            <td>${escapeHtml(ic.paciente?.cama||'—')}</td>
            <td>${escapeHtml(ic.motivo||'')}</td>
            <td>${escapeHtml(ic.urgencia||'')}</td>
            <td>${escapeHtml(ic.funcionarioAsignado||'')}</td>
            <td>${escapeHtml(this._estadoLabel(ic.estado))}</td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>`;

    // Tarjetas interactivas
    html += `<div class="no-print">${filtradas.map(ic => this._renderICEntranteCard(ic)).join('')}</div>`;
    return html;
  },

  _chipIC(tipo, label, count) {
    return `<button class="chip ${this._filtroICEntrante===tipo?'active':''}" onclick="App.setFiltroIC('${tipo}')">${label}<span class="count">${count}</span></button>`;
  },

  setFiltroIC(tipo) {
    this._filtroICEntrante = tipo;
    this.render();
  },

  _matchesICFilter(ic) {
    const f = this._filtroICEntrante;
    if (!f || f === 'todas') return true;
    if (f === 'pendientes') return ic.estado === 'pendiente' || ic.estado === 'en_evaluacion';
    if (f === 'respondidas') return ic.estado === 'respondida';
    if (f === 'urgentes') return ic.urgencia === 'urgente';
    if (f === 'mias') {
      const yo = (getCurrentUser()||'').toLowerCase();
      if (!yo) return false;
      const asig = (ic.funcionarioAsignado||'').toLowerCase();
      // Excluir prefijos genéricos para evitar falsos positivos (dr., dra., doctor, etc.)
      const prefijos = ['dr','dra','dr.','dra.','doctor','doctora','lic','lic.','sra','sra.','sr','sr.'];
      const palabrasYo = yo.split(/\s+/).filter(w => w.length > 2 && !prefijos.includes(w));
      if (palabrasYo.length === 0) return false;
      return palabrasYo.some(w => asig.includes(w));
    }
    if (f === 'hoy') return (ic.fechaSolicitud||'').slice(0,10) === todayISO();
    return true;
  },

  _countsICEntrante(todas) {
    const yo = (getCurrentUser()||'').toLowerCase();
    const prefijos = ['dr','dra','dr.','dra.','doctor','doctora','lic','lic.','sra','sra.','sr','sr.'];
    const palabrasYo = yo.split(/\s+/).filter(w => w.length > 2 && !prefijos.includes(w));
    const hoy = todayISO();
    const ymActual = hoy.slice(0,7);
    const hace24h = new Date(Date.now() - 24*60*60*1000).toISOString();
    return {
      todas: todas.length,
      pendientes: todas.filter(ic => ic.estado === 'pendiente' || ic.estado === 'en_evaluacion').length,
      urgentes: todas.filter(ic => ic.urgencia === 'urgente').length,
      urgentesPendientes: todas.filter(ic => ic.urgencia === 'urgente' && (ic.estado === 'pendiente' || ic.estado === 'en_evaluacion')).length,
      respondidas: todas.filter(ic => ic.estado === 'respondida').length,
      respondidasHoy: todas.filter(ic => ic.estado === 'respondida' && (ic.fechaRespuesta||'') >= hace24h).length,
      hoy: todas.filter(ic => (ic.fechaSolicitud||'').slice(0,10) === hoy).length,
      mes: todas.filter(ic => (ic.fechaSolicitud||'').slice(0,7) === ymActual).length,
      mias: (yo && palabrasYo.length > 0) ? todas.filter(ic => {
        const asig = (ic.funcionarioAsignado||'').toLowerCase();
        return palabrasYo.some(w => asig.includes(w));
      }).length : 0
    };
  },

  _estadoLabel(estado) {
    if (estado === 'pendiente') return 'Pendiente';
    if (estado === 'en_evaluacion') return 'En evaluación';
    if (estado === 'respondida') return 'Respondida';
    if (estado === 'descartada') return 'Descartada';
    return estado || 'Pendiente';
  },

  _renderICEntranteCard(ic) {
    const fechaFmt = (ic.fechaSolicitud||'').slice(0,10);
    const horas = ic.fechaSolicitud ? new Date(ic.fechaSolicitud).toLocaleTimeString('es', {hour:'2-digit', minute:'2-digit'}) : '';
    const urgenciaTag = ic.urgencia === 'urgente'
      ? '<span class="tag red">⚠ URGENTE</span>'
      : ic.urgencia === 'prioritario'
        ? '<span class="tag yellow">Prioritario</span>'
        : '<span class="tag gray">Rutina</span>';
    const estadoTag = ic.estado === 'respondida'
      ? '<span class="tag green">✓ Respondida</span>'
      : ic.estado === 'descartada'
        ? '<span class="tag gray">Descartada</span>'
        : ic.estado === 'en_evaluacion'
          ? '<span class="tag blue">En evaluación</span>'
          : '<span class="tag yellow">Pendiente</span>';

    let cls = 'patient-card';
    if (ic.urgencia === 'urgente' && ic.estado !== 'respondida') cls += ' alert';
    else if (ic.estado === 'respondida') cls += ' ready';
    else if (ic.estado === 'pendiente' || ic.estado === 'en_evaluacion') cls += ' warn';

    const dias = ic.fechaSolicitud ? Math.floor((Date.now() - new Date(ic.fechaSolicitud).getTime()) / (1000*60*60*24)) : 0;
    const horasPendiente = ic.fechaSolicitud && (ic.estado === 'pendiente' || ic.estado === 'en_evaluacion')
      ? Math.floor((Date.now() - new Date(ic.fechaSolicitud).getTime()) / (1000*60*60))
      : null;

    return `
      <div class="${cls}" onclick="App.abrirICEntrante('${ic.id}')">
        <div class="pc-row">
          <div class="pc-info">
            <div class="pc-name">
              ${escapeHtml(ic.paciente?.nombre || '(sin nombre paciente)')}
              ${urgenciaTag}
              ${estadoTag}
            </div>
            <div class="pc-meta">
              <strong>De:</strong> ${escapeHtml(ic.servicioSolicitante || '(sin servicio)')}
              ${ic.paciente?.cama ? ` · Cama ${escapeHtml(ic.paciente.cama)}` : ''}
              ${ic.paciente?.sala ? ` · Sala ${escapeHtml(ic.paciente.sala)}` : ''}
              · ${fechaFmt} ${horas}
            </div>
            <div class="pc-meta" style="margin-top:4px">
              <strong>Motivo:</strong> ${escapeHtml(ic.motivo || '(sin especificar)')}
            </div>
            ${ic.diagnosticoPresuntivo ? `<div class="pc-meta"><strong>Dx presuntivo:</strong> ${escapeHtml(ic.diagnosticoPresuntivo)}</div>` : ''}
            <div class="pc-meta">
              <strong>Asignado a:</strong> ${escapeHtml(ic.funcionarioAsignado || '(sin asignar)')}
              ${horasPendiente !== null ? ` · ${horasPendiente} h pendiente` : ''}
            </div>
            ${ic.estado === 'respondida' && ic.respuesta
              ? `<div class="pc-meta" style="margin-top:6px;color:#065f46"><strong>Respuesta:</strong> ${escapeHtml(ic.respuesta.slice(0,150))}${ic.respuesta.length>150?'...':''}</div>`
              : ''}
          </div>
        </div>
      </div>
    `;
  },

      this._currentICEntranteId = null;

        <div class="print-title">Interconsulta — Servicio de ${escapeHtml(cfg.servicio||'Ortopedia')}</div>
        <div class="print-sub">${new Date().toLocaleString('es')}</div>
      </div>

      <div class="toolbar no-print">
        <button class="btn ghost small" onclick="App.cerrarICEntrante()">← Volver</button>
        <h2 style="margin:0">Interconsulta</h2>
        <div style="flex:1"></div>
        <button class="btn ghost small" onclick="window.print()">🖨 Imprimir</button>
        <button class="btn danger small" onclick="App.eliminarICEntrante('${ic.id}')">Eliminar</button>
      </div>

      <!-- Datos de solicitud -->
      <div class="card">
        <h3>Solicitud</h3>
        <div class="field-row">
          <div class="field" style="margin-bottom:0">
            <label>Fecha y hora de solicitud</label>
            <input type="datetime-local" value="${escapeHtml((ic.fechaSolicitud||'').slice(0,16))}"
              onchange="App.setICEntrante('${ic.id}','fechaSolicitud',this.value ? this.value+':00.000Z' : '')">
          </div>
          <div class="field" style="margin-bottom:0">
            <label>Servicio solicitante</label>
            <input list="serviciosSolicitantesList" value="${escapeHtml(ic.servicioSolicitante||'')}"
              onchange="App.setICEntrante('${ic.id}','servicioSolicitante',this.value)"
              placeholder="Ej. Medicina Interna">
            <datalist id="serviciosSolicitantesList">
              ${SERVICIOS_SOLICITANTES.map(s => `<option value="${escapeHtml(s)}">`).join('')}
            </datalist>
          </div>
        </div>
        <div class="field-row" style="margin-top:8px">
          <div class="field" style="margin-bottom:0">
            <label>Urgencia</label>
            <select onchange="App.setICEntrante('${ic.id}','urgencia',this.value)">
              ${URGENCIAS_IC.map(u => `<option value="${u}" ${ic.urgencia===u?'selected':''}>${u.charAt(0).toUpperCase()+u.slice(1)}</option>`).join('')}
            </select>
          </div>

  },

  /* ---------- Acciones IC entrantes ---------- */
  abrirICEntrante(id) {
    this._currentICEntranteId = id;
    this.render();
    window.scrollTo({top:0});
  },
  cerrarICEntrante() {
    this._currentICEntranteId = null;
    this.render();
  },
  crearICEntrante() {
    debounceAction('crearICEntrante', () => {
      if (!State.data.interconsultasEntrantes) State.data.interconsultasEntrantes = [];
      const ic = nuevaICEntrante();
      State.data.interconsultasEntrantes.push(ic);
      State.save();
      this.abrirICEntrante(ic.id);
    });
  },
  setICEntrante(id, campo, valor) {
    const ic = (State.data.interconsultasEntrantes||[]).find(x => x.id === id);
    if (!ic) return;
    ic[campo] = valor;
    ic.modificado = new Date().toISOString();
    // Regla: si el servicio solicitante es UCI / Cuidados Intensivos,
    // la urgencia se setea automáticamente a "urgente"
    let necesitaRender = false;
    if (campo === 'servicioSolicitante' && /uci|cuidados\s*intensivos/i.test(valor || '')) {
      if (ic.urgencia !== 'urgente') {
        ic.urgencia = 'urgente';
        necesitaRender = true;
      }
    }
    State.save();
    if (necesitaRender && this._currentICEntranteId === id) {
      this.render();
    }
  },
  setICEntrantePaciente(id, campo, valor) {
    const ic = (State.data.interconsultasEntrantes||[]).find(x => x.id === id);
    if (!ic) return;
    if (!ic.paciente) ic.paciente = { nombre:'', cedula:'', edad:'', cama:'', sala:'' };
    ic.paciente[campo] = valor;
    ic.modificado = new Date().toISOString();
    State.save();
  },
  marcarICRespondida(id) {
    const ic = (State.data.interconsultasEntrantes||[]).find(x => x.id === id);
    if (!ic) return;
    ic.estado = 'respondida';
    if (!ic.fechaRespuesta) ic.fechaRespuesta = new Date().toISOString();
    ic.modificado = new Date().toISOString();
    State.save();
    this.render();
  },
  eliminarICEntrante(id) {
    if (!confirm('¿Eliminar esta interconsulta? No se puede deshacer.')) return;
    State.data.interconsultasEntrantes = (State.data.interconsultasEntrantes||[]).filter(x => x.id !== id);
    State.save();
    this._currentICEntranteId = null;
    this.render();
  },

  /* ============================================================
     EGRESOS / SALIDAS — reporte de salida del paciente
     ============================================================ */
  _currentEgresoId: null,

  renderSalidas() {
    if (this._currentEgresoId) {
      return this.renderEgresoDetalle(this._currentEgresoId);
    }
    const egresos = (State.data.egresos || []).slice()
      .sort((a,b) => (b.fechaEgreso||'').localeCompare(a.fechaEgreso||''));

    let html = `
      <div class="toolbar no-print">
        <h2 style="margin:0">Egresos / Reportes de salida (${egresos.length})</h2>
        <div style="flex:1"></div>
        <button class="btn small" onclick="App.openSelectorEgreso()">+ Nuevo egreso</button>
      </div>
    `;

    if (egresos.length === 0) {
      html += `<div class="empty">
        <div class="ico">🚪</div>
        <div>No hay egresos registrados.</div>
        <div style="margin-top:10px"><button class="btn" onclick="App.openSelectorEgreso()">+ Crear primer egreso</button></div>
      </div>`;
      return html;
    }

    html += egresos.map(eg => {
      const p = State.data.patients.find(x => x.id === eg.pacienteId);
      if (!p) return '';
      const nCir = (eg.cirugiasResumen || []).length;
      return `
        <div class="patient-card ready" onclick="App.abrirEgreso('${eg.id}')">
          <div class="pc-row">
            <div class="pc-bed">${escapeHtml(p.cama||'?')}</div>
            <div class="pc-info">
              <div class="pc-name">${escapeHtml(p.nombre||'(sin nombre)')}
                <span class="tag green">Egresado ${fmtDate(eg.fechaEgreso)}</span>
              </div>
              <div class="pc-meta">
                ${escapeHtml(p.cedula||'—')} · ${escapeHtml(p.edad||'?')} años · Ingreso: ${fmtDate(p.fechaIngreso)}
              </div>
              <div class="pc-meta">
                <strong>Dx final:</strong> ${escapeHtml(eg.diagnosticoFinal || (p.diagnosticos||[]).join('; ') || '—')}
              </div>
              ${nCir>0?`<div class="pc-meta">🔪 ${nCir} cirugía(s) durante hospitalización</div>`:''}
              ${eg.citaControl && eg.citaControl.fecha
                ? `<div class="pc-meta">📅 Cita control: ${fmtDate(eg.citaControl.fecha)}${eg.citaControl.lugar?' · '+escapeHtml(eg.citaControl.lugar):''}</div>`
                : ''}
              ${eg.rayosXControl && eg.rayosXControl.requiere
                ? `<div class="pc-meta">📷 Rx control para cita: ${escapeHtml(eg.rayosXControl.descripcion||'sí')}</div>`
                : ''}
            </div>
          </div>
        </div>
      `;
    }).join('');

    return html;
  },

  /* ---------- Editor del egreso ---------- */

    const eg = (State.data.egresos || []).find(x => x.id === id);

  /* ---------- Acciones del egreso ---------- */
  abrirEgreso(id) {
    this._currentEgresoId = id;
    this.render();
    window.scrollTo({top:0});
  },
  cerrarEgreso() {
    this._currentEgresoId = null;
    this.render();
  },

  openSelectorEgreso() {
    // Selecciona de la lista TOTAL de pacientes (no egresados aún)
    const yaConEgreso = new Set((State.data.egresos || []).map(e => e.pacienteId));
    const candidatos = State.data.patients
      .filter(p => !p.fechaEgreso)
      .filter(p => !yaConEgreso.has(p.id))
      .sort((a,b) => (a.cama||'').localeCompare(b.cama||'', 'es', {numeric:true}));

    const html = `
      <div class="modal-backdrop" onclick="if(event.target===this) App.closeModal()">
        <div class="modal" style="max-width:600px">
          <div class="modal-head">
            <div>
              <div style="font-weight:600">Crear reporte de egreso</div>
              <div style="font-size:.8rem;opacity:.9">Selecciona el paciente al que se le da salida</div>
            </div>
            <button class="close-x" onclick="App.closeModal()">✕</button>
          </div>
          <div class="modal-body">
            ${candidatos.length === 0 ? `
              <div class="empty">
                <div class="ico">✅</div>
                <div>No hay pacientes pendientes de egreso.</div>
                <div class="muted" style="margin-top:8px">Todos los pacientes hospitalizados ya tienen egreso o están dados de alta.</div>
              </div>
            ` : candidatos.map(p => {
              const operado = p.cirugia && p.cirugia.realizada;
              const dpost = diasPostop(p);
              const dias = daysBetween(p.fechaIngreso);
              return `
                <div class="patient-card" onclick="App.crearEgreso('${p.id}')">
                  <div class="pc-row">
                    <div class="pc-bed">${escapeHtml(p.cama||'?')}</div>
                    <div class="pc-info">
                      <div class="pc-name">${escapeHtml(p.nombre||'(sin nombre)')}
                        ${operado?`<span class="tag green">Operado · día ${dpost} postop</span>`:''}
                      </div>
                      <div class="pc-meta">${escapeHtml(p.cedula||'—')} · ${escapeHtml(p.edad||'?')} años · ${dias} día(s) hosp.</div>
                      <div class="pc-meta"><strong>Dx:</strong> ${escapeHtml((p.diagnosticos||[]).join(', ')||'—')}</div>
                    </div>
                  </div>
                </div>
              `;
            }).join('')}
          </div>
          <div class="modal-foot">
            <button class="btn ghost" onclick="App.closeModal()">Cancelar</button>
          </div>
        </div>
      </div>
    `;
    document.getElementById('modalRoot').innerHTML = html;
  },

  crearEgreso(pacienteId) {
    const p = this._findP(pacienteId);
    if (!p) return;
    if (!State.data.egresos) State.data.egresos = [];
    const eg = nuevoEgreso(pacienteId);
    // Prefill cirugías
    eg.cirugiasResumen = getCirugiasDelPaciente(pacienteId);
    if (eg.cirugiasResumen.length === 0 && p.cirugia && p.cirugia.realizada) {
      eg.cirugiasResumen.push({
        fecha: p.cirugia.fecha,
        procedimiento: p.cirugia.procedimiento,
        lateralidad: p.cirugia.lateralidad,
        cirujano: p.cirugia.cirujano,
        quirofano: '',
        notas: p.cirugia.notas || ''
      });
    }
    // Prefill labs
    eg.laboratoriosResumen = generarResumenLabs(p);
    // Prefill referencias desde interconsultas respondidas
    eg.referencias = getInterconsultasRespondidas(p).map(ic => ({
      especialidad: ic.servicio || '',
      fecha: '',
      lugar: '',
      notas: ic.respuesta ? ic.respuesta.slice(0, 80) : ''
    }));
    // Prefill diagnóstico final
    eg.diagnosticoFinal = (p.diagnosticos || []).join('; ');

    State.data.egresos.push(eg);
    p.fechaEgreso = eg.fechaEgreso;
    logCambio(p, 'Egreso', 'Reporte de egreso creado');
    State.save();
    this.closeModal();
    this.abrirEgreso(eg.id);
  },

  setEgreso(id, campo, val) {
    const eg = State.data.egresos.find(x => x.id === id);
    if (!eg) return;
    eg[campo] = val;
    eg.modificado = new Date().toISOString();
    if (campo === 'fechaEgreso') {
      const p = State.data.patients.find(x => x.id === eg.pacienteId);
      if (p) p.fechaEgreso = val;
    }
    State.save();
  },

  setEgresoCita(id, campo, val) {
    const eg = State.data.egresos.find(x => x.id === id);
    if (!eg) return;
    if (!eg.citaControl) eg.citaControl = { fecha:'', lugar:'', especialidad:'Ortopedia', notas:'' };
    eg.citaControl[campo] = val;
    eg.modificado = new Date().toISOString();
    State.save();
  },

  setEgresoCuracion(id, campo, val) {
    const eg = State.data.egresos.find(x => x.id === id);
    if (!eg) return;
    if (!eg.curacionHeridas) eg.curacionHeridas = { lugar:'', frecuencia:'', instrucciones:'' };
    eg.curacionHeridas[campo] = val;
    eg.modificado = new Date().toISOString();
    State.save();
  },

  toggleVerificadoStaff(id, val) {
    const eg = State.data.egresos.find(x => x.id === id);
    if (!eg) return;
    if (!eg.verificadoStaff) eg.verificadoStaff = { confirmado:false, staffNombre:'', fecha:'', notas:'' };
    eg.verificadoStaff.confirmado = val;
    if (val) {
      if (!eg.verificadoStaff.staffNombre) eg.verificadoStaff.staffNombre = getCurrentUser() || '';
      eg.verificadoStaff.fecha = new Date().toISOString();
    }
    eg.modificado = new Date().toISOString();
    State.save();
    const p = State.data.patients.find(x => x.id === eg.pacienteId);
    if (p) logCambio(p, 'Egreso', val ? 'Verificado por staff: ' + eg.verificadoStaff.staffNombre : 'Verificación de staff retirada');
    this.render();
  },
  setVerificadoStaff(id, campo, val) {
    const eg = State.data.egresos.find(x => x.id === id);
    if (!eg) return;
    if (!eg.verificadoStaff) eg.verificadoStaff = { confirmado:false, staffNombre:'', fecha:'', notas:'' };
    eg.verificadoStaff[campo] = val;
    eg.modificado = new Date().toISOString();
    State.save();
  },

  setEgresoRayos(id, campo, val) {
    const eg = State.data.egresos.find(x => x.id === id);
    if (!eg) return;
    if (!eg.rayosXControl) eg.rayosXControl = { requiere:false, descripcion:'' };
    eg.rayosXControl[campo] = val;
    eg.modificado = new Date().toISOString();
    State.save();
    if (campo === 'requiere') this.render();
  },

  addCirugiaEgreso(id) {
    const eg = State.data.egresos.find(x => x.id === id);
    if (!eg) return;
    if (!eg.cirugiasResumen) eg.cirugiasResumen = [];
    eg.cirugiasResumen.push({ fecha:'', procedimiento:'', lateralidad:'', cirujano:'', quirofano:'', notas:'' });
    State.save();
    this.render();
  },
  setCirugiaEgreso(id, idx, campo, val) {
    const eg = State.data.egresos.find(x => x.id === id);
    if (!eg) return;
    if (!eg.cirugiasResumen[idx]) return;
    eg.cirugiasResumen[idx][campo] = val;
    eg.modificado = new Date().toISOString();
    State.save();
  },
  removeCirugiaEgreso(id, idx) {
    if (!confirm('¿Quitar esta cirugía del reporte?')) return;
    const eg = State.data.egresos.find(x => x.id === id);
    if (!eg) return;
    eg.cirugiasResumen.splice(idx, 1);
    State.save();
    this.render();
  },

  addReferenciaEgreso(id) {
    const eg = State.data.egresos.find(x => x.id === id);
    if (!eg) return;
    if (!eg.referencias) eg.referencias = [];
    eg.referencias.push({ especialidad:'Ortopedia', fecha:'', lugar:'', notas:'' });
    State.save();
    this.render();
  },
  setReferenciaEgreso(id, idx, campo, val) {
    const eg = State.data.egresos.find(x => x.id === id);
    if (!eg || !eg.referencias[idx]) return;
    eg.referencias[idx][campo] = val;
    eg.modificado = new Date().toISOString();
    State.save();
  },
  removeReferenciaEgreso(id, idx) {
    if (!confirm('¿Quitar esta referencia?')) return;
    const eg = State.data.egresos.find(x => x.id === id);
    if (!eg) return;
    eg.referencias.splice(idx, 1);
    State.save();
    this.render();
  },

  eliminarEgreso(id) {
    if (!confirm('¿Eliminar este reporte de egreso? El paciente queda sin egreso registrado y vuelve a la lista de hospitalizados.')) return;
    const eg = State.data.egresos.find(x => x.id === id);
    if (eg) {
      const p = State.data.patients.find(x => x.id === eg.pacienteId);
      if (p) {
        p.fechaEgreso = '';
        logCambio(p, 'Egreso', 'Reporte de egreso eliminado — paciente reactivo');
      }
    }
    State.data.egresos = State.data.egresos.filter(x => x.id !== id);
    State.save();
    this._currentEgresoId = null;
    this.render();
  },

        <h3>Métricas de calidad clínica</h3>
        <p class="muted" style="font-size:.85rem">
          ${(State.reporteDesde || State.reporteHasta) ? 'En el rango seleccionado' : 'Histórico completo'}
        </p>
        ${(() => {
          const q = this._metricasCalidad();
          return `
            <div class="kpi-grid">
              <div class="kpi yellow">
                <div class="kpi-label">Tasa infección postop</div>
                <div class="kpi-value">${q.tasaInfeccion.toFixed(1)}%</div>

              </div>
              <div class="kpi">
                <div class="kpi-label">Estancia preop promedio</div>
                <div class="kpi-value">${q.estanciaPreopProm.toFixed(1)}</div>
                <div class="kpi-sub">días desde ingreso a 1ª cirugía</div>
              </div>
              <div class="kpi">
                <div class="kpi-label">Estancia postop promedio</div>
                <div class="kpi-value">${q.estanciaPostopProm.toFixed(1)}</div>
                <div class="kpi-sub">días desde cirugía hasta egreso</div>
              </div>
              <div class="kpi red">
                <div class="kpi-label">Cirugías suspendidas</div>
                <div class="kpi-value">${q.suspendidas}</div>
                <div class="kpi-sub">de ${q.programadasTotal} programadas (${q.tasaSuspension.toFixed(1)}%)</div>
              </div>
              <div class="kpi">
                <div class="kpi-label">Promedio cirugías/paciente</div>
                <div class="kpi-value">${q.cirugiasPorPaciente.toFixed(2)}</div>
                <div class="kpi-sub">re-intervenciones consideradas</div>
              </div>
              <div class="kpi green">
                <div class="kpi-label">Egresos verificados por staff</div>
                <div class="kpi-value">${q.egresosVerificados}/${q.egresosTotal}</div>
                <div class="kpi-sub">${q.tasaVerificacion.toFixed(0)}% con visto bueno</div>
              </div>
            </div>
            ${q.motivosSuspension.length > 0 ? `
              <h4 style="margin-top:14px">Motivos de cirugías suspendidas</h4>
              ${this._renderHBarChart(q.motivosSuspension)}
            ` : ''}
          `;
        })()}
      </div>

      <!-- Pie de impresión -->
      <div class="print-only" style="margin-top:24px;font-size:.8em;color:#666;border-top:1px solid #ccc;padding-top:8px">
        Total de pacientes registrados: ${State.data.patients.length}
        · Programas registrados: ${(State.data.programas||[]).length}
        · Egresos: ${(State.data.egresos||[]).length}

  /* ---------- Filtros de fecha en reportes ---------- */
  setRangoReporte(campo, valor) {
    if (campo === 'desde') State.reporteDesde = valor;
    else if (campo === 'hasta') State.reporteHasta = valor;
    this.render();
  },
  setRangoRapido(tipo) {
    const hoy = new Date();
    if (tipo === 'mes') {
      State.reporteDesde = hoy.getFullYear() + '-' + String(hoy.getMonth()+1).padStart(2,'0') + '-01';
      State.reporteHasta = todayISO();
    } else if (tipo === 'trim') {
      const q = Math.floor(hoy.getMonth()/3);
      State.reporteDesde = hoy.getFullYear() + '-' + String(q*3+1).padStart(2,'0') + '-01';
      State.reporteHasta = todayISO();
    } else if (tipo === 'año') {
      State.reporteDesde = hoy.getFullYear() + '-01-01';
      State.reporteHasta = todayISO();
    } else {
      State.reporteDesde = '';
      State.reporteHasta = '';
    }
    this.render();
  },
  // Verifica si una fecha ISO (YYYY-MM-DD o ISO datetime) está dentro del rango configurado
  _enRango(fechaISO) {
    if (!fechaISO) return false;
    const f = fechaISO.slice(0,10);
    if (State.reporteDesde && f < State.reporteDesde) return false;
    if (State.reporteHasta && f > State.reporteHasta) return false;
    return true;
  },

  /* ---------- Cálculos de métricas ---------- */
  _metricasResumen() {
    const pats = State.data.patients || [];
    const activos = pats.filter(p => !p.fechaEgreso);
    const hoy = new Date();
    const hace30 = new Date(hoy.getTime() - 30*24*60*60*1000).toISOString().slice(0,10);
    const inicioMes = hoy.toISOString().slice(0,7) + '-01';

    const listos = activos.filter(p => evaluarAptoCirugia(p).listo).length;
    const postopList = activos.filter(p => p.cirugia && p.cirugia.realizada);
    const postop = postopList.length;
    const diasPostopProm = postopList.length > 0
      ? postopList.reduce((s,p) => s + (diasPostop(p)||0), 0) / postopList.length
      : 0;
    const conInfeccion = activos.filter(p => tieneInfeccion(p)).length;

    // Estancia promedio de egresos últimos 30 días
    const egresosRecientes = pats.filter(p => p.fechaEgreso && p.fechaEgreso >= hace30);
    const estanciaProm = egresosRecientes.length > 0
      ? egresosRecientes.reduce((s,p) => s + daysBetween(p.fechaIngreso, p.fechaEgreso), 0) / egresosRecientes.length
      : 0;

    // Cirugías del mes actual
    let cirugiasMesActual = 0;
    pats.forEach(p => {
      (p.cirugiasRealizadas || []).forEach(c => {
        if (c.fecha && c.fecha >= inicioMes) cirugiasMesActual++;
      });
    });

    // Egresos último mes (últimos 30 días)
    const egresosUltimoMes = pats.filter(p => p.fechaEgreso && p.fechaEgreso >= hace30).length;

    // Tiempo a cirugía promedio (días desde ingreso hasta primera cirugía)
    const conCirugia = pats.filter(p => (p.cirugiasRealizadas||[]).length > 0 && p.fechaIngreso);
    const tiempoACirugiaProm = conCirugia.length > 0
      ? conCirugia.reduce((s,p) => {
          const primera = p.cirugiasRealizadas.slice().sort((a,b)=>(a.fecha||'').localeCompare(b.fecha||''))[0];
          return s + daysBetween(p.fechaIngreso, primera.fecha);
        }, 0) / conCirugia.length
      : 0;

    // Estado preoperatorio
    let pendientesPreop = 0, contraindicados = 0;
    activos.forEach(p => {
      const a = evaluarAptoCirugia(p);
      if (a.listo) return;
      if (a.operado) return;
      if (tieneContraindicacion(p)) contraindicados++;
      else pendientesPreop++;
    });

    return {
      activos: activos.length,
      listos, postop, diasPostopProm, conInfeccion,
      estanciaProm, cirugiasMesActual, egresosUltimoMes,
      tiempoACirugiaProm, pendientesPreop, contraindicados
    };
  },

  _cirugiasUltimosMeses(n) {
    const meses = [];
    const hoy = new Date();
    for (let i = n-1; i >= 0; i--) {
      const d = new Date(hoy.getFullYear(), hoy.getMonth() - i, 1);
      const ym = d.toISOString().slice(0,7);
      meses.push({ ym, label: d.toLocaleDateString('es', {month:'short', year:'2-digit'}), value: 0 });
    }
    State.data.patients.forEach(p => {
      (p.cirugiasRealizadas || []).forEach(c => {
        if (!c.fecha) return;
        const ym = c.fecha.slice(0,7);
        const m = meses.find(x => x.ym === ym);
        if (m) m.value++;
      });
    });
    return meses;
  },

  _egresosUltimosMeses(n) {
    const meses = [];
    const hoy = new Date();
    for (let i = n-1; i >= 0; i--) {
      const d = new Date(hoy.getFullYear(), hoy.getMonth() - i, 1);
      const ym = d.toISOString().slice(0,7);
      meses.push({ ym, label: d.toLocaleDateString('es', {month:'short', year:'2-digit'}), value: 0 });
    }
    State.data.patients.forEach(p => {
      if (!p.fechaEgreso) return;
      const ym = p.fechaEgreso.slice(0,7);
      const m = meses.find(x => x.ym === ym);
      if (m) m.value++;
    });
    return meses;
  },

  _topDiagnosticos(n) {
    const counts = {};
    State.data.patients.forEach(p => {
      (p.diagnosticos || []).forEach(d => {
        const k = d.trim();
        if (!k) return;
        counts[k] = (counts[k] || 0) + 1;
      });
    });
    const arr = Object.entries(counts)
      .map(([label, value]) => ({label, value}))
      .sort((a,b) => b.value - a.value)
      .slice(0, n);
    return arr;
  },

  _topCirujanos(n) {
    const counts = {};
    State.data.patients.forEach(p => {
      (p.cirugiasRealizadas || []).forEach(c => {
        const k = (c.cirujano||'').trim() || '(sin asignar)';
        counts[k] = (counts[k] || 0) + 1;
      });
    });
    return Object.entries(counts)
      .map(([label, value]) => ({label, value}))
      .sort((a,b) => b.value - a.value)
      .slice(0, n);
  },

  // Métricas de calidad clínica (respeta el filtro de fechas si está activo)
  _metricasCalidad() {
    const enRango = (f) => !f ? false : (
      (!State.reporteDesde && !State.reporteHasta) ? true : this._enRango(f)
    );
    const pacientesEnRango = State.data.patients.filter(p => {
      if (!State.reporteDesde && !State.reporteHasta) return true;
      return this._enRango(p.fechaIngreso) || this._enRango(p.fechaEgreso) ||
        (p.cirugiasRealizadas||[]).some(c => this._enRango(c.fecha));
    });
    // Operados en rango
    let totalOperados = 0;
    let conInfeccionPostop = 0;
    let sumPreop = 0, countPreop = 0;
    let sumPostop = 0, countPostop = 0;
    let sumCirugias = 0;
    pacientesEnRango.forEach(p => {
      const cirugias = (p.cirugiasRealizadas||[])
        .filter(c => !State.reporteDesde && !State.reporteHasta ? true : this._enRango(c.fecha))
        .slice().sort((a,b) => (a.fecha||'').localeCompare(b.fecha||''));
      if (cirugias.length === 0) return;
      totalOperados++;
      sumCirugias += cirugias.length;
      // Infección postop: si tiene infección en dx y la primera cirugía fue antes
      if (tieneInfeccion(p)) {
        conInfeccionPostop++;
      }
      // Estancia preop: días desde ingreso hasta 1ª cirugía
      if (p.fechaIngreso && cirugias[0].fecha) {
        const d = daysBetween(p.fechaIngreso, cirugias[0].fecha);
        if (d >= 0) { sumPreop += d; countPreop++; }
      }
      // Estancia postop: días desde 1ª cirugía hasta egreso (si existe)
      if (cirugias[0].fecha && p.fechaEgreso && p.fechaEgreso >= cirugias[0].fecha) {
        const d = daysBetween(cirugias[0].fecha, p.fechaEgreso);
        if (d >= 0) { sumPostop += d; countPostop++; }
      }
    });

    // Suspendidas: entradas en programa con operado=false
    let suspendidas = 0, programadasTotal = 0;
    const motivosCount = {};
    (State.data.programas||[]).forEach(prg => {
      if ((State.reporteDesde || State.reporteHasta) && !this._enRango(prg.fecha)) return;
      (prg.pacientes||[]).forEach(e => {
        programadasTotal++;
        if (e.operado === false) {
          suspendidas++;
          const m = (e.motivoNoOperado||'(sin motivo)').trim() || '(sin motivo)';
          motivosCount[m] = (motivosCount[m]||0) + 1;
        }
      });
    });

    // Egresos verificados por staff (en rango)
    const egresosRange = (State.data.egresos||[]).filter(eg =>
      (!State.reporteDesde && !State.reporteHasta) ? true : this._enRango(eg.fechaEgreso));
    const egresosTotal = egresosRange.length;
    const egresosVerificados = egresosRange.filter(eg => eg.verificadoStaff && eg.verificadoStaff.confirmado).length;

    const motivosSuspension = Object.entries(motivosCount)
      .map(([label, value]) => ({ label, value, color: '#dc2626' }))
      .sort((a,b) => b.value - a.value)
      .slice(0, 8);

    return {
      totalOperados,
      conInfeccionPostop,
      tasaInfeccion: totalOperados > 0 ? (conInfeccionPostop / totalOperados) * 100 : 0,
      estanciaPreopProm: countPreop > 0 ? sumPreop / countPreop : 0,
      estanciaPostopProm: countPostop > 0 ? sumPostop / countPostop : 0,
      suspendidas,
      programadasTotal,
      tasaSuspension: programadasTotal > 0 ? (suspendidas / programadasTotal) * 100 : 0,
      cirugiasPorPaciente: totalOperados > 0 ? sumCirugias / totalOperados : 0,
      egresosTotal,
      egresosVerificados,
      tasaVerificacion: egresosTotal > 0 ? (egresosVerificados / egresosTotal) * 100 : 0,
      motivosSuspension
    };
  },

  _topProcedimientos(n) {
    const counts = {};
    State.data.patients.forEach(p => {
      (p.cirugiasRealizadas || []).forEach(c => {
        const k = (c.procedimiento||'').trim() || '(sin especificar)';
        counts[k] = (counts[k] || 0) + 1;
      });
    });
    return Object.entries(counts)
      .map(([label, value]) => ({label, value}))
      .sort((a,b) => b.value - a.value)
      .slice(0, n);
  },

  /* ---------- Renderers de gráficos ---------- */
  _renderHBarChart(items) {
    if (!items || items.length === 0) {
      return `<div class="muted">Sin datos suficientes.</div>`;
    }
    const max = Math.max(...items.map(it => it.total ? it.total : it.value), 1);
    return `<div class="bar-chart">
      ${items.map(it => {
        const pct = (it.value / max) * 100;
        const color = it.color || '#3282b8';
        return `<div class="bar-row">
          <div class="bar-label" title="${escapeHtml(it.label)}">${escapeHtml(it.label)}</div>
          <div class="bar-track">
            <div class="bar-fill" style="width:${pct.toFixed(1)}%;background:${color}"></div>
          </div>
          <div class="bar-value">${it.value}</div>
        </div>`;
      }).join('')}
    </div>`;
  },

  _renderVBarChart(items) {
    if (!items || items.length === 0) return `<div class="muted">Sin datos.</div>`;
    const max = Math.max(...items.map(it => it.value), 1);
    return `<div class="vbar-chart">
      ${items.map(it => {
        const h = (it.value / max) * 100;
        return `<div class="vbar-col">
          <div class="vbar-count">${it.value}</div>
          <div class="vbar-fill" style="height:${h}%"></div>
          <div class="vbar-label">${escapeHtml(it.label)}</div>
        </div>`;
      }).join('')}
    </div>`;
  },

  /* ---------- Exportar a CSV ---------- */
  exportarCSV(tipo) {
    let header = [], rows = [];
    if (tipo === 'pacientes') {
      header = ['ID','Nombre','Cédula','Edad','Sexo','Cama','Cirujano','Fecha ingreso','Fecha egreso','Días hospitalización','Diagnósticos','Alergias','Antecedentes','# Cirugías','Cirugías','Estado'];
      rows = State.data.patients.map(p => {
        const dias = p.fechaIngreso ? daysBetween(p.fechaIngreso, p.fechaEgreso) : '';
        const apto = evaluarAptoCirugia(p);
        const estado = p.fechaEgreso ? 'Egresado'
          : apto.listo ? 'Listo cirugía'
          : apto.operado ? 'Operado' + (p.requiereOtraCirugia ? ' (req otra)' : '')
          : tieneContraindicacion(p) ? 'No apto' : 'Pendiente preop';
        const cirugias = (p.cirugiasRealizadas||[]).map(c => `${c.fecha} ${c.procedimiento||''}`).join(' | ');
        return [
          p.id, p.nombre||'', p.cedula||'', p.edad||'', p.sexo||'', p.cama||'', p.cirujano||'',
          p.fechaIngreso||'', p.fechaEgreso||'', dias,
          (p.diagnosticos||[]).join(' | '), p.alergias||'', p.antecedentesPatologicos||'',
          (p.cirugiasRealizadas||[]).length, cirugias, estado
        ];
      });
    } else if (tipo === 'cirugias') {
      header = ['Fecha','Paciente','Cédula','Edad','Procedimiento','Lateralidad','Cirujano','Quirófano','Diagnóstico','Notas'];
      State.data.patients.forEach(p => {
        (p.cirugiasRealizadas||[]).forEach(c => {
          rows.push([
            c.fecha||'', p.nombre||'', p.cedula||'', p.edad||'',
            c.procedimiento||'', c.lateralidad||'', c.cirujano||'', c.quirofano||'',
            (p.diagnosticos||[]).join(' | '), c.notas||''
          ]);
        });
      });
      rows.sort((a,b) => (b[0]||'').localeCompare(a[0]||''));
    } else if (tipo === 'egresos') {
      header = ['Fecha egreso','Paciente','Cédula','Edad','Cama','Días hospitalización','Cirujano','Dx final','# Cirugías','Cita control','Lugar cita','Rx control'];
      (State.data.egresos||[]).forEach(eg => {
        const p = State.data.patients.find(x => x.id === eg.pacienteId) || {};
        const dias = p.fechaIngreso ? daysBetween(p.fechaIngreso, eg.fechaEgreso) : '';
        rows.push([
          eg.fechaEgreso||'', p.nombre||'', p.cedula||'', p.edad||'', p.cama||'',
          dias, p.cirujano||'',
          eg.diagnosticoFinal || (p.diagnosticos||[]).join(' | '),
          (eg.cirugiasResumen||[]).length,
          (eg.citaControl||{}).fecha || '',
          (eg.citaControl||{}).lugar || '',
          (eg.rayosXControl||{}).requiere ? (eg.rayosXControl.descripcion || 'sí') : 'no'
        ]);
      });
      rows.sort((a,b) => (b[0]||'').localeCompare(a[0]||''));
    }

    const csvEscape = (v) => {
      const s = String(v == null ? '' : v);
      if (/[",\n;]/.test(s)) return '"' + s.replace(/"/g,'""') + '"';
      return s;
    };
    const csv = [header, ...rows].map(r => r.map(csvEscape).join(',')).join('\n');
    const blob = new Blob(['﻿' + csv], { type:'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `ortopedia_${tipo}_${todayISO()}.csv`;
    document.body.appendChild(a); a.click(); a.remove();
    URL.revokeObjectURL(url);
  },

  // Exportar a Excel (archivo .xls que Excel/Numbers/Sheets abren nativamente)
  // Usa formato de tabla HTML con MIME application/vnd.ms-excel
  exportarExcel(tipo) {
    const datos = this._datosParaExport(tipo);
    if (!datos) return;
    const cfg = getConfig();
    const tituloMap = { pacientes:'Pacientes', cirugias:'Cirugías', egresos:'Egresos' };
    const rango = (State.reporteDesde || State.reporteHasta)
      ? ' · Rango: ' + (State.reporteDesde||'inicio') + ' a ' + (State.reporteHasta||'hoy')
      : '';
    const escapeXLS = (s) => String(s == null ? '' : s).replace(/[<>&]/g, c => ({'<':'&lt;','>':'&gt;','&':'&amp;'}[c]));
    const html = `<html xmlns:x="urn:schemas-microsoft-com:office:excel">
<head>
<meta charset="UTF-8">
<style>
  table { border-collapse: collapse; }
  th { background: #0f4c75; color: white; padding: 8px; border: 1px solid #888; text-align: left; }
  td { padding: 6px 8px; border: 1px solid #ccc; }
  tr:nth-child(even) td { background: #f5f7fa; }
</style>
</head>
<body>
<h2>${escapeXLS(cfg.hospitalNombre || '')} — ${escapeXLS(tituloMap[tipo]||tipo)}</h2>
<p>Generado el ${new Date().toLocaleString('es')}${escapeXLS(rango)}</p>
<table>
  <thead><tr>${datos.header.map(h => `<th>${escapeXLS(h)}</th>`).join('')}</tr></thead>
  <tbody>
    ${datos.rows.map(r => `<tr>${r.map(c => `<td>${escapeXLS(c)}</td>`).join('')}</tr>`).join('')}
  </tbody>
</table>
</body>
</html>`;
    const blob = new Blob(['﻿' + html], { type: 'application/vnd.ms-excel;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `ortopedia_${tipo}_${todayISO()}.xls`;
    document.body.appendChild(a); a.click(); a.remove();
    URL.revokeObjectURL(url);
  },

      rows = State.data.patients

          if (!State.reporteDesde && !State.reporteHasta) return true;

            (p.cirugiasRealizadas||[]).some(c => this._enRango(c.fecha));

        .map(p => {

          const apto = evaluarAptoCirugia(p);

            : tieneContraindicacion(p) ? 'No apto' : 'Pendiente preop';
          const cirugias = (p.cirugiasRealizadas||[]).map(c => `${c.fecha} ${c.procedimiento||''}`).join(' | ');
          return [
            p.id, p.nombre||'', p.cedula||'', p.edad||'', p.sexo||'', p.ubicacion||'', p.cama||'', p.cirujano||'',
            p.fechaIngreso||'', p.fechaEgreso||'', dias,
            (p.diagnosticos||[]).join(' | '), p.alergias||'', p.antecedentesPatologicos||'',
            (p.cirugiasRealizadas||[]).length, cirugias, estado
          ];
        });
    } else if (tipo === 'cirugias') {
      header = ['Fecha','Paciente','Cédula','Edad','Procedimiento','Lateralidad','Cirujano','Quirófano','Diagnóstico','Notas'];
      State.data.patients.forEach(p => {

          rows.push([
            c.fecha||'', p.nombre||'', p.cedula||'', p.edad||'',
            c.procedimiento||'', c.lateralidad||'', c.cirujano||'', c.quirofano||'',
            (p.diagnosticos||[]).join(' | '), c.notas||''
          ]);
        });
      });
      rows.sort((a,b) => (b[0]||'').localeCompare(a[0]||''));
    } else if (tipo === 'egresos') {
      header = ['Fecha egreso','Paciente','Cédula','Edad','Cama','Días hospitalización','Cirujano','Dx final','# Cirugías','Cita control','Lugar cita','Rx control'];
      (State.data.egresos||[]).forEach(eg => {
        if ((State.reporteDesde || State.reporteHasta) && !this._enRango(eg.fechaEgreso)) return;
        const p = State.data.patients.find(x => x.id === eg.pacienteId) || {};
        const dias = p.fechaIngreso ? daysBetween(p.fechaIngreso, eg.fechaEgreso) : '';
        rows.push([
          eg.fechaEgreso||'', p.nombre||'', p.cedula||'', p.edad||'', p.cama||'',
          dias, p.cirujano||'',
          eg.diagnosticoFinal || (p.diagnosticos||[]).join(' | '),
          (eg.cirugiasResumen||[]).length,
          (eg.citaControl||{}).fecha || '',
          (eg.citaControl||{}).lugar || '',
          (eg.rayosXControl||{}).requiere ? (eg.rayosXControl.descripcion || 'sí') : 'no'
        ]);
      });
      rows.sort((a,b) => (b[0]||'').localeCompare(a[0]||''));
    }
    return { header, rows };
  },

  /* ---------- Alertas globales ---------- */
  renderAlertas() {
    const items = [];
    State.data.patients.filter(p=>!p.fechaEgreso).forEach(p => {
      calcularAlertasPaciente(p).forEach(a => {
        items.push({ p, a });
      });
    });

    // ordenar: rojas primero, luego amarillas, luego verdes
    const orden = { red:0, yellow:1, blue:2, green:3 };
    items.sort((x,y) => orden[x.a.tipo] - orden[y.a.tipo]);

    let html = `<h2>Alertas y recordatorios</h2>`;
    if (items.length === 0) {
      html += `<div class="empty"><div class="ico">✅</div><div>Sin alertas activas.</div></div>`;
      return html;
    }

    items.forEach(({p,a}) => {
      html += `
        <div class="alert-box ${a.tipo}" onclick="App.openPaciente('${p.id}')" style="cursor:pointer;margin-bottom:8px">
          <div class="strong">Cama ${escapeHtml(p.cama||'?')} · ${escapeHtml(p.nombre||'(sin nombre)')}</div>
          <div>${escapeHtml(a.texto)}</div>
        </div>
      `;
    });
    return html;
  },

  _crearPaciente(esAmbulatorio) {
    debounceAction('crearPaciente', () => {
      const p = nuevoPaciente();
      if (esAmbulatorio) {
        p.enListaEspera = true;
        p.fechaListaEspera = todayISO();
        p.fechaIngreso = '';
        p.cama = '';
      }
      State.data.patients.push(p);
      logCambio(p, 'Creación', 'Paciente creado · ' + (esAmbulatorio?'ambulatorio':'hospitalizado'));
      State.save();
      this._modalSubtab = 'datos';
      this.openPaciente(p.id);
    });
  },

  // Compatibilidad: openNewAmbulatorio sigue funcionando (sin pasar por modal)
  openNewAmbulatorio() {
    this._crearPaciente(true);
  },

  openPaciente(id) {
    this._modalSubtab = 'datos';
    this._currentModalId = id;
    this.renderModal(id);
  },

  closeModal() {
    const idCerrando = this._currentModalId;
    this._currentModalId = null;
    document.getElementById('modalRoot').innerHTML = '';
    // v3.25 (C3): al cerrar el modal, si había cambios remotos diferidos sin decidir,
    // se conservan los cambios locales (el usuario los hizo conscientemente).
    // La próxima sincronización propagará la versión local al resto del equipo,
    // y los cambios del otro dispositivo se pueden re-aplicar manualmente si se necesita.
    if (idCerrando) {
      delete this._pendingRemoteRefresh[idCerrando];
      // Dejar el dirty marker activo unos segundos más para que el siguiente snapshot
      // tampoco interfiera mientras la versión local se sube
    }
    this.render();
  },

  /* Modales secundarios (catálogos, plantillas) que se abren ENCIMA del modal del paciente */
  _renderSecondary(html) {
    document.getElementById('modalRoot2').innerHTML = html;
  },
  _closeSecondary() {
    document.getElementById('modalRoot2').innerHTML = '';
    // Si hay un modal de paciente abierto, refrescarlo para que se vean los cambios
    // hechos en el catálogo (diagnósticos toggleados, etc.)
    if (this._currentModalId) {
      this.renderModal(this._currentModalId);
    } else {
      // Si no hay paciente abierto pero estamos en una vista que pudo cambiar
      // (programa quirúrgico, egreso), re-renderizamos
      this.render();
    }
  },

  renderModal(id) {
    const p = State.data.patients.find(x => x.id === id);
    if (!p) return;
    const apto = evaluarAptoCirugia(p);
    const dias = daysBetween(p.fechaIngreso);

    const tabs = [
      ['datos','Datos básicos'],
      ['preop','Preoperatorio'],
      ['programa','Programa Qx'],
      ['evolucion','Evolución'],
      ['meds','Medicamentos'],
      ['labs','Laboratorios'],
      ['ic','Interconsultas'],
      ['inf','Control infección'],
      ['hist','Historial']
    ];

    let bodyHtml = '';
    if (this._modalSubtab === 'datos') bodyHtml = this.tabDatos(p);
    else if (this._modalSubtab === 'preop') bodyHtml = this.tabPreop(p);
    else if (this._modalSubtab === 'programa') bodyHtml = this.tabPrograma(p);
    else if (this._modalSubtab === 'evolucion') bodyHtml = this.tabEvolucion(p);
    else if (this._modalSubtab === 'meds') bodyHtml = this.tabMeds(p);
    else if (this._modalSubtab === 'labs') bodyHtml = this.tabLabs(p);
    else if (this._modalSubtab === 'ic') bodyHtml = this.tabIC(p);
    else if (this._modalSubtab === 'inf') bodyHtml = this.tabInf(p);
    else if (this._modalSubtab === 'hist') bodyHtml = this.tabHist(p);

    const erroresValidacion = validarPaciente(p);
    const progPendModal = getProgramacionPendiente(p);
    const aptoBadge = (erroresValidacion.length > 0)
      ? `<span class="pill notready">⚠ Datos incompletos</span>`
      : (progPendModal && !apto.operado)
        ? `<span class="pill" style="background:#dbeafe;color:#1e3a8a">📅 Programado · ${fmtDate(progPendModal.programa.fecha)}${progPendModal.entrada.quirofano?' · Q'+escapeHtml(progPendModal.entrada.quirofano):''}</span>`
        : apto.listo
          ? `<span class="pill ready">✓ Listo cirugía</span>`
          : apto.operado
            ? (p.requiereOtraCirugia
                ? (progPendModal
                    ? `<span class="pill" style="background:#dbeafe;color:#1e3a8a">📅 Reoperación programada · ${fmtDate(progPendModal.programa.fecha)}</span>`
                    : `<span class="pill pending">Operado · pendiente otra cirugía</span>`)
                : `<span class="pill ready">✓ Operado</span>`)
            : (tieneContraindicacion(p) ? `<span class="pill notready">No apto</span>` : `<span class="pill pending">Pendiente</span>`);

    const html = `
      <div class="modal-backdrop" onclick="if(event.target===this) App.closeModal()">
        <div class="modal">
          <div class="modal-head">
            <div>
              <div style="font-weight:600">${escapeHtml(p.nombre || '(Nuevo paciente)')}</div>
              <div style="font-size:.8rem;opacity:.9">
                Cama ${escapeHtml(p.cama||'?')} · ${escapeHtml(p.cedula||'sin cédula')} · ${dias} día(s) ${aptoBadge}
              </div>
            </div>
            <button class="close-x" onclick="App.closeModal()" aria-label="Cerrar">✕</button>
          </div>
          <div class="subtabs">
            ${tabs.map(([k,l])=>`
              <button class="${this._modalSubtab===k?'active':''}" onclick="App.subtab('${p.id}','${k}')">${l}</button>
            `).join('')}
          </div>
          <div class="modal-body">${bodyHtml}</div>
          <div class="modal-foot">
            <button class="btn danger" onclick="App.eliminarPaciente('${p.id}')">Eliminar</button>
            <div style="flex:1"></div>
            <button class="btn ghost" onclick="App.closeModal()">Cerrar</button>
          </div>
        </div>
      </div>
    `;
    document.getElementById('modalRoot').innerHTML = html;
  },

  subtab(id, k) {
    this._modalSubtab = k;
    this.renderModal(id);
  },
