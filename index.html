<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0f4c75">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Control de Pacientes - Servicio de Ortopedia</title>
<!-- Firebase SDK (versión compat — más estable en Safari/iOS) -->
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore-compat.js"></script>
<style>
  /* ---------- Reset & base ---------- */
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background: #f3f5f8;
    color: #1f2937;
    font-size: 15px;
    line-height: 1.45;
    -webkit-font-smoothing: antialiased;
  }
  h1, h2, h3, h4 { margin: 0 0 .5em; line-height: 1.2; }
  h1 { font-size: 1.25rem; }
  h2 { font-size: 1.1rem; color: #0f4c75; }
  h3 { font-size: 1rem; color: #0f4c75; }
  h4 { font-size: .9rem; color: #374151; text-transform: uppercase; letter-spacing: .04em; }
  a { color: #0f4c75; }
  button { font: inherit; cursor: pointer; }

  /* ---------- App shell ---------- */
  header.appbar {
    background: linear-gradient(135deg, #0f4c75, #3282b8);
    color: white;
    padding: 12px 16px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 6px rgba(0,0,0,.12);
  }
  .appbar-row {
    display: flex; align-items: center; justify-content: space-between; gap: 8px; flex-wrap: wrap;
  }
  .appbar-title { font-weight: 600; font-size: 1.05rem; }
  .appbar-sub { font-size: .8rem; opacity: .9; }
  nav.tabs {
    display: flex; flex-wrap: wrap; gap: 4px;
    background: #0f4c75;
    padding: 0 8px;
    overflow-x: auto;
    scrollbar-width: none;
    position: sticky;
    top: 64px;
    z-index: 99;
  }
  nav.tabs::-webkit-scrollbar { display: none; }
  nav.tabs button {
    background: transparent;
    border: none;
    color: #cfe3f3;
    padding: 12px 14px;
    font-size: .9rem;
    border-bottom: 3px solid transparent;
    white-space: nowrap;
  }
  nav.tabs button.active {
    color: white;
    border-bottom-color: #ffd166;
    font-weight: 600;
  }
  nav.tabs .badge {
    display: inline-block;
    background: #e63946;
    color: white;
    font-size: .7rem;
    border-radius: 10px;
    padding: 1px 7px;
    margin-left: 5px;
    font-weight: 700;
  }

  main { padding: 16px; max-width: 1200px; margin: 0 auto; }

  /* ---------- Buttons ---------- */
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    background: #0f4c75; color: white; border: none;
    padding: 9px 14px; border-radius: 8px; font-size: .9rem; font-weight: 500;
    transition: background .15s ease, transform .05s ease;
  }
  .btn:hover { background: #103e60; }
  .btn:active { transform: translateY(1px); }
  .btn.secondary { background: #4b5563; }
  .btn.secondary:hover { background: #374151; }
  .btn.success { background: #059669; }
  .btn.success:hover { background: #047857; }
  .btn.danger { background: #dc2626; }
  .btn.danger:hover { background: #b91c1c; }
  .btn.ghost { background: transparent; color: #0f4c75; border: 1px solid #cbd5e1; }
  .btn.ghost:hover { background: #eef2f7; }
  .btn.small { padding: 5px 10px; font-size: .8rem; }
  .btn.full { width: 100%; justify-content: center; }

  /* ---------- Cards & layout ---------- */
  .card {
    background: white; border-radius: 12px;
    box-shadow: 0 1px 3px rgba(0,0,0,.06);
    padding: 16px;
    margin-bottom: 16px;
  }
  .card.compact { padding: 12px; }
  .grid { display: grid; gap: 12px; }
  .grid.cols-2 { grid-template-columns: 1fr 1fr; }
  .grid.cols-3 { grid-template-columns: 1fr 1fr 1fr; }
  @media (max-width: 700px) {
    .grid.cols-2, .grid.cols-3 { grid-template-columns: 1fr; }
  }
  .toolbar {
    display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; align-items: center;
  }
  .toolbar input[type="search"] {
    flex: 1; min-width: 160px;
  }

  /* ---------- Forms ---------- */
  label { display: block; font-size: .82rem; color: #374151; margin-bottom: 4px; font-weight: 500; }
  input, select, textarea {
    width: 100%;
    padding: 9px 11px;
    border: 1px solid #d1d5db;
    border-radius: 8px;
    font: inherit;
    background: white;
    color: #111827;
  }
  input:focus, select:focus, textarea:focus {
    outline: none; border-color: #3282b8; box-shadow: 0 0 0 3px rgba(50,130,184,.18);
  }
  textarea { resize: vertical; min-height: 64px; }
  .field { margin-bottom: 12px; }
  .field-row { display: grid; gap: 12px; grid-template-columns: 1fr 1fr; }
  @media (max-width: 600px) { .field-row { grid-template-columns: 1fr; } }
  .checkbox-row { display: flex; align-items: center; gap: 8px; margin: 6px 0; }
  .checkbox-row input { width: auto; }
  .checkbox-row label { margin: 0; font-weight: 400; }

  /* ---------- Patient cards ---------- */
  .patient-card {
    background: white;
    border-radius: 10px;
    padding: 12px 14px;
    margin-bottom: 10px;
    border-left: 5px solid #cbd5e1;
    box-shadow: 0 1px 3px rgba(0,0,0,.05);
    cursor: pointer;
    transition: transform .1s, box-shadow .1s;
  }
  .patient-card:hover { transform: translateX(2px); box-shadow: 0 2px 8px rgba(0,0,0,.08); }
  .patient-card.ready { border-left-color: #059669; }
  .patient-card.alert { border-left-color: #dc2626; background: #fef2f2; }
  .patient-card.warn { border-left-color: #f59e0b; }
  .pc-row { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
  .pc-bed {
    background: #0f4c75; color: white;
    width: 42px; height: 42px;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 1rem;
    flex-shrink: 0;
  }
  .pc-info { flex: 1; min-width: 0; }
  .pc-name { font-weight: 600; color: #0f172a; font-size: 1rem; }
  .pc-meta { font-size: .82rem; color: #6b7280; margin-top: 2px; }
  .pc-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
  .tag {
    display: inline-block;
    font-size: .72rem;
    padding: 2px 8px;
    border-radius: 999px;
    background: #e5e7eb;
    color: #374151;
    font-weight: 500;
  }
  .tag.green { background: #d1fae5; color: #065f46; }
  .tag.red { background: #fee2e2; color: #991b1b; }
  .tag.yellow { background: #fef3c7; color: #92400e; }
  .tag.blue { background: #dbeafe; color: #1e3a8a; }
  .tag.gray { background: #e5e7eb; color: #374151; }

  /* ---------- Modal ---------- */
  .modal-backdrop {
    position: fixed; inset: 0;
    background: rgba(15,23,42,.55);
    z-index: 200;
    display: flex; align-items: flex-start; justify-content: center;
    padding: 0;
    overflow-y: auto;
  }
  .modal {
    background: #f9fafb;
    width: 100%;
    max-width: 900px;
    margin: 20px auto;
    border-radius: 14px;
    box-shadow: 0 12px 40px rgba(0,0,0,.25);
    overflow: hidden;
    min-height: calc(100vh - 40px);
  }
  @media (max-width: 800px) {
    .modal { margin: 0; border-radius: 0; min-height: 100vh; }
  }
  .modal-head {
    background: linear-gradient(135deg, #0f4c75, #3282b8);
    color: white; padding: 14px 16px;
    display: flex; align-items: center; justify-content: space-between; gap: 8px;
    position: sticky; top: 0; z-index: 5;
  }
  .modal-body { padding: 16px; }
  .modal-foot {
    padding: 12px 16px;
    background: white;
    border-top: 1px solid #e5e7eb;
    display: flex; gap: 8px; justify-content: flex-end; flex-wrap: wrap;
    position: sticky; bottom: 0;
  }
  .close-x {
    background: rgba(255,255,255,.15);
    color: white; border: none;
    width: 34px; height: 34px;
    border-radius: 50%;
    font-size: 1.2rem;
    display: flex; align-items: center; justify-content: center;
  }

  /* Sub-tabs inside modal */
  .subtabs {
    display: flex; flex-wrap: wrap; gap: 2px;
    background: white;
    border-bottom: 1px solid #e5e7eb;
    padding: 0 8px;
    overflow-x: auto;
  }
  .subtabs button {
    background: transparent; border: none;
    padding: 10px 12px;
    color: #6b7280; font-size: .85rem;
    border-bottom: 2px solid transparent;
    white-space: nowrap;
  }
  .subtabs button.active {
    color: #0f4c75; border-bottom-color: #0f4c75; font-weight: 600;
  }

  /* ---------- Tables ---------- */
  table { width: 100%; border-collapse: collapse; font-size: .88rem; }
  table thead { background: #f1f5f9; }
  table th, table td { padding: 8px 10px; text-align: left; border-bottom: 1px solid #e5e7eb; }
  table th { font-weight: 600; color: #334155; font-size: .8rem; text-transform: uppercase; letter-spacing: .03em; }
  .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }

  /* ---------- Alerts ---------- */
  .alert-box {
    padding: 10px 12px; border-radius: 8px; margin-bottom: 10px;
    border-left: 4px solid;
  }
  .alert-box.red { background: #fef2f2; border-color: #dc2626; color: #7f1d1d; }
  .alert-box.yellow { background: #fffbeb; border-color: #f59e0b; color: #78350f; }
  .alert-box.green { background: #ecfdf5; border-color: #059669; color: #065f46; }
  .alert-box.blue { background: #eff6ff; border-color: #3282b8; color: #1e3a8a; }

  /* ---------- Empty state ---------- */
  .empty {
    text-align: center; padding: 32px 16px; color: #6b7280;
  }
  .empty .ico { font-size: 2.5rem; margin-bottom: 8px; opacity: .5; }

  /* ---------- Tiny utilities ---------- */
  .muted { color: #6b7280; font-size: .85rem; }
  .strong { font-weight: 600; }
  .row-between { display: flex; align-items: center; justify-content: space-between; gap: 8px; flex-wrap: wrap; }
  .row-gap { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .pill {
    display: inline-block; padding: 3px 9px; border-radius: 999px;
    font-size: .75rem; font-weight: 600;
  }
  .pill.ready { background: #d1fae5; color: #065f46; }
  .pill.notready { background: #fee2e2; color: #991b1b; }
  .pill.pending { background: #fef3c7; color: #92400e; }
  .lab-table input { padding: 4px 6px; font-size: .85rem; }
  hr { border: none; border-top: 1px solid #e5e7eb; margin: 14px 0; }

  /* ---------- Print ---------- */
  @media print {
    @page { size: A4; margin: 12mm; }
    body { background: white; font-size: 11px; }
    header.appbar, nav.tabs, .toolbar, .no-print, .btn, .modal-foot { display: none !important; }
    main { padding: 0; max-width: none; }
    .card { box-shadow: none; border: 1px solid #ccc; padding: 8px; margin-bottom: 8px; page-break-inside: avoid; }
    .patient-card { border: 1px solid #ccc; box-shadow: none; page-break-inside: avoid; margin-bottom: 6px; }
    table { font-size: 10px; }
    .print-only { display: block !important; }
    .print-title { font-size: 14pt; font-weight: 700; margin-bottom: 8px; text-align: center; }
    .print-sub { font-size: 10pt; text-align: center; margin-bottom: 12px; color: #555; }
  }
  .print-only { display: none; }

  /* ---------- Mobile tweaks ---------- */
  @media (max-width: 500px) {
    main { padding: 10px; }
    .appbar-title { font-size: 1rem; }
    nav.tabs button { padding: 10px 10px; font-size: .82rem; }
    .pc-bed { width: 38px; height: 38px; font-size: .9rem; }
  }

  /* ---------- Sync status ---------- */
  .sync-status {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: .75rem;
    padding: 3px 8px;
    border-radius: 12px;
    background: rgba(255,255,255,.18);
  }
  .sync-status .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #f59e0b;
    box-shadow: 0 0 4px currentColor;
  }
  .sync-status.online .dot { background: #10b981; }
  .sync-status.offline .dot { background: #ef4444; }
  .sync-status.local .dot { background: #94a3b8; box-shadow: none; }

  /* Setup screen */
  .setup-wrap {
    max-width: 720px; margin: 24px auto;
  }
  .setup-step {
    background: white; padding: 16px; border-radius: 10px;
    margin-bottom: 12px; border-left: 4px solid #3282b8;
  }
  .setup-step h3 { color: #0f4c75; }
  .code-block {
    background: #0f172a; color: #e2e8f0;
    padding: 12px; border-radius: 8px;
    font-family: 'Courier New', monospace; font-size: .8rem;
    overflow-x: auto;
    white-space: pre;
    margin: 8px 0;
  }
  .copy-btn {
    background: #1e293b; color: #cbd5e1;
    border: 1px solid #334155; border-radius: 6px;
    padding: 4px 10px; font-size: .75rem; margin-top: 4px;
  }
</style>
</head>
<body>

<header class="appbar">
  <div class="appbar-row">
    <div>
      <div class="appbar-title">Control de Pacientes</div>
      <div class="appbar-sub">Servicio de Ortopedia · <span id="appVersionLabel"></span></div>
    </div>
    <div class="row-gap no-print">
      <span class="sync-status local" id="syncStatus" title="Estado de sincronización" onclick="App.openSetup()">
        <span class="dot"></span><span id="syncText">Sin nube</span>
      </span>
      <button class="btn small" onclick="App.openNew()">+ Paciente</button>
      <button class="btn ghost small" onclick="App.exportData()">Exportar</button>
      <button class="btn ghost small" onclick="document.getElementById('importFile').click()">Importar</button>
      <button class="btn ghost small" onclick="App.openSetup()">⚙</button>
      <input type="file" id="importFile" accept="application/json" style="display:none" onchange="App.importData(event)">
    </div>
  </div>
</header>

<nav class="tabs no-print" id="tabs">
  <button data-tab="lista" class="active" onclick="App.switchTab('lista')">Pase de visita</button>
  <button data-tab="cirugia" onclick="App.switchTab('cirugia')">Listos para cirugía</button>
  <button data-tab="programa" onclick="App.switchTab('programa')">Programa Qx</button>
  <button data-tab="salidas" onclick="App.switchTab('salidas')">Salida</button>
  <button data-tab="alertas" onclick="App.switchTab('alertas')">Alertas <span class="badge" id="alertCount" style="display:none">0</span></button>
  <button data-tab="todos" onclick="App.switchTab('todos')">Todos</button>
</nav>

<main>
  <div id="view"></div>
</main>

<div id="modalRoot"></div>

<script>
/* =========================================================
   Control de Pacientes - Servicio de Ortopedia
   Datos en localStorage; export/import JSON; sin backend.
   ========================================================= */

const APP_VERSION = 'v1.9-salidas-egresos-2026-05-08';
const STORAGE_KEY = 'ortopedia_v1';
const FB_CONFIG_KEY = 'ortopedia_fb_config_v1';
const FB_DOC_PATH = 'apps/ortopedia';   // Documento único de Firestore

// Configuración de Firebase embebida — todos los dispositivos que abran esta URL
// se conectan automáticamente al mismo proyecto, sin necesidad de configurar nada.
const EMBEDDED_FB_CONFIG = {
  apiKey: "AIzaSyCKbRptktjhE3kob9VADWzeCpke8NoM5JE",
  authDomain: "ortopedia-113f8.firebaseapp.com",
  projectId: "ortopedia-113f8",
  storageBucket: "ortopedia-113f8.firebasestorage.app",
  messagingSenderId: "653477762575",
  appId: "1:653477762575:web:a7b008dea2219f9289357a",
  measurementId: "G-62QNQX4VGZ"
};
const SPECIALIDADES_PREOP = [
  'Medicina Interna', 'Medicina Familiar', 'Geriatría',
  'Cardiología', 'Neumología', 'Endocrinología',
  'Nefrología', 'Hematología', 'Otra'
];
const SERVICIOS_INTERCONSULTA = [
  'Medicina Interna','Medicina Familiar','Geriatría','Cardiología','Neumología',
  'Endocrinología','Nefrología','Hematología','Infectología','Anestesiología',
  'Cirugía General','Neurocirugía','Urología','Vascular Periférico',
  'Psiquiatría','Nutrición','Rehabilitación','Otro'
];

/* ---------- Utilidades ---------- */
const uid = () => 'p_' + Date.now().toString(36) + Math.random().toString(36).slice(2,8);
const todayISO = () => new Date().toISOString().slice(0,10);
const fmtDate = (iso) => {
  if (!iso) return '—';
  const d = new Date(iso + (iso.length===10?'T00:00:00':''));
  if (isNaN(d)) return iso;
  return d.toLocaleDateString('es', { day:'2-digit', month:'short', year:'numeric' });
};
const daysBetween = (a, b) => {
  if (!a) return 0;
  const A = new Date(a + (a.length===10?'T00:00:00':''));
  const B = b ? new Date(b + (b.length===10?'T00:00:00':'')) : new Date();
  return Math.floor((B - A) / (1000*60*60*24));
};
const escapeHtml = (s) => (s==null?'':String(s)).replace(/[&<>"']/g, c => ({
  '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
}[c]));

/* ---------- Modelo ---------- */
function nuevoPaciente() {
  return {
    id: uid(),
    nombre: '',
    cedula: '',
    edad: '',
    sexo: '',
    cama: '',
    telefono: '',
    contactoEmergencia: '',
    fechaIngreso: todayISO(),
    fechaEgreso: '',
    cirujano: '',
    diagnosticos: [],
    alergias: '',
    antecedentesPatologicos: '',
    antecedentesQuirurgicos: '',
    medicamentosPrevios: '',
    observaciones: '',
    contraindicaciones: {
      malEstadoGeneral: false,
      malEstadoTejidos: false,
      otra: ''
    },
    estudios: {
      rxTorax: { realizado:false, fecha:'', resultado:'' },
      hemograma: { realizado:false, fecha:'', resultado:'' },
      tiemposCoagulacion: { realizado:false, fecha:'', resultado:'' },
      quimicaSanguinea: { realizado:false, fecha:'', resultado:'' },
      ekg: { realizado:false, fecha:'', resultado:'' },
      evaluacionPreop: { realizado:false, fecha:'', especialidad:'', resultado:'' }
    },
    medicamentos: [],   // {id,nombre,dosis,via,frecuencia,inicio,fin,activo,nota}
    laboratorios: [],   // {id, fecha, valores:{Hb,Hct,Leu,Plt,Cr,BUN,Glu,Na,K,Ca,PCR,VES,...}, nota}
    interconsultas: [], // {id,fechaSolicitud,servicio,motivo,respondida,fechaRespuesta,respuesta}
    controlInfeccion: [], // {fecha,rxRepetido,examenesRepetidos,nota}
    programaQx: {
      programado: false,
      fechaProgramada: '',     // ISO date
      procedimiento: '',
      insumos: '',
      lateralidad: '',         // derecha / izquierda / bilateral / no aplica
      requerimientoSangre: '', // tipo y cruce / N unidades / ninguno
      medicoCargo: '',
      anestesia: '',
      observaciones: '',
      estado: '',              // '' / programado / realizado / suspendido
      fechaRealizado: ''
    },
    historial: []       // {fecha, accion, detalle}
  };
}

// Devuelve el objeto programaQx de un paciente, con defaults si falta (legacy / pacientes viejos)
function getProgramaQx(p) {
  if (!p.programaQx) {
    p.programaQx = {
      programado:false, fechaProgramada:'', procedimiento:'', insumos:'',
      lateralidad:'', requerimientoSangre:'', medicoCargo:'', anestesia:'',
      observaciones:'', estado:'', fechaRealizado:''
    };
  }
  return p.programaQx;
}

// Cirugía realizada del paciente (para post-op tracking)
function getCirugia(p) {
  if (!p.cirugia) {
    p.cirugia = {
      realizada:false, fecha:'', procedimiento:'', lateralidad:'',
      cirujano:'', programaId:'', notas:''
    };
  }
  return p.cirugia;
}

function nuevoPrograma(fecha) {
  return {
    id: 'prg_' + Date.now().toString(36) + Math.random().toString(36).slice(2,8),
    fecha: fecha || todayISO(),
    pacientes: [],
    notas: '',
    creado: new Date().toISOString(),
    revisado: false
  };
}

function nuevaEntradaPrograma(pacienteId, defaults) {
  defaults = defaults || {};
  return {
    id: 'pe_' + Date.now().toString(36) + Math.random().toString(36).slice(2,8),
    pacienteId,
    quirofano: defaults.quirofano || '',
    orden: defaults.orden || 0,
    procedimiento: defaults.procedimiento || '',
    lateralidad: defaults.lateralidad || '',
    insumos: defaults.insumos || '',
    requerimientoSangre: defaults.requerimientoSangre || '',
    medicoCargo: defaults.medicoCargo || '',
    anestesia: defaults.anestesia || '',
    observaciones: defaults.observaciones || '',
    horaInicio: defaults.horaInicio || '',
    operado: null,           // null = no revisado, true = sí, false = no
    motivoNoOperado: ''
  };
}

// Agrupa las entradas de un programa por quirófano y las ordena
function agruparPorQuirofano(prg) {
  const grupos = {};
  (prg.pacientes || []).forEach(e => {
    const q = e.quirofano || '';
    if (!grupos[q]) grupos[q] = [];
    grupos[q].push(e);
  });
  // Ordenar cada grupo por campo orden
  Object.keys(grupos).forEach(q => {
    grupos[q].sort((a,b) => (a.orden||999) - (b.orden||999));
  });
  // Ordenar las claves de quirófano (numéricos primero)
  const quirofanos = Object.keys(grupos).sort((a,b) => {
    if (!a) return 1;     // sin asignar al final
    if (!b) return -1;
    const na = parseInt(a, 10), nb = parseInt(b, 10);
    if (!isNaN(na) && !isNaN(nb) && na !== nb) return na - nb;
    return a.localeCompare(b, 'es', {numeric:true});
  });
  return { grupos, quirofanos };
}

const fmtDateLong = (iso) => {
  if (!iso) return '—';
  const d = new Date(iso + (iso.length===10?'T00:00:00':''));
  if (isNaN(d)) return iso;
  return d.toLocaleDateString('es', { weekday:'long', day:'numeric', month:'long', year:'numeric' });
};

// Días postoperatorios. Si tiene fecha de egreso y la cirugía fue antes, cuenta hasta egreso.
function diasPostop(p) {
  const c = p.cirugia;
  if (!c || !c.realizada || !c.fecha) return null;
  const fin = (p.fechaEgreso && p.fechaEgreso >= c.fecha) ? p.fechaEgreso : null;
  return daysBetween(c.fecha, fin);
}

/* ---------- Egresos / reportes de salida ---------- */
function nuevoEgreso(pacienteId) {
  return {
    id: 'eg_' + Date.now().toString(36) + Math.random().toString(36).slice(2,8),
    pacienteId,
    fechaEgreso: todayISO(),
    diagnosticoFinal: '',
    resumenEvolucion: '',
    cirugiasResumen: [],         // [{fecha, procedimiento, lateralidad, cirujano, quirofano, notas}]
    laboratoriosResumen: '',
    medicamentosEgreso: '',
    referencias: [],             // [{especialidad, fecha, lugar, notas}]
    curacionHeridas: { lugar:'', frecuencia:'', instrucciones:'' },
    citaControl: { fecha:'', lugar:'', especialidad:'Ortopedia', notas:'' },
    rayosXControl: { requiere:false, descripcion:'' },
    recomendaciones: '',
    creado: new Date().toISOString(),
    modificado: new Date().toISOString()
  };
}

function getCirugiasDelPaciente(pacienteId) {
  const lista = [];
  (State.data.programas || []).forEach(prg => {
    (prg.pacientes || []).forEach(e => {
      if (e.pacienteId === pacienteId && e.operado === true) {
        lista.push({
          fecha: prg.fecha,
          procedimiento: e.procedimiento || '',
          lateralidad: e.lateralidad || '',
          cirujano: e.medicoCargo || '',
          quirofano: e.quirofano || '',
          notas: e.observaciones || ''
        });
      }
    });
  });
  lista.sort((a,b) => (a.fecha||'').localeCompare(b.fecha||''));
  return lista;
}

function getUltimosLabs(p, n) {
  n = n || 2;
  const labs = (p.laboratorios || []).slice().sort((a,b) => (b.fecha||'').localeCompare(a.fecha||''));
  return labs.slice(0, n);
}

function generarResumenLabs(p) {
  const labs = getUltimosLabs(p, 2);
  if (labs.length === 0) return '';
  return labs.map(l => {
    const valores = Object.entries(l.valores || {})
      .filter(([k,v]) => v && String(v).trim())
      .map(([k,v]) => `${k}: ${v}`)
      .join(', ');
    return `${fmtDate(l.fecha)} — ${valores || '(sin valores)'}`;
  }).join('\n');
}

function getInterconsultasRespondidas(p) {
  return (p.interconsultas || [])
    .filter(ic => ic.respondida)
    .sort((a,b) => (b.fechaRespuesta||'').localeCompare(a.fechaRespuesta||''));
}

/* ---------- Sincronización en la nube (Firebase Firestore) ---------- */
const Sync = {
  app: null,
  db: null,
  unsubscribe: null,
  status: 'local',          // 'local' | 'connecting' | 'online' | 'offline' | 'error'
  saveTimeout: null,
  ignoreNextRemote: false,  // para evitar loops cuando recibimos eco propio

  getConfig() {
    // 1. Configuración guardada localmente (override manual)
    try {
      const stored = JSON.parse(localStorage.getItem(FB_CONFIG_KEY) || 'null');
      if (stored && stored.apiKey && stored.projectId) return stored;
    } catch(e) {}
    // 2. Configuración embebida en la app (default — para que todos compartan datos)
    if (EMBEDDED_FB_CONFIG && EMBEDDED_FB_CONFIG.apiKey && EMBEDDED_FB_CONFIG.projectId) {
      return EMBEDDED_FB_CONFIG;
    }
    return null;
  },
  setConfig(cfg) {
    if (cfg) localStorage.setItem(FB_CONFIG_KEY, JSON.stringify(cfg));
    else localStorage.removeItem(FB_CONFIG_KEY);
  },

  setStatus(s, msg) {
    this.status = s;
    const el = document.getElementById('syncStatus');
    const tx = document.getElementById('syncText');
    if (!el) return;
    el.classList.remove('online','offline','local');
    const map = {
      local: ['local', 'Sin nube'],
      connecting: ['', 'Conectando…'],
      online: ['online', 'Sincronizado'],
      offline: ['offline', 'Sin conexión'],
      error: ['offline', msg || 'Error']
    };
    const [cls, label] = map[s] || ['', s];
    if (cls) el.classList.add(cls);
    tx.textContent = label;
  },

  async connect() {
    const cfg = this.getConfig();
    if (!cfg || !cfg.apiKey || !cfg.projectId) {
      this.setStatus('local');
      return false;
    }
    // Esperar a que el SDK de Firebase termine de cargar (con timeout)
    this.setStatus('connecting');
    const start = Date.now();
    while (typeof window.firebase === 'undefined' && Date.now() - start < 10000) {
      await new Promise(r => setTimeout(r, 100));
    }
    if (typeof window.firebase === 'undefined') {
      this.setStatus('error', 'No se pudo cargar Firebase. ¿Hay conexión a internet?');
      return false;
    }
    try {
      // Inicializar app (evitar duplicados)
      if (window.firebase.apps && window.firebase.apps.length > 0) {
        this.app = window.firebase.apps[0];
      } else {
        this.app = window.firebase.initializeApp(cfg);
      }
      this.db = window.firebase.firestore();

      // Persistencia offline (puede fallar en modo incógnito o múltiples pestañas — no es crítico)
      try { await this.db.enablePersistence({ synchronizeTabs: true }); }
      catch(e) { console.warn('Persistencia offline no activa:', e.code || e.message); }

      const ref = this.db.doc(FB_DOC_PATH);
      this.unsubscribe = ref.onSnapshot(
        (snap) => {
          this.setStatus('online');
          if (this.ignoreNextRemote) {
            this.ignoreNextRemote = false;
            return;
          }
          const remote = snap.exists ? snap.data() : null;
          if (remote && remote.patients) {
            const localStr = JSON.stringify(State.data);
            const remoteStr = JSON.stringify({ patients: remote.patients, programas: remote.programas || [], egresos: remote.egresos || [], lastWrite: remote.lastWrite });
            if (localStr !== remoteStr) {
              State.data = { patients: remote.patients, programas: remote.programas || [], egresos: remote.egresos || [], lastWrite: remote.lastWrite };
              State._migrar();
              try { localStorage.setItem(STORAGE_KEY, JSON.stringify(State.data)); } catch(e){}
              if (App.render) App.render();
              if (App._currentModalId && State.data.patients.some(p=>p.id===App._currentModalId)) {
                App.renderModal(App._currentModalId);
              } else if (App._currentModalId) {
                App.closeModal();
              }
            }
          } else if (snap && !snap.exists) {
            // Documento no existe; subir lo local
            this.pushNow();
          }
        },
        (err) => {
          console.error('Firestore error:', err);
          this.setStatus('error', 'Error: ' + (err.code || err.message || ''));
          alert('Error de Firebase: ' + (err.message || err.code) +
            '\n\nVerifica las reglas de Firestore en la consola.');
        }
      );

      window.addEventListener('online', () => { if (this.status==='offline') this.setStatus('online'); });
      window.addEventListener('offline', () => this.setStatus('offline'));
      return true;
    } catch(e) {
      console.error(e);
      this.setStatus('error', e.message);
      alert('No se pudo conectar a Firebase: ' + e.message);
      return false;
    }
  },

  scheduleSave() {
    if (!this.db) return;
    if (this.saveTimeout) clearTimeout(this.saveTimeout);
    this.saveTimeout = setTimeout(() => this.pushNow(), 400);
  },

  async pushNow() {
    if (!this.db) return;
    try {
      const ref = this.db.doc(FB_DOC_PATH);
      this.ignoreNextRemote = true;
      const payload = {
        patients: State.data.patients || [],
        programas: State.data.programas || [],
        egresos: State.data.egresos || [],
        lastWrite: Date.now()
      };
      State.data.lastWrite = payload.lastWrite;
      await ref.set(payload);
    } catch(e) {
      console.error('Error guardando en la nube:', e);
      this.ignoreNextRemote = false;
      if (!navigator.onLine) this.setStatus('offline');
      else this.setStatus('error', 'Error al guardar');
    }
  },

  disconnect() {
    if (this.unsubscribe) { try { this.unsubscribe(); } catch(e){} this.unsubscribe = null; }
    this.app = null; this.db = null;
    this.setStatus('local');
  }
};

/* ---------- Estado y persistencia ---------- */
const State = {
  data: { patients: [] },
  currentTab: 'lista',
  search: '',
  load() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) this.data = JSON.parse(raw);
    } catch(e) { console.warn('No se pudo cargar datos', e); }
    if (!this.data.patients) this.data.patients = [];
    if (!this.data.programas) this.data.programas = [];
    if (!this.data.egresos) this.data.egresos = [];
    this._migrar();
  },
  // Migrar datos antiguos al nuevo formato
  _migrar() {
    const data = this.data;
    data.patients.forEach(p => {
      if (p.programaQx && p.programaQx.programado && !p._migratedToPrograma) {
        const fecha = p.programaQx.fechaProgramada || todayISO();
        let prog = data.programas.find(pg => pg.fecha === fecha);
        if (!prog) {
          prog = nuevoPrograma(fecha);
          data.programas.push(prog);
        }
        if (!prog.pacientes.find(e => e.pacienteId === p.id)) {
          const entrada = nuevaEntradaPrograma(p.id, p.programaQx);
          // Estado realizado en legacy → marcar operado y mover a cirugia
          if (p.programaQx.estado === 'realizado') {
            entrada.operado = true;
            getCirugia(p).realizada = true;
            getCirugia(p).fecha = p.programaQx.fechaRealizado || fecha;
            getCirugia(p).procedimiento = p.programaQx.procedimiento || '';
            getCirugia(p).lateralidad = p.programaQx.lateralidad || '';
            getCirugia(p).cirujano = p.programaQx.medicoCargo || p.cirujano || '';
            getCirugia(p).programaId = prog.id;
          } else if (p.programaQx.estado === 'suspendido') {
            entrada.operado = false;
            entrada.motivoNoOperado = 'Suspendido (migrado)';
          }
          prog.pacientes.push(entrada);
        }
        p._migratedToPrograma = true;
      }
    });
  },
  save() {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(this.data)); }
    catch(e) { alert('Error al guardar localmente: ' + e.message); }
    Sync.scheduleSave();
  }
};

/* ---------- Lógica clínica ---------- */
function tieneAntecedentes(p) {
  return !!(p.antecedentesPatologicos && p.antecedentesPatologicos.trim().length > 0);
}

function estudiosBasicos(p) {
  return ['rxTorax','hemograma','tiemposCoagulacion','quimicaSanguinea']
    .every(k => p.estudios[k] && p.estudios[k].realizado);
}

function estudiosCompletos(p) {
  return estudiosBasicos(p)
    && p.estudios.ekg.realizado
    && p.estudios.evaluacionPreop.realizado;
}

function tieneContraindicacion(p) {
  const c = p.contraindicaciones || {};
  return c.malEstadoGeneral || c.malEstadoTejidos || (c.otra && c.otra.trim().length > 0);
}

/**
 * Devuelve { listo: bool, motivo: string, faltantes: [strings] }
 */
function evaluarAptoCirugia(p) {
  // Si ya fue operado, ya no es candidato
  if (p.cirugia && p.cirugia.realizada) {
    return { listo:false, operado:true, motivo:'Ya operado el ' + fmtDate(p.cirugia.fecha), faltantes:[] };
  }
  const edad = parseInt(p.edad, 10);
  const faltantes = [];
  if (!edad || isNaN(edad)) {
    return { listo:false, motivo:'Falta registrar edad', faltantes:['Edad'] };
  }

  if (tieneContraindicacion(p)) {
    const motivos = [];
    if (p.contraindicaciones.malEstadoGeneral) motivos.push('mal estado general');
    if (p.contraindicaciones.malEstadoTejidos) motivos.push('mal estado de tejidos blandos');
    if (p.contraindicaciones.otra) motivos.push(p.contraindicaciones.otra);
    return { listo:false, motivo:'Contraindicación: ' + motivos.join(', '), faltantes:[] };
  }

  const requiereCompletos = (edad >= 50) || tieneAntecedentes(p);

  if (!p.estudios.rxTorax.realizado) faltantes.push('Rx tórax');
  if (!p.estudios.hemograma.realizado) faltantes.push('Hemograma');
  if (!p.estudios.tiemposCoagulacion.realizado) faltantes.push('Tiempos coagulación');
  if (!p.estudios.quimicaSanguinea.realizado) faltantes.push('Química sanguínea');
  if (requiereCompletos) {
    if (!p.estudios.ekg.realizado) faltantes.push('EKG');
    if (!p.estudios.evaluacionPreop.realizado) faltantes.push('Eval. preop. M.I./M.F./Geriatría');
  }

  if (faltantes.length === 0) {
    return { listo:true, motivo: requiereCompletos ? 'Preop completo' : 'Estudios básicos completos', faltantes:[] };
  }
  return { listo:false, motivo:'Faltan estudios', faltantes };
}

/**
 * Detecta si el paciente tiene diagnóstico de infección.
 */
function tieneInfeccion(p) {
  if (!p.diagnosticos) return false;
  const re = /infecc|infect|osteomielitis|absceso|celulitis|sepsis|piomi/i;
  return p.diagnosticos.some(d => re.test(d));
}

/**
 * Calcula alertas activas para el paciente.
 */
function calcularAlertasPaciente(p) {
  const alertas = [];
  const dias = daysBetween(p.fechaIngreso);

  // 1. Recordatorio 7 días para infección
  if (tieneInfeccion(p) && dias >= 7) {
    const ultimoControl = (p.controlInfeccion || []).slice().sort((a,b)=>b.fecha.localeCompare(a.fecha))[0];
    const diasUltimo = ultimoControl ? daysBetween(ultimoControl.fecha) : dias;
    if (!ultimoControl || diasUltimo >= 7) {
      alertas.push({
        tipo:'red',
        texto:`Diagnóstico de infección con ${dias} días de hospitalización. Repetir Rx y exámenes de control de infección (último: ${ultimoControl ? fmtDate(ultimoControl.fecha) : 'ninguno'}).`
      });
    }
  }

  // 2. Interconsultas pendientes >2 días
  (p.interconsultas || []).forEach(ic => {
    if (!ic.respondida) {
      const d = daysBetween(ic.fechaSolicitud);
      if (d >= 2) {
        alertas.push({
          tipo:'yellow',
          texto:`Interconsulta a ${ic.servicio} solicitada hace ${d} día(s) sin respuesta.`
        });
      }
    }
  });

  // 3. Listo para cirugía
  const apto = evaluarAptoCirugia(p);
  if (apto.listo) {
    alertas.push({
      tipo:'green',
      texto:`Paciente listo para cirugía (${apto.motivo}).`
    });
  }

  // 4. Hospitalización prolongada
  if (dias >= 14) {
    alertas.push({
      tipo:'yellow',
      texto:`Hospitalización prolongada: ${dias} días.`
    });
  }

  return alertas;
}

/* ---------- Historial ---------- */
function logCambio(p, accion, detalle='') {
  if (!p.historial) p.historial = [];
  p.historial.push({
    fecha: new Date().toISOString(),
    accion,
    detalle
  });
  // mantener solo últimos 200
  if (p.historial.length > 200) p.historial = p.historial.slice(-200);
}

    // Intento 1: JSON puro
    try { cfg = JSON.parse(txt); } catch(e) { lastErr = e.message; }

    // Intento 2: parser manual con regex (sin eval, compatible con CSP estricta)
    if (!cfg) {
      const m = txt.match(/\{[\s\S]*\}/);
      if (m) {
        cfg = {};
        // Extraer pares clave: "valor" o clave: 'valor'
        const re = /(\w+)\s*:\s*(["'])((?:\\.|(?!\2).)*)\2/g;
        let match;
        while ((match = re.exec(m[0])) !== null) {
          cfg[match[1]] = match[3];
        }
        if (Object.keys(cfg).length === 0) {
          cfg = null;
          lastErr = 'No se encontraron pares "clave: \"valor\"" dentro de las llaves.';
        }
      } else {
        lastErr = 'No se encontraron las llaves { } en el texto pegado.';
      }
    }

    if (!cfg || typeof cfg !== 'object' || !cfg.apiKey || !cfg.projectId) {
      const faltan = [];
      if (cfg && !cfg.apiKey) faltan.push('apiKey');
      if (cfg && !cfg.projectId) faltan.push('projectId');
      alert('No se pudo leer la configuración.\n\n' +
        (faltan.length
          ? 'Falta(n): ' + faltan.join(', ')
          : 'Asegúrate de pegar el objeto firebaseConfig completo, desde la llave { hasta }, incluyendo apiKey y projectId.') +
        (lastErr ? '\n\nDetalle técnico: ' + lastErr : '') +
        '\n\nEjemplo válido:\n{\n  apiKey: "AIza...",\n  authDomain: "tu-proyecto.firebaseapp.com",\n  projectId: "tu-proyecto",\n  ...\n}');
      return;
    }

    // Limpiar a sólo los campos que necesita Firebase (quita ruido)
    const keep = ['apiKey','authDomain','projectId','storageBucket','messagingSenderId','appId','databaseURL','measurementId'];
    const clean = {};
    keep.forEach(k => { if (cfg[k] != null) clean[k] = cfg[k]; });

    Sync.setConfig(clean);
    this.closeModal();
    Sync.disconnect();
    Sync.connect().then(ok => {
      if (ok) alert('¡Conectado a la nube! Los cambios se sincronizarán automáticamente entre dispositivos.');
    });
  },

  clearFbConfig() {
    if (!confirm('¿Desconectar de la nube? Los datos en la nube no se borran, sólo dejarás de sincronizar en este dispositivo.')) return;
    Sync.disconnect();
    Sync.setConfig(null);
    this.closeModal();
  },

  refreshAlertCount() {
    let total = 0;
    State.data.patients.filter(p=>!p.fechaEgreso).forEach(p => {
      total += calcularAlertasPaciente(p).filter(a => a.tipo==='red' || a.tipo==='yellow').length;
    });
    const badge = document.getElementById('alertCount');
    if (total > 0) {
      badge.style.display = 'inline-block';
      badge.textContent = total;
    } else {
      badge.style.display = 'none';
    }
  },

  switchTab(tab) {
    State.currentTab = tab;
    document.querySelectorAll('#tabs button').forEach(b => {
      b.classList.toggle('active', b.dataset.tab === tab);
    });
    this.render();
  },

  render() {
    const view = document.getElementById('view');
    const t = State.currentTab;
    if (t === 'lista') view.innerHTML = this.renderLista(false);
    else if (t === 'cirugia') view.innerHTML = this.renderCirugia();
    else if (t === 'programa') view.innerHTML = this.renderPrograma();
    else if (t === 'salidas') view.innerHTML = this.renderSalidas();
    else if (t === 'alertas') view.innerHTML = this.renderAlertas();
    else if (t === 'todos') view.innerHTML = this.renderLista(true);
    this.refreshAlertCount();
  },

  /* ---------- Pase de visita / lista por cama ---------- */
  renderLista(incluirEgresados) {
    const titulo = incluirEgresados ? 'Todos los pacientes' : 'Pase de visita (por cama)';
    return `
      <div class="print-only" id="printHeader">
        <div class="print-title">Servicio de Ortopedia — ${titulo}</div>
        <div class="print-sub" id="printSub"></div>
      </div>

      <div class="toolbar no-print">
        <input type="search" id="searchInput" placeholder="Buscar por nombre, cédula, cama, dx..." value="${escapeHtml(State.search)}"
               oninput="App.setSearch(this.value)">
        <button class="btn ghost small" onclick="window.print()">🖨 Imprimir</button>
      </div>

      <div id="patientListContainer">${this.renderPatientListContent(incluirEgresados)}</div>
    `;
  },

  // Sólo el contenido de la lista — sin la casilla de búsqueda. Se re-renderiza al filtrar
  // sin destruir el input y por lo tanto sin perder el foco del teclado.
  renderPatientListContent(incluirEgresados) {
    const pacientes = State.data.patients
      .filter(p => incluirEgresados || !p.fechaEgreso)
      .filter(p => this.matchesSearch(p))
      .sort((a,b) => {
        const ca = (a.cama||'').toString();
        const cb = (b.cama||'').toString();
        const na = parseInt(ca,10), nb = parseInt(cb,10);
        if (!isNaN(na) && !isNaN(nb) && na !== nb) return na - nb;
        return ca.localeCompare(cb, 'es');
      });

    if (pacientes.length === 0) {
      const sinFiltro = !State.search;
      return `<div class="empty">
        <div class="ico">${sinFiltro?'🛏️':'🔍'}</div>
        <div>${sinFiltro
          ? `No hay pacientes ${incluirEgresados?'':'activos'}.`
          : `Sin resultados para "${escapeHtml(State.search)}".`}</div>
        ${sinFiltro
          ? `<div style="margin-top:10px"><button class="btn" onclick="App.openNew()">+ Agregar primer paciente</button></div>`
          : ''}
      </div>`;
    }

    let html = `
      <div class="card print-only">
        <table>
          <thead><tr>
            <th>Cama</th><th>Nombre</th><th>Cédula</th><th>Edad</th>
            <th>Días</th><th>Diagnóstico</th><th>¿Operable?</th><th>Cirujano</th>
          </tr></thead>
          <tbody>
            ${pacientes.map(p => {
              const apto = evaluarAptoCirugia(p);
              const dias = daysBetween(p.fechaIngreso);
              return `<tr>
                <td><strong>${escapeHtml(p.cama||'—')}</strong></td>
                <td>${escapeHtml(p.nombre||'')}</td>
                <td>${escapeHtml(p.cedula||'')}</td>
                <td>${escapeHtml(p.edad||'')}</td>
                <td>${dias}</td>
                <td>${escapeHtml((p.diagnosticos||[]).join('; ') || '—')}</td>
                <td>${apto.listo ? 'SÍ' : 'No · '+apto.faltantes.slice(0,3).join(', ')+(apto.faltantes.length>3?'...':'')}</td>
                <td>${escapeHtml(p.cirujano||'—')}</td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>
    `;

    html += `<div class="no-print">${pacientes.map(p => this.renderPatientCard(p)).join('')}</div>`;
    return html;
  },

  renderPatientCard(p) {
    const dias = daysBetween(p.fechaIngreso);
    const apto = evaluarAptoCirugia(p);
    const alertas = calcularAlertasPaciente(p);
    const tieneRoja = alertas.some(a=>a.tipo==='red');
    const tieneAmarilla = alertas.some(a=>a.tipo==='yellow');
    const operado = p.cirugia && p.cirugia.realizada;
    const dpostop = diasPostop(p);
    let cls = 'patient-card';
    if (operado && !tieneRoja) cls += ' ready';
    else if (apto.listo && !tieneRoja) cls += ' ready';
    if (tieneRoja) cls += ' alert';
    else if (tieneAmarilla) cls += ' warn';
    if (p.fechaEgreso) cls += ' muted';

    const dxList = (p.diagnosticos || []).join(', ');
    const tagsHtml = [
      operado ? `<span class="tag green">Operado · día ${dpostop} postop</span>` :
        (apto.listo ? '<span class="tag green">Listo cirugía</span>' :
          '<span class="tag red">Pendiente</span>'),
      tieneInfeccion(p) ? '<span class="tag yellow">Infección</span>' : '',
      p.fechaEgreso ? '<span class="tag gray">Egresado</span>' : ''
    ].filter(Boolean).join(' ');

    return `
      <div class="${cls}" onclick="App.openPaciente('${p.id}')">
        <div class="pc-row">
          <div class="pc-bed">${escapeHtml(p.cama||'?')}</div>
          <div class="pc-info">
            <div class="pc-name">${escapeHtml(p.nombre || '(sin nombre)')}</div>
            <div class="pc-meta">
              ${escapeHtml(p.cedula||'—')} · ${escapeHtml(p.edad||'?')} años · ${dias} día(s) hosp.
              ${p.cirujano? ' · Cir: '+escapeHtml(p.cirujano):''}
            </div>
            <div class="pc-meta" style="margin-top:4px">
              <strong>Dx:</strong> ${escapeHtml(dxList || '—')}
            </div>
            ${operado?`<div class="pc-meta" style="margin-top:4px;color:#065f46">
              <strong>Cirugía:</strong> ${escapeHtml(p.cirugia.procedimiento||'—')}
              ${p.cirugia.lateralidad?' ('+escapeHtml(p.cirugia.lateralidad)+')':''}
              · ${fmtDate(p.cirugia.fecha)} · ${dpostop} día(s) postop
            </div>`:''}
            <div class="pc-tags">${tagsHtml}</div>
            ${alertas.filter(a=>a.tipo==='red').slice(0,1).map(a=>`
              <div class="alert-box red" style="margin-top:6px;font-size:.78rem;padding:6px 8px">⚠ ${escapeHtml(a.texto)}</div>
            `).join('')}
          </div>
        </div>
      </div>
    `;
  },

  setSearch(v) {
    State.search = v;
    // Sólo actualizar la lista, no la casilla de búsqueda — así el input no
    // pierde el foco del teclado al escribir cada letra.
    if (State.currentTab === 'lista' || State.currentTab === 'todos') {
      const container = document.getElementById('patientListContainer');
      if (container) {
        container.innerHTML = this.renderPatientListContent(State.currentTab === 'todos');
        return;
      }
    }
    this.render();
  },

  matchesSearch(p) {
    const q = (State.search||'').toLowerCase().trim();
    if (!q) return true;
    const blob = [
      p.nombre, p.cedula, p.cama, p.cirujano,
      ...(p.diagnosticos||[])
    ].join(' ').toLowerCase();
    return blob.includes(q);
  },

  /* ---------- Listos para cirugía ---------- */
  renderCirugia() {
    const pacientes = State.data.patients
      .filter(p => !p.fechaEgreso)
      .filter(p => evaluarAptoCirugia(p).listo)
      .sort((a,b)=> {
        const ca = (a.cama||'').toString(), cb = (b.cama||'').toString();
        const na = parseInt(ca,10), nb = parseInt(cb,10);
        if (!isNaN(na) && !isNaN(nb) && na !== nb) return na - nb;
        return ca.localeCompare(cb, 'es');
      });

    let html = `
      <div class="print-only">
        <div class="print-title">Pacientes Listos para Cirugía</div>
        <div class="print-sub">${new Date().toLocaleString('es')} · ${pacientes.length} pacientes</div>
      </div>
      <div class="toolbar no-print">
        <h2 style="margin:0">Listos para cirugía: ${pacientes.length}</h2>
        <div style="flex:1"></div>
        <button class="btn ghost small" onclick="window.print()">🖨 Imprimir</button>
      </div>
    `;

    if (pacientes.length === 0) {
      html += `<div class="empty">
        <div class="ico">⏳</div>
        <div>Ningún paciente cumple actualmente los criterios para cirugía.</div>
      </div>`;
      return html;
    }

    html += `<div class="card print-only">
      <table>
        <thead><tr><th>Cama</th><th>Nombre</th><th>Cédula</th><th>Edad</th><th>Dx</th><th>Cirujano</th><th>Días hosp</th></tr></thead>
        <tbody>
          ${pacientes.map(p=>`<tr>
            <td><strong>${escapeHtml(p.cama||'—')}</strong></td>
            <td>${escapeHtml(p.nombre||'')}</td>
            <td>${escapeHtml(p.cedula||'')}</td>
            <td>${escapeHtml(p.edad||'')}</td>
            <td>${escapeHtml((p.diagnosticos||[]).join('; '))}</td>
            <td>${escapeHtml(p.cirujano||'—')}</td>
            <td>${daysBetween(p.fechaIngreso)}</td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>`;

    html += `<div class="no-print">${pacientes.map(p => this.renderPatientCard(p)).join('')}</div>`;
    return html;
  },

  /* ============================================================
     PROGRAMA QUIRÚRGICO — múltiples programas por día con historial
     ============================================================ */
  _currentProgramaId: null,

  renderPrograma() {
    // Si hay un programa abierto, mostrar su detalle
    if (this._currentProgramaId) {
      return this.renderProgramaDia(this._currentProgramaId);
    }

    const programas = (State.data.programas || []).slice()
      .sort((a,b) => (b.fecha||'').localeCompare(a.fecha||''));
    const pendientes = this.programasPendientesRevision();

    let html = '';
    // Banner de revisión pendiente
    if (pendientes.length > 0) {
      html += `<div class="alert-box red" style="margin-bottom:12px">
        <strong>⚠ ${pendientes.length} programa(s) pendientes de revisar</strong><br>
        Hay cirugías programadas en fechas pasadas que aún no tienen confirmado si se realizaron o no.
        ${pendientes.map(prg => `
          <div style="margin-top:8px">
            <button class="btn small" onclick="App.abrirRevisionPrograma('${prg.id}')">
              Revisar programa de ${fmtDateLong(prg.fecha)}
            </button>
          </div>
        `).join('')}
      </div>`;
    }

    html += `
      <div class="toolbar no-print">
        <h2 style="margin:0">Programas quirúrgicos (${programas.length})</h2>
        <div style="flex:1"></div>
        <button class="btn small" onclick="App.crearPrograma()">+ Nuevo programa</button>
      </div>
    `;

    if (programas.length === 0) {
      html += `<div class="empty">
        <div class="ico">📅</div>
        <div>No hay programas registrados.</div>
        <div style="margin-top:10px"><button class="btn" onclick="App.crearPrograma()">+ Crear primer programa</button></div>
      </div>`;
      return html;
    }

    // Tarjetas resumen de cada programa
    html += programas.map(prg => {
      const total = prg.pacientes.length;
      const operados = prg.pacientes.filter(e => e.operado === true).length;
      const noOperados = prg.pacientes.filter(e => e.operado === false).length;
      const pendientesRev = prg.pacientes.filter(e => e.operado === null).length;
      const esPasado = prg.fecha < todayISO();
      const esHoy = prg.fecha === todayISO();
      const necesitaRevision = esPasado && !prg.revisado && pendientesRev > 0;

      let cls = 'patient-card';
      let estadoTag = '';
      if (necesitaRevision) {
        cls += ' alert';
        estadoTag = '<span class="tag red">Pendiente revisión</span>';
      } else if (prg.revisado) {
        cls += ' ready';
        estadoTag = '<span class="tag green">Revisado</span>';
      } else if (esHoy) {
        estadoTag = '<span class="tag blue">Hoy</span>';
      } else if (prg.fecha > todayISO()) {
        estadoTag = '<span class="tag yellow">Próximo</span>';
      }

      // Conteo de quirófanos
      const { grupos: gprev, quirofanos: qprev } = agruparPorQuirofano(prg);
      const conQuirofano = qprev.filter(q => q).length;
      const sinQuirofano = (gprev[''] || []).length;

      // Lista compacta de los pacientes (agrupada por quirófano)
      const lineas = [];
      qprev.forEach(q => {
        gprev[q].forEach(e => {
          const p = State.data.patients.find(x => x.id === e.pacienteId);
          if (!p) return;
          const opTag = e.operado === true ? '<span class="tag green" style="font-size:.7rem">✓ Op</span>'
                      : e.operado === false ? '<span class="tag red" style="font-size:.7rem">✗ No op</span>'
                      : '';
          const qBadge = q ? `<span class="tag blue" style="font-size:.7rem">Q${escapeHtml(q)}#${e.orden||1}</span>` : '';
          lineas.push(`<div style="margin-top:4px;font-size:.85rem">
            ${opTag} ${qBadge} <strong>${escapeHtml(p.cama||'?')}</strong> ${escapeHtml(p.nombre||'')} —
            <em>${escapeHtml(e.procedimiento||'(sin procedimiento)')}</em>
            ${e.lateralidad?` (${escapeHtml(e.lateralidad)})`:''}
          </div>`);
        });
      });
      const previewPacientes = lineas.slice(0,5).join('');
      const masPacientes = lineas.length > 5 ? `<div class="muted" style="font-size:.8rem;margin-top:4px">+ ${lineas.length-5} más…</div>` : '';
      const resumenQ = (conQuirofano > 0 ? `${conQuirofano} quirófano(s)` : '') +
                       (sinQuirofano > 0 ? (conQuirofano>0?', ':'') + `${sinQuirofano} sin asignar` : '');

      return `
        <div class="${cls}" onclick="App.abrirPrograma('${prg.id}')">
          <div class="pc-row">
            <div class="pc-info">
              <div class="pc-name">
                Programa del ${fmtDateLong(prg.fecha)}
                ${estadoTag}
              </div>
              <div class="pc-meta">
                ${total} cirugía(s) ${resumenQ?'· '+resumenQ:''} ·
                ${operados>0?`${operados} operado(s) · `:''}
                ${noOperados>0?`${noOperados} no operado(s) · `:''}
                ${pendientesRev>0?`${pendientesRev} sin revisar`:''}
              </div>
              ${previewPacientes}
              ${masPacientes}
              ${prg.notas?`<div class="pc-meta" style="margin-top:4px"><em>"${escapeHtml(prg.notas)}"</em></div>`:''}
            </div>
          </div>
        </div>
      `;
    }).join('');

    return html;
  },

  /* ---------- Vista de un programa (un día) ---------- */
  renderProgramaDia(id) {
    const prg = (State.data.programas || []).find(x => x.id === id);
    if (!prg) {
      this._currentProgramaId = null;
      return this.renderPrograma();
    }
    const total = prg.pacientes.length;
    const operados = prg.pacientes.filter(e => e.operado === true).length;
    const pendientesRev = prg.pacientes.filter(e => e.operado === null).length;
    const esPasado = prg.fecha < todayISO();
    const necesitaRevision = esPasado && !prg.revisado && pendientesRev > 0;

    let html = `
      <div class="print-only">
        <div class="print-title">Programa Quirúrgico</div>
        <div class="print-sub">${fmtDateLong(prg.fecha)} · Servicio de Ortopedia · ${total} cirugía(s)</div>
      </div>

      <div class="toolbar no-print">
        <button class="btn ghost small" onclick="App.cerrarPrograma()">← Volver</button>
        <h2 style="margin:0">${fmtDateLong(prg.fecha)}</h2>
        <div style="flex:1"></div>
        ${necesitaRevision ? `<button class="btn small" onclick="App.abrirRevisionPrograma('${prg.id}')">Revisar cirugías</button>` : ''}
        <button class="btn ghost small" onclick="App.agregarAPrograma('${prg.id}')">+ Paciente</button>
        <button class="btn ghost small" onclick="window.print()">🖨</button>
        <button class="btn ghost small" onclick="App.eliminarPrograma('${prg.id}')">Eliminar</button>
      </div>

      <div class="card no-print">
        <div class="field-row">
          <div class="field" style="margin-bottom:0">
            <label>Fecha del programa</label>
            <input type="date" value="${escapeHtml(prg.fecha)}" onchange="App.setProgramaCampo('${prg.id}','fecha',this.value)">
          </div>
          <div class="field" style="margin-bottom:0">
            <label>Estado</label>
            <input value="${prg.revisado?'Revisado':(esPasado?'Pendiente revisión':'Activo')}" disabled>
          </div>
        </div>
        <div class="field" style="margin-top:8px;margin-bottom:0">
          <label>Notas del programa</label>
          <textarea rows="2" placeholder="Ej. Sala 3, equipo de Dr. Pérez, antibiótico cefazolina."
            oninput="App.setProgramaCampo('${prg.id}','notas',this.value)">${escapeHtml(prg.notas||'')}</textarea>
        </div>
      </div>
    `;

    // Agrupar por quirófano
    const { grupos, quirofanos } = agruparPorQuirofano(prg);

    // Tabla para impresión: una sección por quirófano
    html += `<div class="print-only">
      ${quirofanos.map(q => {
        const ents = grupos[q];
        return `
          <h3 style="margin-top:12px;margin-bottom:6px">
            ${q ? 'Quirófano ' + escapeHtml(q) : 'Sin quirófano asignado'}
            (${ents.length} cirugía${ents.length!==1?'s':''})
          </h3>
          <table>
            <thead><tr>
              <th>Orden</th><th>Cama</th><th>Paciente</th><th>Cédula</th><th>Edad</th>
              <th>Diagnóstico</th><th>Procedimiento</th><th>Lat.</th>
              <th>Sangre</th><th>Insumos</th><th>Cirujano</th><th>Anestesia</th><th>Obs.</th>
            </tr></thead>
            <tbody>
              ${ents.map((e,i) => {
                const p = State.data.patients.find(x => x.id === e.pacienteId) || {};
                return `<tr>
                  <td><strong>${i+1}</strong></td>
                  <td><strong>${escapeHtml(p.cama||'—')}</strong></td>
                  <td>${escapeHtml(p.nombre||'')}</td>
                  <td>${escapeHtml(p.cedula||'')}</td>
                  <td>${escapeHtml(p.edad||'')}</td>
                  <td>${escapeHtml((p.diagnosticos||[]).join('; '))}</td>
                  <td>${escapeHtml(e.procedimiento||'')}</td>
                  <td>${escapeHtml(e.lateralidad||'')}</td>
                  <td>${escapeHtml(e.requerimientoSangre||'—')}</td>
                  <td>${escapeHtml(e.insumos||'—')}</td>
                  <td>${escapeHtml(e.medicoCargo||p.cirujano||'—')}</td>
                  <td>${escapeHtml(e.anestesia||'—')}</td>
                  <td>${escapeHtml(e.observaciones||'')}</td>
                </tr>`;
              }).join('')}
            </tbody>
          </table>
        `;
      }).join('')}
    </div>`;

    // Tarjetas interactivas: agrupadas por quirófano
    if (total === 0) {
      html += `<div class="empty no-print">
        <div class="ico">🩺</div>
        <div>Programa sin pacientes.</div>
        <div style="margin-top:10px"><button class="btn" onclick="App.agregarAPrograma('${prg.id}')">+ Agregar paciente</button></div>
      </div>`;
    } else {
      html += `<div class="no-print">${quirofanos.map(q => {
        const ents = grupos[q];
        return `
          <div class="card" style="border-left:4px solid #3282b8">
            <div class="row-between" style="margin-bottom:8px">
              <h3 style="margin:0">
                ${q ? '🏥 Quirófano ' + escapeHtml(q) : '⚠ Sin quirófano asignado'}
                <span class="muted" style="font-weight:400;font-size:.85rem">
                  · ${ents.length} cirugía${ents.length!==1?'s':''}
                </span>
              </h3>
            </div>
            ${ents.map((e, i) => this.renderEntradaPrograma(prg, e, i, ents.length)).join('')}
          </div>
        `;
      }).join('')}</div>`;
    }

    return html;
  },

  /* ---------- Acciones del programa ---------- */
  programasPendientesRevision() {
    const hoy = todayISO();
    return (State.data.programas || []).filter(prg =>
      prg.fecha < hoy &&
      !prg.revisado &&
      prg.pacientes.some(e => e.operado === null)
    );
  },

  abrirPrograma(id) {
    this._currentProgramaId = id;
    this.render();
    window.scrollTo({top:0});
  },
  cerrarPrograma() {
    this._currentProgramaId = null;
    this.render();
  },

  crearPrograma() {
    const fecha = prompt('Fecha del programa (YYYY-MM-DD):', todayISO());
    if (!fecha) return;
    if (!/^\d{4}-\d{2}-\d{2}$/.test(fecha)) {
      alert('Fecha inválida. Formato: YYYY-MM-DD (ej. 2026-05-12).');
      return;
    }
    const existente = (State.data.programas || []).find(p => p.fecha === fecha);
    if (existente) {
      if (confirm(`Ya existe un programa para el ${fmtDateLong(fecha)}. ¿Quieres abrirlo?`)) {
        this.abrirPrograma(existente.id);
      }
      return;
    }
    const prg = nuevoPrograma(fecha);
    State.data.programas.push(prg);
    State.save();
    this.abrirPrograma(prg.id);
  },

  eliminarPrograma(id) {
    if (!confirm('¿Eliminar este programa? Si tenía cirugías ya marcadas como operadas, la información en cada paciente se conserva (queda en su ficha).')) return;
    State.data.programas = State.data.programas.filter(p => p.id !== id);
    State.save();
    this._currentProgramaId = null;
    this.render();
  },

  setProgramaCampo(id, campo, val) {
    const prg = State.data.programas.find(p => p.id === id);
    if (!prg) return;
    prg[campo] = val;
    State.save();
  },

      .filter(p => !yaEnPrg.has(p.id))

                ${noAptos > 0 ? `<div class="muted" style="margin-top:8px">Hay ${noAptos} paciente(s) hospitalizados pero aún no cumplen criterios. Completa su preoperatorio en la pestaña <em>Pase de visita</em> y aparecerán aquí.</div>` : ''}
              </div>
            ` : `
              ${noAptos > 0 ? `<div class="alert-box blue" style="font-size:.85rem">Mostrando los <strong>${candidatos.length}</strong> paciente(s) listo(s) para cirugía. Hay ${noAptos} más en el servicio que aún no cumplen criterios.</div>` : ''}
              ${candidatos.map(p => `
                <div class="patient-card ready" onclick="App.confirmarAgregarPrograma('${prg.id}','${p.id}')">
                  <div class="pc-row">
                    <div class="pc-bed">${escapeHtml(p.cama||'?')}</div>
                    <div class="pc-info">
                      <div class="pc-name">${escapeHtml(p.nombre||'(sin nombre)')}
                        <span class="tag green">Listo</span>
                      </div>
                      <div class="pc-meta">${escapeHtml(p.cedula||'—')} · ${escapeHtml(p.edad||'?')} años</div>
                      <div class="pc-meta"><strong>Dx:</strong> ${escapeHtml((p.diagnosticos||[]).join(', ')||'—')}</div>
                      <div class="pc-meta"><strong>Cirujano:</strong> ${escapeHtml(p.cirujano||'—')}</div>

    `;

  confirmarAgregarPrograma(programaId, pacienteId) {
    const prg = State.data.programas.find(p => p.id === programaId);
    const p = this._findP(pacienteId);
    if (!prg || !p) return;
    const defaults = {
      medicoCargo: p.cirujano || '',
      // Si el paciente tenía datos legacy en programaQx, los reusamos
      procedimiento: (p.programaQx && p.programaQx.procedimiento) || '',
      lateralidad: (p.programaQx && p.programaQx.lateralidad) || '',
      insumos: (p.programaQx && p.programaQx.insumos) || '',
      requerimientoSangre: (p.programaQx && p.programaQx.requerimientoSangre) || '',
      anestesia: (p.programaQx && p.programaQx.anestesia) || '',
      observaciones: (p.programaQx && p.programaQx.observaciones) || ''
    };
    prg.pacientes.push(nuevaEntradaPrograma(p.id, defaults));
    logCambio(p, 'Programa Qx', `Agregado al programa del ${prg.fecha}`);
    State.save();
    this.closeModal();
  },

  setEntrada(programaId, entradaId, campo, val) {
    const prg = State.data.programas.find(p => p.id === programaId);
    if (!prg) return;
    const e = prg.pacientes.find(x => x.id === entradaId);
    if (!e) return;
    e[campo] = val;
    State.save();
  },

  // Asigna un quirófano a una entrada y la coloca al final del orden de ese quirófano.
  // Renumera el quirófano viejo para que quede consistente.
  setEntradaQuirofano(programaId, entradaId, nuevoQuirofano) {
    const prg = State.data.programas.find(p => p.id === programaId);
    if (!prg) return;
    const e = prg.pacientes.find(x => x.id === entradaId);
    if (!e) return;
    const quirofanoViejo = e.quirofano || '';
    nuevoQuirofano = (nuevoQuirofano||'').trim();
    if (quirofanoViejo === nuevoQuirofano) return;
    e.quirofano = nuevoQuirofano;
    // Asignar orden al final del nuevo quirófano
    const otrosNuevo = prg.pacientes.filter(x => (x.quirofano||'') === nuevoQuirofano && x.id !== e.id);
    e.orden = otrosNuevo.length + 1;
    // Renumerar el quirófano viejo
    this._renumerarQuirofano(prg, quirofanoViejo);
    // Renumerar el nuevo (por si el orden quedó con huecos)
    this._renumerarQuirofano(prg, nuevoQuirofano);
    State.save();
    this.render();
  },

  setEntradaOrden(programaId, entradaId, nuevoOrden) {
    const prg = State.data.programas.find(p => p.id === programaId);
    if (!prg) return;
    const e = prg.pacientes.find(x => x.id === entradaId);
    if (!e) return;
    nuevoOrden = parseInt(nuevoOrden, 10);
    if (!nuevoOrden || nuevoOrden < 1) return;
    const ents = prg.pacientes.filter(x => (x.quirofano||'') === (e.quirofano||''))
      .sort((a,b) => (a.orden||999) - (b.orden||999));
    const idxActual = ents.findIndex(x => x.id === e.id);
    const idxNuevo = Math.min(Math.max(0, nuevoOrden-1), ents.length-1);
    if (idxActual === idxNuevo) return;
    // Mover en el array y renumerar
    ents.splice(idxActual, 1);
    ents.splice(idxNuevo, 0, e);
    ents.forEach((x, i) => { x.orden = i+1; });
    State.save();
    this.render();
  },

  moverEnQuirofano(programaId, entradaId, direccion) {  // -1 = subir, +1 = bajar
    const prg = State.data.programas.find(p => p.id === programaId);
    if (!prg) return;
    const e = prg.pacientes.find(x => x.id === entradaId);
    if (!e) return;
    const ents = prg.pacientes.filter(x => (x.quirofano||'') === (e.quirofano||''))
      .sort((a,b) => (a.orden||999) - (b.orden||999));
    const idx = ents.findIndex(x => x.id === e.id);
    const nuevoIdx = idx + direccion;
    if (nuevoIdx < 0 || nuevoIdx >= ents.length) return;
    // Swap
    [ents[idx], ents[nuevoIdx]] = [ents[nuevoIdx], ents[idx]];
    ents.forEach((x, i) => { x.orden = i+1; });
    State.save();
    this.render();
  },

  _renumerarQuirofano(prg, q) {
    const ents = prg.pacientes.filter(x => (x.quirofano||'') === (q||''))
      .sort((a,b) => (a.orden||999) - (b.orden||999));
    ents.forEach((x, i) => { x.orden = i+1; });
  },

  quitarDePrograma(programaId, entradaId) {
    if (!confirm('¿Quitar este paciente del programa?')) return;
    const prg = State.data.programas.find(p => p.id === programaId);
    if (!prg) return;
    const e = prg.pacientes.find(x => x.id === entradaId);
    if (!e) return;
    const p = this._findP(e.pacienteId);
    prg.pacientes = prg.pacientes.filter(x => x.id !== entradaId);
    if (p) logCambio(p, 'Programa Qx', `Quitado del programa del ${prg.fecha}`);
    State.save();
    this.render();
  },

  /* ---------- Revisión post-programa ---------- */
  abrirRevisionPrograma(id) {
    const prg = State.data.programas.find(p => p.id === id);
    if (!prg) return;
    const html = `
      <div class="modal-backdrop" onclick="if(event.target===this) App.closeModal()">
        <div class="modal" style="max-width:700px">
          <div class="modal-head">
            <div>
              <div style="font-weight:600">Revisar programa</div>
              <div style="font-size:.8rem;opacity:.9">${fmtDateLong(prg.fecha)} · ¿Qué pacientes fueron operados?</div>
            </div>
            <button class="close-x" onclick="App.closeModal()">✕</button>
          </div>
          <div class="modal-body" id="revBody">
            ${prg.pacientes.map(e => this.renderEntradaRevision(prg, e)).join('')}
          </div>
          <div class="modal-foot">
            <button class="btn ghost" onclick="App.closeModal()">Cerrar</button>
            <button class="btn success" onclick="App.finalizarRevision('${prg.id}')">Finalizar revisión</button>
          </div>
        </div>
      </div>
    `;
    document.getElementById('modalRoot').innerHTML = html;
  },

  renderEntradaRevision(prg, e) {
    const p = State.data.patients.find(x => x.id === e.pacienteId);
    if (!p) return `<div class="card compact muted">Paciente eliminado.</div>`;
    return `
      <div class="card compact" style="margin-bottom:10px">
        <div class="strong">
          ${e.quirofano?`<span class="tag blue">Q${escapeHtml(e.quirofano)}#${e.orden||1}</span> `:''}
          ${escapeHtml(p.nombre||'(sin nombre)')} · Cama ${escapeHtml(p.cama||'?')}
        </div>
        <div class="muted" style="font-size:.85rem">${escapeHtml(e.procedimiento||'(sin procedimiento)')}${e.lateralidad?' ('+escapeHtml(e.lateralidad)+')':''}</div>
        <div class="row-gap" style="margin-top:8px">
          <button class="btn ${e.operado===true?'success':'ghost'} small" onclick="App.marcarRevision('${prg.id}','${e.id}',true)">Sí, operado</button>
          <button class="btn ${e.operado===false?'danger':'ghost'} small" onclick="App.marcarRevision('${prg.id}','${e.id}',false)">No operado</button>
        </div>
        ${e.operado === false ? `
          <div class="field" style="margin-top:8px;margin-bottom:0">
            <label>Motivo (opcional)</label>
            <input value="${escapeHtml(e.motivoNoOperado||'')}" placeholder="Ej. Suspendido por mal estado, falta de sala…"
              oninput="App.setEntrada('${prg.id}','${e.id}','motivoNoOperado',this.value)">
          </div>
        ` : ''}
        ${e.operado === true ? `<div class="muted" style="font-size:.8rem;margin-top:4px">✓ Marcado como operado el ${fmtDate(prg.fecha)}</div>` : ''}
      </div>
    `;
  },

  marcarRevision(programaId, entradaId, operado) {
    const prg = State.data.programas.find(p => p.id === programaId);
    if (!prg) return;
    const e = prg.pacientes.find(x => x.id === entradaId);
    if (!e) return;
    e.operado = operado;
    const p = this._findP(e.pacienteId);
    if (p) {
      if (operado) {
        const c = getCirugia(p);
        c.realizada = true;
        c.fecha = prg.fecha;
        c.procedimiento = e.procedimiento || '';
        c.lateralidad = e.lateralidad || '';
        c.cirujano = e.medicoCargo || p.cirujano || '';
        c.programaId = prg.id;
        c.notas = e.observaciones || '';
        logCambio(p, 'Cirugía', `Operado el ${prg.fecha} — ${e.procedimiento}${e.lateralidad?' ('+e.lateralidad+')':''}`);
      } else {
        // Si previamente había sido marcado operado y ahora se cambia, revertir
        if (p.cirugia && p.cirugia.realizada && p.cirugia.programaId === prg.id) {
          p.cirugia.realizada = false;
          p.cirugia.fecha = '';
          p.cirugia.programaId = '';
          logCambio(p, 'Cirugía', 'Marcado como NO operado en revisión');
        } else {
          logCambio(p, 'Programa Qx', `No operado en programa del ${prg.fecha}`);
        }
      }
    }
    State.save();
    // Re-render del modal de revisión
    document.getElementById('revBody').innerHTML =
      prg.pacientes.map(en => this.renderEntradaRevision(prg, en)).join('');
  },

  finalizarRevision(programaId) {
    const prg = State.data.programas.find(p => p.id === programaId);
    if (!prg) return;
    const sinDecidir = prg.pacientes.filter(e => e.operado === null).length;
    if (sinDecidir > 0) {
      if (!confirm(`Aún hay ${sinDecidir} paciente(s) sin marcar. ¿Cerrar revisión de todas formas?`)) return;
    }
    prg.revisado = true;
    State.save();
    this.closeModal();
    this.render();
  },
