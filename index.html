  /* ---------- Acciones del programa ---------- */
  programasPendientesRevision() {
    const hoy = todayISO();
    return (State.data.programas || []).filter(prg =>
      prg.fecha < hoy &&
      !prg.revisado &&
      prg.pacientes.some(e => e.operado === null)
    );
  },

  abrirPrograma(id) {
    this._currentProgramaId = id;
    this.render();
    window.scrollTo({top:0});
  },
  cerrarPrograma() {
    this._currentProgramaId = null;
    this.render();
  },

  crearPrograma() {
    debounceAction('crearPrograma', () => {
      const fecha = prompt('Fecha del programa (YYYY-MM-DD):', todayISO());
      if (!fecha) return;
      if (!/^\d{4}-\d{2}-\d{2}$/.test(fecha)) {
        alert('Fecha inválida. Formato: YYYY-MM-DD (ej. 2026-05-12).');
        return;
      }
      const existente = (State.data.programas || []).find(p => p.fecha === fecha);
      if (existente) {
        if (confirm(`Ya existe un programa para el ${fmtDateLong(fecha)}. ¿Quieres abrirlo?`)) {
          this.abrirPrograma(existente.id);
        }
        return;
      }
      const prg = nuevoPrograma(fecha);
      State.data.programas.push(prg);
      State.save();
      this.abrirPrograma(prg.id);
    });
  },

  eliminarPrograma(id) {
    if (!confirm('¿Eliminar este programa? Si tenía cirugías ya marcadas como operadas, la información en cada paciente se conserva (queda en su ficha).')) return;
    State.data.programas = State.data.programas.filter(p => p.id !== id);
    State.save();
    this._currentProgramaId = null;
    this.render();
  },

  setProgramaCampo(id, campo, val) {
    const prg = State.data.programas.find(p => p.id === id);
    if (!prg) return;
    prg[campo] = val;
    State.save();
  },

  agregarAPrograma(programaId) {
    const prg = State.data.programas.find(p => p.id === programaId);
    if (!prg) return;
    // Candidatos: pacientes listos para cirugía (incluyendo operados con flag "requiere otra cirugía")
    // No filtramos operados explícitamente porque evaluarAptoCirugia ya maneja eso correctamente:
    //   - operado sin flag → listo:false
    //   - operado con flag + preop OK → listo:true (vuelve a aparecer)
    const yaEnPrg = new Set(prg.pacientes.map(e => e.pacienteId));
    const candidatos = State.data.patients
      .filter(p => !p.fechaEgreso)
      .filter(p => !yaEnPrg.has(p.id))
      .filter(p => evaluarAptoCirugia(p).listo)
      .sort((a,b) => (a.cama||'').localeCompare(b.cama||'', 'es', {numeric:true}));

    // Para informar al usuario cuántos pacientes hay pendientes (no aptos) y por qué
    const noAptos = State.data.patients
      .filter(p => !p.fechaEgreso)
      .filter(p => !yaEnPrg.has(p.id))
      .filter(p => !evaluarAptoCirugia(p).listo).length;

    const html = `
      <div class="modal-backdrop" onclick="if(event.target===this) App.closeModal()">
        <div class="modal" style="max-width:600px">
          <div class="modal-head">
            <div>
              <div style="font-weight:600">Agregar al programa</div>
              <div style="font-size:.8rem;opacity:.9">${fmtDateLong(prg.fecha)} · sólo pacientes listos para cirugía</div>
            </div>
            <button class="close-x" onclick="App.closeModal()">✕</button>
          </div>
          <div class="modal-body">
            ${candidatos.length === 0 ? `
              <div class="empty">
                <div class="ico">⏳</div>
                <div>No hay pacientes listos para cirugía disponibles.</div>
                ${noAptos > 0 ? `<div class="muted" style="margin-top:8px">Hay ${noAptos} paciente(s) hospitalizados pero aún no cumplen criterios. Completa su preoperatorio en la pestaña <em>Pase de visita</em> y aparecerán aquí.</div>` : ''}
              </div>
            ` : `
              ${noAptos > 0 ? `<div class="alert-box blue" style="font-size:.85rem">Mostrando los <strong>${candidatos.length}</strong> paciente(s) listo(s) para cirugía. Hay ${noAptos} más en el servicio que aún no cumplen criterios.</div>` : ''}
              ${candidatos.map(p => `
                <div class="patient-card ready" onclick="App.confirmarAgregarPrograma('${prg.id}','${p.id}')">
                  <div class="pc-row">
                    <div class="pc-bed">${escapeHtml(p.cama||'?')}</div>
                    <div class="pc-info">
                      <div class="pc-name">${escapeHtml(p.nombre||'(sin nombre)')}
                        <span class="tag green">Listo</span>
                      </div>
                      <div class="pc-meta">${escapeHtml(p.cedula||'—')} · ${escapeHtml(p.edad||'?')} años</div>
                      <div class="pc-meta"><strong>Dx:</strong> ${escapeHtml((p.diagnosticos||[]).join(', ')||'—')}</div>
                      <div class="pc-meta"><strong>Cirujano:</strong> ${escapeHtml(p.cirujano||'—')}</div>
                    </div>
                  </div>
                </div>
              `).join('')}
            `}
          </div>
          <div class="modal-foot">
            <button class="btn ghost" onclick="App.closeModal()">Cancelar</button>
          </div>
        </div>
      </div>
    `;
    document.getElementById('modalRoot').innerHTML = html;
  },

  confirmarAgregarPrograma(programaId, pacienteId) {
    const prg = State.data.programas.find(p => p.id === programaId);
    const p = this._findP(pacienteId);
    if (!prg || !p) return;
    const defaults = {
      medicoCargo: p.cirujano || '',
      // Si el paciente tenía datos legacy en programaQx, los reusamos
      procedimiento: (p.programaQx && p.programaQx.procedimiento) || '',
      lateralidad: (p.programaQx && p.programaQx.lateralidad) || '',
      insumos: (p.programaQx && p.programaQx.insumos) || '',
      requerimientoSangre: (p.programaQx && p.programaQx.requerimientoSangre) || '',
      anestesia: (p.programaQx && p.programaQx.anestesia) || '',
      observaciones: (p.programaQx && p.programaQx.observaciones) || ''
    };
    prg.pacientes.push(nuevaEntradaPrograma(p.id, defaults));
    logCambio(p, 'Programa Qx', `Agregado al programa del ${prg.fecha}`);
    State.save();
    this.closeModal();
  },

  setEntrada(programaId, entradaId, campo, val) {
    const prg = State.data.programas.find(p => p.id === programaId);
    if (!prg) return;
    const e = prg.pacientes.find(x => x.id === entradaId);
    if (!e) return;
    e[campo] = val;
    State.save();
  },

  // Asigna un quirófano a una entrada y la coloca al final del orden de ese quirófano.
  // Renumera el quirófano viejo para que quede consistente.
  setEntradaQuirofano(programaId, entradaId, nuevoQuirofano) {
    const prg = State.data.programas.find(p => p.id === programaId);
    if (!prg) return;
    const e = prg.pacientes.find(x => x.id === entradaId);
    if (!e) return;
    const quirofanoViejo = e.quirofano || '';
    nuevoQuirofano = (nuevoQuirofano||'').trim();
    if (quirofanoViejo === nuevoQuirofano) return;
    e.quirofano = nuevoQuirofano;
    // Asignar orden al final del nuevo quirófano
    const otrosNuevo = prg.pacientes.filter(x => (x.quirofano||'') === nuevoQuirofano && x.id !== e.id);
    e.orden = otrosNuevo.length + 1;
    // Renumerar el quirófano viejo
    this._renumerarQuirofano(prg, quirofanoViejo);
    // Renumerar el nuevo (por si el orden quedó con huecos)
    this._renumerarQuirofano(prg, nuevoQuirofano);
    State.save();
    this.render();
  },

  setEntradaOrden(programaId, entradaId, nuevoOrden) {
    const prg = State.data.programas.find(p => p.id === programaId);
    if (!prg) return;
    const e = prg.pacientes.find(x => x.id === entradaId);
    if (!e) return;
    nuevoOrden = parseInt(nuevoOrden, 10);
    if (!nuevoOrden || nuevoOrden < 1) return;
    const ents = prg.pacientes.filter(x => (x.quirofano||'') === (e.quirofano||''))
      .sort((a,b) => (a.orden||999) - (b.orden||999));
    const idxActual = ents.findIndex(x => x.id === e.id);
    const idxNuevo = Math.min(Math.max(0, nuevoOrden-1), ents.length-1);
    if (idxActual === idxNuevo) return;
    // Mover en el array y renumerar
    ents.splice(idxActual, 1);
    ents.splice(idxNuevo, 0, e);
    ents.forEach((x, i) => { x.orden = i+1; });
    State.save();
    this.render();
  },

  moverEnQuirofano(programaId, entradaId, direccion) {  // -1 = subir, +1 = bajar
    const prg = State.data.programas.find(p => p.id === programaId);
    if (!prg) return;
    const e = prg.pacientes.find(x => x.id === entradaId);
    if (!e) return;
    const ents = prg.pacientes.filter(x => (x.quirofano||'') === (e.quirofano||''))
      .sort((a,b) => (a.orden||999) - (b.orden||999));
    const idx = ents.findIndex(x => x.id === e.id);
    const nuevoIdx = idx + direccion;
    if (nuevoIdx < 0 || nuevoIdx >= ents.length) return;
    // Swap
    [ents[idx], ents[nuevoIdx]] = [ents[nuevoIdx], ents[idx]];
    ents.forEach((x, i) => { x.orden = i+1; });
    State.save();
    this.render();
  },

  _renumerarQuirofano(prg, q) {
    const ents = prg.pacientes.filter(x => (x.quirofano||'') === (q||''))
      .sort((a,b) => (a.orden||999) - (b.orden||999));
    ents.forEach((x, i) => { x.orden = i+1; });
  },

  quitarDePrograma(programaId, entradaId) {
    if (!confirm('¿Quitar este paciente del programa?')) return;
    const prg = State.data.programas.find(p => p.id === programaId);
    if (!prg) return;
    const e = prg.pacientes.find(x => x.id === entradaId);
    if (!e) return;
    const p = this._findP(e.pacienteId);
    prg.pacientes = prg.pacientes.filter(x => x.id !== entradaId);
    if (p) logCambio(p, 'Programa Qx', `Quitado del programa del ${prg.fecha}`);
    State.save();
    this.render();
  },

  /* ---------- Revisión post-programa ---------- */
  abrirRevisionPrograma(id) {
    const prg = State.data.programas.find(p => p.id === id);
    if (!prg) return;
    const html = `
      <div class="modal-backdrop" onclick="if(event.target===this) App.closeModal()">
        <div class="modal" style="max-width:700px">
          <div class="modal-head">
            <div>
              <div style="font-weight:600">Revisar programa</div>
              <div style="font-size:.8rem;opacity:.9">${fmtDateLong(prg.fecha)} · ¿Qué pacientes fueron operados?</div>
            </div>
            <button class="close-x" onclick="App.closeModal()">✕</button>
          </div>
          <div class="modal-body" id="revBody">
            ${prg.pacientes.map(e => this.renderEntradaRevision(prg, e)).join('')}
          </div>
          <div class="modal-foot">
            <button class="btn ghost" onclick="App.closeModal()">Cerrar</button>
            <button class="btn success" onclick="App.finalizarRevision('${prg.id}')">Finalizar revisión</button>

  },

  renderEntradaRevision(prg, e) {
    const p = State.data.patients.find(x => x.id === e.pacienteId);
    if (!p) return `<div class="card compact muted">Paciente eliminado.</div>`;
    return `
      <div class="card compact" style="margin-bottom:10px">
        <div class="strong">
          ${e.quirofano?`<span class="tag blue">Q${escapeHtml(e.quirofano)}#${e.orden||1}</span> `:''}
          ${escapeHtml(p.nombre||'(sin nombre)')} · Cama ${escapeHtml(p.cama||'?')}
        </div>
        <div class="muted" style="font-size:.85rem">${escapeHtml(e.procedimiento||'(sin procedimiento)')}${e.lateralidad?' ('+escapeHtml(e.lateralidad)+')':''}</div>
        <div class="row-gap" style="margin-top:8px">
          <button class="btn ${e.operado===true?'success':'ghost'} small" onclick="App.marcarRevision('${prg.id}','${e.id}',true)">Sí, operado</button>
          <button class="btn ${e.operado===false?'danger':'ghost'} small" onclick="App.marcarRevision('${prg.id}','${e.id}',false)">No operado</button>
        </div>
        ${e.operado === false ? `
          <div class="field" style="margin-top:8px;margin-bottom:0">
            <label>Motivo (opcional)</label>
            <input value="${escapeHtml(e.motivoNoOperado||'')}" placeholder="Ej. Suspendido por mal estado, falta de sala…"
              oninput="App.setEntrada('${prg.id}','${e.id}','motivoNoOperado',this.value)">
          </div>
        ` : ''}
        ${e.operado === true ? `<div class="muted" style="font-size:.8rem;margin-top:4px">✓ Marcado como operado el ${fmtDate(prg.fecha)}</div>` : ''}
      </div>
    `;
  },

  marcarRevision(programaId, entradaId, operado) {
    const prg = State.data.programas.find(p => p.id === programaId);
    if (!prg) return;
    const e = prg.pacientes.find(x => x.id === entradaId);
    if (!e) return;
    e.operado = operado;
    const p = this._findP(e.pacienteId);
    if (p) {
      if (operado) {
        // Agregar a cirugiasRealizadas (o actualizar si ya existe para este programa)
        if (!p.cirugiasRealizadas) p.cirugiasRealizadas = [];
        const datos = {
          fecha: prg.fecha,
          procedimiento: e.procedimiento || '',
          lateralidad: e.lateralidad || '',
          cirujano: e.medicoCargo || p.cirujano || '',
          programaId: prg.id,
          quirofano: e.quirofano || '',
          notas: e.observaciones || ''
        };
        const idxExistente = p.cirugiasRealizadas.findIndex(c => c.programaId === prg.id);
        if (idxExistente >= 0) {
          p.cirugiasRealizadas[idxExistente] = datos;
        } else {
          p.cirugiasRealizadas.push(datos);
        }
        // Sincronizar legacy
        sincronizarCirugiaLegacy(p);
        // Si tenía marcado "Requiere otra cirugía", preguntar si todavía la necesita
        if (p.requiereOtraCirugia) {
          const totalCir = (p.cirugiasRealizadas || []).length;
          const sigueNecesitando = confirm(
            `${p.nombre || 'El paciente'} ya fue operado.\n` +
            `Lleva ${totalCir} cirugía(s) durante esta hospitalización.\n\n` +
            `¿Todavía requiere otra cirugía adicional?\n` +
            `(Útil en fracturas expuestas, lavados seriados por infección, cirugías por etapas, etc.)\n\n` +
            `Aceptar = Sí, mantener marcado "Requiere otra cirugía"\n` +
            `Cancelar = No, ya está completo, desmarcar la casilla`
          );
          p.requiereOtraCirugia = sigueNecesitando;
          logCambio(p, 'Cirugía',
            `Operado el ${prg.fecha} (cirugía #${totalCir}) — ${e.procedimiento}${e.lateralidad?' ('+e.lateralidad+')':''}` +
            (sigueNecesitando ? ' · Aún requiere otra cirugía' : ' · Casilla "requiere otra" desmarcada'));
        } else {
          const totalCir = (p.cirugiasRealizadas || []).length;
          logCambio(p, 'Cirugía', `Operado el ${prg.fecha} (cirugía #${totalCir}) — ${e.procedimiento}${e.lateralidad?' ('+e.lateralidad+')':''}`);
        }
      } else {
        // Quitar la cirugía de este programa si estaba registrada
        if (p.cirugiasRealizadas) {
          p.cirugiasRealizadas = p.cirugiasRealizadas.filter(c => c.programaId !== prg.id);
        }
        sincronizarCirugiaLegacy(p);
        logCambio(p, 'Cirugía', `No operado en programa del ${prg.fecha}`);
      }
    }
    State.save();
    document.getElementById('revBody').innerHTML =
      prg.pacientes.map(en => this.renderEntradaRevision(prg, en)).join('');
  },

  finalizarRevision(programaId) {
    const prg = State.data.programas.find(p => p.id === programaId);
    if (!prg) return;
    const sinDecidir = prg.pacientes.filter(e => e.operado === null).length;
    if (sinDecidir > 0) {
      if (!confirm(`Aún hay ${sinDecidir} paciente(s) sin marcar. ¿Cerrar revisión de todas formas?`)) return;
    }
    prg.revisado = true;
    State.save();
    this.closeModal();
    this.render();
  },

        <div style="margin-top:10px"><button class="btn" onclick="App.openSelectorEgreso()">+ Crear primer egreso</button></div>

              </div>

        </div>
        <textarea rows="4" class="no-print" placeholder="Reposo, dieta, signos de alarma para regresar a urgencias, fisioterapia, restricciones de carga, etc."
          oninput="App.setEgreso('${eg.id}','recomendaciones',this.value)">${escapeHtml(eg.recomendaciones||'')}</textarea>
        <div class="print-only" style="white-space:pre-wrap">${escapeHtml(eg.recomendaciones||'—')}</div>
      </div>

      <!-- Pie de impresión -->
      <div class="print-only" style="margin-top:24px;border-top:1px solid #ccc;padding-top:12px">
        <div style="display:flex;justify-content:space-between;font-size:.9em">
          <div>Médico responsable: _______________________</div>
          <div>Firma: _______________________</div>
        </div>

  /* ---------- Acciones del egreso ---------- */
  abrirEgreso(id) {
    this._currentEgresoId = id;
    this.render();
    window.scrollTo({top:0});
  },
  cerrarEgreso() {
    this._currentEgresoId = null;
    this.render();
  },

  openSelectorEgreso() {
    // Selecciona de la lista TOTAL de pacientes (no egresados aún)
    const yaConEgreso = new Set((State.data.egresos || []).map(e => e.pacienteId));
    const candidatos = State.data.patients
      .filter(p => !p.fechaEgreso)
      .filter(p => !yaConEgreso.has(p.id))
      .sort((a,b) => (a.cama||'').localeCompare(b.cama||'', 'es', {numeric:true}));

    const html = `
      <div class="modal-backdrop" onclick="if(event.target===this) App.closeModal()">
        <div class="modal" style="max-width:600px">
          <div class="modal-head">
            <div>
              <div style="font-weight:600">Crear reporte de egreso</div>
              <div style="font-size:.8rem;opacity:.9">Selecciona el paciente al que se le da salida</div>
            </div>
            <button class="close-x" onclick="App.closeModal()">✕</button>
          </div>
          <div class="modal-body">
            ${candidatos.length === 0 ? `
              <div class="empty">
                <div class="ico">✅</div>
                <div>No hay pacientes pendientes de egreso.</div>
                <div class="muted" style="margin-top:8px">Todos los pacientes hospitalizados ya tienen egreso o están dados de alta.</div>
              </div>
            ` : candidatos.map(p => {
              const operado = p.cirugia && p.cirugia.realizada;
              const dpost = diasPostop(p);
              const dias = daysBetween(p.fechaIngreso);
              return `
                <div class="patient-card" onclick="App.crearEgreso('${p.id}')">
                  <div class="pc-row">
                    <div class="pc-bed">${escapeHtml(p.cama||'?')}</div>
                    <div class="pc-info">
                      <div class="pc-name">${escapeHtml(p.nombre||'(sin nombre)')}
                        ${operado?`<span class="tag green">Operado · día ${dpost} postop</span>`:''}
                      </div>
                      <div class="pc-meta">${escapeHtml(p.cedula||'—')} · ${escapeHtml(p.edad||'?')} años · ${dias} día(s) hosp.</div>
                      <div class="pc-meta"><strong>Dx:</strong> ${escapeHtml((p.diagnosticos||[]).join(', ')||'—')}</div>
                    </div>
                  </div>
                </div>
              `;
            }).join('')}
          </div>
          <div class="modal-foot">
            <button class="btn ghost" onclick="App.closeModal()">Cancelar</button>
          </div>
        </div>
      </div>
    `;
    document.getElementById('modalRoot').innerHTML = html;
  },

  crearEgreso(pacienteId) {
    const p = this._findP(pacienteId);
    if (!p) return;
    if (!State.data.egresos) State.data.egresos = [];
    const eg = nuevoEgreso(pacienteId);
    // Prefill cirugías
    eg.cirugiasResumen = getCirugiasDelPaciente(pacienteId);
    if (eg.cirugiasResumen.length === 0 && p.cirugia && p.cirugia.realizada) {
      eg.cirugiasResumen.push({
        fecha: p.cirugia.fecha,
        procedimiento: p.cirugia.procedimiento,
        lateralidad: p.cirugia.lateralidad,
        cirujano: p.cirugia.cirujano,
        quirofano: '',
        notas: p.cirugia.notas || ''
      });
    }
    // Prefill labs
    eg.laboratoriosResumen = generarResumenLabs(p);
    // Prefill referencias desde interconsultas respondidas
    eg.referencias = getInterconsultasRespondidas(p).map(ic => ({
      especialidad: ic.servicio || '',
      fecha: '',
      lugar: '',
      notas: ic.respuesta ? ic.respuesta.slice(0, 80) : ''
    }));
    // Prefill diagnóstico final
    eg.diagnosticoFinal = (p.diagnosticos || []).join('; ');

    State.data.egresos.push(eg);
    p.fechaEgreso = eg.fechaEgreso;
    logCambio(p, 'Egreso', 'Reporte de egreso creado');
    State.save();
    this.closeModal();
    this.abrirEgreso(eg.id);
  },

  setEgreso(id, campo, val) {
    const eg = State.data.egresos.find(x => x.id === id);
    if (!eg) return;
    eg[campo] = val;
    eg.modificado = new Date().toISOString();
    if (campo === 'fechaEgreso') {
      const p = State.data.patients.find(x => x.id === eg.pacienteId);
      if (p) p.fechaEgreso = val;
    }
    State.save();
  },

  setEgresoCita(id, campo, val) {
    const eg = State.data.egresos.find(x => x.id === id);
    if (!eg) return;
    if (!eg.citaControl) eg.citaControl = { fecha:'', lugar:'', especialidad:'Ortopedia', notas:'' };
    eg.citaControl[campo] = val;
    eg.modificado = new Date().toISOString();
    State.save();
  },

  setEgresoCuracion(id, campo, val) {
    const eg = State.data.egresos.find(x => x.id === id);
    if (!eg) return;
    if (!eg.curacionHeridas) eg.curacionHeridas = { lugar:'', frecuencia:'', instrucciones:'' };
    eg.curacionHeridas[campo] = val;
    eg.modificado = new Date().toISOString();
    State.save();
  },

  setEgresoRayos(id, campo, val) {
    const eg = State.data.egresos.find(x => x.id === id);
    if (!eg) return;
    if (!eg.rayosXControl) eg.rayosXControl = { requiere:false, descripcion:'' };
    eg.rayosXControl[campo] = val;
    eg.modificado = new Date().toISOString();
    State.save();
    if (campo === 'requiere') this.render();
  },

  addCirugiaEgreso(id) {
    const eg = State.data.egresos.find(x => x.id === id);
    if (!eg) return;
    if (!eg.cirugiasResumen) eg.cirugiasResumen = [];
    eg.cirugiasResumen.push({ fecha:'', procedimiento:'', lateralidad:'', cirujano:'', quirofano:'', notas:'' });
    State.save();
    this.render();
  },
  setCirugiaEgreso(id, idx, campo, val) {
    const eg = State.data.egresos.find(x => x.id === id);
    if (!eg) return;
    if (!eg.cirugiasResumen[idx]) return;
    eg.cirugiasResumen[idx][campo] = val;
    eg.modificado = new Date().toISOString();
    State.save();
  },
  removeCirugiaEgreso(id, idx) {
    if (!confirm('¿Quitar esta cirugía del reporte?')) return;
    const eg = State.data.egresos.find(x => x.id === id);
    if (!eg) return;
    eg.cirugiasResumen.splice(idx, 1);
    State.save();
    this.render();
  },

  addReferenciaEgreso(id) {
    const eg = State.data.egresos.find(x => x.id === id);
    if (!eg) return;
    if (!eg.referencias) eg.referencias = [];
    eg.referencias.push({ especialidad:'Ortopedia', fecha:'', lugar:'', notas:'' });
    State.save();
    this.render();
  },
  setReferenciaEgreso(id, idx, campo, val) {
    const eg = State.data.egresos.find(x => x.id === id);
    if (!eg || !eg.referencias[idx]) return;
    eg.referencias[idx][campo] = val;
    eg.modificado = new Date().toISOString();
    State.save();
  },
  removeReferenciaEgreso(id, idx) {
    if (!confirm('¿Quitar esta referencia?')) return;
    const eg = State.data.egresos.find(x => x.id === id);
    if (!eg) return;
    eg.referencias.splice(idx, 1);
    State.save();
    this.render();
  },

  eliminarEgreso(id) {
    if (!confirm('¿Eliminar este reporte de egreso? El paciente queda sin egreso registrado y vuelve a la lista de hospitalizados.')) return;
    const eg = State.data.egresos.find(x => x.id === id);
    if (eg) {
      const p = State.data.patients.find(x => x.id === eg.pacienteId);
      if (p) {
        p.fechaEgreso = '';
        logCambio(p, 'Egreso', 'Reporte de egreso eliminado — paciente reactivo');
      }
    }
    State.data.egresos = State.data.egresos.filter(x => x.id !== id);
    State.save();
    this._currentEgresoId = null;
    this.render();
  },

  /* ---------- Alertas globales ---------- */
  renderAlertas() {
    const items = [];
    State.data.patients.filter(p=>!p.fechaEgreso).forEach(p => {
      calcularAlertasPaciente(p).forEach(a => {
        items.push({ p, a });
      });
    });

    // ordenar: rojas primero, luego amarillas, luego verdes
    const orden = { red:0, yellow:1, blue:2, green:3 };
    items.sort((x,y) => orden[x.a.tipo] - orden[y.a.tipo]);

    let html = `<h2>Alertas y recordatorios</h2>`;
    if (items.length === 0) {
      html += `<div class="empty"><div class="ico">✅</div><div>Sin alertas activas.</div></div>`;
      return html;
    }

    items.forEach(({p,a}) => {
      html += `
        <div class="alert-box ${a.tipo}" onclick="App.openPaciente('${p.id}')" style="cursor:pointer;margin-bottom:8px">
          <div class="strong">Cama ${escapeHtml(p.cama||'?')} · ${escapeHtml(p.nombre||'(sin nombre)')}</div>
          <div>${escapeHtml(a.texto)}</div>
        </div>
      `;
    });
    return html;
  },

  /* ===========================================================
     MODAL DE PACIENTE
     =========================================================== */
  _modalSubtab: 'datos',

  openNew() {
    debounceAction('openNew', () => {
      const p = nuevoPaciente();
      State.data.patients.push(p);
      logCambio(p, 'Creación', 'Paciente creado');
      State.save();
      this._modalSubtab = 'datos';
      this.openPaciente(p.id);
    });

  openPaciente(id) {
    this._modalSubtab = 'datos';
    this._currentModalId = id;
    this.renderModal(id);
  },

  closeModal() {
    this._currentModalId = null;
    document.getElementById('modalRoot').innerHTML = '';
    this.render();
  },

  /* Modales secundarios (catálogos, plantillas) que se abren ENCIMA del modal del paciente */
  _renderSecondary(html) {
    document.getElementById('modalRoot2').innerHTML = html;
  },
  _closeSecondary() {
    document.getElementById('modalRoot2').innerHTML = '';
    // Si hay un modal de paciente abierto, refrescarlo para que se vean los cambios
    // hechos en el catálogo (diagnósticos toggleados, etc.)
    if (this._currentModalId) {
      this.renderModal(this._currentModalId);
    } else {
      // Si no hay paciente abierto pero estamos en una vista que pudo cambiar
      // (programa quirúrgico, egreso), re-renderizamos
      this.render();
    }
  },

  renderModal(id) {
    const p = State.data.patients.find(x => x.id === id);
    if (!p) return;
    const apto = evaluarAptoCirugia(p);
    const dias = daysBetween(p.fechaIngreso);

    const tabs = [
      ['datos','Datos básicos'],
      ['preop','Preoperatorio'],
      ['programa','Programa Qx'],
      ['meds','Medicamentos'],
      ['labs','Laboratorios'],
      ['ic','Interconsultas'],
      ['inf','Control infección'],
      ['hist','Historial']
    ];

    let bodyHtml = '';
    if (this._modalSubtab === 'datos') bodyHtml = this.tabDatos(p);
    else if (this._modalSubtab === 'preop') bodyHtml = this.tabPreop(p);
    else if (this._modalSubtab === 'programa') bodyHtml = this.tabPrograma(p);
    else if (this._modalSubtab === 'meds') bodyHtml = this.tabMeds(p);
    else if (this._modalSubtab === 'labs') bodyHtml = this.tabLabs(p);
    else if (this._modalSubtab === 'ic') bodyHtml = this.tabIC(p);
    else if (this._modalSubtab === 'inf') bodyHtml = this.tabInf(p);
    else if (this._modalSubtab === 'hist') bodyHtml = this.tabHist(p);

    const erroresValidacion = validarPaciente(p);
    const aptoBadge = (erroresValidacion.length > 0)
      ? `<span class="pill notready">⚠ Datos incompletos</span>`
      : apto.listo
        ? `<span class="pill ready">✓ Listo cirugía</span>`
        : apto.operado
          ? (p.requiereOtraCirugia
              ? `<span class="pill pending">Operado · pendiente otra cirugía</span>`
              : `<span class="pill ready">✓ Operado</span>`)
          : (tieneContraindicacion(p) ? `<span class="pill notready">No apto</span>` : `<span class="pill pending">Pendiente</span>`);

    const html = `
      <div class="modal-backdrop" onclick="if(event.target===this) App.closeModal()">
        <div class="modal">
          <div class="modal-head">
            <div>
              <div style="font-weight:600">${escapeHtml(p.nombre || '(Nuevo paciente)')}</div>
              <div style="font-size:.8rem;opacity:.9">
                Cama ${escapeHtml(p.cama||'?')} · ${escapeHtml(p.cedula||'sin cédula')} · ${dias} día(s) ${aptoBadge}
              </div>
            </div>
            <button class="close-x" onclick="App.closeModal()" aria-label="Cerrar">✕</button>
          </div>
          <div class="subtabs">
            ${tabs.map(([k,l])=>`
              <button class="${this._modalSubtab===k?'active':''}" onclick="App.subtab('${p.id}','${k}')">${l}</button>
            `).join('')}
          </div>
          <div class="modal-body">${bodyHtml}</div>
          <div class="modal-foot">
            <button class="btn danger" onclick="App.eliminarPaciente('${p.id}')">Eliminar</button>
            <div style="flex:1"></div>
            <button class="btn ghost" onclick="App.closeModal()">Cerrar</button>
          </div>
        </div>
      </div>
    `;
    document.getElementById('modalRoot').innerHTML = html;
  },

  subtab(id, k) {
    this._modalSubtab = k;
    this.renderModal(id);
  },

              style="${nombreInvalido?'border-color:#dc2626;background:#fef2f2':''}">

              <option ${p.sexo==='M'?'selected':''}>M</option>
              <option ${p.sexo==='Otro'?'selected':''}>Otro</option>
            </select>
          </div>
        </div>
        <div class="field-row">

          </div>
          <div class="field">
            <label>Cirujano a cargo</label>
            <input list="cirujanosList" value="${escapeHtml(p.cirujano)}" oninput="App.actualizar('${p.id}','cirujano',this.value)" placeholder="Empieza a escribir...">

              ${getCatalogo('cirujanos').map(c => `<option value="${escapeHtml(c)}">`).join('')}

        </div>
        <div class="field-row">
          <div class="field">

            <input type="date" value="${escapeHtml(p.fechaIngreso)}" onchange="App.actualizar('${p.id}','fechaIngreso',this.value)">
          </div>
          <div class="field">
            <label>Fecha de egreso (si aplica)</label>

      <div class="card">

  /* -------- Preoperatorio -------- */
  tabPreop(p) {
    const apto = evaluarAptoCirugia(p);
    const edad = parseInt(p.edad,10);
    const requiereCompletos = (edad>=50) || tieneAntecedentes(p);

    const ult = ultimaCirugia(p);
    const totalCir = (p.cirugiasRealizadas || []).length;
    let aptoBox;
    if (apto.listo) {
      aptoBox = `<div class="alert-box green"><strong>✓ Paciente listo para cirugía.</strong> ${escapeHtml(apto.motivo)}.</div>`;
    } else if (apto.operado) {
      // Paciente ya operado — sólo es candidato si se marca "Requiere otra cirugía"
      aptoBox = `
        <div class="alert-box green">
          <strong>✓ Paciente ya operado.</strong>
          ${totalCir>0?`Lleva ${totalCir} cirugía(s) durante esta hospitalización.`:''}
          Última cirugía: ${escapeHtml(ult.procedimiento||'')}${ult.lateralidad?' ('+escapeHtml(ult.lateralidad)+')':''} el ${fmtDate(ult.fecha)}.
        </div>
        <div class="card" style="border-left:4px solid #f59e0b">
          <div class="checkbox-row">
            <input type="checkbox" id="reqotra-preop-${p.id}" ${p.requiereOtraCirugia?'checked':''}
              onchange="App.toggleRequiereOtraCirugia('${p.id}',this.checked)">
            <label for="reqotra-preop-${p.id}"><strong>Requiere otra cirugía</strong></label>
          </div>
          <div class="muted" style="font-size:.85rem;margin-top:6px">
            Marca esta casilla si el paciente, ya operado, va a necesitar otra intervención (lavado quirúrgico, etapa siguiente, complicación, fractura expuesta, infección que requiere lavados seriados, etc.).
            <br>Mientras esté marcada, el paciente aparecerá nuevamente en la lista <em>Listos para cirugía</em> y podrá agregarse a un programa.
          </div>
        </div>
      `;
    } else if (tieneContraindicacion(p)) {
      aptoBox = `<div class="alert-box red"><strong>✗ No apto.</strong> ${escapeHtml(apto.motivo)}</div>`;
    } else {
      aptoBox = apto.faltantes && apto.faltantes.length > 0
        ? `<div class="alert-box yellow"><strong>Faltan estudios:</strong> ${apto.faltantes.map(escapeHtml).join(', ')}</div>`
        : `<div class="alert-box yellow"><strong>Pendiente:</strong> ${escapeHtml(apto.motivo||'revisar preoperatorio')}</div>`;
    }

    const reglaTxt = requiereCompletos
      ? `Por edad o antecedentes, este paciente requiere <strong>preoperatorio completo</strong> (laboratorios completos, EKG, Rx tórax y evaluación preoperatoria por M.I., M.F., Geriatría o subespecialidad).`
      : `Paciente sin antecedentes y menor de 50 años: requiere <strong>estudios básicos</strong> (Rx tórax, hemograma, tiempos de coagulación, química sanguínea básica).`;

    const estudio = (key, label, mostrar=true) => {
      if (!mostrar) return '';
      const e = p.estudios[key] || {realizado:false,fecha:'',resultado:''};
      return `
        <div class="card compact">
          <div class="row-between">
            <div class="row-gap">
              <input type="checkbox" ${e.realizado?'checked':''} onchange="App.toggleEstudio('${p.id}','${key}',this.checked)">
              <strong>${label}</strong>
            </div>
            ${e.realizado?`<span class="tag green">Realizado</span>`:`<span class="tag red">Pendiente</span>`}
          </div>
          ${e.realizado?`
            <div class="field-row" style="margin-top:8px">
              <div class="field" style="margin-bottom:0">
                <label>Fecha</label>
                <input type="date" value="${escapeHtml(e.fecha)}" onchange="App.setEstudioCampo('${p.id}','${key}','fecha',this.value)">
              </div>
              <div class="field" style="margin-bottom:0">
                <label>Resultado / observaciones</label>
                <input value="${escapeHtml(e.resultado)}" oninput="App.setEstudioCampo('${p.id}','${key}','resultado',this.value)">
              </div>
            </div>
          `:''}
        </div>
      `;
    };

    const evalPre = p.estudios.evaluacionPreop;
    const evalBlock = `
      <div class="card compact">
        <div class="row-between">
          <div class="row-gap">
            <input type="checkbox" ${evalPre.realizado?'checked':''} onchange="App.toggleEstudio('${p.id}','evaluacionPreop',this.checked)">
            <strong>Evaluación preoperatoria</strong>
          </div>
          ${evalPre.realizado?`<span class="tag green">Realizada</span>`:`<span class="tag red">Pendiente</span>`}
        </div>
        ${evalPre.realizado?`
          <div class="field-row" style="margin-top:8px">
            <div class="field" style="margin-bottom:0">
              <label>Fecha</label>
              <input type="date" value="${escapeHtml(evalPre.fecha)}" onchange="App.setEstudioCampo('${p.id}','evaluacionPreop','fecha',this.value)">
            </div>
            <div class="field" style="margin-bottom:0">
              <label>Especialidad</label>
              <select onchange="App.setEstudioCampo('${p.id}','evaluacionPreop','especialidad',this.value)">
                <option value="">—</option>
                ${SPECIALIDADES_PREOP.map(s=>`<option ${evalPre.especialidad===s?'selected':''}>${s}</option>`).join('')}
              </select>
            </div>
          </div>
          <div class="field" style="margin-top:8px;margin-bottom:0">
            <label>Conclusión / autorización</label>
            <input value="${escapeHtml(evalPre.resultado)}" oninput="App.setEstudioCampo('${p.id}','evaluacionPreop','resultado',this.value)">
          </div>
        `:''}
      </div>
    `;

    return `
      ${aptoBox}
      <div class="alert-box blue">${reglaTxt}</div>

      <div class="card">
        <h3>Estudios básicos</h3>
        ${estudio('rxTorax','Rx de tórax')}
        ${estudio('hemograma','Hemograma completo')}
        ${estudio('tiemposCoagulacion','Tiempos de coagulación (TP/TPT/INR)')}
        ${estudio('quimicaSanguinea','Química sanguínea básica')}
      </div>

      <div class="card">
        <h3>Estudios adicionales (≥50 años o con antecedentes)</h3>
        ${requiereCompletos?'':'<div class="muted">No requeridos para este paciente, pero pueden registrarse si se realizan.</div>'}
        ${estudio('ekg','Electrocardiograma (EKG)')}
        ${evalBlock}
      </div>

      <div class="card">
        <h3>Contraindicaciones / razones para no operar</h3>
        <div class="checkbox-row">
          <input type="checkbox" id="cgi-${p.id}" ${p.contraindicaciones.malEstadoGeneral?'checked':''}
            onchange="App.setContra('${p.id}','malEstadoGeneral',this.checked)">
          <label for="cgi-${p.id}">Mal estado general</label>
        </div>
        <div class="checkbox-row">
          <input type="checkbox" id="cti-${p.id}" ${p.contraindicaciones.malEstadoTejidos?'checked':''}
            onchange="App.setContra('${p.id}','malEstadoTejidos',this.checked)">
          <label for="cti-${p.id}">Mal estado de tejidos blandos</label>
        </div>
        <div class="field" style="margin-top:8px">
          <label>Otra contraindicación</label>
          <input value="${escapeHtml(p.contraindicaciones.otra||'')}" oninput="App.setContra('${p.id}','otra',this.value)">
        </div>
      </div>
    `;
  },

  /* -------- Programa Quirúrgico (sub-pestaña en la ficha) -------- */
  tabPrograma(p) {
    const cirugias = getCirugiasRealizadas(p).slice().sort((a,b) => (b.fecha||'').localeCompare(a.fecha||''));
    const ult = ultimaCirugia(p);
    const dpost = diasPostop(p);
    const enProgramas = (State.data.programas || [])
      .filter(prg => prg.pacientes.some(e => e.pacienteId === p.id))
      .sort((a,b) => (b.fecha||'').localeCompare(a.fecha||''));

    let html = '';

    if (ult) {
      // Encabezado: estado actual
      if (p.requiereOtraCirugia) {
        html += `<div class="alert-box yellow">
          <strong>⚠ Pendiente otra cirugía.</strong> El paciente fue operado el ${fmtDate(ult.fecha)} (${dpost} día(s) postop) y se marcó que requiere una nueva cirugía.<br>
          Ya aparece en la lista <em>Listos para cirugía</em> y se puede agregar a un programa.
        </div>`;
      } else {
        html += `<div class="alert-box green">
          <strong>✓ Paciente operado.</strong> ${cirugias.length>1?`${cirugias.length} cirugías realizadas. `:''}
          Última: ${escapeHtml(ult.procedimiento||'—')}${ult.lateralidad?' ('+escapeHtml(ult.lateralidad)+')':''}
          el ${fmtDate(ult.fecha)} · <strong>${dpost} día(s) postoperatorio</strong>.
        </div>`;
      }

      // Toggle "Requiere otra cirugía"
      html += `<div class="card">
        <div class="checkbox-row">
          <input type="checkbox" id="reqotra-${p.id}" ${p.requiereOtraCirugia?'checked':''}
            onchange="App.toggleRequiereOtraCirugia('${p.id}',this.checked)">
          <label for="reqotra-${p.id}"><strong>Requiere otra cirugía</strong></label>
        </div>
        <div class="muted" style="font-size:.85rem;margin-top:4px">
          Marca esta casilla cuando el paciente, ya operado, vaya a necesitar otra intervención (lavado quirúrgico, etapa siguiente, complicación, etc.). Mientras esté marcada, el paciente aparecerá en la lista <em>Listos para cirugía</em> si cumple los estudios preoperatorios. Al confirmar la nueva cirugía en la revisión del programa, la app te preguntará si aún requiere otra cirugía adicional antes de desmarcarla.
        </div>
      </div>`;

      // Historial de cirugías realizadas
      html += `<div class="card">
        <div class="row-between">
          <h3 style="margin:0">Historial de cirugías</h3>
          <button class="btn ghost small" onclick="App.agregarCirugiaManual('${p.id}')">+ Agregar manual</button>
        </div>
        ${cirugias.map((c, idx) => `
          <div class="card compact" style="margin-top:10px">
            <div class="row-between">
              <strong>${cirugias.length-idx}. ${fmtDate(c.fecha)}</strong>
              ${c.programaId?'<span class="tag blue" style="font-size:.7rem">Del programa</span>':'<span class="tag gray" style="font-size:.7rem">Manual</span>'}
            </div>
            <div class="field-row" style="margin-top:8px">
              <div class="field" style="margin-bottom:0">
                <label>Fecha</label>
                <input type="date" value="${escapeHtml(c.fecha||'')}" onchange="App.setCirugiaIdx('${p.id}',${idx},'fecha',this.value)">
              </div>
              <div class="field" style="margin-bottom:0">
                <label>Cirujano</label>
                <input value="${escapeHtml(c.cirujano||'')}" oninput="App.setCirugiaIdx('${p.id}',${idx},'cirujano',this.value)">
              </div>
            </div>
            <div class="field" style="margin-top:8px">
              <label>Procedimiento</label>
              <textarea rows="2" oninput="App.setCirugiaIdx('${p.id}',${idx},'procedimiento',this.value)">${escapeHtml(c.procedimiento||'')}</textarea>
            </div>
            <div class="field-row">
              <div class="field" style="margin-bottom:0">
                <label>Lateralidad</label>
                <input value="${escapeHtml(c.lateralidad||'')}" oninput="App.setCirugiaIdx('${p.id}',${idx},'lateralidad',this.value)">
              </div>
              <div class="field" style="margin-bottom:0">
                <label>Quirófano</label>
                <input value="${escapeHtml(c.quirofano||'')}" oninput="App.setCirugiaIdx('${p.id}',${idx},'quirofano',this.value)">
              </div>
            </div>
            <div class="field" style="margin-top:8px;margin-bottom:0">
              <label>Notas / hallazgos</label>
              <textarea rows="2" oninput="App.setCirugiaIdx('${p.id}',${idx},'notas',this.value)">${escapeHtml(c.notas||'')}</textarea>
            </div>
            <div style="text-align:right;margin-top:8px">
              <button class="btn ghost small" onclick="App.eliminarCirugiaIdx('${p.id}',${idx})">Eliminar esta cirugía</button>
            </div>
          </div>
        `).join('')}
      </div>`;
    } else {
      // No operado — estado preop
      const apto = evaluarAptoCirugia(p);
      html += apto.listo
        ? `<div class="alert-box green">Paciente <strong>listo para cirugía</strong>. Puedes agregarlo al programa quirúrgico desde la pestaña <em>Programa Qx</em>.</div>`
        : `<div class="alert-box yellow"><strong>Pendiente de preoperatorio.</strong> ${escapeHtml(apto.motivo)}${apto.faltantes&&apto.faltantes.length?': '+escapeHtml(apto.faltantes.join(', ')):''}</div>`;
    }

    // Historial de aparición en programas (planeación)
    if (enProgramas.length > 0) {
      html += `<div class="card">
        <h3>Aparece en programas</h3>
        ${enProgramas.map(prg => {
          const e = prg.pacientes.find(x => x.pacienteId === p.id);
          const opTag = e.operado === true ? '<span class="tag green">Operado</span>'
                      : e.operado === false ? '<span class="tag red">No operado</span>'
                      : '<span class="tag blue">Programado</span>';
          return `
            <div class="card compact" style="margin-top:8px;cursor:pointer" onclick="App.closeModal();App.switchTab('programa');App.abrirPrograma('${prg.id}')">
              <div class="row-between">
                <div>
                  <strong>${fmtDateLong(prg.fecha)}</strong> ${opTag}
                  ${e.motivoNoOperado?`<div class="muted" style="font-size:.8rem">Motivo: ${escapeHtml(e.motivoNoOperado)}</div>`:''}
                </div>
                <div class="muted" style="font-size:.85rem">→</div>
              </div>
              <div class="muted" style="font-size:.85rem;margin-top:4px">
                ${e.quirofano?`Q${escapeHtml(e.quirofano)}#${e.orden||1} · `:''}
                ${escapeHtml(e.procedimiento||'(sin procedimiento)')}${e.lateralidad?' ('+escapeHtml(e.lateralidad)+')':''}
              </div>
            </div>
          `;
        }).join('')}
      </div>`;
    } else if (!ult) {
      html += `<div class="card muted" style="text-align:center">
        Este paciente no está en ningún programa quirúrgico.<br>
        <button class="btn small" style="margin-top:8px" onclick="App.closeModal();App.switchTab('programa')">Ir a Programa Qx</button>
      </div>`;
    }

    return html;
  },

  toggleRequiereOtraCirugia(id, val) {
    const p = this._findP(id); if (!p) return;
    p.requiereOtraCirugia = !!val;
    logCambio(p, 'Cirugía', val ? 'Marcado: requiere otra cirugía' : 'Desmarcado: ya no requiere otra cirugía');
    State.save();
    this.renderModal(id);
  },

  setCirugiaIdx(id, idx, campo, val) {
    const p = this._findP(id); if (!p) return;
    const lista = getCirugiasRealizadas(p);
    // ordenar por fecha desc para indexar
    const ordenadas = lista.slice().sort((a,b) => (b.fecha||'').localeCompare(a.fecha||''));
    const target = ordenadas[idx];
    if (!target) return;
    target[campo] = val;
    sincronizarCirugiaLegacy(p);
    State.save();
  },

  eliminarCirugiaIdx(id, idx) {
    if (!confirm('¿Eliminar esta cirugía del historial? Esto NO afecta el programa quirúrgico de origen, sólo el registro en la ficha del paciente.')) return;
    const p = this._findP(id); if (!p) return;
    const lista = getCirugiasRealizadas(p);
    const ordenadas = lista.slice().sort((a,b) => (b.fecha||'').localeCompare(a.fecha||''));
    const target = ordenadas[idx];
    if (!target) return;
    p.cirugiasRealizadas = lista.filter(c => c !== target);
    sincronizarCirugiaLegacy(p);
    logCambio(p, 'Cirugía', `Eliminada del historial: ${target.fecha} ${target.procedimiento||''}`);
    State.save();
    this.renderModal(id);
  },

  agregarCirugiaManual(id) {
    const p = this._findP(id); if (!p) return;
    if (!p.cirugiasRealizadas) p.cirugiasRealizadas = [];
    p.cirugiasRealizadas.push({
      fecha: todayISO(),
      procedimiento: '',
      lateralidad: '',
      cirujano: p.cirujano || '',
      programaId: '',
      quirofano: '',
      notas: ''
    });
    sincronizarCirugiaLegacy(p);
    logCambio(p, 'Cirugía', 'Agregada manualmente al historial');
    State.save();
    this.renderModal(id);
  },

  /* -------- Medicamentos -------- */
  tabMeds(p) {
    const meds = (p.medicamentos||[]).slice().sort((a,b) => (b.activo?1:0) - (a.activo?1:0));
    return `
      <div class="card">
        <div class="row-between">
          <h3 style="margin:0">Medicamentos en curso</h3>
          <div class="row-gap">
            <button class="btn ghost small" onclick="App.openMedTemplatePicker('${p.id}')">+ Desde plantilla</button>
            <button class="btn small" onclick="App.addMed('${p.id}')">+ Vacío</button>
          </div>
        </div>
        ${meds.length===0?`<div class="muted" style="margin-top:8px">Sin medicamentos registrados.</div>`:''}
        ${meds.map(m => {
          const dias = daysBetween(m.inicio, m.fin || null);
          return `
            <div class="card compact" style="margin-top:10px;border-left:4px solid ${m.activo?'#059669':'#cbd5e1'}">
              <div class="field-row">
                <div class="field" style="margin-bottom:0">
                  <label>Medicamento</label>
                  <input value="${escapeHtml(m.nombre)}" oninput="App.setMed('${p.id}','${m.id}','nombre',this.value)">
                </div>
                <div class="field" style="margin-bottom:0">
                  <label>Dosis</label>
                  <input value="${escapeHtml(m.dosis)}" oninput="App.setMed('${p.id}','${m.id}','dosis',this.value)">
                </div>
              </div>
              <div class="field-row" style="margin-top:8px">
                <div class="field" style="margin-bottom:0">
                  <label>Vía</label>
                  <input value="${escapeHtml(m.via)}" oninput="App.setMed('${p.id}','${m.id}','via',this.value)" placeholder="VO / IV / IM / SC">
                </div>
                <div class="field" style="margin-bottom:0">
                  <label>Frecuencia</label>
                  <input value="${escapeHtml(m.frecuencia)}" oninput="App.setMed('${p.id}','${m.id}','frecuencia',this.value)" placeholder="c/8h">
                </div>
              </div>
              <div class="field-row" style="margin-top:8px">
                <div class="field" style="margin-bottom:0">
                  <label>Inicio</label>
                  <input type="date" value="${escapeHtml(m.inicio)}" onchange="App.setMed('${p.id}','${m.id}','inicio',this.value)">
                </div>
                <div class="field" style="margin-bottom:0">
                  <label>Fin (vacío = activo)</label>
                  <input type="date" value="${escapeHtml(m.fin||'')}" onchange="App.setMedFin('${p.id}','${m.id}',this.value)">
                </div>
              </div>
              <div class="row-between" style="margin-top:8px">
                <div class="muted">${m.activo?`Activo · ${dias} día(s)`:`Suspendido · ${dias} día(s) total`}</div>
                <button class="btn ghost small" onclick="App.delMed('${p.id}','${m.id}')">Eliminar</button>
              </div>
              <div class="field" style="margin-top:8px;margin-bottom:0">
                <label>Notas</label>
                <input value="${escapeHtml(m.nota||'')}" oninput="App.setMed('${p.id}','${m.id}','nota',this.value)">
              </div>
            </div>
          `;
        }).join('')}
      </div>
    `;
  },

  /* -------- Laboratorios -------- */
  tabLabs(p) {
    const labs = (p.laboratorios||[]).slice().sort((a,b)=>(a.fecha||'').localeCompare(b.fecha||''));
    // Recolectar todas las claves de valores presentes
    const keysSet = new Set();
    labs.forEach(l => Object.keys(l.valores||{}).forEach(k => keysSet.add(k)));
    const claves = Array.from(keysSet);
    const COMUNES = ['Hb','Hto','Leu','Neut','Plt','Cr','BUN','Glu','Na','K','Ca','PCR','VES','TP','TPT','INR','AST','ALT'];
    COMUNES.forEach(k => { if(!keysSet.has(k)) claves.push(k); });

    return `
      <div class="card">
        <div class="row-between">
          <h3 style="margin:0">Laboratorios en el tiempo</h3>
          <button class="btn small" onclick="App.addLab('${p.id}')">+ Nueva fecha</button>
        </div>
        <p class="muted" style="margin-top:6px">Registre los valores manualmente. Cada columna es una toma.</p>
        ${labs.length===0?`<div class="muted" style="margin-top:8px">Sin laboratorios registrados.</div>`:`
          <div class="table-wrap" style="margin-top:10px">
            <table class="lab-table">
              <thead>
                <tr>
                  <th>Examen</th>
                  ${labs.map(l=>`<th>${fmtDate(l.fecha)} <button class="btn ghost small" style="margin-left:4px" onclick="App.delLab('${p.id}','${l.id}')">×</button></th>`).join('')}
                </tr>
              </thead>
              <tbody>
                ${claves.map(k => `
                  <tr>
                    <td><strong>${escapeHtml(k)}</strong></td>
                    ${labs.map(l => `
                      <td><input value="${escapeHtml((l.valores||{})[k]||'')}"
                          oninput="App.setLabVal('${p.id}','${l.id}','${escapeHtml(k)}',this.value)"></td>
                    `).join('')}
                  </tr>
                `).join('')}
              </tbody>
            </table>
          </div>
          <div class="muted" style="margin-top:8px">Para añadir un examen no listado, edite la fecha y agregue el nombre nuevo abajo.</div>
          <div class="field-row" style="margin-top:6px">
            <div class="field" style="margin-bottom:0">
              <input id="newLabKey-${p.id}" placeholder="Nombre del examen (ej. Albúmina)">
            </div>
            <div class="field" style="margin-bottom:0">
              <button class="btn small" onclick="App.addLabKey('${p.id}')">Agregar examen</button>
            </div>
          </div>
        `}
      </div>
    `;
  },

  /* -------- Interconsultas -------- */
  tabIC(p) {
    const ics = (p.interconsultas||[]).slice().sort((a,b)=>(b.fechaSolicitud||'').localeCompare(a.fechaSolicitud||''));
    return `
      <div class="card">
        <div class="row-between">
          <h3 style="margin:0">Interconsultas</h3>
          <button class="btn small" onclick="App.addIC('${p.id}')">+ Nueva</button>
        </div>
        ${ics.length===0?`<div class="muted" style="margin-top:8px">Sin interconsultas.</div>`:''}
        ${ics.map(ic => {
          const dias = daysBetween(ic.fechaSolicitud, ic.respondida ? (ic.fechaRespuesta||todayISO()) : null);
          return `
            <div class="card compact" style="margin-top:10px;border-left:4px solid ${ic.respondida?'#059669':'#f59e0b'}">
              <div class="field-row">
                <div class="field" style="margin-bottom:0">
                  <label>Servicio</label>
                  <select onchange="App.setIC('${p.id}','${ic.id}','servicio',this.value)">

                  </select>

                <div class="field" style="margin-bottom:0">

                </div>
              </div>
              <div class="field" style="margin-top:8px;margin-bottom:0">
                <label>Motivo / pregunta clínica</label>
                <textarea rows="2" oninput="App.setIC('${p.id}','${ic.id}','motivo',this.value)">${escapeHtml(ic.motivo||'')}</textarea>
              </div>
              <div class="checkbox-row" style="margin-top:8px">
                <input type="checkbox" id="ic-r-${ic.id}" ${ic.respondida?'checked':''} onchange="App.toggleICResp('${p.id}','${ic.id}',this.checked)">
                <label for="ic-r-${ic.id}">Respondida</label>
                <span class="muted" style="margin-left:8px">${ic.respondida?`✓ ${dias} día(s) en responder`:`Pendiente · ${dias} día(s) sin respuesta`}</span>
              </div>
              ${ic.respondida?`
                <div class="field-row" style="margin-top:8px">
                  <div class="field" style="margin-bottom:0">
                    <label>Fecha respuesta</label>
                    <input type="date" value="${escapeHtml(ic.fechaRespuesta)}" onchange="App.setIC('${p.id}','${ic.id}','fechaRespuesta',this.value)">
                  </div>
                </div>
                <div class="field" style="margin-top:8px;margin-bottom:0">
                  <label>Respuesta / recomendaciones</label>
                  <textarea rows="2" oninput="App.setIC('${p.id}','${ic.id}','respuesta',this.value)">${escapeHtml(ic.respuesta||'')}</textarea>
                </div>
              `:''}
              <div style="margin-top:8px;text-align:right">
                <button class="btn ghost small" onclick="App.delIC('${p.id}','${ic.id}')">Eliminar</button>
              </div>
            </div>
          `;
        }).join('')}
      </div>
    `;
  },

  /* -------- Control infección -------- */
  tabInf(p) {
    const dias = daysBetween(p.fechaIngreso);
    const tieneInf = tieneInfeccion(p);
    const controles = (p.controlInfeccion||[]).slice().sort((a,b)=>(b.fecha||'').localeCompare(a.fecha||''));
    const ultimo = controles[0];
    const diasUltimo = ultimo ? daysBetween(ultimo.fecha) : null;
    const necesario = tieneInf && dias >= 7 && (!ultimo || diasUltimo >= 7);

    return `
      ${tieneInf
        ? (necesario
          ? `<div class="alert-box red"><strong>⚠ Repetir Rx y exámenes de control de infección.</strong> ${dias} día(s) hospitalizado, último control ${ultimo?fmtDate(ultimo.fecha):'(ninguno)'}.</div>`
          : `<div class="alert-box green">Control de infección al día.</div>`)
        : `<div class="alert-box blue">Este paciente no tiene diagnóstico de infección registrado. Si lo desarrolla, agregue el dx en la pestaña <em>Datos básicos</em> para activar los recordatorios.</div>`
      }
      <div class="card">
        <div class="row-between">
          <h3 style="margin:0">Controles realizados</h3>
          <button class="btn small" onclick="App.addInf('${p.id}')">+ Registrar control</button>
        </div>
        ${controles.length===0?`<div class="muted" style="margin-top:8px">Sin controles registrados.</div>`:''}
        ${controles.map(c => `
          <div class="card compact" style="margin-top:10px">
            <div class="field-row">
              <div class="field" style="margin-bottom:0">
                <label>Fecha</label>
                <input type="date" value="${escapeHtml(c.fecha)}" onchange="App.setInf('${p.id}','${c.fecha}','fecha',this.value)">
              </div>
            </div>
            <div class="checkbox-row" style="margin-top:8px">
              <input type="checkbox" ${c.rxRepetido?'checked':''} onchange="App.setInf('${p.id}','${c.fecha}','rxRepetido',this.checked)">
              <label>Rx de control repetido</label>
            </div>
            <div class="checkbox-row">
              <input type="checkbox" ${c.examenesRepetidos?'checked':''} onchange="App.setInf('${p.id}','${c.fecha}','examenesRepetidos',this.checked)">
              <label>Exámenes de control de infección repetidos (PCR, VES, hemograma, cultivos)</label>
            </div>
            <div class="field" style="margin-top:8px;margin-bottom:0">
              <label>Notas</label>
              <input value="${escapeHtml(c.nota||'')}" oninput="App.setInf('${p.id}','${c.fecha}','nota',this.value)">
            </div>
            <div style="text-align:right;margin-top:8px">
              <button class="btn ghost small" onclick="App.delInf('${p.id}','${c.fecha}')">Eliminar</button>
            </div>
          </div>
        `).join('')}
      </div>
    `;
  },

  /* -------- Historial -------- */
  tabHist(p) {
    const hist = (p.historial||[]).slice().reverse();
    return `
      <div class="card">
        <h3>Historial de cambios</h3>
        ${hist.length===0?`<div class="muted">Sin movimientos registrados.</div>`:`
          <div class="table-wrap">
            <table>
              <thead><tr><th>Fecha y hora</th><th>Acción</th><th>Detalle</th></tr></thead>
              <tbody>
                ${hist.map(h => `
                  <tr>
                    <td>${new Date(h.fecha).toLocaleString('es')}</td>
                    <td>${escapeHtml(h.accion)}</td>
                    <td>${escapeHtml(h.detalle)}</td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          </div>
        `}
      </div>
    `;
  },

  /* ===========================================================
     ACCIONES (mutaciones)
     =========================================================== */
  _findP(id) { return State.data.patients.find(x => x.id === id); },

  actualizar(id, campo, valor) {
    const p = this._findP(id); if (!p) return;
    if (p[campo] !== valor) {
      logCambio(p, 'Edición', `${campo}: ${valor}`);
    }
    p[campo] = valor;
    State.save();
    // No re-render del modal completo para no perder foco; sólo refresca header sutilmente
    this._refreshHeader(id);
  },

  _refreshHeader(id) {
    // Actualiza badge y header de modal sin rerender pesado
    const p = this._findP(id); if (!p) return;
    const head = document.querySelector('.modal-head');
    if (head) {
      const apto = evaluarAptoCirugia(p);
      const dias = daysBetween(p.fechaIngreso);
      const erroresValidacionH = validarPaciente(p);
      const aptoBadge = (erroresValidacionH.length > 0)
        ? `<span class="pill notready">⚠ Datos incompletos</span>`
        : apto.listo
          ? `<span class="pill ready">✓ Listo cirugía</span>`
          : apto.operado
            ? (p.requiereOtraCirugia
                ? `<span class="pill pending">Operado · pendiente otra cirugía</span>`
                : `<span class="pill ready">✓ Operado</span>`)
            : (tieneContraindicacion(p) ? `<span class="pill notready">No apto</span>` : `<span class="pill pending">Pendiente</span>`);
      head.innerHTML = `
        <div>
          <div style="font-weight:600">${escapeHtml(p.nombre || '(Nuevo paciente)')}</div>
          <div style="font-size:.8rem;opacity:.9">
            Cama ${escapeHtml(p.cama||'?')} · ${escapeHtml(p.cedula||'sin cédula')} · ${dias} día(s) ${aptoBadge}
          </div>
        </div>
        <button class="close-x" onclick="App.closeModal()" aria-label="Cerrar">✕</button>
      `;
    }
  },

  actualizarDx(id, valor) {
    const p = this._findP(id); if (!p) return;
    p.diagnosticos = valor.split('\n').map(s=>s.trim()).filter(Boolean);
    logCambio(p,'Edición','Diagnósticos actualizados');
    State.save();
    this.renderModal(id);
  },

  toggleEstudio(id, key, val) {
    const p = this._findP(id); if (!p) return;
    p.estudios[key].realizado = val;
    if (val && !p.estudios[key].fecha) p.estudios[key].fecha = todayISO();
    logCambio(p, 'Estudio', `${key}: ${val?'realizado':'no realizado'}`);
    State.save();
    this.renderModal(id);
  },

  setEstudioCampo(id, key, campo, val) {
    const p = this._findP(id); if (!p) return;
    p.estudios[key][campo] = val;
    State.save();
  },

  setContra(id, campo, val) {
    const p = this._findP(id); if (!p) return;
    p.contraindicaciones[campo] = val;
    logCambio(p,'Contraindicación',`${campo}: ${val}`);
    State.save();
    this.renderModal(id);
  },

  // Medicamentos
  addMed(id) {
    const p = this._findP(id); if (!p) return;
    p.medicamentos.push({
      id: 'm_'+uid(), nombre:'', dosis:'', via:'', frecuencia:'',
      inicio: todayISO(), fin:'', activo: true, nota:''
    });
    logCambio(p,'Medicamento','Nuevo registro');
    State.save();
    this.renderModal(id);
  },
  setMed(id, mid, campo, val) {
    const p = this._findP(id); if (!p) return;
    const m = p.medicamentos.find(x=>x.id===mid); if (!m) return;
    m[campo] = val;
    State.save();
  },
  setMedFin(id, mid, val) {
    const p = this._findP(id); if (!p) return;
    const m = p.medicamentos.find(x=>x.id===mid); if (!m) return;
    m.fin = val;
    m.activo = !val;
    logCambio(p,'Medicamento', `${m.nombre}: ${val?'suspendido':'reactivado'}`);
    State.save();
    this.renderModal(id);
  },
  delMed(id, mid) {
    const p = this._findP(id); if (!p) return;
    const m = p.medicamentos.find(x=>x.id===mid);
    p.medicamentos = p.medicamentos.filter(x => x.id !== mid);
    logCambio(p,'Medicamento',`Eliminado: ${m?m.nombre:''}`);
    State.save();
    this.renderModal(id);
  },

  // Laboratorios
  addLab(id) {
    const p = this._findP(id); if (!p) return;
    p.laboratorios.push({ id:'l_'+uid(), fecha: todayISO(), valores:{}, nota:'' });
    logCambio(p,'Laboratorio','Nueva fecha');
    State.save();
    this.renderModal(id);
  },
  delLab(id, lid) {
    const p = this._findP(id); if (!p) return;
    if (!confirm('¿Eliminar esta toma de laboratorios?')) return;
    p.laboratorios = p.laboratorios.filter(l => l.id !== lid);
    logCambio(p,'Laboratorio','Toma eliminada');
    State.save();
    this.renderModal(id);
  },
  setLabVal(id, lid, key, val) {
    const p = this._findP(id); if (!p) return;
    const l = p.laboratorios.find(x => x.id === lid); if (!l) return;
    if (!l.valores) l.valores = {};
    if (val === '') delete l.valores[key];
    else l.valores[key] = val;
    State.save();
  },
  addLabKey(id) {
    const inp = document.getElementById('newLabKey-'+id);
    if (!inp) return;
    const k = (inp.value||'').trim();
    if (!k) return;
    const p = this._findP(id); if (!p) return;
    // Asegurar que exista en al menos una toma
    if (p.laboratorios.length===0) {
      p.laboratorios.push({ id:'l_'+uid(), fecha: todayISO(), valores:{[k]:''}, nota:'' });
    } else {
      p.laboratorios[0].valores = p.laboratorios[0].valores || {};
      p.laboratorios[0].valores[k] = p.laboratorios[0].valores[k] || '';
    }
    logCambio(p,'Laboratorio',`Examen agregado: ${k}`);
    State.save();
    this.renderModal(id);
  },

  // Interconsultas
  addIC(id) {
    const p = this._findP(id); if (!p) return;
    p.interconsultas.push({
      id: 'ic_'+uid(),
      fechaSolicitud: todayISO(),
      servicio: 'Medicina Interna',
      motivo: '',
      respondida: false,
      fechaRespuesta: '',
      respuesta: ''
    });
    logCambio(p,'Interconsulta','Nueva solicitud');
    State.save();
    this.renderModal(id);
  },
  setIC(id, icid, campo, val) {
    const p = this._findP(id); if (!p) return;
    const ic = p.interconsultas.find(x=>x.id===icid); if (!ic) return;
    ic[campo] = val;
    State.save();
  },
  toggleICResp(id, icid, val) {
    const p = this._findP(id); if (!p) return;
    const ic = p.interconsultas.find(x=>x.id===icid); if (!ic) return;
    ic.respondida = val;
    if (val && !ic.fechaRespuesta) ic.fechaRespuesta = todayISO();
    logCambio(p,'Interconsulta', `${ic.servicio}: ${val?'respondida':'reabierta'}`);
    State.save();
    this.renderModal(id);
  },
  delIC(id, icid) {
    const p = this._findP(id); if (!p) return;
    if (!confirm('¿Eliminar esta interconsulta?')) return;
    p.interconsultas = p.interconsultas.filter(x => x.id !== icid);
    logCambio(p,'Interconsulta','Eliminada');
    State.save();
    this.renderModal(id);
  },

  // Control infección
  addInf(id) {
    const p = this._findP(id); if (!p) return;
    if (!p.controlInfeccion) p.controlInfeccion = [];
    if (p.controlInfeccion.some(c => c.fecha === todayISO())) {
      alert('Ya existe un control con fecha de hoy.');
      return;
    }
    p.controlInfeccion.push({ fecha: todayISO(), rxRepetido:false, examenesRepetidos:false, nota:'' });
    logCambio(p,'Infección','Control registrado');
    State.save();
    this.renderModal(id);
  },
  setInf(id, fecha, campo, val) {
    const p = this._findP(id); if (!p) return;
    const c = p.controlInfeccion.find(x=>x.fecha===fecha); if (!c) return;
    c[campo] = val;
    State.save();
    if (campo === 'fecha') this.renderModal(id);
  },
  delInf(id, fecha) {
    const p = this._findP(id); if (!p) return;
    p.controlInfeccion = p.controlInfeccion.filter(x => x.fecha !== fecha);
    logCambio(p,'Infección','Control eliminado');
    State.save();
    this.renderModal(id);
  },

  // Eliminar paciente
  eliminarPaciente(id) {
    if (!confirm('¿Eliminar definitivamente este paciente y todos sus registros?')) return;
    State.data.patients = State.data.patients.filter(p => p.id !== id);
    State.save();
    this.closeModal();
  },

  /* ---------- Export / Import ---------- */
  exportData() {
    const blob = new Blob([JSON.stringify(State.data, null, 2)], { type:'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `ortopedia_${todayISO()}.json`;
    document.body.appendChild(a); a.click(); a.remove();
    URL.revokeObjectURL(url);
    setLastExportNow();
    // Refrescar para que desaparezca el banner si estaba visible
    if (State.currentTab === 'lista' || State.currentTab === 'todos') this.render();
  },

  importData(ev) {
    const f = ev.target.files[0];
    if (!f) return;
    const reader = new FileReader();
    reader.onload = e => {
      try {
        const obj = JSON.parse(e.target.result);
        if (!obj.patients) throw new Error('Formato no válido');
        if (!confirm(`Importar ${obj.patients.length} paciente(s)? Se reemplazarán los datos actuales.`)) return;
        State.data = obj;
        State.save();
        this.render();
      } catch(err) {
        alert('Error al importar: ' + err.message);
      }
    };
    reader.readAsText(f);
    ev.target.value = '';
  }
};

document.addEventListener('DOMContentLoaded', () => App.init());
</script>
</body>
</html>
