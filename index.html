      onclick="Voz.alternar('${id}','${btnId}')">🎙</button>
  </div>`;
}

/* ---------- Dictado por voz (Web Speech API) ---------- */
const Voz = {
  recognition: null,
  targetEl: null,
  btnEl: null,
  soportado() {
    return typeof window !== 'undefined' && (window.SpeechRecognition || window.webkitSpeechRecognition);
  },
  alternar(targetId, btnId) {
    if (!this.soportado()) {
      alert('El dictado por voz no está disponible en este navegador. Funciona mejor en Chrome o Safari moderno.');
      return;
    }
    if (this.recognition && this.targetEl && this.targetEl.id === targetId) {
      this.detener();
      return;
    }
    this.iniciar(targetId, btnId);
  },
  iniciar(targetId, btnId) {
    this.detener();
    const target = document.getElementById(targetId);
    if (!target) return;
    const btn = document.getElementById(btnId);
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    const rec = new SR();
    rec.lang = 'es-ES';
    rec.continuous = true;
    rec.interimResults = false;
    rec.onresult = (e) => {
      for (let i = e.resultIndex; i < e.results.length; i++) {
        const txt = e.results[i][0].transcript.trim();
        const sep = (target.value && !/\s$/.test(target.value)) ? ' ' : '';
        target.value += sep + txt;
        target.dispatchEvent(new Event('input', { bubbles: true }));
      }
    };
    rec.onerror = (e) => {
      console.warn('Speech error:', e.error);
      this.detener();
    };
    rec.onend = () => {
      // Si terminó por timeout, detener visualmente
      if (this.recognition === rec) this.detener();
    };
    this.recognition = rec;
    this.targetEl = target;
    this.btnEl = btn;
    if (btn) {
      btn.textContent = '⏹';
      btn.classList.add('grabando');
      btn.title = 'Detener dictado';
    }
    try { rec.start(); }
    catch(e) { console.warn(e); this.detener(); }
  },
  detener() {
    if (this.recognition) {
      try { this.recognition.stop(); } catch(e) {}
      this.recognition = null;
    }
    if (this.btnEl) {
      this.btnEl.textContent = '🎙';
      this.btnEl.classList.remove('grabando');
      this.btnEl.title = 'Dictar por voz';
    }
    this.targetEl = null;
    this.btnEl = null;
  }
};

/* ---------- Debounce para botones críticos ---------- */
const _debounceLocks = new Set();
function debounceAction(key, fn) {
  if (_debounceLocks.has(key)) return false;
  _debounceLocks.add(key);
  try { fn(); }
  finally {
    setTimeout(() => _debounceLocks.delete(key), DEBOUNCE_MS);
  }
  return true;
}

/* ---------- Backups locales rotativos (v3.23) ----------
   Mantiene una bitácora versionada de la base en localStorage para poder restaurar
   ante pérdida súbita. Dos series independientes:
     - "recent": últimos N snapshots cada vez que el dataset cambia significativamente
     - "daily":  un snapshot por día (el primero del día), últimos M días
   Se almacenan los datos serializados, con timestamp y métricas para mostrar al usuario.
*/
const Backups = {
  _read() {
    try {
      const raw = localStorage.getItem(BACKUP_HISTORY_KEY);
      if (!raw) return { recent: [], daily: [] };
      const obj = JSON.parse(raw);
      return { recent: obj.recent || [], daily: obj.daily || [] };
    } catch(e) { return { recent: [], daily: [] }; }
  },
  _write(history) {
    try { localStorage.setItem(BACKUP_HISTORY_KEY, JSON.stringify(history)); }
    catch(e) {
      console.warn('No se pudo guardar el backup local:', e);
      // localStorage lleno — reducir cantidad
      if (history.recent.length > 3) {
        history.recent = history.recent.slice(0, 3);
        try { localStorage.setItem(BACKUP_HISTORY_KEY, JSON.stringify(history)); }
        catch(e2) { console.error('Backup local imposible:', e2); }
      }
    }
  },
  _resumen(data) {
    return {
      pacientes: (data.patients||[]).length,
      pacientesActivos: (data.patients||[]).filter(p => !p.fechaEgreso).length,
      programas: (data.programas||[]).length,
      egresos: (data.egresos||[]).length,
      icRecibidas: (data.interconsultasEntrantes||[]).length,
      usuarios: (data.config && data.config.usuarios ? data.config.usuarios.length : 0)
    };
  },
  // Decide si vale la pena guardar este snapshot — evita ruido por cambios triviales
  // Guarda un snapshot del estado actual
  guardar(data) {
    if (!data || !data.patients) return;
    const history = this._read();
    const ahora = new Date();
    const ahoraISO = ahora.toISOString();
    const fechaSolo = ahoraISO.slice(0, 10);   // YYYY-MM-DD
    const serial = JSON.stringify(data);
    const entry = {
      timestamp: ahoraISO,
      fecha: fechaSolo,
      tamanoKB: Math.round(serial.length / 1024),
      resumen: this._resumen(data),
      data: serial   // guardamos como string para no duplicar parsing
    };
    // Solo agregar a recent si el último no es idéntico (evita duplicados consecutivos)
    const ultimo = history.recent[0];
    if (!ultimo || ultimo.data !== serial) {
      history.recent.unshift(entry);
      if (history.recent.length > BACKUP_MAX_RECENT) {
        history.recent = history.recent.slice(0, BACKUP_MAX_RECENT);
      }
    }
    // Daily: si no hay backup para hoy, agregarlo
    const hayHoy = history.daily.some(e => e.fecha === fechaSolo);
    if (!hayHoy) {
      history.daily.unshift({ ...entry });
      if (history.daily.length > BACKUP_MAX_DAILY) {
        history.daily = history.daily.slice(0, BACKUP_MAX_DAILY);
      }
    }
    this._write(history);
    // v3.26 (C6): espejar también en IndexedDB para sobrevivir a iOS Safari storage eviction.
    // No bloquea — si IDB falla, los backups en localStorage siguen funcionando.
    try {
      IDB.put({ ...entry, kind: hayHoy ? 'recent' : 'daily' });
      // mantener máximo 14 entradas en IDB (10 recent + 7 daily aprox.)
      IDB.deleteOld(BACKUP_MAX_RECENT + BACKUP_MAX_DAILY);
    } catch(e) { console.warn('[Backups] IDB mirror falló:', e); }
  },
  listar() {
    return this._read();
  },
  // Restaurar desde un backup específico (por timestamp + tipo)
  restaurar(timestamp, tipo) {
    const history = this._read();
    const lista = (tipo === 'daily') ? history.daily : history.recent;
    const entry = lista.find(e => e.timestamp === timestamp);
    if (!entry) return null;
    try { return JSON.parse(entry.data); }
    catch(e) { return null; }
  },
  // v3.26 (C6): listar y restaurar desde IndexedDB como alternativa cuando localStorage fue evictado
  async listarIDB() {
    const entries = await IDB.getAll();
    return entries.sort((a,b) => (b.timestamp||'').localeCompare(a.timestamp||''));
  },
  async restaurarIDB(timestamp) {
    const entry = await IDB.get(timestamp);
    if (!entry) return null;
    try { return JSON.parse(entry.data); }
    catch(e) { return null; }
  },
  // Limpiar todos los backups locales (último recurso)
  limpiarTodos() {
    try { localStorage.removeItem(BACKUP_HISTORY_KEY); } catch(e){}
  }
};

/* ---------- Espejo en IndexedDB (v3.26) ----------
   localStorage en iOS Safari puede ser evictado tras 7 días de inactividad.
   IndexedDB tiene política de eviction más favorable (especialmente con persist()).
   Replicamos los snapshots de backup aquí para tener una segunda copia local más resistente.
*/
const IDB_NAME = 'ortopedia_backups_idb';
const IDB_STORE = 'snapshots';
const IDB = {
  _db: null,
  async _open() {
    if (this._db) return this._db;
    if (typeof indexedDB === 'undefined') return null;
    return new Promise((resolve) => {
      const req = indexedDB.open(IDB_NAME, 1);
      req.onerror = () => { console.warn('[IDB] open error'); resolve(null); };
      req.onsuccess = () => { this._db = req.result; resolve(this._db); };
      req.onupgradeneeded = (ev) => {
        const db = ev.target.result;
        if (!db.objectStoreNames.contains(IDB_STORE)) {
          db.createObjectStore(IDB_STORE, { keyPath: 'timestamp' });
        }
      };
    });
  },
  async put(entry) {
    const db = await this._open();
    if (!db) return false;
    return new Promise((resolve) => {
      try {
        const tx = db.transaction(IDB_STORE, 'readwrite');
        const store = tx.objectStore(IDB_STORE);
        store.put(entry);
        tx.oncomplete = () => resolve(true);
        tx.onerror = () => { console.warn('[IDB] tx error', tx.error); resolve(false); };
      } catch(e) { console.warn('[IDB] put error', e); resolve(false); }
    });
  },
  async getAll() {
    const db = await this._open();
    if (!db) return [];
    return new Promise((resolve) => {
      try {
        const tx = db.transaction(IDB_STORE, 'readonly');
        const store = tx.objectStore(IDB_STORE);
        const req = store.getAll();
        req.onsuccess = () => resolve(req.result || []);
        req.onerror = () => resolve([]);
      } catch(e) { resolve([]); }
    });
  },
  async get(timestamp) {
    const db = await this._open();
    if (!db) return null;
    return new Promise((resolve) => {
      try {
        const tx = db.transaction(IDB_STORE, 'readonly');
        const store = tx.objectStore(IDB_STORE);
        const req = store.get(timestamp);
        req.onsuccess = () => resolve(req.result || null);
        req.onerror = () => resolve(null);
      } catch(e) { resolve(null); }
    });
  },
  async deleteOld(maxEntries = 14) {
    // Mantener solo los últimos N por timestamp (descendente)
    const all = await this.getAll();
    if (all.length <= maxEntries) return;
    all.sort((a,b) => (b.timestamp||'').localeCompare(a.timestamp||''));
    const toDelete = all.slice(maxEntries);
    const db = await this._open();
    if (!db) return;
    try {
      const tx = db.transaction(IDB_STORE, 'readwrite');
      const store = tx.objectStore(IDB_STORE);
      toDelete.forEach(e => store.delete(e.timestamp));
    } catch(e){}
  }
};

/* ---------- Backups diarios en Firebase (v3.23) ----------
   Una vez al día, guarda un snapshot de la base completa en una colección aparte.
   Cada documento es un día (YYYY-MM-DD). Mantiene los últimos CLOUD_BACKUP_MAX_DAYS.
   Si Firebase falla o no está disponible, no rompe nada — los backups locales son la
   primera línea de defensa.
*/
const CloudBackups = {
  _lastCheckedDay: null,    // Recordar el último día revisado para no consultar Firestore en cada save

  // Verificar si el backup de hoy existe; si no, crearlo. Idempotente.
  async asegurarBackupDeHoy() {
    if (!Sync.db || !Sync.hasReceivedSnapshot) return;
    const data = State.data;
    if (!data || !data.patients || data.patients.length === 0) return;  // No respaldar vacío
    const hoy = new Date().toISOString().slice(0, 10);
    if (this._lastCheckedDay === hoy) return;   // Ya revisamos hoy en esta sesión
    this._lastCheckedDay = hoy;
    try {
      const col = Sync.db.collection(FB_BACKUP_COL);
      const docRef = col.doc(hoy);
      const snap = await docRef.get();
      if (snap.exists) return;   // Ya existe el de hoy
      const payload = {
        fecha: hoy,
        timestamp: Date.now(),
        creadoPor: getCurrentUser() || '',
        appVersion: APP_VERSION,
        resumen: Backups._resumen(data),
        patients: data.patients || [],
        programas: data.programas || [],
        egresos: data.egresos || [],
        interconsultasEntrantes: data.interconsultasEntrantes || [],
        config: data.config || {}
      };
      await docRef.set(payload);
      console.log('[CloudBackups] Respaldo diario creado:', hoy);
      // Limpiar respaldos viejos (no esperamos el resultado para no bloquear UX)
      this.limpiarAntiguos();
    } catch(e) {
      console.warn('[CloudBackups] No se pudo crear respaldo diario:', e.message || e);
    }
  },

  async limpiarAntiguos() {
    if (!Sync.db) return;
    try {
      const col = Sync.db.collection(FB_BACKUP_COL);
      const snap = await col.orderBy('fecha', 'desc').get();
      const docs = [];
      snap.forEach(d => docs.push({ id: d.id, fecha: d.data().fecha }));
      // Eliminar los que sobran después del límite
      const sobran = docs.slice(CLOUD_BACKUP_MAX_DAYS);
      for (const d of sobran) {
        try { await col.doc(d.id).delete(); } catch(e){}
      }
    } catch(e) { console.warn('[CloudBackups] Error limpiando antiguos:', e.message || e); }
  },

  async listar() {
    if (!Sync.db) return [];
    try {
      const col = Sync.db.collection(FB_BACKUP_COL);
      const snap = await col.orderBy('fecha', 'desc').limit(CLOUD_BACKUP_MAX_DAYS).get();
      const out = [];
      snap.forEach(d => {
        const data = d.data();
        out.push({
          id: d.id,
          fecha: data.fecha,
          timestamp: data.timestamp,
          creadoPor: data.creadoPor || '',
          appVersion: data.appVersion || '',
          resumen: data.resumen || {}
        });
      });
      return out;
    } catch(e) {
      console.warn('[CloudBackups] Error listando:', e.message || e);
      return [];
    }
  },

  async cargar(fecha) {
    if (!Sync.db) return null;
    try {
      const doc = await Sync.db.collection(FB_BACKUP_COL).doc(fecha).get();
      if (!doc.exists) return null;
      const d = doc.data();
      return {
        patients: d.patients || [],
        programas: d.programas || [],
        egresos: d.egresos || [],
        interconsultasEntrantes: d.interconsultasEntrantes || [],
        config: d.config || {},
        lastWrite: d.timestamp
      };
    } catch(e) {
      console.warn('[CloudBackups] Error cargando:', e.message || e);
      return null;
    }
  }
};

/* ---------- Backups en Google Drive (v3.23) ----------
   Sube una copia JSON al Google Drive del usuario una vez por día.
   Requiere:
     1) Que el usuario haya creado un OAuth Client ID en Google Cloud Console
     2) Que el usuario haya autorizado a la app (popup de Google)
   El token se guarda en localStorage. Se renueva cada 1h aprox automáticamente.
   Usamos scope 'drive.file' que solo permite a la app ver/editar archivos creados por ella misma —
   más seguro y privado que pedir acceso completo a Drive.
*/
const DriveBackup = {
  _accessToken: null,
  _tokenExpiresAt: 0,
  _folderId: null,
  _lastUploadDay: null,

  getClientId() {
    return localStorage.getItem(DRIVE_CLIENT_ID_KEY) || '';
  },
  setClientId(id) {
    if (id) localStorage.setItem(DRIVE_CLIENT_ID_KEY, id);
    else localStorage.removeItem(DRIVE_CLIENT_ID_KEY);
  },

  isAuthorized() {
    if (!this._accessToken) {
      // Intentar restaurar desde localStorage
      try {
        const saved = JSON.parse(localStorage.getItem(DRIVE_OAUTH_KEY) || 'null');
        if (saved && saved.access_token && saved.expires_at > Date.now()) {
          this._accessToken = saved.access_token;
          this._tokenExpiresAt = saved.expires_at;
          this._folderId = saved.folder_id || null;
        }
      } catch(e){}
    }
    return !!this._accessToken && this._tokenExpiresAt > Date.now();
  },

  _saveToken() {
    try {
      localStorage.setItem(DRIVE_OAUTH_KEY, JSON.stringify({
        access_token: this._accessToken,
        expires_at: this._tokenExpiresAt,
        folder_id: this._folderId
      }));
    } catch(e){}
  },

  // Solicita autorización al usuario (popup de Google)
  async autorizar() {
    if (typeof google === 'undefined' || !google.accounts || !google.accounts.oauth2) {
      throw new Error('Google Identity Services no está cargado. Espera unos segundos e intenta de nuevo.');
    }
    const clientId = this.getClientId();
    if (!clientId) {
      throw new Error('Falta configurar el Client ID de Google. Ver instrucciones en Configuración.');
    }
    return new Promise((resolve, reject) => {
      const tokenClient = google.accounts.oauth2.initTokenClient({
        client_id: clientId,
        scope: 'https://www.googleapis.com/auth/drive.file',
        prompt: '',
        callback: (resp) => {
          if (resp.error) {
            reject(new Error('Autorización rechazada: ' + (resp.error_description || resp.error)));
            return;
          }
          this._accessToken = resp.access_token;
          this._tokenExpiresAt = Date.now() + (resp.expires_in || 3600) * 1000;
          this._saveToken();
          resolve(true);
        }
      });
      tokenClient.requestAccessToken();
    });
  },

  desautorizar() {
    if (this._accessToken && typeof google !== 'undefined' && google.accounts && google.accounts.oauth2) {
      try { google.accounts.oauth2.revoke(this._accessToken, ()=>{}); } catch(e){}
    }
    this._accessToken = null;
    this._tokenExpiresAt = 0;
    this._folderId = null;
    try { localStorage.removeItem(DRIVE_OAUTH_KEY); } catch(e){}
  },

  // Asegura que existe la carpeta Ortopedia_Backups en el Drive del usuario
  async _asegurarCarpeta() {
    if (this._folderId) return this._folderId;
    // Buscar si ya existe
    const q = encodeURIComponent(`name='${DRIVE_FOLDER_NAME}' and mimeType='application/vnd.google-apps.folder' and trashed=false`);
    const resp = await fetch(`https://www.googleapis.com/drive/v3/files?q=${q}&fields=files(id,name)`, {
      headers: { Authorization: 'Bearer ' + this._accessToken }
    });
    if (!resp.ok) throw new Error('Error buscando carpeta: ' + resp.status);
    const data = await resp.json();
    if (data.files && data.files.length > 0) {
      this._folderId = data.files[0].id;
    } else {
      // Crearla
      const create = await fetch('https://www.googleapis.com/drive/v3/files', {
        method: 'POST',
        headers: {
          Authorization: 'Bearer ' + this._accessToken,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          name: DRIVE_FOLDER_NAME,
          mimeType: 'application/vnd.google-apps.folder'
        })
      });
      if (!create.ok) throw new Error('Error creando carpeta: ' + create.status);
      const createData = await create.json();
      this._folderId = createData.id;
    }
    this._saveToken();
    return this._folderId;
  },

  // Sube el JSON del día (idempotente — sobrescribe si ya existe el mismo día)
  async subirBackupDeHoy() {
    if (!this.isAuthorized()) return false;
    const data = State.data;
    if (!data || !data.patients || data.patients.length === 0) return false;
    const hoy = new Date().toISOString().slice(0, 10);
    if (this._lastUploadDay === hoy) return false;   // ya subimos hoy en esta sesión
    try {
      const folderId = await this._asegurarCarpeta();
      const nombre = `ortopedia_${hoy}.json`;
      // Buscar si ya existe archivo con ese nombre en la carpeta
      const q = encodeURIComponent(`name='${nombre}' and '${folderId}' in parents and trashed=false`);
      const search = await fetch(`https://www.googleapis.com/drive/v3/files?q=${q}&fields=files(id,name)`, {
        headers: { Authorization: 'Bearer ' + this._accessToken }
      });
      if (!search.ok) throw new Error('Error buscando archivo: ' + search.status);
      const searchData = await search.json();
      const fileId = (searchData.files && searchData.files[0]) ? searchData.files[0].id : null;
      const contenido = JSON.stringify({
        appVersion: APP_VERSION,
        creadoPor: getCurrentUser() || '',
        timestamp: Date.now(),
        resumen: Backups._resumen(data),
        data: data
      }, null, 2);
      // Usar Drive upload con multipart para soportar metadatos + contenido
      const boundary = '-------ortopedia_' + Math.random().toString(36).slice(2);
      const metadata = fileId
        ? { name: nombre }   // update no admite parents
        : { name: nombre, parents: [folderId] };
      const body =
        `--${boundary}\r\n` +
        `Content-Type: application/json; charset=UTF-8\r\n\r\n` +
        JSON.stringify(metadata) + `\r\n` +
        `--${boundary}\r\n` +
        `Content-Type: application/json\r\n\r\n` +
        contenido + `\r\n` +
        `--${boundary}--`;
      const url = fileId
        ? `https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=multipart`
        : 'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart';
      const upload = await fetch(url, {
        method: fileId ? 'PATCH' : 'POST',
        headers: {
          Authorization: 'Bearer ' + this._accessToken,
          'Content-Type': 'multipart/related; boundary=' + boundary
        },
        body: body
      });
      if (!upload.ok) {
        const txt = await upload.text();
        throw new Error('Error subiendo a Drive (' + upload.status + '): ' + txt.slice(0, 200));
      }
      this._lastUploadDay = hoy;
      console.log('[DriveBackup] Respaldo subido a Drive:', nombre);
      return true;
    } catch(e) {
      console.warn('[DriveBackup] Error:', e.message || e);
      // Si el token expiró, limpiarlo
      if ((e.message||'').includes('401')) {
        this._accessToken = null;
        this._tokenExpiresAt = 0;
        try { localStorage.removeItem(DRIVE_OAUTH_KEY); } catch(e){}
      }
      throw e;
    }
  },

  // Lista backups en la carpeta de Drive
  async listar() {
    if (!this.isAuthorized()) return [];
    try {
      const folderId = await this._asegurarCarpeta();
      const q = encodeURIComponent(`'${folderId}' in parents and trashed=false and mimeType='application/json'`);
      const resp = await fetch(`https://www.googleapis.com/drive/v3/files?q=${q}&fields=files(id,name,modifiedTime,size)&orderBy=modifiedTime desc&pageSize=60`, {
        headers: { Authorization: 'Bearer ' + this._accessToken }
      });
      if (!resp.ok) throw new Error('Error listando: ' + resp.status);
      const data = await resp.json();
      return data.files || [];
    } catch(e) {
      console.warn('[DriveBackup] Error listando:', e.message || e);
      return [];
    }
  },

  async descargar(fileId) {
    if (!this.isAuthorized()) return null;
    try {
      const resp = await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`, {
        headers: { Authorization: 'Bearer ' + this._accessToken }
      });
      if (!resp.ok) throw new Error('Error descargando: ' + resp.status);
      const json = await resp.json();
      return json.data || json;
    } catch(e) {
      console.warn('[DriveBackup] Error descargando:', e.message || e);
      return null;
    }
  }
};

/* ---------- Analizador y compactador de tamaño (v3.28) ----------
   Cuando el documento se acerca al límite de 1MB de Firestore, esta herramienta
   ayuda a entender qué consume el espacio y ofrece compactaciones controladas.
*/
const SizeAnalyzer = {
  // Tamaño en bytes de cualquier valor serializado a JSON
  _size(v) {
    try { return new Blob([JSON.stringify(v||null)]).size; } catch(e) { return 0; }
  },
  // Análisis completo del tamaño actual
  analizar() {
    const data = State.data || {};
    const totalSize = this._size(data);
    const patientsSize = this._size(data.patients||[]);
    const programasSize = this._size(data.programas||[]);
    const egresosSize = this._size(data.egresos||[]);
    const icSize = this._size(data.interconsultasEntrantes||[]);
    const configSize = this._size(data.config||{});

    // Análisis por paciente
    const pacientes = (data.patients || []).map(p => {
      const histSize = this._size(p.historial||[]);
      const evolSize = this._size(p.evoluciones||[]);
      const labsSize = this._size(p.laboratorios||[]);
      const cirSize = this._size(p.cirugiasRealizadas||[]);
      const icPSize = this._size(p.interconsultas||[]);
      const otrosSize = this._size(p) - histSize - evolSize - labsSize - cirSize - icPSize;
      return {
        id: p.id,
        nombre: p.nombre || '(sin nombre)',
        cama: p.cama || '',
        egresado: !!p.fechaEgreso,
        fechaEgreso: p.fechaEgreso || '',
        totalBytes: this._size(p),
        historialBytes: histSize,
        historialCount: (p.historial||[]).length,
        evolucionesBytes: evolSize,
        evolucionesCount: (p.evoluciones||[]).length,
        laboratoriosBytes: labsSize,
        laboratoriosCount: (p.laboratorios||[]).length,
        cirugiasBytes: cirSize,
        cirugiasCount: (p.cirugiasRealizadas||[]).length,
        interconsultasBytes: icPSize,
        interconsultasCount: (p.interconsultas||[]).length,
        otrosBytes: otrosSize
      };
    }).sort((a,b) => b.totalBytes - a.totalBytes);

    return {
      totalBytes: totalSize,
      patientsBytes: patientsSize,
      programasBytes: programasSize,
      egresosBytes: egresosSize,
      icBytes: icSize,
      configBytes: configSize,
      patientCount: (data.patients||[]).length,
      pacientes
    };
  },

  // Compactar historial: dedup entradas similares + cap a 50 por paciente
  // Retorna {pacientesAfectados, bytesAhorrados, antesBytes, despuesBytes}
  compactarHistorial(maxPorPaciente = 50, applyToEgresados = true, applyToActivos = true) {
    const antes = this._size(State.data.patients||[]);
    let pacientesAfectados = 0;
    (State.data.patients || []).forEach(p => {
      const egresado = !!p.fechaEgreso;
      if (egresado && !applyToEgresados) return;
      if (!egresado && !applyToActivos) return;
      if (!Array.isArray(p.historial) || p.historial.length === 0) return;
      const original = p.historial.length;
      // Deduplicar consecutivos con misma accion + detalle dentro de 5 min
      const dedup = [];
      let ult = null;
      p.historial.forEach(h => {
        if (ult && ult.accion === h.accion && ult.detalle === h.detalle && ult.usuario === h.usuario) {
          // mismo evento → reemplazar timestamp con el más nuevo
          ult.fecha = h.fecha;
        } else {
          dedup.push(h);
          ult = h;
        }
      });
      // Cap a maxPorPaciente (mantener los más recientes)
      if (dedup.length > maxPorPaciente) {
        p.historial = dedup.slice(-maxPorPaciente);
      } else {
        p.historial = dedup;
      }
      if (p.historial.length < original) pacientesAfectados++;
    });
    const despues = this._size(State.data.patients||[]);
    return { pacientesAfectados, bytesAhorrados: antes - despues, antesBytes: antes, despuesBytes: despues };
  },

  // Limpiar campos vacíos del documento (strings vacíos, arrays vacíos, objetos vacíos)
  limpiarCamposVacios() {
    const antes = this._size(State.data);
    const isEmpty = (v) => {
      if (v === null || v === undefined) return true;
      if (typeof v === 'string') return v === '';
      if (Array.isArray(v)) return v.length === 0;
      // No tocar objetos — pueden tener estructura significativa con valores vacíos por convención
      return false;
    };
    let camposLimpiados = 0;
    const limpiar = (obj, ruta) => {
      if (!obj || typeof obj !== 'object') return;
      Object.keys(obj).forEach(k => {
        if (Array.isArray(obj[k])) {
          obj[k].forEach((it, i) => limpiar(it, ruta + '.' + k + '[' + i + ']'));
          return;
        }
        if (obj[k] && typeof obj[k] === 'object') {
          limpiar(obj[k], ruta + '.' + k);
          return;
        }
        // Solo borrar campos de pacientes/programas que sean strings vacíos y no estructurales
        // Lista blanca: estos campos NO se deben borrar aunque estén vacíos
        const camposEstructurales = ['id', 'fechaIngreso', 'fechaEgreso', 'enListaEspera', 'requiereOtraCirugia'];
        if (camposEstructurales.includes(k)) return;
        if (isEmpty(obj[k])) {
          // No borrar — Firestore acepta strings vacíos y son útiles para que la UI los muestre como inputs vacíos
          // En su lugar, podemos eliminarlos sólo si el ahorro es significativo
          // Por seguridad: solo logueamos sin borrar
        }
      });
    };
    (State.data.patients||[]).forEach(p => limpiar(p, 'p'));
    const despues = this._size(State.data);
    return { camposLimpiados, bytesAhorrados: antes - despues, antesBytes: antes, despuesBytes: despues };
  },

  // Mover evoluciones viejas de pacientes egresados a un campo "evolucionesArchivadas"
  // que se exporta pero NO se sincroniza con Firestore (no se incluirá en pushNow)
  // Para esto necesitaríamos modificar pushNow — por ahora, simplemente las truncamos
  // dejando solo las últimas 5 de cada paciente egresado.
  compactarEgresados(mantenerUltimas = 5) {
    const antes = this._size(State.data.patients||[]);
    let pacientesAfectados = 0;
    let evolucionesEliminadas = 0;
    (State.data.patients || []).forEach(p => {
      if (!p.fechaEgreso) return;
      if (!Array.isArray(p.evoluciones) || p.evoluciones.length <= mantenerUltimas) return;
      const originales = p.evoluciones.length;
      // Mantener las últimas N por fecha
      const sorted = p.evoluciones.slice().sort((a,b) => (b.fecha||'').localeCompare(a.fecha||''));
      p.evoluciones = sorted.slice(0, mantenerUltimas).sort((a,b) => (a.fecha||'').localeCompare(b.fecha||''));
      evolucionesEliminadas += (originales - p.evoluciones.length);
      pacientesAfectados++;
    });
    const despues = this._size(State.data.patients||[]);
    return { pacientesAfectados, evolucionesEliminadas, bytesAhorrados: antes - despues, antesBytes: antes, despuesBytes: despues };
  }
};

/* ---------- Sincronización en la nube (Firebase Firestore) ---------- */
const Sync = {
  app: null,
  db: null,
  unsubscribe: null,
  status: 'local',          // 'local' | 'connecting' | 'online' | 'offline' | 'error'
  saveTimeout: null,
  ignoreNextRemote: false,  // para evitar loops cuando recibimos eco propio
  hasReceivedSnapshot: false,  // v3.23: gate de protección — no se puede pushear
                                 // hasta haber confirmado el contenido remoto al menos una vez.
                                 // Esto previene que un dispositivo recién abierto con localStorage
                                 // vacío sobrescriba la base remota con un estado vacío.

  getConfig() {
    // 1. Configuración guardada localmente (override manual)
    try {
      const stored = JSON.parse(localStorage.getItem(FB_CONFIG_KEY) || 'null');
      if (stored && stored.apiKey && stored.projectId) return stored;
    } catch(e) {}
    // 2. Configuración embebida en la app (default — para que todos compartan datos)
    if (EMBEDDED_FB_CONFIG && EMBEDDED_FB_CONFIG.apiKey && EMBEDDED_FB_CONFIG.projectId) {
      return EMBEDDED_FB_CONFIG;
    }
    return null;
  },
  setConfig(cfg) {
    if (cfg) localStorage.setItem(FB_CONFIG_KEY, JSON.stringify(cfg));
    else localStorage.removeItem(FB_CONFIG_KEY);
  },

  /* v3.21: Fusión de configuración remota + local por unión.
     Evita pérdida de usuarios/catálogos cuando dos dispositivos guardan al mismo tiempo.
     Estrategia:
       - Usuarios: unión por nombre (case-insensitive). Los datos remotos ganan en caso de
         match (rol más reciente). Los locales que no están en remoto se preservan.
       - Catálogos de strings (diagnosticos, procedimientos, cirujanos, ubicaciones):
         unión simple por string.
       - Catálogos de objetos (medicamentos, esquemasEgreso, plantillasEvolucion): unión
         por nombre/título.
       - Resto de campos (hospitalNombre, servicio, etc.): el remoto gana. */
  _mergeConfig(localCfg, remoteCfg) {
    if (!remoteCfg || typeof remoteCfg !== 'object') return localCfg || {};
    if (!localCfg || typeof localCfg !== 'object') return remoteCfg;
    const merged = Object.assign({}, remoteCfg);

    // --- usuarios ---
    const lu = Array.isArray(localCfg.usuarios) ? localCfg.usuarios : [];
    const ru = Array.isArray(remoteCfg.usuarios) ? remoteCfg.usuarios : [];
    const setRemoto = new Set(ru.map(u => (u.nombre||'').toLowerCase()));
    const extras = lu.filter(u => !setRemoto.has((u.nombre||'').toLowerCase()));
    merged.usuarios = ru.concat(extras);

    // --- catálogos ---
    const lc = (localCfg.catalogos && typeof localCfg.catalogos === 'object') ? localCfg.catalogos : {};
    const rc = (remoteCfg.catalogos && typeof remoteCfg.catalogos === 'object') ? remoteCfg.catalogos : {};
    const mc = Object.assign({}, rc);
    const unirStrings = (key) => {
      const la = Array.isArray(lc[key]) ? lc[key] : [];
      const ra = Array.isArray(rc[key]) ? rc[key] : [];
      const set = new Set(ra.map(s => (s||'').toLowerCase()));
      const ex = la.filter(s => !set.has((s||'').toLowerCase()));
      mc[key] = ra.concat(ex);
    };
    const unirObjetos = (key, idFn) => {
      const la = Array.isArray(lc[key]) ? lc[key] : [];
      const ra = Array.isArray(rc[key]) ? rc[key] : [];
      const set = new Set(ra.map(o => (idFn(o)||'').toLowerCase()));
      const ex = la.filter(o => !set.has((idFn(o)||'').toLowerCase()));
      mc[key] = ra.concat(ex);
    };
    unirStrings('diagnosticos');
    unirStrings('procedimientos');
    unirStrings('cirujanos');
    unirStrings('ubicaciones');
    unirObjetos('medicamentos', m => m.nombre);
    unirObjetos('esquemasEgreso', e => e.nombre);
    unirObjetos('plantillasEvolucion', t => (typeof t === 'string' ? t : (t.titulo || t.texto || '')));
    merged.catalogos = mc;

    return merged;
  },

  /* Comprueba si el config fusionado tiene ítems extra que el remoto no tenía.
     Si es true, debemos re-publicar el documento para que esos ítems se propaguen. */
  _configDiffersFromRemote(mergedCfg, remoteCfg) {
    if (!mergedCfg || !remoteCfg) return false;
    const lenU = (Array.isArray(mergedCfg.usuarios) ? mergedCfg.usuarios.length : 0);
    const lenRU = (Array.isArray(remoteCfg.usuarios) ? remoteCfg.usuarios.length : 0);
    if (lenU > lenRU) return true;
    const mc = mergedCfg.catalogos || {};
    const rc = remoteCfg.catalogos || {};
    const keys = ['diagnosticos','procedimientos','cirujanos','ubicaciones',
                  'medicamentos','esquemasEgreso','plantillasEvolucion'];
    for (const k of keys) {
      const lenL = (Array.isArray(mc[k]) ? mc[k].length : 0);
      const lenR = (Array.isArray(rc[k]) ? rc[k].length : 0);
      if (lenL > lenR) return true;
    }
    return false;
  },

  setStatus(s, msg) {
    this.status = s;
    const el = document.getElementById('syncStatus');
    const tx = document.getElementById('syncText');
    if (!el) return;
    el.classList.remove('online','offline','local');
    const map = {
      local: ['local', 'Sin nube'],
      connecting: ['', 'Conectando…'],
      online: ['online', 'Sincronizado'],
      offline: ['offline', 'Sin conexión'],
      error: ['offline', msg || 'Error']
    };
    const [cls, label] = map[s] || ['', s];
    if (cls) el.classList.add(cls);
    tx.textContent = label;
  },

  async connect() {
    const cfg = this.getConfig();
    if (!cfg || !cfg.apiKey || !cfg.projectId) {
      this.setStatus('local');
      return false;
    }
    // Esperar a que el SDK de Firebase termine de cargar (con timeout)
    this.setStatus('connecting');
    const start = Date.now();
    while (typeof window.firebase === 'undefined' && Date.now() - start < 10000) {
      await new Promise(r => setTimeout(r, 100));
    }
    if (typeof window.firebase === 'undefined') {
      this.setStatus('error', 'No se pudo cargar Firebase. ¿Hay conexión a internet?');
      return false;
    }
    try {
      // Inicializar app (evitar duplicados)
      if (window.firebase.apps && window.firebase.apps.length > 0) {
        this.app = window.firebase.apps[0];
      } else {
        this.app = window.firebase.initializeApp(cfg);
      }
      this.db = window.firebase.firestore();

      // Persistencia offline (puede fallar en modo incógnito o múltiples pestañas — no es crítico)
      try { await this.db.enablePersistence({ synchronizeTabs: true }); }
      catch(e) { console.warn('Persistencia offline no activa:', e.code || e.message); }

      // v3.30: SHARDING COMPLETO — tres suscripciones independientes:
      //   1. apps/ortopedia (doc): programas, egresos, IC, config (pequeño, acotado)
      //   2. ortopedia_patients (colección): un doc por paciente → capacidad sin tope práctico
      //   3. ortopedia_historial_v2 (colección): un doc por paciente con su historial
      // Cada documento tiene su propio límite de 1MB y se sincronizan independientemente.
      this._patientsCache = {};      // {patientId: patient data} desde la subcolección
      this._historialCache = {};     // {patientId: [entries]} desde la subcolección
      this._initialPatientsLoaded = false;
      this._initialHistorialLoaded = false;
      this._initialMainLoaded = false;

      const refMain = this.db.doc(FB_DOC_PATH);
      const colPatients = this.db.collection(FB_PATIENTS_COL);
      const colHistorial = this.db.collection(FB_HISTORIAL_COL);

      // 1. Documento principal
      this._unsubscribeMain = refMain.onSnapshot(
        (snap) => {
          this.setStatus('online');
          this.hasReceivedSnapshot = true;
          setTimeout(() => { try { CloudBackups.asegurarBackupDeHoy(); } catch(e){} }, 3000);
          setTimeout(() => {
            try { if (DriveBackup.isAuthorized()) DriveBackup.subirBackupDeHoy(); } catch(e){}
          }, 5000);
          if (this._ignoreNextMain) { this._ignoreNextMain = false; return; }
          this._mainSnap = snap.exists ? snap.data() : null;
          this._initialMainLoaded = true;
          // Si el doc tiene patients inline (formato pre-v3.30), correr migración
          if (this._mainSnap && Array.isArray(this._mainSnap.patients) && this._mainSnap.patients.length > 0
              && !this._mainSnap._shardingMigrated) {
            this._migrarASharding();
          }
          this._aplicarSnapshots();
        },
        (err) => {
          console.error('Firestore error (main):', err);
          this.setStatus('error', 'Error: ' + (err.code || err.message || ''));
          alert('Error de Firebase: ' + (err.message || err.code) +
            '\n\nVerifica las reglas de Firestore. Necesitas reglas para apps/ortopedia, ortopedia_patients/* y ortopedia_historial_v2/*.');
        }
      );

      // 2. Colección de pacientes
      this._unsubscribePatients = colPatients.onSnapshot(
        (snap) => {
          if (this._ignoreNextCollections) {
            // los echo de nuestros propios writes pueden generar muchos cambios; ignorar este batch
            // (se resetea en _aplicarSnapshots)
          }
          snap.docChanges().forEach(change => {
            const id = change.doc.id;
            if (change.type === 'added' || change.type === 'modified') {
              this._patientsCache[id] = change.doc.data();
            } else if (change.type === 'removed') {
              delete this._patientsCache[id];
            }
          });
          this._initialPatientsLoaded = true;
          this._aplicarSnapshots();
        },
        (err) => {
          console.error('Firestore error (patients collection):', err);
        }
      );

      // 3. Colección de historial
      this._unsubscribeHistorial = colHistorial.onSnapshot(
        (snap) => {
          snap.docChanges().forEach(change => {
            const id = change.doc.id;
            if (change.type === 'added' || change.type === 'modified') {
              this._historialCache[id] = (change.doc.data().entries || []);
            } else if (change.type === 'removed') {
              delete this._historialCache[id];
            }
          });
          this._initialHistorialLoaded = true;
          this._aplicarSnapshots();
        },
        (err) => {
          console.warn('Firestore error (historial collection):', err);
        }
      );

      this.unsubscribe = () => {
        if (this._unsubscribeMain) this._unsubscribeMain();
        if (this._unsubscribePatients) this._unsubscribePatients();
        if (this._unsubscribeHistorial) this._unsubscribeHistorial();
      };

      window.addEventListener('online', () => { if (this.status==='offline') this.setStatus('online'); });
      window.addEventListener('offline', () => this.setStatus('offline'));
      return true;
    } catch(e) {
      console.error(e);
      this.setStatus('error', e.message);
      alert('No se pudo conectar a Firebase: ' + e.message);
      return false;
    }
  },

  // v3.30: combinar caches del modelo sharded (3 fuentes) en un estado unificado.
  // Esperar a que las TRES suscripciones hayan tenido al menos un evento antes de aplicar,
  // para no procesar estados parciales que vacíen la UI temporalmente.
  _aplicarSnapshots() {
    if (!this._initialMainLoaded) return;
    if (!this._initialPatientsLoaded) return;
    // historial puede tardar más; permitir aplicar sin él (los pacientes simplemente
    // mostrarán historial vacío hasta que llegue, lo cual es seguro).
    const main = this._mainSnap || {};

    // Backward-compat: si main todavía trae patients inline (versión antigua), incluirlos
    const fromMain = Array.isArray(main.patients) ? main.patients : [];
    const fromCache = Object.values(this._patientsCache || {});
    // Merge: la subcolección gana sobre los inline si los IDs colisionan
    const byId = {};
    fromMain.forEach(p => { byId[p.id] = p; });
    fromCache.forEach(p => { byId[p.id] = p; });

    // Adjuntar historial de cada paciente (preferir subcolección, fallback a inline)
    const patientsMerged = Object.values(byId).map(p => {
      const out = Object.assign({}, p);
      const histColeccion = this._historialCache[p.id];
      const histInline = Array.isArray(p.historial) ? p.historial : null;
      out.historial = histColeccion || histInline || [];
      return out;
    });

    const remote = {
      patients: patientsMerged,
      programas: main.programas || [],
      egresos: main.egresos || [],
      interconsultasEntrantes: main.interconsultasEntrantes || [],
      config: main.config || {},
      lastWrite: main.lastWrite
    };
    this._procesarRemote(remote);
  },

  // v3.30: Migración one-time de pacientes inline → subcolección.
  // Se dispara cuando el main doc todavía tiene patients[] no vacío y no está marcado como migrado.
  async _migrarASharding() {
    if (this._migracionEnCurso) return;
    this._migracionEnCurso = true;
    const patientes = (this._mainSnap.patients || []).slice();
    console.log('[Sharding] Iniciando migración de ' + patientes.length + ' pacientes...');
    try {
      // 1. Escribir cada paciente en la subcolección (en lotes de 400 para no exceder batch limit de 500)
      for (let i = 0; i < patientes.length; i += 400) {
        const slice = patientes.slice(i, i + 400);
        const batch = this.db.batch();
        slice.forEach(p => {
          const { historial, ...rest } = p;
          batch.set(this.db.collection(FB_PATIENTS_COL).doc(p.id), rest);
          if (Array.isArray(historial) && historial.length > 0) {
            batch.set(this.db.collection(FB_HISTORIAL_COL).doc(p.id), { entries: historial });
          }
        });
        await batch.commit();
        console.log('[Sharding] Lote ' + Math.floor(i/400 + 1) + ' completado.');
      }
      // 2. Limpiar el main doc — eliminar patients y marcar migrado
      this._ignoreNextMain = true;
      await this.db.doc(FB_DOC_PATH).update({
        patients: [],
        _shardingMigrated: true,
        _migracionTimestamp: Date.now()
      });
      console.log('[Sharding] Migración completada. Patients vaciado del main doc.');
    } catch(e) {
      console.error('[Sharding] Error en migración:', e);
      alert('Error durante la migración a sharding:\n' + e.message + '\n\nLos datos están a salvo (en main doc).');
    } finally {
      this._migracionEnCurso = false;
    }
  },

  _procesarRemote(remote) {
    if (remote && remote.patients) {
            // v3.21: fusionar config (usuarios + catálogos) por unión para evitar
            // pérdida por "last writer wins" cuando varios dispositivos guardan a la vez.
            const remoteCfg = remote.config || {};
            const localCfg = State.data.config || {};
            const mergedConfig = Sync._mergeConfig(localCfg, remoteCfg);
            // Detectar si la fusión añadió algo que no estaba en el remoto;
            // si es así, hay que volver a subir el documento para no perder esos items.
            const needsRepush = Sync._configDiffersFromRemote(mergedConfig, remoteCfg);

            // v3.25 (C3) / v3.27: proteger pacientes editados localmente reciente o abiertos en modal,
            // y excluir los eliminados localmente para que no sean resucitados por el snapshot remoto.
            if (App._cleanupDirty) App._cleanupDirty();
            const localPatientsById = {};
            (State.data.patients || []).forEach(p => { localPatientsById[p.id] = p; });
            const remotePatientsById = {};
            (remote.patients || []).forEach(p => { remotePatientsById[p.id] = p; });
            let pacientesProtegidos = 0;
            let pacientesEliminadosFiltrados = 0;
            let diferidos = [];
            const newPatients = [];
            (remote.patients || []).forEach(rp => {
              // v3.27: si el paciente fue eliminado localmente en los últimos 30s, NO incluirlo
              if (App._isPatientRecentlyDeleted && App._isPatientRecentlyDeleted(rp.id)) {
                pacientesEliminadosFiltrados++;
                return;
              }
              if (App._isPatientDirty && App._isPatientDirty(rp.id)) {
                const local = localPatientsById[rp.id];
                if (local) {
                  pacientesProtegidos++;
                  if (JSON.stringify(local) !== JSON.stringify(rp)) {
                    if (App._pendingRemoteRefresh) App._pendingRemoteRefresh[rp.id] = rp;
                    diferidos.push(rp.id);
                  }
                  newPatients.push(local);   // preservar versión local
                  return;
                }
              }
              newPatients.push(rp);
            });
            // Pacientes locales que NO están en remoto y son dirty: preservarlos también
            // (probablemente recién creados localmente)
            (State.data.patients || []).forEach(local => {
              if (!remotePatientsById[local.id] && App._isPatientDirty && App._isPatientDirty(local.id)) {
                newPatients.push(local);
                pacientesProtegidos++;
              }
            });

            const newState = {
              patients: newPatients,
              programas: remote.programas || [],
              egresos: remote.egresos || [],
              interconsultasEntrantes: remote.interconsultasEntrantes || [],
              config: mergedConfig,
              lastWrite: remote.lastWrite
            };
            const localStr = JSON.stringify(State.data);
            const newStr = JSON.stringify(newState);
            if (localStr !== newStr) {
              State.data = newState;
              // v3.24 (H10): NO auto-recuperar usuarios al recibir snapshot —
              // el dispositivo originante ya lo hizo o lo va a hacer. Evita write-storm.
              State._migrar({ recoverUsers: false });
              try { localStorage.setItem(STORAGE_KEY, JSON.stringify(State.data)); } catch(e){}
              if (App.render) App.render();
              // v3.25 (C3): si hay un paciente dirty con cambios remotos diferidos,
              // mostrar banner sutil en el modal pero NO re-renderizar (no interrumpir edición).
              if (App._currentModalId && State.data.patients.some(p=>p.id===App._currentModalId)) {
                const tieneDiferidos = diferidos.includes(App._currentModalId);
                if (tieneDiferidos) {
                  if (App._showDeferredBanner) App._showDeferredBanner(App._currentModalId);
                } else {
                  // El paciente abierto no fue tocado por el snapshot (o no era dirty) → re-render normal
                  if (!App._isPatientDirty(App._currentModalId, 1500)) {
                    App.renderModal(App._currentModalId);
                  }
                }
              } else if (App._currentModalId) {
                App.closeModal();
              }
            }
            // NOTA (C3): NO se hace scheduleSave por pacientesProtegidos. La versión local
            // del paciente dirty se conserva por ahora; cuando el usuario haga su próxima
            // edición, State.save() naturalmente disparará el push. Esto deja una ventana
            // donde cambios remotos para pacientes dirty pueden perderse en el siguiente push,
            // pero es el trade-off necesario para no interrumpir la edición.
            // Si la fusión recuperó usuarios/catálogos locales (de ANTES del snapshot),
            // re-publicar para propagarlos.
            if (needsRepush) {
              this.scheduleSave();
            }
    } else {
      // No hay documento principal todavía — subir lo que tenemos localmente
      this.pushNow();
    }
  },

  scheduleSave() {
    if (!this.db) return;
    if (this.saveTimeout) clearTimeout(this.saveTimeout);
    this.saveTimeout = setTimeout(() => this.pushNow(), 400);
  },

  // v3.24 (C5): retry controlado con un solo timer, backoff exponencial y tope máximo.
  _retryTimer: null,
  _retryAttempt: 0,
  _retryMax: 30,
  _scheduleRetry() {
    if (this._retryTimer) clearTimeout(this._retryTimer);
    this._retryAttempt++;
    if (this._retryAttempt > this._retryMax) {
      console.error('[Sync] Máximo de reintentos alcanzado. Esperando intervención manual.');
      this.setStatus('error', 'Reintentos agotados');
      if (!this._errorShownThisSession) {
        this._errorShownThisSession = true;
        alert('La app no logró conectarse a la nube después de ' + this._retryMax + ' intentos.\n\n' +
          'Tus cambios están seguros en este dispositivo (y en los respaldos locales).\n' +
          'Recarga la página (Ctrl+Shift+R) cuando tengas conexión estable.');
      }
      return;
    }
    // Backoff exponencial con tope de 30s: 1s, 2s, 4s, 8s, 16s, 30s, 30s, ...
    const delay = Math.min(30000, 1000 * Math.pow(2, this._retryAttempt - 1));
    this._retryTimer = setTimeout(() => this.pushNow(), delay);
  },
  _clearRetry() {
    if (this._retryTimer) { clearTimeout(this._retryTimer); this._retryTimer = null; }
    this._retryAttempt = 0;
  },

  async pushNow() {
    if (!this.db) return;
    if (!this.hasReceivedSnapshot) {
      console.warn('[Sync] Push bloqueado: aún no se ha recibido el primer snapshot. Reintento programado.');
      this._scheduleRetry();
      return;
    }
    try {
      // v3.30: Push DELTA. Solo se escriben pacientes/historiales que cambiaron
      // respecto a la caché remota. Más main doc con programas/egresos/IC/config.

      const now = Date.now();
      const localPatients = State.data.patients || [];

      // Main payload — datos pequeños/acotados (sin pacientes)
      const mainPayload = {
        // Mantener patients vacío para compatibilidad de lectura — la subcolección es la fuente real
        patients: [],
        programas: State.data.programas || [],
        egresos: State.data.egresos || [],
        interconsultasEntrantes: State.data.interconsultasEntrantes || [],
        config: State.data.config || {},
        lastWrite: now,
        _shardingMigrated: true
      };

      // Diff pacientes: comparar local con _patientsCache (versión más reciente recibida)
      const cache = this._patientsCache || {};
      const histCache = this._historialCache || {};
      const writes = [];   // [{type, ref, data}] para batchear
      const localIds = new Set();
      localPatients.forEach(p => {
        localIds.add(p.id);
        const { historial, ...rest } = p;
        // Comparar con caché remota; si difiere, escribir
        const cached = cache[p.id];
        const restStr = JSON.stringify(rest);
        const cachedStr = cached ? JSON.stringify(cached) : null;
        if (cachedStr !== restStr) {
          writes.push({
            type: 'set',
            ref: this.db.collection(FB_PATIENTS_COL).doc(p.id),
            data: rest
          });
        }
        // Historial separado
        const histLocal = Array.isArray(historial) ? historial : [];
        const histCached = Array.isArray(histCache[p.id]) ? histCache[p.id] : [];
        if (JSON.stringify(histLocal) !== JSON.stringify(histCached)) {
          if (histLocal.length > 0) {
            writes.push({
              type: 'set',
              ref: this.db.collection(FB_HISTORIAL_COL).doc(p.id),
              data: { entries: histLocal }
            });
          } else {
            writes.push({
              type: 'delete',
              ref: this.db.collection(FB_HISTORIAL_COL).doc(p.id)
            });
          }
        }
      });
      // Pacientes que están en cache pero NO en local → eliminados
      Object.keys(cache).forEach(id => {
        if (!localIds.has(id)) {
          writes.push({ type: 'delete', ref: this.db.collection(FB_PATIENTS_COL).doc(id) });
          if (histCache[id]) {
            writes.push({ type: 'delete', ref: this.db.collection(FB_HISTORIAL_COL).doc(id) });
          }
        }
      });

      // Chequeo de tamaño por paciente individual (cada documento tiene su 1MB)
      const limiteHardPorDoc = 1040000;
      let pacientesGrandes = [];
      writes.forEach(w => {
        if (w.type === 'set' && w.data) {
          const sz = new Blob([JSON.stringify(w.data)]).size;
          if (sz > limiteHardPorDoc) {
            pacientesGrandes.push({ id: w.ref.id, kb: Math.round(sz/1024) });
          }
        }
      });
      if (pacientesGrandes.length > 0) {
        if (!this._sizeWarningShown) {
          this._sizeWarningShown = true;
          alert('⚠ Hay paciente(s) que individualmente exceden 1 MB:\n\n' +
                pacientesGrandes.map(p => '  • ' + p.id + ': ' + p.kb + ' KB').join('\n') +
                '\n\nUsa la herramienta de compactación (engrane → Análisis de tamaño) para reducirlos.');
        }
        // No abortamos el push entero — Firestore rechazará solo los grandes, el resto pasa
      }

      State.data.lastWrite = now;

      // Marcar todos los echo para ignorar
      this._ignoreNextMain = true;

      // Aplicar writes en lotes de 400
      let writtenCount = 0;
      for (let i = 0; i < writes.length; i += 400) {
        const slice = writes.slice(i, i + 400);
        const batch = this.db.batch();
        slice.forEach(w => {
          if (w.type === 'set') batch.set(w.ref, w.data);
          else if (w.type === 'delete') batch.delete(w.ref);
        });
        await batch.commit();
        writtenCount += slice.length;
      }
      // Main doc (siempre)
      await this.db.doc(FB_DOC_PATH).set(mainPayload);

      if (writtenCount > 0) {
        console.log('[Sync] Push delta:', writtenCount, 'documento(s) actualizado(s)');
      }
      this.setStatus('online');
      this._clearRetry();
    } catch(e) {
      console.error('Error guardando en la nube:', e);
      this._ignoreNextMain = false;
      if (!navigator.onLine) {
        this.setStatus('offline');
      } else {
        this.setStatus('error', 'Error al guardar');
        // Mostrar aviso visible (una sola vez por sesión para no spamear)
        if (!this._errorShownThisSession) {
          this._errorShownThisSession = true;
          alert('No se pudo guardar el último cambio en la nube.\n\n' +
            'Detalle: ' + (e.message || e.code || 'desconocido') + '\n\n' +
            'Tus cambios sí están guardados localmente. Cuando se restablezca la conexión o se corrija el error, sincronizarán automáticamente.\n\n' +
            'Si esto ocurre seguido, exporta un respaldo desde el botón "Exportar".');
        }
      }
      // Programar retry si todavía hay esperanza (online, dentro del max)
      if (navigator.onLine) this._scheduleRetry();
    }
  },

  disconnect() {
    if (this.unsubscribe) { try { this.unsubscribe(); } catch(e){} this.unsubscribe = null; }
    if (this.saveTimeout) { clearTimeout(this.saveTimeout); this.saveTimeout = null; }
    this._clearRetry();
    this.app = null; this.db = null;
    this.hasReceivedSnapshot = false;
    this._mainSnap = null;
    this._patientsCache = {};
    this._historialCache = {};
    this._initialPatientsLoaded = false;
    this._initialHistorialLoaded = false;
    this._initialMainLoaded = false;
    this._ignoreNextMain = false;
    this.setStatus('local');
  }
};

/* ---------- Estado y persistencia ---------- */
const State = {
  data: { patients: [] },
  currentTab: 'lista',
  search: '',
  filterType: 'todos',  // todos | listos | postop | infeccion | hoy | sinprog | misPacientes
  sortBy: 'cama',       // cama | dih
  sortDir: 'asc',       // asc | desc
  // Rango de fechas para Reportes
  reporteDesde: '',     // YYYY-MM-DD vacío = sin filtro inferior
  reporteHasta: '',     // YYYY-MM-DD vacío = sin filtro superior
  load() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) this.data = JSON.parse(raw);
    } catch(e) { console.warn('No se pudo cargar datos', e); }
    if (!this.data.patients) this.data.patients = [];
    if (!this.data.programas) this.data.programas = [];
    if (!this.data.egresos) this.data.egresos = [];
    if (!this.data.interconsultasEntrantes) this.data.interconsultasEntrantes = [];
    this._migrar();
  },
  // Migrar datos antiguos al nuevo formato y sembrar catálogos si faltan.
  // v3.24 (H10): el parámetro opts.recoverUsers controla si se hace auto-recuperación de usuarios
  // desde firmas (solo conviene en la carga inicial e imports — NO en cada snapshot recibido,
  // para evitar write-storms donde 5 dispositivos publican lo mismo simultáneamente).
  _migrar(opts) {
    opts = opts || {};
    const recoverUsers = (opts.recoverUsers !== false);
    const data = this.data;

    // Asegurar config y catálogos. Esto corre tanto al cargar como cuando
    // llegan datos remotos, así que protege los catálogos de ser borrados
    // por una sincronización con un dispositivo que tenga versión vieja.
    if (!data.config) {
      data.config = { hospitalNombre: '', servicio: 'Ortopedia', jefeServicio: '', direccion: '', telefono: '', usuarios: [] };
    }
    if (!data.config.usuarios) data.config.usuarios = [];
    if (!data.config.catalogos) data.config.catalogos = {};
    const cats = data.config.catalogos;
    if (!cats.diagnosticos) cats.diagnosticos = [];
    if (!cats.procedimientos) cats.procedimientos = [];
    if (!cats.medicamentos) cats.medicamentos = [];
    if (!cats.esquemasEgreso) cats.esquemasEgreso = [];
    if (!cats.cirujanos) cats.cirujanos = [];
    if (!cats.ubicaciones) cats.ubicaciones = [];
    if (!cats.plantillasEvolucion) cats.plantillasEvolucion = [];
    // Sembrar con valores por defecto si nunca se sembraron en este servidor.
    // El flag _seeded evita re-sembrar si el usuario borró ítems intencionalmente.
    if (!data.config._seeded) {
      if (cats.diagnosticos.length === 0) cats.diagnosticos = SEED_DIAGNOSTICOS.slice();
      if (cats.procedimientos.length === 0) cats.procedimientos = SEED_PROCEDIMIENTOS.slice();
      if (cats.medicamentos.length === 0) cats.medicamentos = SEED_MEDICAMENTOS.map(m => ({...m}));
      if (cats.esquemasEgreso.length === 0) cats.esquemasEgreso = SEED_ESQUEMAS_EGRESO.map(e => ({...e}));
      if (cats.cirujanos.length === 0) cats.cirujanos = SEED_CIRUJANOS.slice();
      if (cats.ubicaciones.length === 0) cats.ubicaciones = SEED_UBICACIONES.slice();
      if (cats.plantillasEvolucion.length === 0) cats.plantillasEvolucion = SEED_PLANTILLAS_EVOLUCION.slice();
      data.config._seeded = true;
    }
    // Para usuarios que ya estaban en el sistema sin ubicaciones/plantillas, sembrarlas si vacío
    if (cats.ubicaciones.length === 0) cats.ubicaciones = SEED_UBICACIONES.slice();
    if (cats.plantillasEvolucion.length === 0) cats.plantillasEvolucion = SEED_PLANTILLAS_EVOLUCION.slice();
    if (!data.config.jefeServicio) data.config.jefeServicio = 'Dr. Franklin Carrillo';
    if (data.config.archivoMesesAntiguedad === undefined) data.config.archivoMesesAntiguedad = 6;

    // v3.22: Auto-recuperar usuarios desde las firmas de los datos.
    // v3.24 (H5): normalizar para evitar duplicados por variantes ("Dr. Juan" vs "Dr Juan" vs "Juan").
    // v3.24 (H10): solo correr si recoverUsers es true (no en cada snapshot — evita write-storm).
    if (recoverUsers) (function autoRecuperarUsuarios() {
      const ignorar = new Set(['', '(sin identificar)', 'sin identificar']);
      // Normalizar: minúsculas, sin diacríticos, sin prefijos (Dr/Dra/Lic/Sr/Sra), un solo espacio
      const normalizar = (s) => {
        if (!s || typeof s !== 'string') return '';
        let n = s.trim().toLowerCase();
        // Quitar diacríticos: NFD descompone, regex saca combining marks
        n = n.normalize('NFD').replace(/[̀-ͯ]/g, '');
        // Quitar prefijos comunes al inicio
        n = n.replace(/^(dr\.?|dra\.?|doctor|doctora|lic\.?|sr\.?|sra\.?|tec\.?|t\.?n\.?|t\.?o\.?|enfermera|enfermero)\s+/i, '');
        // Colapsar espacios
        n = n.replace(/\s+/g, ' ').trim();
        return n;
      };
      const yaCentral = new Set((data.config.usuarios||[]).map(u => normalizar(u.nombre)));
      const candidatos = new Map();   // claveNormalizada -> nombreOriginal (primera ocurrencia)
      const considerar = (nombre) => {
        if (!nombre || typeof nombre !== 'string') return;
        const limpio = nombre.trim();
        if (!limpio) return;
        if (ignorar.has(limpio.toLowerCase())) return;
        const clave = normalizar(limpio);
        if (!clave) return;
        if (yaCentral.has(clave)) return;
        if (!candidatos.has(clave)) candidatos.set(clave, limpio);
      };
      (data.patients||[]).forEach(p => {
        considerar(p.creadoPor);
        (p.historial||[]).forEach(h => considerar(h.usuario));
        (p.evoluciones||[]).forEach(e => considerar(e.autor));
      });
      (data.interconsultasEntrantes||[]).forEach(ic => considerar(ic.creadoPor));
      (data.egresos||[]).forEach(eg => {
        considerar(eg.creadoPor);
        if (eg.verificadoStaff && eg.verificadoStaff.staffNombre) {
          considerar(eg.verificadoStaff.staffNombre);
        }
      });
      candidatos.forEach(nombre => {
        data.config.usuarios.push({ nombre, rol: 'residente', autoRecuperado: true });
      });
    })();

    data.patients.forEach(p => {
      // Defaults para nuevos campos (v3.8) — pacientes anteriores no los tenían
      if (p.ubicacion === undefined) p.ubicacion = '';
      if (p.enListaEspera === undefined) p.enListaEspera = false;
      if (p.fechaListaEspera === undefined) p.fechaListaEspera = '';
      if (p.prioridadListaEspera === undefined) p.prioridadListaEspera = 'normal';
      if (p.notasListaEspera === undefined) p.notasListaEspera = '';
      if (p.hospitalizacionesPrevias === undefined) p.hospitalizacionesPrevias = '';
      if (p.traumatismosPrevios === undefined) p.traumatismosPrevios = '';
      if (p.usaAditamentos === undefined) p.usaAditamentos = '';
      if (!p.sustancias) {
        p.sustancias = {
          alcoholismo: { activo:false, detalle:'' },
          tabaquismo: { activo:false, detalle:'' },
          drogas: { activo:false, detalle:'' }
        };
      }
      if (!p.curaciones) p.curaciones = { requiere:false, frecuencia:'', ultimaFecha:'', notas:'' };
      if (!p.tpn) p.tpn = { activa:false, fechaInicio:'', ultimoCambio:'', ubicacion:'', presion:'', notas:'' };
      if (!p.evoluciones) p.evoluciones = [];

      // Migrar cirugía única legacy → array cirugiasRealizadas
      if (!p.cirugiasRealizadas) p.cirugiasRealizadas = [];
      if (p.cirugia && p.cirugia.realizada && p.cirugia.fecha && p.cirugiasRealizadas.length === 0) {
        p.cirugiasRealizadas.push({
          fecha: p.cirugia.fecha,
          procedimiento: p.cirugia.procedimiento || '',
          lateralidad: p.cirugia.lateralidad || '',
          cirujano: p.cirugia.cirujano || '',
          programaId: p.cirugia.programaId || '',
          quirofano: '',
          notas: p.cirugia.notas || ''
        });
      }
      if (p.requiereOtraCirugia === undefined) p.requiereOtraCirugia = false;

      // Migración v3.20: evaluación preop tipificada
      if (p.estudios && p.estudios.evaluacionPreop) {
        const ep = p.estudios.evaluacionPreop;
        if (ep.estado === undefined) {
          // Mapear modelo viejo: realizado=true → apto sin condiciones, false → pendiente
          ep.estado = ep.realizado ? 'apto' : 'pendiente';
        }
        if (!Array.isArray(ep.pendientes)) ep.pendientes = [];
        if (ep.fechaSolicitud === undefined) ep.fechaSolicitud = '';
      }

      if (p.programaQx && p.programaQx.programado && !p._migratedToPrograma) {
        const fecha = p.programaQx.fechaProgramada || todayISO();
        let prog = data.programas.find(pg => pg.fecha === fecha);
        if (!prog) {
          prog = nuevoPrograma(fecha);
          data.programas.push(prog);
        }
        if (!prog.pacientes.find(e => e.pacienteId === p.id)) {
          const entrada = nuevaEntradaPrograma(p.id, p.programaQx);
          // Estado realizado en legacy → marcar operado y mover a cirugia
          if (p.programaQx.estado === 'realizado') {
            entrada.operado = true;
            getCirugia(p).realizada = true;
            getCirugia(p).fecha = p.programaQx.fechaRealizado || fecha;
            getCirugia(p).procedimiento = p.programaQx.procedimiento || '';
            getCirugia(p).lateralidad = p.programaQx.lateralidad || '';
            getCirugia(p).cirujano = p.programaQx.medicoCargo || p.cirujano || '';
            getCirugia(p).programaId = prog.id;
          } else if (p.programaQx.estado === 'suspendido') {
            entrada.operado = false;
            entrada.motivoNoOperado = 'Suspendido (migrado)';
          }
          prog.pacientes.push(entrada);
        }
        p._migratedToPrograma = true;
      }
    });
  },
  save() {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(this.data)); }
    catch(e) { alert('Error al guardar localmente: ' + e.message); }
    // v3.23: snapshot local rotativo (debounced) para poder restaurar ante pérdida súbita
    State._scheduleBackup();
    Sync.scheduleSave();
  },
  // Debounce de backups para no escribir localStorage en cada keystroke
  _backupTimeout: null,
  _scheduleBackup() {
    if (State._backupTimeout) clearTimeout(State._backupTimeout);
    State._backupTimeout = setTimeout(() => {
      // No guardar backups de datos vacíos (estado inicial sin patients)
      if ((State.data.patients||[]).length === 0
          && (State.data.programas||[]).length === 0
          && (State.data.egresos||[]).length === 0) return;
      Backups.guardar(State.data);
    }, 2000);
  }
};

/* ---------- Lógica clínica ---------- */
// Reemplaza la lógica anterior que sólo verificaba si el campo estaba vacío.
// Ahora también detecta "niega", "no", "ninguno", "sin app", etc. como SANO.
function tieneAntecedentes(p) {
  if (!p.antecedentesPatologicos || !p.antecedentesPatologicos.trim()) return false;
  return !esSano(p);
}

function estudiosBasicos(p) {
  return ['rxTorax','hemograma','tiemposCoagulacion','quimicaSanguinea']
    .every(k => p.estudios[k] && p.estudios[k].realizado);
}

function estudiosCompletos(p) {
  return estudiosBasicos(p)
    && p.estudios.ekg.realizado
    && preopHabilitaCirugia(getEvalPreop(p));
}

function tieneContraindicacion(p) {
  const c = p.contraindicaciones || {};
  return c.malEstadoGeneral || c.malEstadoTejidos || (c.otra && c.otra.trim().length > 0);
}

/**
 * Helpers de evaluación preoperatoria (v3.20)
 */
function getEvalPreop(p) {
  if (!p.estudios) return null;
  const ep = p.estudios.evaluacionPreop;
  if (!ep) return null;
  if (!ep.estado) ep.estado = ep.realizado ? 'apto' : 'pendiente';
  if (!Array.isArray(ep.pendientes)) ep.pendientes = [];
  return ep;
}
function preopPendientesFaltan(ep) {
  if (!ep || !Array.isArray(ep.pendientes)) return 0;
  return ep.pendientes.filter(x => !x.cumplido).length;
}
function preopEstadoLabel(estado) {
  const def = PREOP_ESTADOS.find(e => e.v === estado);
  return def ? def.label : estado;
}
function preopEstadoCls(estado) {
  const def = PREOP_ESTADOS.find(e => e.v === estado);
  return def ? def.cls : 'gray';
}
/**
 * ¿La evaluación preop es válida para considerar al paciente apto?
 * - 'apto'             → siempre sí
 * - 'apto_condicional' → sólo si todos los pendientes están cumplidos
 * - resto              → no
 */
function preopHabilitaCirugia(ep) {
  if (!ep) return false;
  if (ep.estado === 'apto') return true;
  if (ep.estado === 'apto_condicional') return preopPendientesFaltan(ep) === 0;
  return false;
}

/**
 * Devuelve { listo: bool, motivo: string, faltantes: [strings] }
 */
function evaluarAptoCirugia(p) {
  // Datos básicos del paciente: sin nombre o cédula no se programa nada
  if (!p.nombre || !p.nombre.trim() || !p.cedula || !p.cedula.trim()) {
    return { listo:false, motivo:'Faltan datos básicos del paciente (nombre o cédula)', faltantes:['Datos básicos'] };
  }
  // Si ya fue operado y NO tiene marcado "requiere otra cirugía", no es candidato
  const ult = ultimaCirugia(p);
  if (ult && !p.requiereOtraCirugia) {
    return { listo:false, operado:true, motivo:'Ya operado el ' + fmtDate(ult.fecha), faltantes:[] };
  }
  const edad = parseInt(p.edad, 10);
  const faltantes = [];
  if (!edad || isNaN(edad)) {
    return { listo:false, motivo:'Falta registrar edad', faltantes:['Edad'] };
  }

  if (tieneContraindicacion(p)) {
    const motivos = [];
    if (p.contraindicaciones.malEstadoGeneral) motivos.push('mal estado general');
    if (p.contraindicaciones.malEstadoTejidos) motivos.push('mal estado de tejidos blandos');
    if (p.contraindicaciones.otra) motivos.push(p.contraindicaciones.otra);
    return { listo:false, motivo:'Contraindicación: ' + motivos.join(', '), faltantes:[] };
  }

  // Regla: paciente sano (sin APP / "niega") con < 60 años → solo básicos.
  // Paciente sano con ≥ 60 años → básicos + EKG + eval preop.
  // Paciente con antecedentes → siempre básicos + EKG + eval preop.
  const requiereCompletos = (edad >= 60) || tieneAntecedentes(p);

  if (!p.estudios.rxTorax.realizado) faltantes.push('Rx tórax');
  if (!p.estudios.hemograma.realizado) faltantes.push('Hemograma');
  if (!p.estudios.tiemposCoagulacion.realizado) faltantes.push('Tiempos coagulación');
  if (!p.estudios.quimicaSanguinea.realizado) faltantes.push('Química sanguínea');
  if (requiereCompletos) {
    if (!p.estudios.ekg.realizado) faltantes.push('EKG');
  }

  // Evaluación preoperatoria tipificada (v3.20)
  const ep = getEvalPreop(p);
  let preopBloquea = null;
  if (requiereCompletos) {
    if (!ep || ep.estado === 'pendiente') {
      faltantes.push('Solicitar eval. preop. M.I./M.F./Geriatría');
    } else if (ep.estado === 'solicitada') {
      faltantes.push('Esperando respuesta de eval. preop.');
    } else if (ep.estado === 'apto_condicional') {
      const faltan = preopPendientesFaltan(ep);
      if (faltan > 0) {
        faltantes.push(`Eval. preop apta con ${faltan} pendiente(s) por cumplir`);
      }
    } else if (ep.estado === 'no_apto_temporal') {
      preopBloquea = 'No apto temporalmente por evaluación preoperatoria';
    } else if (ep.estado === 'no_apto') {
      preopBloquea = 'No apto por evaluación preoperatoria';
    }
  }

  if (preopBloquea) {
    return { listo:false, motivo: preopBloquea, faltantes, preopEstado: ep ? ep.estado : 'pendiente' };
  }
  if (faltantes.length === 0) {
    return {
      listo:true,
      motivo: requiereCompletos ? 'Preop completo' : 'Estudios básicos completos',
      faltantes:[],
      preopEstado: ep ? ep.estado : 'pendiente'
    };
  }
  return { listo:false, motivo:'Faltan estudios', faltantes, preopEstado: ep ? ep.estado : 'pendiente' };
}

/**
 * Detecta si el paciente tiene diagnóstico de infección.
 */
function tieneInfeccion(p) {
  if (!p.diagnosticos) return false;
  const re = /infecc|infect|osteomielitis|absceso|celulitis|sepsis|piomi/i;
  return p.diagnosticos.some(d => re.test(d));
}

/**
 * Calcula alertas activas para el paciente.
 */
function calcularAlertasPaciente(p) {
  const alertas = [];
  const dias = daysBetween(p.fechaIngreso);

  // 1. Recordatorio 7 días para infección
  if (tieneInfeccion(p) && dias >= 7) {
    const ultimoControl = (p.controlInfeccion || []).slice().sort((a,b)=>b.fecha.localeCompare(a.fecha))[0];
    const diasUltimo = ultimoControl ? daysBetween(ultimoControl.fecha) : dias;
    if (!ultimoControl || diasUltimo >= 7) {
      alertas.push({
        tipo:'red',
        texto:`Diagnóstico de infección con ${dias} días de hospitalización. Repetir Rx y exámenes de control de infección (último: ${ultimoControl ? fmtDate(ultimoControl.fecha) : 'ninguno'}).`
      });
    }
  }

  // 2. Interconsultas pendientes >2 días
  (p.interconsultas || []).forEach(ic => {
    if (!ic.respondida) {
      const d = daysBetween(ic.fechaSolicitud);
      if (d >= 2) {
        alertas.push({
          tipo:'yellow',
          texto:`Interconsulta a ${ic.servicio} solicitada hace ${d} día(s) sin respuesta.`
        });
      }
    }
  });

  // 2b. Evaluación preoperatoria solicitada hace >3 días sin respuesta
  const ep = getEvalPreop(p);
  if (ep && ep.estado === 'solicitada' && ep.fechaSolicitud) {
    const d = daysBetween(ep.fechaSolicitud);
    if (d >= 3) {
      alertas.push({
        tipo:'yellow',
        texto:`Evaluación preoperatoria${ep.especialidad?' a '+ep.especialidad:''} solicitada hace ${d} día(s) sin respuesta.`
      });
    }
  }

  // 2c. Apto con condiciones: pendientes derivados sin cumplir
  if (ep && ep.estado === 'apto_condicional') {
    const faltan = preopPendientesFaltan(ep);
    if (faltan > 0) {
      alertas.push({
        tipo:'yellow',
        texto:`Apto con condiciones: ${faltan} pendiente(s) por cumplir antes de cirugía.`
      });
    }
  }
  if (ep && (ep.estado === 'no_apto_temporal' || ep.estado === 'no_apto')) {
    alertas.push({
      tipo:'red',
      texto:`Evaluación preoperatoria: ${preopEstadoLabel(ep.estado)}.`
    });
  }

  // 3. Listo para cirugía
  const apto = evaluarAptoCirugia(p);
  if (apto.listo) {
    alertas.push({
      tipo:'green',
      texto:`Paciente listo para cirugía (${apto.motivo}).`
    });
  }

  // 4. Hospitalización prolongada
  if (dias >= 14) {
    alertas.push({
      tipo:'yellow',
      texto:`Hospitalización prolongada: ${dias} días.`
    });
  }

  return alertas;
}

/* ---------- Historial ---------- */
function logCambio(p, accion, detalle='') {
  if (!p.historial) p.historial = [];
  const usuario = getCurrentUser() || '(sin identificar)';
  // v3.24 (H1): coalescer entradas consecutivas del mismo (usuario, accion) en ventana de 5 min.
  // Esto evita que cada keystroke genere su propia entrada (ej. al teclear el nombre de un paciente
  // letra por letra). La entrada existente se actualiza con el detalle más reciente y la nueva fecha.
  const ultimo = p.historial.length > 0 ? p.historial[p.historial.length-1] : null;
  if (ultimo &&
      ultimo.usuario === usuario &&
      ultimo.accion === accion &&
      Date.now() - new Date(ultimo.fecha).getTime() < 5 * 60 * 1000) {
    ultimo.fecha = new Date().toISOString();
    ultimo.detalle = detalle;
    return;
  }
  p.historial.push({
    fecha: new Date().toISOString(),
    usuario,
    accion,
    detalle
  });
  // mantener solo últimos 200
  // v3.28: cap más conservador (era 200) para limitar crecimiento del documento
  if (p.historial.length > 100) p.historial = p.historial.slice(-100);
}
