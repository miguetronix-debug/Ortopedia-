<style>
  /* ---------- Reset & base ---------- */
  :root {
    --bg: #f3f5f8;
    --card: #ffffff;
    --card-alt: #f9fafb;
    --text: #1f2937;
    --text-soft: #374151;
    --muted: #6b7280;
    --border: #d1d5db;
    --border-soft: #e5e7eb;
    --accent: #0f4c75;
    --accent-grad: linear-gradient(135deg, #0f4c75, #3282b8);
    --input-bg: #ffffff;
    --shadow: rgba(0,0,0,.06);
    --shadow-strong: rgba(0,0,0,.12);
    --hover: #eef2f7;
    --hover-strong: #e5e7eb;
    --th-bg: #f1f5f9;
    --pre-text: #475569;
  }
  body.dark {
    --bg: #0f172a;
    --card: #1e293b;
    --card-alt: #273449;
    --text: #e2e8f0;
    --text-soft: #cbd5e1;
    --muted: #94a3b8;
    --border: #475569;
    --border-soft: #334155;
    --accent: #3b82f6;
    --accent-grad: linear-gradient(135deg, #1e3a8a, #3b82f6);
    --input-bg: #0f172a;
    --shadow: rgba(0,0,0,.4);
    --shadow-strong: rgba(0,0,0,.5);
    --hover: #334155;
    --hover-strong: #475569;
    --th-bg: #273449;
    --pre-text: #cbd5e1;
  }
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 15px;
    line-height: 1.45;
    -webkit-font-smoothing: antialiased;
    transition: background .2s, color .2s;
  }
  h1, h2, h3, h4 { margin: 0 0 .5em; line-height: 1.2; }
  h1 { font-size: 1.25rem; }
  h2 { font-size: 1.1rem; color: #0f4c75; }
  h3 { font-size: 1rem; color: #0f4c75; }
  h4 { font-size: .9rem; color: #374151; text-transform: uppercase; letter-spacing: .04em; }
  a { color: #0f4c75; }
  button { font: inherit; cursor: pointer; }

  /* ---------- App shell ---------- */
  header.appbar {
    background: linear-gradient(135deg, #0f4c75, #3282b8);
    color: white;
    padding: 12px 16px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 6px rgba(0,0,0,.12);
  }
  .appbar-row {
    display: flex; align-items: center; justify-content: space-between; gap: 8px; flex-wrap: wrap;
  }
  .appbar-title { font-weight: 600; font-size: 1.05rem; }
  .appbar-sub { font-size: .8rem; opacity: .9; }
  nav.tabs {
    display: flex; flex-wrap: wrap; gap: 4px;
    background: #0f4c75;
    padding: 0 8px;
    overflow-x: auto;
    scrollbar-width: none;
    position: sticky;
    top: 64px;
    z-index: 99;
  }
  nav.tabs::-webkit-scrollbar { display: none; }
  nav.tabs button {
    background: transparent;
    border: none;
    color: #cfe3f3;
    padding: 12px 14px;
    font-size: .9rem;
    border-bottom: 3px solid transparent;
    white-space: nowrap;
  }
  nav.tabs button.active {
    color: white;
    border-bottom-color: #ffd166;
    font-weight: 600;
  }
  nav.tabs .badge {
    display: inline-block;
    background: #e63946;
    color: white;
    font-size: .7rem;
    border-radius: 10px;
    padding: 1px 7px;
    margin-left: 5px;
    font-weight: 700;
  }

  main { padding: 16px; max-width: 1200px; margin: 0 auto; }

  /* ---------- Buttons ---------- */
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    background: #0f4c75; color: white; border: none;
    padding: 9px 14px; border-radius: 8px; font-size: .9rem; font-weight: 500;
    transition: background .15s ease, transform .05s ease;
  }
  .btn:hover { background: #103e60; }
  .btn:active { transform: translateY(1px); }
  .btn.secondary { background: #4b5563; }
  .btn.secondary:hover { background: #374151; }
  .btn.success { background: #059669; }
  .btn.success:hover { background: #047857; }
  .btn.danger { background: #dc2626; }
  .btn.danger:hover { background: #b91c1c; }
  .btn.ghost { background: transparent; color: #0f4c75; border: 1px solid #cbd5e1; }
  .btn.ghost:hover { background: #eef2f7; }
  .btn.small { padding: 5px 10px; font-size: .8rem; }
  .btn.full { width: 100%; justify-content: center; }

  /* ---------- Cards & layout ---------- */
  .card {
    background: white; border-radius: 12px;
    box-shadow: 0 1px 3px rgba(0,0,0,.06);
    padding: 16px;
    margin-bottom: 16px;
  }
  .card.compact { padding: 12px; }
  .grid { display: grid; gap: 12px; }
  .grid.cols-2 { grid-template-columns: 1fr 1fr; }
  .grid.cols-3 { grid-template-columns: 1fr 1fr 1fr; }
  @media (max-width: 700px) {
    .grid.cols-2, .grid.cols-3 { grid-template-columns: 1fr; }
  }
  .toolbar {
    display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; align-items: center;
  }
  .toolbar input[type="search"] {
    flex: 1; min-width: 160px;
  }

  /* ---------- Forms ---------- */
  label { display: block; font-size: .82rem; color: #374151; margin-bottom: 4px; font-weight: 500; }
  input, select, textarea {
    width: 100%;
    padding: 9px 11px;
    border: 1px solid #d1d5db;
    border-radius: 8px;
    font: inherit;
    background: white;
    color: #111827;
  }
  input:focus, select:focus, textarea:focus {
    outline: none; border-color: #3282b8; box-shadow: 0 0 0 3px rgba(50,130,184,.18);
  }
  textarea { resize: vertical; min-height: 64px; }
  .field { margin-bottom: 12px; }
  .field-row { display: grid; gap: 12px; grid-template-columns: 1fr 1fr; }
  @media (max-width: 600px) { .field-row { grid-template-columns: 1fr; } }
  .checkbox-row { display: flex; align-items: center; gap: 8px; margin: 6px 0; }
  .checkbox-row input { width: auto; }
  .checkbox-row label { margin: 0; font-weight: 400; }

  /* ---------- Patient cards ---------- */
  .patient-card {
    background: white;
    border-radius: 10px;
    padding: 12px 14px;
    margin-bottom: 10px;
    border-left: 5px solid #cbd5e1;
    box-shadow: 0 1px 3px rgba(0,0,0,.05);
    cursor: pointer;
    transition: transform .1s, box-shadow .1s;
  }
  .patient-card:hover { transform: translateX(2px); box-shadow: 0 2px 8px rgba(0,0,0,.08); }
  .patient-card.ready { border-left-color: #059669; }
  .patient-card.alert { border-left-color: #dc2626; background: #fef2f2; }
  .patient-card.warn { border-left-color: #f59e0b; }
  .pc-row { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
  .pc-bed {
    background: #0f4c75; color: white;
    width: 42px; height: 42px;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 1rem;
    flex-shrink: 0;
  }
  .pc-info { flex: 1; min-width: 0; }
  .pc-name { font-weight: 600; color: #0f172a; font-size: 1rem; }
  .pc-meta { font-size: .82rem; color: #6b7280; margin-top: 2px; }
  .pc-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
  .tag {
    display: inline-block;
    font-size: .72rem;
    padding: 2px 8px;
    border-radius: 999px;
    background: #e5e7eb;
    color: #374151;
    font-weight: 500;
  }
  .tag.green { background: #d1fae5; color: #065f46; }
  .tag.red { background: #fee2e2; color: #991b1b; }
  .tag.yellow { background: #fef3c7; color: #92400e; }
  .tag.blue { background: #dbeafe; color: #1e3a8a; }
  .tag.gray { background: #e5e7eb; color: #374151; }

  /* ---------- Modal ---------- */
  .modal-backdrop {
    position: fixed; inset: 0;
    background: rgba(15,23,42,.55);
    z-index: 200;
    display: flex; align-items: flex-start; justify-content: center;
    padding: 0;
    overflow-y: auto;
  }
  .modal {
    background: #f9fafb;
    width: 100%;
    max-width: 900px;
    margin: 20px auto;
    border-radius: 14px;
    box-shadow: 0 12px 40px rgba(0,0,0,.25);
    overflow: hidden;
    min-height: calc(100vh - 40px);
  }
  @media (max-width: 800px) {
    .modal { margin: 0; border-radius: 0; min-height: 100vh; }
  }
  .modal-head {
    background: linear-gradient(135deg, #0f4c75, #3282b8);
    color: white; padding: 14px 16px;
    display: flex; align-items: center; justify-content: space-between; gap: 8px;
    position: sticky; top: 0; z-index: 5;
  }
  .modal-body { padding: 16px; }
  .modal-foot {
    padding: 12px 16px;
    background: white;
    border-top: 1px solid #e5e7eb;
    display: flex; gap: 8px; justify-content: flex-end; flex-wrap: wrap;
    position: sticky; bottom: 0;
  }
  .close-x {
    background: rgba(255,255,255,.15);
    color: white; border: none;
    width: 34px; height: 34px;
    border-radius: 50%;
    font-size: 1.2rem;
    display: flex; align-items: center; justify-content: center;
  }

  /* Sub-tabs inside modal */
  .subtabs {
    display: flex; flex-wrap: wrap; gap: 2px;
    background: white;
    border-bottom: 1px solid #e5e7eb;
    padding: 0 8px;
    overflow-x: auto;
  }
  .subtabs button {
    background: transparent; border: none;
    padding: 10px 12px;
    color: #6b7280; font-size: .85rem;
    border-bottom: 2px solid transparent;
    white-space: nowrap;
  }
  .subtabs button.active {
    color: #0f4c75; border-bottom-color: #0f4c75; font-weight: 600;
  }

  /* ---------- Tables ---------- */
  table { width: 100%; border-collapse: collapse; font-size: .88rem; }
  table thead { background: #f1f5f9; }
  table th, table td { padding: 8px 10px; text-align: left; border-bottom: 1px solid #e5e7eb; }
  table th { font-weight: 600; color: #334155; font-size: .8rem; text-transform: uppercase; letter-spacing: .03em; }
  .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }

  /* ---------- Alerts ---------- */
  .alert-box {
    padding: 10px 12px; border-radius: 8px; margin-bottom: 10px;
    border-left: 4px solid;
  }
  .alert-box.red { background: #fef2f2; border-color: #dc2626; color: #7f1d1d; }
  .alert-box.yellow { background: #fffbeb; border-color: #f59e0b; color: #78350f; }
  .alert-box.green { background: #ecfdf5; border-color: #059669; color: #065f46; }
  .alert-box.blue { background: #eff6ff; border-color: #3282b8; color: #1e3a8a; }

  /* ---------- Empty state ---------- */
  .empty {
    text-align: center; padding: 32px 16px; color: #6b7280;
  }
  .empty .ico { font-size: 2.5rem; margin-bottom: 8px; opacity: .5; }

  /* ---------- Tiny utilities ---------- */
  .muted { color: #6b7280; font-size: .85rem; }
  .strong { font-weight: 600; }
  .row-between { display: flex; align-items: center; justify-content: space-between; gap: 8px; flex-wrap: wrap; }
  .row-gap { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .pill {
    display: inline-block; padding: 3px 9px; border-radius: 999px;
    font-size: .75rem; font-weight: 600;
  }
  .pill.ready { background: #d1fae5; color: #065f46; }
  .pill.notready { background: #fee2e2; color: #991b1b; }
  .pill.pending { background: #fef3c7; color: #92400e; }
  .lab-table input { padding: 4px 6px; font-size: .85rem; }
  hr { border: none; border-top: 1px solid #e5e7eb; margin: 14px 0; }

  /* ---------- Print ---------- */
  @media print {
    @page { size: A4; margin: 12mm; }
    body { background: white; font-size: 11px; }
    header.appbar, nav.tabs, .toolbar, .no-print, .btn, .modal-foot { display: none !important; }
    main { padding: 0; max-width: none; }
    .card { box-shadow: none; border: 1px solid #ccc; padding: 8px; margin-bottom: 8px; page-break-inside: avoid; }
    .patient-card { border: 1px solid #ccc; box-shadow: none; page-break-inside: avoid; margin-bottom: 6px; }
    table { font-size: 10px; }
    .print-only { display: block !important; }
    .print-title { font-size: 14pt; font-weight: 700; margin-bottom: 8px; text-align: center; }
    .print-sub { font-size: 10pt; text-align: center; margin-bottom: 12px; color: #555; }
  }
  .print-only { display: none; }

  /* ---------- Mobile tweaks ---------- */
  @media (max-width: 500px) {
    main { padding: 10px; }
    .appbar-title { font-size: 1rem; }
    nav.tabs button { padding: 10px 10px; font-size: .82rem; }
    .pc-bed { width: 38px; height: 38px; font-size: .9rem; }
  }

  /* ---------- Dark mode overrides ---------- */
  body.dark .card { background: var(--card); box-shadow: 0 1px 3px var(--shadow); color: var(--text); }
  body.dark .card.compact { background: var(--card-alt); }
  body.dark input, body.dark select, body.dark textarea {
    background: var(--input-bg); color: var(--text); border-color: var(--border);
  }
  body.dark input:focus, body.dark select:focus, body.dark textarea:focus {
    box-shadow: 0 0 0 3px rgba(59,130,246,.25);
  }
  body.dark label { color: var(--text-soft); }
  body.dark .muted { color: var(--muted); }
  body.dark h2, body.dark h3 { color: #93c5fd; }
  body.dark h4 { color: var(--text-soft); }
  body.dark a { color: #93c5fd; }
  body.dark .patient-card { background: var(--card); box-shadow: 0 1px 3px var(--shadow); }
  body.dark .patient-card.alert { background: #4a1a1a; }
  body.dark .patient-card.warn { border-left-color: #f59e0b; }
  body.dark .modal { background: var(--bg); }
  body.dark .modal-foot { background: var(--card); border-top-color: var(--border-soft); }
  body.dark .subtabs { background: var(--card); border-bottom-color: var(--border-soft); }
  body.dark .subtabs button { color: var(--muted); }
  body.dark .subtabs button.active { color: #93c5fd; border-bottom-color: #93c5fd; }
  body.dark table thead { background: var(--th-bg); }
  body.dark table th { color: var(--text-soft); }
  body.dark table th, body.dark table td { border-bottom-color: var(--border-soft); }
  body.dark .alert-box.blue { background: #1e3a5f; color: #93c5fd; }
  body.dark .alert-box.yellow { background: #4a3c1a; color: #fbbf24; }
  body.dark .alert-box.red { background: #4a1a1a; color: #fca5a5; }
  body.dark .alert-box.green { background: #1a4a2f; color: #86efac; }
  body.dark .tag.gray { background: #475569; color: #cbd5e1; }
  body.dark .btn.ghost { background: transparent; color: #93c5fd; border-color: var(--border); }
  body.dark .btn.ghost:hover { background: var(--hover); }
  body.dark .chip { background: var(--card); color: var(--text-soft); border-color: var(--border); }
  body.dark .chip:hover { border-color: #3b82f6; color: #93c5fd; }
  body.dark .chip.active { background: var(--accent); color: white; border-color: var(--accent); }
  body.dark .filter-chips .chip .count { background: rgba(255,255,255,.1); }
  body.dark .kpi { background: var(--card); }
  body.dark .kpi .kpi-value { color: #93c5fd; }
  body.dark .catalog-item { background: var(--card-alt); color: var(--text); }
  body.dark .catalog-item:hover { background: var(--hover-strong); }
  body.dark .catalog-item.selected { background: #1a4a2f; border-color: #059669; }
  body.dark .bar-row .bar-track { background: var(--border-soft); }
  body.dark .vbar-fill { background: var(--accent); }
  body.dark .empty { color: var(--muted); }
  body.dark hr { border-top-color: var(--border-soft); }
  body.dark .code-block { background: #020617; }
  body.dark .setup-step { background: var(--card); }
  body.dark .setup-step h3 { color: #93c5fd; }

  /* ---------- Filter chips ---------- */
  .filter-chips {
    display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px;
  }
  .chip {
    background: white; border: 1px solid #cbd5e1;
    color: #334155; padding: 6px 12px; border-radius: 999px;
    font-size: .85rem; cursor: pointer; transition: all .12s;
    white-space: nowrap;
  }
  .chip:hover { border-color: #3282b8; color: #0f4c75; }
  .chip.active {
    background: #0f4c75; color: white; border-color: #0f4c75;
    font-weight: 500;
  }
  .chip .count {
    display: inline-block; background: rgba(0,0,0,.08);
    border-radius: 10px; padding: 1px 7px; margin-left: 4px;
    font-size: .75rem; font-weight: 600;
  }
  .chip.active .count { background: rgba(255,255,255,.22); }

  /* Catalog picker modal */
  .catalog-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 6px; max-height: 50vh; overflow-y: auto;
    padding: 4px;
  }
  .catalog-item {
    padding: 8px 10px; background: #f1f5f9; border-radius: 6px;
    cursor: pointer; font-size: .85rem;
    transition: background .12s;
  }
  .catalog-item:hover { background: #cbd5e1; }
  .catalog-item.selected { background: #d1fae5; border: 1px solid #059669; }

  /* Botón de dictado por voz */
  .dict-wrap { position: relative; }
  .dict-btn {
    position: absolute; right: 6px; bottom: 6px;
    background: rgba(255,255,255,.9); border: 1px solid var(--border);
    border-radius: 50%;
    width: 32px; height: 32px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1rem; cursor: pointer;
    z-index: 2;
    transition: all .15s;
  }
  .dict-btn:hover { background: white; transform: scale(1.05); }
  .dict-btn.grabando {
    background: #dc2626; color: white; border-color: #dc2626;
    animation: pulseRec 1.2s ease-in-out infinite;
  }
  body.dark .dict-btn { background: var(--card); color: var(--text); }
  body.dark .dict-btn:hover { background: var(--hover); }
  @keyframes pulseRec {
    0%, 100% { box-shadow: 0 0 0 0 rgba(220, 38, 38, .5); }
    50% { box-shadow: 0 0 0 8px rgba(220, 38, 38, 0); }
  }

  /* Reportes */
  .kpi-grid {
    display: grid; gap: 10px;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    margin-bottom: 16px;
  }
  .kpi {
    background: white; border-radius: 10px;
    padding: 12px 14px;
    border-left: 4px solid #3282b8;
    box-shadow: 0 1px 3px rgba(0,0,0,.05);
  }

};

// Cirugía realizada del paciente (para post-op tracking — legacy: apunta a la más reciente)

function getCirugiasRealizadas(p) {
  if (!p.cirugiasRealizadas) p.cirugiasRealizadas = [];

}

// La cirugía más reciente
function ultimaCirugia(p) {
  const lista = getCirugiasRealizadas(p);
  if (lista.length === 0) {
    // Compat con datos viejos que sólo tenían p.cirugia
    if (p.cirugia && p.cirugia.realizada && p.cirugia.fecha) return p.cirugia;
    return null;
  }
  return lista.slice().sort((a,b) => (b.fecha||'').localeCompare(a.fecha||''))[0];
}

function tieneCirugias(p) {
  return getCirugiasRealizadas(p).length > 0
    || (p.cirugia && p.cirugia.realizada);
}

// Sincroniza p.cirugia (legacy) con la última cirugía registrada

      lateralidad: ult.lateralidad || '',

}

// Agrupa las entradas de un programa por quirófano y las ordena
function agruparPorQuirofano(prg) {
  const grupos = {};
  (prg.pacientes || []).forEach(e => {
    const q = e.quirofano || '';
    if (!grupos[q]) grupos[q] = [];
    grupos[q].push(e);
  });
  // Ordenar cada grupo por campo orden
  Object.keys(grupos).forEach(q => {
    grupos[q].sort((a,b) => (a.orden||999) - (b.orden||999));
  });
  // Ordenar las claves de quirófano (numéricos primero)
  const quirofanos = Object.keys(grupos).sort((a,b) => {
    if (!a) return 1;     // sin asignar al final
    if (!b) return -1;
    const na = parseInt(a, 10), nb = parseInt(b, 10);
    if (!isNaN(na) && !isNaN(nb) && na !== nb) return na - nb;
    return a.localeCompare(b, 'es', {numeric:true});
  });
  return { grupos, quirofanos };
}

const fmtDateLong = (iso) => {
  if (!iso) return '—';
  const d = new Date(iso + (iso.length===10?'T00:00:00':''));
  if (isNaN(d)) return iso;
  return d.toLocaleDateString('es', { weekday:'long', day:'numeric', month:'long', year:'numeric' });
};

  const fin = (p.fechaEgreso && p.fechaEgreso >= ult.fecha) ? p.fechaEgreso : null;
  return daysBetween(ult.fecha, fin);
}

/* ---------- Helpers para nuevos campos (TPN VAC, evolución, sano) ---------- */
// Días totales desde que se colocó la TPN (Terapia de Presión Negativa / VAC)
function diasTPN(p) {
  if (!p.tpn || !p.tpn.activa || !p.tpn.fechaInicio) return null;
  const fin = (p.fechaEgreso && p.fechaEgreso >= p.tpn.fechaInicio) ? p.fechaEgreso : null;
  return daysBetween(p.tpn.fechaInicio, fin);
}
// Días desde el último cambio de apósito VAC (típicamente cada 3 días)
function diasDesdeUltimoCambioTPN(p) {
  if (!p.tpn || !p.tpn.activa) return null;
  const ref = p.tpn.ultimoCambio || p.tpn.fechaInicio;
  if (!ref) return null;
  return daysBetween(ref);
}

function ultimaEvolucion(p) {
  const evs = p.evoluciones || [];
  if (evs.length === 0) return null;
  return evs.slice().sort((a,b) => (b.fecha||'').localeCompare(a.fecha||''))[0];
}

function tieneEvolucionHoy(p) {
  const ult = ultimaEvolucion(p);
  if (!ult) return false;
  return (ult.fecha||'').slice(0,10) === todayISO();
}

// Detecta si los antecedentes patológicos son básicamente "ninguno".
// IMPORTANTE: sólo se considera sano si el campo COMPLETO es una negación limpia.
// Si dice algo específico además ("niega DM, padece HTA"), NO es sano.
function esSano(p) {
  const app = (p.antecedentesPatologicos || '').toLowerCase().trim();
  if (!app) return true;  // vacío = sano
  // Patrones limpios de negación (el campo completo debe ser una de estas frases)
  const re = new RegExp(
    '^\\s*(' +
      'niega|niego|niegan|' +
      'no|nada|sano|sana|' +
      'ninguno|ninguna|' +
      'sin\\s+(app|antecedentes|antecedentes\\s+patol[oó]gicos|antecedentes\\s+m[eé]dicos|app\\s+de\\s+relevancia)|' +
      'niega\\s+(app|antecedentes|antecedentes\\s+patol[oó]gicos|antecedentes\\s+m[eé]dicos|de\\s+relevancia)|' +
      'no\\s+(refiere|tiene|presenta|hay|conocidos?|app|antecedentes|de\\s+relevancia)|' +
      '\\(?\\s*-\\s*\\)?' +
    ')\\s*\\.?\\s*$',
    'i'
  );
  return re.test(app);
}

// Devuelve {programa, entrada} si el paciente está en un programa quirúrgico futuro
// (o de hoy) con operado=null. Es decir: programado y aún no operado.
function getProgramacionPendiente(p) {
  if (!p || !p.id) return null;
  const hoy = todayISO();
  const programas = (State.data.programas || [])
    .filter(prg => prg.fecha >= hoy)
    .sort((a,b) => (a.fecha||'').localeCompare(b.fecha||''));
  for (const prg of programas) {
    const e = (prg.pacientes || []).find(en => en.pacienteId === p.id && en.operado === null);
    if (e) return { programa: prg, entrada: e };
  }
  return null;
}

// Calcula los pendientes de un paciente para vista Resumen
function calcularPendientesPaciente(p) {
  const pendientes = [];
  // Estudios faltantes
  const apto = evaluarAptoCirugia(p);
  if (apto.faltantes && apto.faltantes.length > 0) {
    pendientes.push({ tipo:'estudios', desc:'Faltan estudios: ' + apto.faltantes.join(', ') });
  }
  // IC sin responder
  (p.interconsultas||[]).forEach(ic => {
    if (!ic.respondida) {
      const dias = daysBetween(ic.fechaSolicitud);
      pendientes.push({ tipo:'ic', desc:`IC ${ic.servicio} sin responder (${dias} día${dias!==1?'s':''})` });
    }
  });
  // Control infección a 7 días
  if (tieneInfeccion(p)) {
    const dias = daysBetween(p.fechaIngreso);
    if (dias >= 7) {
      const ult = (p.controlInfeccion || []).slice().sort((a,b)=>b.fecha.localeCompare(a.fecha))[0];
      const diasUlt = ult ? daysBetween(ult.fecha) : dias;
      if (!ult || diasUlt >= 7) {
        pendientes.push({ tipo:'infeccion', desc:`Repetir Rx + exámenes control infección (último: ${ult?fmtDate(ult.fecha):'nunca'})` });
      }
    }
  }
  // Curaciones (toggle requiere y frecuencia configurada)
  if (p.curaciones && p.curaciones.requiere && p.curaciones.frecuencia) {
    pendientes.push({ tipo:'curacion', desc:`Curación cada ${p.curaciones.frecuencia}${p.curaciones.ultimaFecha?' (última: '+fmtDate(p.curaciones.ultimaFecha)+')':''}` });
  }
  // TPN (presión negativa / VAC): cambio de apósito cada 3 días
  if (p.tpn && p.tpn.activa) {
    const dCambio = diasDesdeUltimoCambioTPN(p);
    if (dCambio !== null && dCambio >= 3) {
      pendientes.push({ tipo:'tpn', desc:`TPN: cambio de apósito vencido (${dCambio} días desde último cambio)` });
    }
  }
  // Evolución del día sin escribir
  if (!tieneEvolucionHoy(p)) {
    pendientes.push({ tipo:'evolucion', desc:'Falta evolución del día de hoy' });
  }
  return pendientes;
}

/* ---------- Validación de paciente ---------- */
function validarPaciente(p, todos) {
  const errores = [];
  if (!p.nombre || !p.nombre.trim()) errores.push('Falta el nombre');
  if (!p.cedula || !p.cedula.trim()) errores.push('Falta la cédula');
  // Cédula duplicada (excluye al mismo paciente)
  if (p.cedula && p.cedula.trim()) {
    const cedNorm = p.cedula.trim().toLowerCase();
    const dup = (todos || State.data.patients || []).find(o =>
      o.id !== p.id && o.cedula && o.cedula.trim().toLowerCase() === cedNorm);
    if (dup) errores.push(`Cédula duplicada con: ${dup.nombre || '(sin nombre)'} (cama ${dup.cama || '?'})`);
  }
  // Edad razonable
  if (p.edad !== '' && p.edad != null) {
    const e = parseInt(p.edad, 10);
    if (isNaN(e) || e < 0 || e > 130) errores.push(`Edad fuera de rango (${p.edad})`);
  }
  return errores;
}

// Uso: dictArea({ id, rows, placeholder, oninput, value })
function dictArea(opts) {
  const id = opts.id;
  const btnId = 'btn_' + id;
  const rows = opts.rows || 3;
  const oninput = opts.oninput || '';
  const onchange = opts.onchange || '';
