<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0f4c75">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">

<title>Control de Pacientes - Servicio de Ortopedia</title>
<!-- Firebase SDK (versión compat — más estable en Safari/iOS) -->
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore-compat.js"></script>
<style>
  /* ---------- Reset & base ---------- */
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background: #f3f5f8;
    color: #1f2937;
    font-size: 15px;
    line-height: 1.45;
    -webkit-font-smoothing: antialiased;
  }
  h1, h2, h3, h4 { margin: 0 0 .5em; line-height: 1.2; }
  h1 { font-size: 1.25rem; }
  h2 { font-size: 1.1rem; color: #0f4c75; }
  h3 { font-size: 1rem; color: #0f4c75; }
  h4 { font-size: .9rem; color: #374151; text-transform: uppercase; letter-spacing: .04em; }
  a { color: #0f4c75; }
  button { font: inherit; cursor: pointer; }

  /* ---------- App shell ---------- */
  header.appbar {
    background: linear-gradient(135deg, #0f4c75, #3282b8);
    color: white;
    padding: 12px 16px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 6px rgba(0,0,0,.12);
  }
  .appbar-row {
    display: flex; align-items: center; justify-content: space-between; gap: 8px; flex-wrap: wrap;
  }
  .appbar-title { font-weight: 600; font-size: 1.05rem; }
  .appbar-sub { font-size: .8rem; opacity: .9; }
  nav.tabs {
    display: flex; flex-wrap: wrap; gap: 4px;
    background: #0f4c75;
    padding: 0 8px;
    overflow-x: auto;
    scrollbar-width: none;
    position: sticky;
    top: 64px;
    z-index: 99;
  }
  nav.tabs::-webkit-scrollbar { display: none; }
  nav.tabs button {
    background: transparent;
    border: none;
    color: #cfe3f3;
    padding: 12px 14px;
    font-size: .9rem;
    border-bottom: 3px solid transparent;
    white-space: nowrap;
  }
  nav.tabs button.active {
    color: white;
    border-bottom-color: #ffd166;
    font-weight: 600;
  }
  nav.tabs .badge {
    display: inline-block;
    background: #e63946;
    color: white;
    font-size: .7rem;
    border-radius: 10px;
    padding: 1px 7px;
    margin-left: 5px;
    font-weight: 700;
  }

  main { padding: 16px; max-width: 1200px; margin: 0 auto; }

  /* ---------- Buttons ---------- */
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    background: #0f4c75; color: white; border: none;
    padding: 9px 14px; border-radius: 8px; font-size: .9rem; font-weight: 500;
    transition: background .15s ease, transform .05s ease;
  }
  .btn:hover { background: #103e60; }
  .btn:active { transform: translateY(1px); }
  .btn.secondary { background: #4b5563; }
  .btn.secondary:hover { background: #374151; }
  .btn.success { background: #059669; }
  .btn.success:hover { background: #047857; }
  .btn.danger { background: #dc2626; }
  .btn.danger:hover { background: #b91c1c; }
  .btn.ghost { background: transparent; color: #0f4c75; border: 1px solid #cbd5e1; }
  .btn.ghost:hover { background: #eef2f7; }
  .btn.small { padding: 5px 10px; font-size: .8rem; }
  .btn.full { width: 100%; justify-content: center; }

  /* ---------- Cards & layout ---------- */
  .card {
    background: white; border-radius: 12px;
    box-shadow: 0 1px 3px rgba(0,0,0,.06);
    padding: 16px;
    margin-bottom: 16px;
  }
  .card.compact { padding: 12px; }
  .grid { display: grid; gap: 12px; }
  .grid.cols-2 { grid-template-columns: 1fr 1fr; }
  .grid.cols-3 { grid-template-columns: 1fr 1fr 1fr; }
  @media (max-width: 700px) {
    .grid.cols-2, .grid.cols-3 { grid-template-columns: 1fr; }
  }
  .toolbar {
    display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; align-items: center;
  }
  .toolbar input[type="search"] {
    flex: 1; min-width: 160px;
  }

  /* ---------- Forms ---------- */
  label { display: block; font-size: .82rem; color: #374151; margin-bottom: 4px; font-weight: 500; }
  input, select, textarea {
    width: 100%;
    padding: 9px 11px;
    border: 1px solid #d1d5db;
    border-radius: 8px;
    font: inherit;
    background: white;
    color: #111827;
  }
  input:focus, select:focus, textarea:focus {
    outline: none; border-color: #3282b8; box-shadow: 0 0 0 3px rgba(50,130,184,.18);
  }
  textarea { resize: vertical; min-height: 64px; }
  .field { margin-bottom: 12px; }
  .field-row { display: grid; gap: 12px; grid-template-columns: 1fr 1fr; }
  @media (max-width: 600px) { .field-row { grid-template-columns: 1fr; } }
  .checkbox-row { display: flex; align-items: center; gap: 8px; margin: 6px 0; }
  .checkbox-row input { width: auto; }
  .checkbox-row label { margin: 0; font-weight: 400; }

  /* ---------- Patient cards ---------- */
  .patient-card {
    background: white;
    border-radius: 10px;
    padding: 12px 14px;
    margin-bottom: 10px;
    border-left: 5px solid #cbd5e1;
    box-shadow: 0 1px 3px rgba(0,0,0,.05);
    cursor: pointer;
    transition: transform .1s, box-shadow .1s;
  }
  .patient-card:hover { transform: translateX(2px); box-shadow: 0 2px 8px rgba(0,0,0,.08); }
  .patient-card.ready { border-left-color: #059669; }
  .patient-card.alert { border-left-color: #dc2626; background: #fef2f2; }
  .patient-card.warn { border-left-color: #f59e0b; }
  .pc-row { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
  .pc-bed {
    background: #0f4c75; color: white;
    width: 42px; height: 42px;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 1rem;
    flex-shrink: 0;
  }
  .pc-info { flex: 1; min-width: 0; }
  .pc-name { font-weight: 600; color: #0f172a; font-size: 1rem; }
  .pc-meta { font-size: .82rem; color: #6b7280; margin-top: 2px; }
  .pc-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
  .tag {
    display: inline-block;
    font-size: .72rem;
    padding: 2px 8px;
    border-radius: 999px;
    background: #e5e7eb;
    color: #374151;
    font-weight: 500;
  }
  .tag.green { background: #d1fae5; color: #065f46; }
  .tag.red { background: #fee2e2; color: #991b1b; }
  .tag.yellow { background: #fef3c7; color: #92400e; }
  .tag.blue { background: #dbeafe; color: #1e3a8a; }
  .tag.gray { background: #e5e7eb; color: #374151; }

  /* ---------- Modal ---------- */
  .modal-backdrop {
    position: fixed; inset: 0;
    background: rgba(15,23,42,.55);
    z-index: 200;
    display: flex; align-items: flex-start; justify-content: center;
    padding: 0;
    overflow-y: auto;
  }
  .modal {
    background: #f9fafb;
    width: 100%;
    max-width: 900px;
    margin: 20px auto;
    border-radius: 14px;
    box-shadow: 0 12px 40px rgba(0,0,0,.25);
    overflow: hidden;
    min-height: calc(100vh - 40px);
  }
  @media (max-width: 800px) {
    .modal { margin: 0; border-radius: 0; min-height: 100vh; }
  }
  .modal-head {
    background: linear-gradient(135deg, #0f4c75, #3282b8);
    color: white; padding: 14px 16px;
    display: flex; align-items: center; justify-content: space-between; gap: 8px;
    position: sticky; top: 0; z-index: 5;
  }
  .modal-body { padding: 16px; }
  .modal-foot {
    padding: 12px 16px;
    background: white;
    border-top: 1px solid #e5e7eb;
    display: flex; gap: 8px; justify-content: flex-end; flex-wrap: wrap;
    position: sticky; bottom: 0;
  }
  .close-x {
    background: rgba(255,255,255,.15);
    color: white; border: none;
    width: 34px; height: 34px;
    border-radius: 50%;
    font-size: 1.2rem;
    display: flex; align-items: center; justify-content: center;
  }

  /* Sub-tabs inside modal */
  .subtabs {
    display: flex; flex-wrap: wrap; gap: 2px;
    background: white;
    border-bottom: 1px solid #e5e7eb;
    padding: 0 8px;
    overflow-x: auto;
  }
  .subtabs button {
    background: transparent; border: none;
    padding: 10px 12px;
    color: #6b7280; font-size: .85rem;
    border-bottom: 2px solid transparent;
    white-space: nowrap;
  }
  .subtabs button.active {
    color: #0f4c75; border-bottom-color: #0f4c75; font-weight: 600;
  }

  /* ---------- Tables ---------- */
  table { width: 100%; border-collapse: collapse; font-size: .88rem; }
  table thead { background: #f1f5f9; }
  table th, table td { padding: 8px 10px; text-align: left; border-bottom: 1px solid #e5e7eb; }
  table th { font-weight: 600; color: #334155; font-size: .8rem; text-transform: uppercase; letter-spacing: .03em; }
  .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }

  /* ---------- Alerts ---------- */
  .alert-box {
    padding: 10px 12px; border-radius: 8px; margin-bottom: 10px;
    border-left: 4px solid;
  }
  .alert-box.red { background: #fef2f2; border-color: #dc2626; color: #7f1d1d; }
  .alert-box.yellow { background: #fffbeb; border-color: #f59e0b; color: #78350f; }
  .alert-box.green { background: #ecfdf5; border-color: #059669; color: #065f46; }
  .alert-box.blue { background: #eff6ff; border-color: #3282b8; color: #1e3a8a; }

  /* ---------- Empty state ---------- */
  .empty {
    text-align: center; padding: 32px 16px; color: #6b7280;
  }
  .empty .ico { font-size: 2.5rem; margin-bottom: 8px; opacity: .5; }

  /* ---------- Tiny utilities ---------- */
  .muted { color: #6b7280; font-size: .85rem; }
  .strong { font-weight: 600; }
  .row-between { display: flex; align-items: center; justify-content: space-between; gap: 8px; flex-wrap: wrap; }
  .row-gap { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .pill {
    display: inline-block; padding: 3px 9px; border-radius: 999px;
    font-size: .75rem; font-weight: 600;
  }
  .pill.ready { background: #d1fae5; color: #065f46; }
  .pill.notready { background: #fee2e2; color: #991b1b; }
  .pill.pending { background: #fef3c7; color: #92400e; }
  .lab-table input { padding: 4px 6px; font-size: .85rem; }
  hr { border: none; border-top: 1px solid #e5e7eb; margin: 14px 0; }

  /* ---------- Print ---------- */
  @media print {
    @page { size: A4; margin: 12mm; }
    body { background: white; font-size: 11px; }
    header.appbar, nav.tabs, .toolbar, .no-print, .btn, .modal-foot { display: none !important; }
    main { padding: 0; max-width: none; }
    .card { box-shadow: none; border: 1px solid #ccc; padding: 8px; margin-bottom: 8px; page-break-inside: avoid; }
    .patient-card { border: 1px solid #ccc; box-shadow: none; page-break-inside: avoid; margin-bottom: 6px; }
    table { font-size: 10px; }
    .print-only { display: block !important; }
    .print-title { font-size: 14pt; font-weight: 700; margin-bottom: 8px; text-align: center; }
    .print-sub { font-size: 10pt; text-align: center; margin-bottom: 12px; color: #555; }
  }
  .print-only { display: none; }

  /* ---------- Mobile tweaks ---------- */
  @media (max-width: 500px) {
    main { padding: 10px; }
    .appbar-title { font-size: 1rem; }
    nav.tabs button { padding: 10px 10px; font-size: .82rem; }
    .pc-bed { width: 38px; height: 38px; font-size: .9rem; }
  }

  /* ---------- Filter chips ---------- */
  .filter-chips {
    display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px;
  }
  .chip {
    background: white; border: 1px solid #cbd5e1;
    color: #334155; padding: 6px 12px; border-radius: 999px;
    font-size: .85rem; cursor: pointer; transition: all .12s;
    white-space: nowrap;
  }
  .chip:hover { border-color: #3282b8; color: #0f4c75; }
  .chip.active {
    background: #0f4c75; color: white; border-color: #0f4c75;
    font-weight: 500;
  }
  .chip .count {
    display: inline-block; background: rgba(0,0,0,.08);
    border-radius: 10px; padding: 1px 7px; margin-left: 4px;
    font-size: .75rem; font-weight: 600;
  }
  .chip.active .count { background: rgba(255,255,255,.22); }

  /* Catalog picker modal */
  .catalog-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 6px; max-height: 50vh; overflow-y: auto;
    padding: 4px;
  }
  .catalog-item {
    padding: 8px 10px; background: #f1f5f9; border-radius: 6px;
    cursor: pointer; font-size: .85rem;
    transition: background .12s;
  }
  .catalog-item:hover { background: #cbd5e1; }
  .catalog-item.selected { background: #d1fae5; border: 1px solid #059669; }

  /* Modales secundarios (catálogos / plantillas) — quedan por encima del modal principal */
  #modalRoot2 .modal-backdrop { z-index: 300; background: rgba(15,23,42,.65); }
  #modalRoot2 .modal { max-height: calc(100vh - 20px); }

  /* ---------- Sync status ---------- */
  .sync-status {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: .75rem;
    padding: 3px 8px;
    border-radius: 12px;
    background: rgba(255,255,255,.18);
  }
  .sync-status .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #f59e0b;
    box-shadow: 0 0 4px currentColor;
  }
  .sync-status.online .dot { background: #10b981; }
  .sync-status.offline .dot { background: #ef4444; }
  .sync-status.local .dot { background: #94a3b8; box-shadow: none; }

  /* Setup screen */
  .setup-wrap {
    max-width: 720px; margin: 24px auto;
  }
  .setup-step {
    background: white; padding: 16px; border-radius: 10px;
    margin-bottom: 12px; border-left: 4px solid #3282b8;
  }
  .setup-step h3 { color: #0f4c75; }
  .code-block {
    background: #0f172a; color: #e2e8f0;
    padding: 12px; border-radius: 8px;
    font-family: 'Courier New', monospace; font-size: .8rem;
    overflow-x: auto;
    white-space: pre;
    margin: 8px 0;
  }
  .copy-btn {
    background: #1e293b; color: #cbd5e1;
    border: 1px solid #334155; border-radius: 6px;
    padding: 4px 10px; font-size: .75rem; margin-top: 4px;
  }
</style>
</head>
<body>

<header class="appbar">
  <div class="appbar-row">
    <div>
      <div class="appbar-title">Control de Pacientes</div>
      <div class="appbar-sub">Servicio de Ortopedia · <span id="appVersionLabel"></span></div>
    </div>
    <div class="row-gap no-print">
      <span class="sync-status local" id="userBadge" title="Usuario actual de este dispositivo" onclick="App.openIdentificarse()" style="cursor:pointer">
        <span style="font-size:.9em">👤</span><span id="userText">Sin identificar</span>
      </span>
      <span class="sync-status local" id="syncStatus" title="Estado de sincronización" onclick="App.openSetup()">
        <span class="dot"></span><span id="syncText">Sin nube</span>
      </span>
      <button class="btn small" onclick="App.openNew()">+ Paciente</button>
      <button class="btn ghost small" onclick="App.exportData()">Exportar</button>
      <button class="btn ghost small" onclick="document.getElementById('importFile').click()">Importar</button>
      <button class="btn ghost small" onclick="App.openSetup()">⚙</button>
      <input type="file" id="importFile" accept="application/json" style="display:none" onchange="App.importData(event)">
    </div>
  </div>
</header>

<nav class="tabs no-print" id="tabs">
  <button data-tab="lista" class="active" onclick="App.switchTab('lista')">Pase de visita</button>
  <button data-tab="cirugia" onclick="App.switchTab('cirugia')">Listos para cirugía</button>
  <button data-tab="programa" onclick="App.switchTab('programa')">Programa Qx</button>
  <button data-tab="salidas" onclick="App.switchTab('salidas')">Salida</button>
  <button data-tab="alertas" onclick="App.switchTab('alertas')">Alertas <span class="badge" id="alertCount" style="display:none">0</span></button>
  <button data-tab="todos" onclick="App.switchTab('todos')">Todos</button>
</nav>

<main>
  <div id="view"></div>
</main>

<div id="modalRoot"></div>
<div id="modalRoot2"></div>

const daysBetween = (a, b) => {

  const A = new Date(a + (a.length===10?'T00:00:00':''));
  const B = b ? new Date(b + (b.length===10?'T00:00:00':'')) : new Date();
  return Math.floor((B - A) / (1000*60*60*24));
};

}

// La cirugía más reciente
function ultimaCirugia(p) {
  const lista = getCirugiasRealizadas(p);
  if (lista.length === 0) {
    // Compat con datos viejos que sólo tenían p.cirugia
    if (p.cirugia && p.cirugia.realizada && p.cirugia.fecha) return p.cirugia;
    return null;
  }
  return lista.slice().sort((a,b) => (b.fecha||'').localeCompare(a.fecha||''))[0];
}

function tieneCirugias(p) {
  return getCirugiasRealizadas(p).length > 0

}

// Agrupa las entradas de un programa por quirófano y las ordena
function agruparPorQuirofano(prg) {
  const grupos = {};
  (prg.pacientes || []).forEach(e => {
    const q = e.quirofano || '';
    if (!grupos[q]) grupos[q] = [];
    grupos[q].push(e);
  });
  // Ordenar cada grupo por campo orden
  Object.keys(grupos).forEach(q => {
    grupos[q].sort((a,b) => (a.orden||999) - (b.orden||999));
  });
  // Ordenar las claves de quirófano (numéricos primero)
  const quirofanos = Object.keys(grupos).sort((a,b) => {
    if (!a) return 1;     // sin asignar al final
    if (!b) return -1;
    const na = parseInt(a, 10), nb = parseInt(b, 10);
    if (!isNaN(na) && !isNaN(nb) && na !== nb) return na - nb;
    return a.localeCompare(b, 'es', {numeric:true});
  });
  return { grupos, quirofanos };
}

  const fin = (p.fechaEgreso && p.fechaEgreso >= ult.fecha) ? p.fechaEgreso : null;

}

      .filter(([k,v]) => v && String(v).trim())
      .map(([k,v]) => `${k}: ${v}`)
      .join(', ');
    return `${fmtDate(l.fecha)} — ${valores || '(sin valores)'}`;
  }).join('\n');

/* ---------- Validación de paciente ---------- */
function validarPaciente(p, todos) {
  const errores = [];
  if (!p.nombre || !p.nombre.trim()) errores.push('Falta el nombre');
  if (!p.cedula || !p.cedula.trim()) errores.push('Falta la cédula');
  // Cédula duplicada (excluye al mismo paciente)
  if (p.cedula && p.cedula.trim()) {
    const cedNorm = p.cedula.trim().toLowerCase();
    const dup = (todos || State.data.patients || []).find(o =>
      o.id !== p.id && o.cedula && o.cedula.trim().toLowerCase() === cedNorm);
    if (dup) errores.push(`Cédula duplicada con: ${dup.nombre || '(sin nombre)'} (cama ${dup.cama || '?'})`);
  }
  // Edad razonable
  if (p.edad !== '' && p.edad != null) {
    const e = parseInt(p.edad, 10);
    if (isNaN(e) || e < 0 || e > 130) errores.push(`Edad fuera de rango (${p.edad})`);
  }
  return errores;
}

/* ---------- Debounce para botones críticos ---------- */
const _debounceLocks = new Set();
function debounceAction(key, fn) {
  if (_debounceLocks.has(key)) return false;
  _debounceLocks.add(key);
  try { fn(); }
  finally {
    setTimeout(() => _debounceLocks.delete(key), DEBOUNCE_MS);
  }
  return true;
}

/* ---------- Sincronización en la nube (Firebase Firestore) ---------- */
const Sync = {
  app: null,
  db: null,
  unsubscribe: null,
  status: 'local',          // 'local' | 'connecting' | 'online' | 'offline' | 'error'
  saveTimeout: null,
  ignoreNextRemote: false,  // para evitar loops cuando recibimos eco propio

  getConfig() {
    // 1. Configuración guardada localmente (override manual)
    try {
      const stored = JSON.parse(localStorage.getItem(FB_CONFIG_KEY) || 'null');
      if (stored && stored.apiKey && stored.projectId) return stored;
    } catch(e) {}
    // 2. Configuración embebida en la app (default — para que todos compartan datos)
    if (EMBEDDED_FB_CONFIG && EMBEDDED_FB_CONFIG.apiKey && EMBEDDED_FB_CONFIG.projectId) {
      return EMBEDDED_FB_CONFIG;
    }
    return null;
  },
  setConfig(cfg) {
    if (cfg) localStorage.setItem(FB_CONFIG_KEY, JSON.stringify(cfg));
    else localStorage.removeItem(FB_CONFIG_KEY);
  },

  setStatus(s, msg) {
    this.status = s;
    const el = document.getElementById('syncStatus');
    const tx = document.getElementById('syncText');
    if (!el) return;
    el.classList.remove('online','offline','local');
    const map = {
      local: ['local', 'Sin nube'],
      connecting: ['', 'Conectando…'],
      online: ['online', 'Sincronizado'],
      offline: ['offline', 'Sin conexión'],
      error: ['offline', msg || 'Error']
    };
    const [cls, label] = map[s] || ['', s];
    if (cls) el.classList.add(cls);
    tx.textContent = label;
  },

  async connect() {
    const cfg = this.getConfig();
    if (!cfg || !cfg.apiKey || !cfg.projectId) {
      this.setStatus('local');
      return false;
    }
    // Esperar a que el SDK de Firebase termine de cargar (con timeout)
    this.setStatus('connecting');
    const start = Date.now();
    while (typeof window.firebase === 'undefined' && Date.now() - start < 10000) {
      await new Promise(r => setTimeout(r, 100));
    }
    if (typeof window.firebase === 'undefined') {
      this.setStatus('error', 'No se pudo cargar Firebase. ¿Hay conexión a internet?');
      return false;
    }
    try {
      // Inicializar app (evitar duplicados)
      if (window.firebase.apps && window.firebase.apps.length > 0) {
        this.app = window.firebase.apps[0];
      } else {
        this.app = window.firebase.initializeApp(cfg);
      }
      this.db = window.firebase.firestore();

      // Persistencia offline (puede fallar en modo incógnito o múltiples pestañas — no es crítico)
      try { await this.db.enablePersistence({ synchronizeTabs: true }); }
      catch(e) { console.warn('Persistencia offline no activa:', e.code || e.message); }

      const ref = this.db.doc(FB_DOC_PATH);
      this.unsubscribe = ref.onSnapshot(
        (snap) => {
          this.setStatus('online');
          if (this.ignoreNextRemote) {
            this.ignoreNextRemote = false;
            return;
          }
          const remote = snap.exists ? snap.data() : null;
          if (remote && remote.patients) {
            const localStr = JSON.stringify(State.data);
            const remoteStr = JSON.stringify({ patients: remote.patients, programas: remote.programas || [], egresos: remote.egresos || [], config: remote.config || State.data.config, lastWrite: remote.lastWrite });
            if (localStr !== remoteStr) {
              State.data = { patients: remote.patients, programas: remote.programas || [], egresos: remote.egresos || [], config: remote.config || State.data.config, lastWrite: remote.lastWrite };
              State._migrar();
              try { localStorage.setItem(STORAGE_KEY, JSON.stringify(State.data)); } catch(e){}
              if (App.render) App.render();
              if (App._currentModalId && State.data.patients.some(p=>p.id===App._currentModalId)) {
                App.renderModal(App._currentModalId);
              } else if (App._currentModalId) {
                App.closeModal();
              }
            }
          } else if (snap && !snap.exists) {
            // Documento no existe; subir lo local
            this.pushNow();
          }
        },
        (err) => {
          console.error('Firestore error:', err);
          this.setStatus('error', 'Error: ' + (err.code || err.message || ''));
          alert('Error de Firebase: ' + (err.message || err.code) +
            '\n\nVerifica las reglas de Firestore en la consola.');
        }
      );

      window.addEventListener('online', () => { if (this.status==='offline') this.setStatus('online'); });
      window.addEventListener('offline', () => this.setStatus('offline'));
      return true;
    } catch(e) {
      console.error(e);
      this.setStatus('error', e.message);
      alert('No se pudo conectar a Firebase: ' + e.message);
      return false;
    }
  },

  scheduleSave() {
    if (!this.db) return;
    if (this.saveTimeout) clearTimeout(this.saveTimeout);
    this.saveTimeout = setTimeout(() => this.pushNow(), 400);
  },

  async pushNow() {
    if (!this.db) return;
    try {
      const ref = this.db.doc(FB_DOC_PATH);
      this.ignoreNextRemote = true;
      const payload = {
        patients: State.data.patients || [],
        programas: State.data.programas || [],
        egresos: State.data.egresos || [],
        config: State.data.config || {},
        lastWrite: Date.now()
      };
      State.data.lastWrite = payload.lastWrite;
      await ref.set(payload);
      this.setStatus('online');
    } catch(e) {
      console.error('Error guardando en la nube:', e);
      this.ignoreNextRemote = false;
      if (!navigator.onLine) {
        this.setStatus('offline');
      } else {
        this.setStatus('error', 'Error al guardar');
        // Mostrar aviso visible (una sola vez por sesión para no spamear)
        if (!this._errorShownThisSession) {
          this._errorShownThisSession = true;
          alert('No se pudo guardar el último cambio en la nube.\n\n' +
            'Detalle: ' + (e.message || e.code || 'desconocido') + '\n\n' +
            'Tus cambios sí están guardados localmente. Cuando se restablezca la conexión o se corrija el error, sincronizarán automáticamente.\n\n' +
            'Si esto ocurre seguido, exporta un respaldo desde el botón "Exportar".');
        }
      }
    }
  },

  disconnect() {
    if (this.unsubscribe) { try { this.unsubscribe(); } catch(e){} this.unsubscribe = null; }
    this.app = null; this.db = null;
    this.setStatus('local');
  }
};

/* ---------- Estado y persistencia ---------- */
const State = {
  data: { patients: [] },
  currentTab: 'lista',
  search: '',
  filterType: 'todos',  // todos | listos | postop | infeccion | hoy | sinprog | misPacientes
  load() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) this.data = JSON.parse(raw);
    } catch(e) { console.warn('No se pudo cargar datos', e); }
    if (!this.data.patients) this.data.patients = [];
    if (!this.data.programas) this.data.programas = [];
    if (!this.data.egresos) this.data.egresos = [];
    this._migrar();
  },
  // Migrar datos antiguos al nuevo formato y sembrar catálogos si faltan
  _migrar() {
    const data = this.data;

    // Asegurar config y catálogos. Esto corre tanto al cargar como cuando
    // llegan datos remotos, así que protege los catálogos de ser borrados
    // por una sincronización con un dispositivo que tenga versión vieja.
    if (!data.config) {
      data.config = { hospitalNombre: '', servicio: 'Ortopedia', jefeServicio: '', direccion: '', telefono: '', usuarios: [] };
    }
    if (!data.config.usuarios) data.config.usuarios = [];
    if (!data.config.catalogos) data.config.catalogos = {};
    const cats = data.config.catalogos;
    if (!cats.diagnosticos) cats.diagnosticos = [];
    if (!cats.procedimientos) cats.procedimientos = [];
    if (!cats.medicamentos) cats.medicamentos = [];
    if (!cats.esquemasEgreso) cats.esquemasEgreso = [];
    if (!cats.cirujanos) cats.cirujanos = [];
    // Sembrar con valores por defecto si nunca se sembraron en este servidor.
    // El flag _seeded evita re-sembrar si el usuario borró ítems intencionalmente.
    if (!data.config._seeded) {
      if (cats.diagnosticos.length === 0) cats.diagnosticos = SEED_DIAGNOSTICOS.slice();
      if (cats.procedimientos.length === 0) cats.procedimientos = SEED_PROCEDIMIENTOS.slice();
      if (cats.medicamentos.length === 0) cats.medicamentos = SEED_MEDICAMENTOS.map(m => ({...m}));
      if (cats.esquemasEgreso.length === 0) cats.esquemasEgreso = SEED_ESQUEMAS_EGRESO.map(e => ({...e}));
      if (cats.cirujanos.length === 0) cats.cirujanos = SEED_CIRUJANOS.slice();
      data.config._seeded = true;
    }
    if (!data.config.jefeServicio) data.config.jefeServicio = 'Dr. Franklin Carrillo';

    data.patients.forEach(p => {
      // Migrar cirugía única legacy → array cirugiasRealizadas
      if (!p.cirugiasRealizadas) p.cirugiasRealizadas = [];
      if (p.cirugia && p.cirugia.realizada && p.cirugia.fecha && p.cirugiasRealizadas.length === 0) {
        p.cirugiasRealizadas.push({
          fecha: p.cirugia.fecha,
          procedimiento: p.cirugia.procedimiento || '',
          lateralidad: p.cirugia.lateralidad || '',
          cirujano: p.cirugia.cirujano || '',
          programaId: p.cirugia.programaId || '',
          quirofano: '',
          notas: p.cirugia.notas || ''
        });
      }
      if (p.requiereOtraCirugia === undefined) p.requiereOtraCirugia = false;

      if (p.programaQx && p.programaQx.programado && !p._migratedToPrograma) {
        const fecha = p.programaQx.fechaProgramada || todayISO();
        let prog = data.programas.find(pg => pg.fecha === fecha);
        if (!prog) {
          prog = nuevoPrograma(fecha);
          data.programas.push(prog);
        }
        if (!prog.pacientes.find(e => e.pacienteId === p.id)) {
          const entrada = nuevaEntradaPrograma(p.id, p.programaQx);
          // Estado realizado en legacy → marcar operado y mover a cirugia
          if (p.programaQx.estado === 'realizado') {
            entrada.operado = true;
            getCirugia(p).realizada = true;
            getCirugia(p).fecha = p.programaQx.fechaRealizado || fecha;
            getCirugia(p).procedimiento = p.programaQx.procedimiento || '';
            getCirugia(p).lateralidad = p.programaQx.lateralidad || '';
            getCirugia(p).cirujano = p.programaQx.medicoCargo || p.cirujano || '';
            getCirugia(p).programaId = prog.id;
          } else if (p.programaQx.estado === 'suspendido') {
            entrada.operado = false;
            entrada.motivoNoOperado = 'Suspendido (migrado)';
          }
          prog.pacientes.push(entrada);
        }
        p._migratedToPrograma = true;
      }
    });
  },
  save() {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(this.data)); }
    catch(e) { alert('Error al guardar localmente: ' + e.message); }
    Sync.scheduleSave();
  }
};

/* ---------- Lógica clínica ---------- */
function tieneAntecedentes(p) {
  return !!(p.antecedentesPatologicos && p.antecedentesPatologicos.trim().length > 0);
}

function estudiosBasicos(p) {
  return ['rxTorax','hemograma','tiemposCoagulacion','quimicaSanguinea']
    .every(k => p.estudios[k] && p.estudios[k].realizado);
}

function estudiosCompletos(p) {
  return estudiosBasicos(p)
    && p.estudios.ekg.realizado
    && p.estudios.evaluacionPreop.realizado;
}

function tieneContraindicacion(p) {
  const c = p.contraindicaciones || {};
  return c.malEstadoGeneral || c.malEstadoTejidos || (c.otra && c.otra.trim().length > 0);
}

/**
 * Devuelve { listo: bool, motivo: string, faltantes: [strings] }
 */
function evaluarAptoCirugia(p) {
  // Datos básicos del paciente: sin nombre o cédula no se programa nada
  if (!p.nombre || !p.nombre.trim() || !p.cedula || !p.cedula.trim()) {
    return { listo:false, motivo:'Faltan datos básicos del paciente (nombre o cédula)', faltantes:['Datos básicos'] };
  }
  // Si ya fue operado y NO tiene marcado "requiere otra cirugía", no es candidato
  const ult = ultimaCirugia(p);
  if (ult && !p.requiereOtraCirugia) {
    return { listo:false, operado:true, motivo:'Ya operado el ' + fmtDate(ult.fecha), faltantes:[] };
  }
  const edad = parseInt(p.edad, 10);
  const faltantes = [];
  if (!edad || isNaN(edad)) {
    return { listo:false, motivo:'Falta registrar edad', faltantes:['Edad'] };
  }

  if (tieneContraindicacion(p)) {
    const motivos = [];
    if (p.contraindicaciones.malEstadoGeneral) motivos.push('mal estado general');
    if (p.contraindicaciones.malEstadoTejidos) motivos.push('mal estado de tejidos blandos');
    if (p.contraindicaciones.otra) motivos.push(p.contraindicaciones.otra);
    return { listo:false, motivo:'Contraindicación: ' + motivos.join(', '), faltantes:[] };
  }

  const requiereCompletos = (edad >= 50) || tieneAntecedentes(p);

  if (!p.estudios.rxTorax.realizado) faltantes.push('Rx tórax');
  if (!p.estudios.hemograma.realizado) faltantes.push('Hemograma');
  if (!p.estudios.tiemposCoagulacion.realizado) faltantes.push('Tiempos coagulación');
  if (!p.estudios.quimicaSanguinea.realizado) faltantes.push('Química sanguínea');
  if (requiereCompletos) {
    if (!p.estudios.ekg.realizado) faltantes.push('EKG');
    if (!p.estudios.evaluacionPreop.realizado) faltantes.push('Eval. preop. M.I./M.F./Geriatría');
  }

  if (faltantes.length === 0) {
    return { listo:true, motivo: requiereCompletos ? 'Preop completo' : 'Estudios básicos completos', faltantes:[] };
  }
  return { listo:false, motivo:'Faltan estudios', faltantes };
}

/**
 * Detecta si el paciente tiene diagnóstico de infección.
 */
function tieneInfeccion(p) {
  if (!p.diagnosticos) return false;
  const re = /infecc|infect|osteomielitis|absceso|celulitis|sepsis|piomi/i;
  return p.diagnosticos.some(d => re.test(d));
}

/**
 * Calcula alertas activas para el paciente.
 */
function calcularAlertasPaciente(p) {
  const alertas = [];
  const dias = daysBetween(p.fechaIngreso);

  // 1. Recordatorio 7 días para infección
  if (tieneInfeccion(p) && dias >= 7) {
    const ultimoControl = (p.controlInfeccion || []).slice().sort((a,b)=>b.fecha.localeCompare(a.fecha))[0];
    const diasUltimo = ultimoControl ? daysBetween(ultimoControl.fecha) : dias;
    if (!ultimoControl || diasUltimo >= 7) {
      alertas.push({
        tipo:'red',
        texto:`Diagnóstico de infección con ${dias} días de hospitalización. Repetir Rx y exámenes de control de infección (último: ${ultimoControl ? fmtDate(ultimoControl.fecha) : 'ninguno'}).`
      });
    }
  }

  // 2. Interconsultas pendientes >2 días
  (p.interconsultas || []).forEach(ic => {
    if (!ic.respondida) {
      const d = daysBetween(ic.fechaSolicitud);
      if (d >= 2) {
        alertas.push({
          tipo:'yellow',
          texto:`Interconsulta a ${ic.servicio} solicitada hace ${d} día(s) sin respuesta.`
        });
      }
    }
  });

  // 3. Listo para cirugía
  const apto = evaluarAptoCirugia(p);
  if (apto.listo) {
    alertas.push({
      tipo:'green',
      texto:`Paciente listo para cirugía (${apto.motivo}).`
    });
  }

  // 4. Hospitalización prolongada
  if (dias >= 14) {
    alertas.push({
      tipo:'yellow',
      texto:`Hospitalización prolongada: ${dias} días.`
    });
  }

  return alertas;
}

/* ---------- Historial ---------- */
function logCambio(p, accion, detalle='') {
  if (!p.historial) p.historial = [];
  p.historial.push({
    fecha: new Date().toISOString(),
    usuario: getCurrentUser() || '(sin identificar)',
    accion,
    detalle
  });
  // mantener solo últimos 200
  if (p.historial.length > 200) p.historial = p.historial.slice(-200);
}

                <button class="btn ghost small" onclick="App.openCatalogoAdmin('procedimientos')">🔪 Procedimientos (${getCatalogo('procedimientos').length})</button>

            <div class="setup-step">

                <li>Entra a <a href="https://console.firebase.google.com/" target="_blank">console.firebase.google.com</a> con tu Gmail.</li>
                <li>Click en <strong>"Agregar proyecto"</strong>. Ponle un nombre (ej. "ortopedia"). Acepta los pasos por defecto.</li>
                <li>Una vez creado, en el menú lateral entra a <strong>"Build → Firestore Database"</strong>.</li>
                <li>Click en <strong>"Crear base de datos"</strong>. Elige <strong>"Modo de prueba"</strong> y la ubicación más cercana.</li>
              </ol>
            </div>

            <div class="setup-step">
              <h3>2. Configura las reglas de seguridad</h3>
              <p>En Firestore, pestaña <strong>"Reglas"</strong>, pega estas reglas y publica:</p>
              <div class="code-block">rules_version = '2';
service cloud.firestore {
  match /databases/{database}/documents {
    match /apps/ortopedia {
      allow read, write: if true;
    }
  }
}</div>
              <button class="copy-btn" onclick="App.copyText(\`rules_version = '2';
service cloud.firestore {
  match /databases/{database}/documents {

      allow read, write: if true;
    }
  }
}\`)">Copiar reglas</button>
              <p class="muted" style="margin-top:8px"><strong>Importante:</strong> esto deja el documento abierto a quien tenga la URL. Mantén privada la URL de la app y, si necesitas más seguridad, podemos agregar un código de acceso después.</p>

            <div class="setup-step">

              <p>Dale un nombre (ej. "Ortopedia Web") y registra. Verás un código con un objeto <code>firebaseConfig = { ... }</code>. <strong>Cópialo completo</strong>.</p>
            </div>

            <div class="setup-step">
              <h3>4. Pega tu configuración aquí</h3>
              <p>Pega el objeto completo (puedes incluir <code>const firebaseConfig =</code> y los <code>{ }</code>):</p>
              <textarea id="fbConfigInput" rows="10" placeholder='const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "tu-proyecto.firebaseapp.com",
  projectId: "tu-proyecto",
  storageBucket: "tu-proyecto.appspot.com",
  messagingSenderId: "123456789",
  appId: "1:123:web:abc..."
};'>${cfg.apiKey?JSON.stringify(cfg, null, 2):''}</textarea>
              <div style="display:flex;gap:8px;margin-top:8px;flex-wrap:wrap">
                <button class="btn success" onclick="App.saveFbConfig()">Conectar a la nube</button>

              </div>
            </div>

            <div class="setup-step">
              <h3>5. Comparte la URL con tu equipo</h3>
              <p>Una vez conectado, sube este archivo a un hosting gratuito (Netlify drop, GitHub Pages, Firebase Hosting). Cualquier persona que abra la URL verá los mismos pacientes y podrá modificarlos en tiempo real.</p>
              <p class="muted">La configuración de Firebase queda guardada en este dispositivo. En cada dispositivo nuevo (o navegador en incógnito) hay que configurar una sola vez con los mismos datos.</p>

          </div>
          <div class="modal-foot">

  setHospitalConfig(campo, valor) {
    const cfg = getConfig();
    cfg[campo] = valor;
    State.save();
  },

  /* ---------- Pickers de catálogo ---------- */
  // Picker de diagnósticos: agrega los seleccionados al paciente
  openCatalogoPicker(catalogo, pacienteId) {
    const items = getCatalogo(catalogo).slice().sort((a,b) => a.localeCompare(b, 'es'));
    const p = this._findP(pacienteId);
    const existentes = new Set((p && p.diagnosticos) ? p.diagnosticos : []);
    const titulo = catalogo === 'diagnosticos' ? 'Agregar diagnóstico desde catálogo' : 'Agregar desde catálogo';
    const html = `
      <div class="modal-backdrop" onclick="if(event.target===this) App._closeSecondary()">
        <div class="modal" style="max-width:680px">
          <div class="modal-head">
            <div>
              <div style="font-weight:600">${titulo}</div>
              <div style="font-size:.8rem;opacity:.9">Click en cada uno para agregar/quitar. "Listo" cuando termines.</div>
            </div>
            <button class="close-x" onclick="App._closeSecondary()">✕</button>
          </div>
          <div class="modal-body">
            <input type="search" placeholder="Buscar..." oninput="App._filtrarCatalogoPicker(this.value)" style="margin-bottom:10px">
            <div class="catalog-grid" id="catalogPickerGrid">
              ${items.map(it => `
                <div class="catalog-item ${existentes.has(it)?'selected':''}"
                  data-name="${escapeHtml(it).toLowerCase()}"
                  onclick="App._toggleDxFromCatalog('${pacienteId}', this, '${escapeHtml(it).replace(/'/g, '&apos;')}')">
                  ${escapeHtml(it)}
                </div>
              `).join('')}
            </div>
          </div>
          <div class="modal-foot">
            <div class="muted" style="font-size:.85rem">${items.length} ${catalogo} en el catálogo</div>
            <div style="flex:1"></div>
            <button class="btn success" onclick="App._closeSecondary();App.renderModal('${pacienteId}')">✓ Listo</button>
          </div>
        </div>
      </div>
    `;
    this._renderSecondary(html);
  },

  _filtrarCatalogoPicker(q) {
    const grid = document.getElementById('catalogPickerGrid');
    if (!grid) return;
    q = (q||'').toLowerCase();
    Array.from(grid.children).forEach(child => {
      const name = child.dataset.name || '';
      child.style.display = (q === '' || name.includes(q)) ? '' : 'none';
    });
  },

  _toggleDxFromCatalog(pacienteId, el, valor) {
    const p = this._findP(pacienteId); if (!p) return;
    if (!p.diagnosticos) p.diagnosticos = [];
    valor = valor.replace(/&apos;/g, "'");
    const idx = p.diagnosticos.indexOf(valor);
    if (idx >= 0) {
      p.diagnosticos.splice(idx, 1);
      el.classList.remove('selected');
    } else {
      p.diagnosticos.push(valor);
      el.classList.add('selected');
    }
    logCambio(p, 'Edición', `Dx ${idx>=0?'quitado':'agregado'}: ${valor}`);
    State.save();
  },

  // Picker para entradas de programa (procedimiento)
  openCatalogoPickerEntrada(catalogo, programaId, entradaId) {
    const items = getCatalogo(catalogo).slice().sort((a,b) => a.localeCompare(b, 'es'));
    const html = `
      <div class="modal-backdrop" onclick="if(event.target===this) App._closeSecondary()">
        <div class="modal" style="max-width:680px">
          <div class="modal-head">
            <div>
              <div style="font-weight:600">Insertar procedimiento desde catálogo</div>
              <div style="font-size:.8rem;opacity:.9">Click sobre uno para insertarlo.</div>
            </div>
            <button class="close-x" onclick="App._closeSecondary()">✕</button>
          </div>
          <div class="modal-body">
            <input type="search" placeholder="Buscar..." oninput="App._filtrarCatalogoPicker(this.value)" style="margin-bottom:10px">
            <div class="catalog-grid" id="catalogPickerGrid">
              ${items.map(it => `
                <div class="catalog-item"
                  data-name="${escapeHtml(it).toLowerCase()}"
                  onclick="App._aplicarProcEntrada('${programaId}','${entradaId}','${escapeHtml(it).replace(/'/g,'&apos;')}')">
                  ${escapeHtml(it)}
                </div>
              `).join('')}

            <button class="btn ghost" onclick="App._closeSecondary()">Cerrar</button>
          </div>
        </div>
      </div>
    `;
    this._renderSecondary(html);
  },

  _aplicarProcEntrada(programaId, entradaId, valor) {
    valor = valor.replace(/&apos;/g, "'");
    const prg = State.data.programas.find(p => p.id === programaId);
    if (!prg) return;
    const e = prg.pacientes.find(x => x.id === entradaId);
    if (!e) return;
    e.procedimiento = valor;
    State.save();
    this._closeSecondary();
    this.render();
  },

  // Picker de plantillas de medicamentos para paciente
  openMedTemplatePicker(pacienteId) {
    const meds = getCatalogo('medicamentos');
    const html = `
      <div class="modal-backdrop" onclick="if(event.target===this) App._closeSecondary()">
        <div class="modal" style="max-width:700px">
          <div class="modal-head">
            <div>
              <div style="font-weight:600">Agregar medicamento desde plantilla</div>
              <div style="font-size:.8rem;opacity:.9">Click sobre uno y se agrega al paciente con dosis preconfigurada.</div>
            </div>
            <button class="close-x" onclick="App._closeSecondary()">✕</button>
          </div>
          <div class="modal-body">
            <input type="search" placeholder="Buscar..." oninput="App._filtrarCatalogoPicker(this.value)" style="margin-bottom:10px">
            <div id="catalogPickerGrid" style="display:flex;flex-direction:column;gap:6px">
              ${meds.map((m, idx) => `
                <div class="catalog-item" data-name="${escapeHtml((m.nombre||'')+' '+(m.nota||'')).toLowerCase()}"
                  onclick="App._aplicarMedPlantilla('${pacienteId}', ${idx})">
                  <div><strong>${escapeHtml(m.nombre)}</strong>
                    ${m.dosis?` · ${escapeHtml(m.dosis)}`:''}
                    ${m.via?` · ${escapeHtml(m.via)}`:''}
                    ${m.frecuencia?` · ${escapeHtml(m.frecuencia)}`:''}</div>
                  ${m.nota?`<div class="muted" style="font-size:.78rem;margin-top:2px">${escapeHtml(m.nota)}</div>`:''}
                </div>
              `).join('')}
            </div>
          </div>
          <div class="modal-foot">
            <button class="btn ghost" onclick="App._closeSecondary()">Cerrar</button>
          </div>
        </div>
      </div>
    `;
    this._renderSecondary(html);
  },

  _aplicarMedPlantilla(pacienteId, idxPlantilla) {
    const p = this._findP(pacienteId); if (!p) return;
    const plantilla = getCatalogo('medicamentos')[idxPlantilla];
    if (!plantilla) return;
    if (!p.medicamentos) p.medicamentos = [];
    p.medicamentos.push({
      id: 'm_'+uid(),
      nombre: plantilla.nombre || '',
      dosis: plantilla.dosis || '',
      via: plantilla.via || '',
      frecuencia: plantilla.frecuencia || '',
      inicio: todayISO(),
      fin: '',
      activo: true,
      nota: plantilla.nota || ''
    });
    logCambio(p, 'Medicamento', `Agregado desde plantilla: ${plantilla.nombre}`);
    State.save();
    this._closeSecondary();
    this.renderModal(pacienteId);
  },

  // Picker de esquemas de egreso (inserta texto en una textarea)
  openEsquemaPicker(egresoId, campo) {

        <div class="modal" style="max-width:700px">
          <div class="modal-head">

              <div style="font-weight:600">Insertar esquema de egreso</div>

            </div>
            <button class="close-x" onclick="App._closeSecondary()">✕</button>
          </div>
          <div class="modal-body">
            ${esquemas.map((es, idx) => `
              <div class="card compact" style="margin-bottom:8px;cursor:pointer"
                onclick="App._aplicarEsquema('${egresoId}','${campo}',${idx})">
                <strong>${escapeHtml(es.nombre)}</strong>
                <pre style="white-space:pre-wrap;font-family:inherit;font-size:.85rem;margin:6px 0 0;color:#475569">${escapeHtml(es.contenido)}</pre>

            `).join('')}

  /* ---------- Administrador de catálogos ---------- */
  openCatalogoAdmin(catalogo) {
    const items = getCatalogo(catalogo);
    const titulos = {
      diagnosticos: 'Diagnósticos',
      procedimientos: 'Procedimientos quirúrgicos',
      medicamentos: 'Plantillas de medicamentos',
      esquemasEgreso: 'Esquemas de egreso',
      cirujanos: 'Cirujanos del servicio'
    };
    let bodyHtml = '';
    if (catalogo === 'medicamentos') {
      bodyHtml = items.map((m, idx) => `
        <div class="card compact" style="margin-bottom:6px">
          <div class="field-row">
            <div class="field" style="margin-bottom:0">
              <label>Nombre</label>
              <input value="${escapeHtml(m.nombre||'')}" onchange="App.editarItemCatalogo('medicamentos',${idx},'nombre',this.value)">
            </div>
            <div class="field" style="margin-bottom:0">
              <label>Dosis</label>
              <input value="${escapeHtml(m.dosis||'')}" onchange="App.editarItemCatalogo('medicamentos',${idx},'dosis',this.value)">
            </div>
          </div>
          <div class="field-row" style="margin-top:6px">
            <div class="field" style="margin-bottom:0">
              <label>Vía</label>
              <input value="${escapeHtml(m.via||'')}" onchange="App.editarItemCatalogo('medicamentos',${idx},'via',this.value)">
            </div>
            <div class="field" style="margin-bottom:0">
              <label>Frecuencia</label>
              <input value="${escapeHtml(m.frecuencia||'')}" onchange="App.editarItemCatalogo('medicamentos',${idx},'frecuencia',this.value)">
            </div>
          </div>
          <div class="field" style="margin-top:6px;margin-bottom:0">
            <label>Nota</label>
            <input value="${escapeHtml(m.nota||'')}" onchange="App.editarItemCatalogo('medicamentos',${idx},'nota',this.value)">
          </div>
          <div style="text-align:right;margin-top:6px">
            <button class="btn ghost small" onclick="App.eliminarItemCatalogo('medicamentos',${idx})">Eliminar</button>
          </div>
        </div>
      `).join('');
      bodyHtml += `
        <hr>
        <h4>Agregar nuevo medicamento</h4>
        <div class="field-row">
          <div class="field"><label>Nombre</label><input id="newMedNombre"></div>
          <div class="field"><label>Dosis</label><input id="newMedDosis"></div>
        </div>
        <div class="field-row">
          <div class="field"><label>Vía</label><input id="newMedVia"></div>
          <div class="field"><label>Frecuencia</label><input id="newMedFrec"></div>
        </div>
        <div class="field"><label>Nota</label><input id="newMedNota"></div>
        <button class="btn" onclick="App.agregarMedCatalogo()">+ Agregar al catálogo</button>
      `;
    } else if (catalogo === 'esquemasEgreso') {
      bodyHtml = items.map((es, idx) => `
        <div class="card compact" style="margin-bottom:6px">
          <div class="field" style="margin-bottom:6px">
            <label>Nombre del esquema</label>
            <input value="${escapeHtml(es.nombre||'')}" onchange="App.editarItemCatalogo('esquemasEgreso',${idx},'nombre',this.value)">
          </div>
          <div class="field" style="margin-bottom:0">
            <label>Contenido (una indicación por línea)</label>
            <textarea rows="6" onchange="App.editarItemCatalogo('esquemasEgreso',${idx},'contenido',this.value)">${escapeHtml(es.contenido||'')}</textarea>
          </div>
          <div style="text-align:right;margin-top:6px">
            <button class="btn ghost small" onclick="App.eliminarItemCatalogo('esquemasEgreso',${idx})">Eliminar</button>
          </div>
        </div>
      `).join('');
      bodyHtml += `
        <hr>
        <h4>Agregar nuevo esquema</h4>
        <div class="field"><label>Nombre</label><input id="newEsqNombre" placeholder="Ej. Postop hombro"></div>
        <div class="field"><label>Contenido</label><textarea id="newEsqContenido" rows="5" placeholder="Una indicación por línea"></textarea></div>
        <button class="btn" onclick="App.agregarEsqCatalogo()">+ Agregar al catálogo</button>
      `;
    } else {
      // Lista simple (diagnosticos, procedimientos, cirujanos)
      bodyHtml = `
        <div class="catalog-grid" style="margin-bottom:14px">
          ${items.map((it, idx) => `
            <div class="catalog-item" style="display:flex;justify-content:space-between;align-items:center;gap:6px">
              <span style="flex:1">${escapeHtml(it)}</span>
              <button class="btn ghost small" style="padding:2px 6px;font-size:.75rem" onclick="App.eliminarItemCatalogo('${catalogo}',${idx})">×</button>
            </div>
          `).join('')}
        </div>
        <hr>
        <h4>Agregar nuevo</h4>
        <div style="display:flex;gap:6px">
          <input id="newSimpleItem" style="flex:1" placeholder="Escribe aquí y presiona Agregar">
          <button class="btn" onclick="App.agregarSimpleCatalogo('${catalogo}')">+ Agregar</button>
        </div>
      `;
    }

    const html = `
      <div class="modal-backdrop" onclick="if(event.target===this) App._closeSecondary()">
        <div class="modal" style="max-width:780px">
          <div class="modal-head">
            <div>
              <div style="font-weight:600">Administrar: ${titulos[catalogo]||catalogo}</div>
              <div style="font-size:.8rem;opacity:.9">${items.length} item(s) · cambios se sincronizan a todos los dispositivos</div>
            </div>
            <button class="close-x" onclick="App._closeSecondary()">✕</button>
          </div>
          <div class="modal-body">${bodyHtml}</div>
          <div class="modal-foot">
            <button class="btn ghost" onclick="App._closeSecondary()">Cerrar</button>
          </div>
        </div>
      </div>
    `;
    this._renderSecondary(html);
  },

  editarItemCatalogo(catalogo, idx, campo, valor) {
    const items = getCatalogo(catalogo);
    if (!items[idx]) return;
    if (typeof items[idx] === 'string') {
      items[idx] = valor;
    } else {
      items[idx][campo] = valor;
    }
    State.save();
  },

  eliminarItemCatalogo(catalogo, idx) {
    if (!confirm('¿Eliminar este item del catálogo?')) return;
    const items = getCatalogo(catalogo);
    items.splice(idx, 1);
    State.save();
    this.openCatalogoAdmin(catalogo);
  },

  agregarSimpleCatalogo(catalogo) {
    const inp = document.getElementById('newSimpleItem');
    const v = (inp.value||'').trim();
    if (!v) return;
    const items = getCatalogo(catalogo);
    if (items.some(x => (typeof x === 'string' ? x : x.nombre || '').toLowerCase() === v.toLowerCase())) {
      alert('Ya existe.'); return;
    }
    items.push(v);
    State.save();
    this.openCatalogoAdmin(catalogo);
  },

  agregarMedCatalogo() {
    const nombre = (document.getElementById('newMedNombre').value || '').trim();
    if (!nombre) { alert('Pon al menos el nombre'); return; }
    const items = getCatalogo('medicamentos');
    items.push({
      nombre,
      dosis: document.getElementById('newMedDosis').value || '',
      via: document.getElementById('newMedVia').value || '',
      frecuencia: document.getElementById('newMedFrec').value || '',
      nota: document.getElementById('newMedNota').value || ''
    });
    State.save();
    this.openCatalogoAdmin('medicamentos');
  },

  agregarEsqCatalogo() {
    const nombre = (document.getElementById('newEsqNombre').value || '').trim();
    const contenido = (document.getElementById('newEsqContenido').value || '').trim();
    if (!nombre || !contenido) { alert('Completa nombre y contenido.'); return; }
    const items = getCatalogo('esquemasEgreso');
    items.push({ nombre, contenido });
    State.save();
    this.openCatalogoAdmin('esquemasEgreso');
  },

  _aplicarEsquema(egresoId, campo, idxEsquema) {
    const eg = State.data.egresos.find(x => x.id === egresoId);
    if (!eg) return;
    const esquema = getCatalogo('esquemasEgreso')[idxEsquema];
    if (!esquema) return;
    const previo = eg[campo] || '';
    eg[campo] = previo + (previo ? '\n\n' : '') + esquema.contenido;
    eg.modificado = new Date().toISOString();
    State.save();
    this._closeSecondary();
    this.render();
  },

  copyText(t) {
    navigator.clipboard.writeText(t).then(()=> {
      alert('Copiado al portapapeles.');
    }).catch(()=>{
      const ta = document.createElement('textarea');
      ta.value = t; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); ta.remove();
      alert('Copiado.');
    });
  },

  saveFbConfig() {
    let txt = (document.getElementById('fbConfigInput').value||'').trim();
    if (!txt) { alert('Pega la configuración primero.'); return; }

    // Limpiar etiquetas <script>, comentarios HTML y comentarios JS por si pegaron el bloque completo
    txt = txt
      .replace(/<script[^>]*>/gi, '')
      .replace(/<\/script>/gi, '')
      .replace(/\/\/[^\n]*/g, '')        // // comentarios
      .replace(/\/\*[\s\S]*?\*\//g, ''); // /* comentarios */

    let cfg = null;
    let lastErr = '';

    // Intento 1: JSON puro
    try { cfg = JSON.parse(txt); } catch(e) { lastErr = e.message; }

    // Intento 2: parser manual con regex (sin eval, compatible con CSP estricta)
    if (!cfg) {
      const m = txt.match(/\{[\s\S]*\}/);
      if (m) {
        cfg = {};
        // Extraer pares clave: "valor" o clave: 'valor'
        const re = /(\w+)\s*:\s*(["'])((?:\\.|(?!\2).)*)\2/g;
        let match;
        while ((match = re.exec(m[0])) !== null) {
          cfg[match[1]] = match[3];
        }
        if (Object.keys(cfg).length === 0) {
          cfg = null;
          lastErr = 'No se encontraron pares "clave: \"valor\"" dentro de las llaves.';
        }
      } else {
        lastErr = 'No se encontraron las llaves { } en el texto pegado.';
      }
    }

    if (!cfg || typeof cfg !== 'object' || !cfg.apiKey || !cfg.projectId) {
      const faltan = [];
      if (cfg && !cfg.apiKey) faltan.push('apiKey');
      if (cfg && !cfg.projectId) faltan.push('projectId');
      alert('No se pudo leer la configuración.\n\n' +
        (faltan.length
          ? 'Falta(n): ' + faltan.join(', ')
          : 'Asegúrate de pegar el objeto firebaseConfig completo, desde la llave { hasta }, incluyendo apiKey y projectId.') +
        (lastErr ? '\n\nDetalle técnico: ' + lastErr : '') +
        '\n\nEjemplo válido:\n{\n  apiKey: "AIza...",\n  authDomain: "tu-proyecto.firebaseapp.com",\n  projectId: "tu-proyecto",\n  ...\n}');
      return;
    }

    // Limpiar a sólo los campos que necesita Firebase (quita ruido)
    const keep = ['apiKey','authDomain','projectId','storageBucket','messagingSenderId','appId','databaseURL','measurementId'];
    const clean = {};
    keep.forEach(k => { if (cfg[k] != null) clean[k] = cfg[k]; });

    Sync.setConfig(clean);
    this.closeModal();
    Sync.disconnect();
    Sync.connect().then(ok => {
      if (ok) alert('¡Conectado a la nube! Los cambios se sincronizarán automáticamente entre dispositivos.');
    });
  },

  clearFbConfig() {
    if (!confirm('¿Desconectar de la nube? Los datos en la nube no se borran, sólo dejarás de sincronizar en este dispositivo.')) return;
    Sync.disconnect();
    Sync.setConfig(null);
    this.closeModal();
  },

  refreshAlertCount() {
    let total = 0;
    State.data.patients.filter(p=>!p.fechaEgreso).forEach(p => {
      total += calcularAlertasPaciente(p).filter(a => a.tipo==='red' || a.tipo==='yellow').length;
    });
    const badge = document.getElementById('alertCount');
    if (total > 0) {
      badge.style.display = 'inline-block';
      badge.textContent = total;
    } else {
      badge.style.display = 'none';
    }
  },

  switchTab(tab) {
    State.currentTab = tab;
    document.querySelectorAll('#tabs button').forEach(b => {
      b.classList.toggle('active', b.dataset.tab === tab);
    });
    this.render();

  render() {
    const view = document.getElementById('view');

    else if (t === 'cirugia') view.innerHTML = this.renderCirugia();

    else if (t === 'alertas') view.innerHTML = this.renderAlertas();

          <button class="btn small" style="margin-top:6px" onclick="App.exportData()">Exportar ahora</button>
        </div>`

    // Filtros rápidos (chips)
    const counts = this._countsPorFiltro(incluirEgresados);
    const chips = `

        <div class="print-sub" id="printSub"></div>

      ${chips}

        <input type="search" id="searchInput" placeholder="Buscar por nombre, cédula, cama, dx, cirujano..." value="${escapeHtml(State.search)}"
               oninput="App.setSearch(this.value)">

  _chip(tipo, label, count) {
    return `<button class="chip ${State.filterType===tipo?'active':''}" onclick="App.setFilter('${tipo}')">${label}<span class="count">${count}</span></button>`;
  },

  _countsPorFiltro(incluirEgresados) {
    const base = State.data.patients.filter(p => incluirEgresados || !p.fechaEgreso);
    const hoy = todayISO();
    const programaHoy = (State.data.programas || []).find(prg => prg.fecha === hoy);
    const idsHoy = new Set(programaHoy ? programaHoy.pacientes.map(e => e.pacienteId) : []);
    const idsProgramados = new Set();
    (State.data.programas || []).forEach(prg => {
      if (prg.fecha >= hoy) prg.pacientes.forEach(e => {
        if (e.operado === null) idsProgramados.add(e.pacienteId);
      });
    });
    const yo = getCurrentUser();
    return {
      todos: base.length,
      listos: base.filter(p => evaluarAptoCirugia(p).listo).length,
      postop: base.filter(p => p.cirugia && p.cirugia.realizada).length,
      infeccion: base.filter(p => tieneInfeccion(p)).length,
      hoy: base.filter(p => idsHoy.has(p.id)).length,
      sinprog: base.filter(p => evaluarAptoCirugia(p).listo && !idsProgramados.has(p.id)).length,
      misPacientes: yo ? base.filter(p => (p.cirujano||'').toLowerCase().includes(yo.toLowerCase()) || ((p.cirujano||'').toLowerCase().split(' ').some(w => w && yo.toLowerCase().includes(w)))).length : 0
    };
  },

  setFilter(tipo) {
    State.filterType = tipo;
    // Re-render: necesitamos recalcular los counts y la lista
    this.render();
  },

  matchesFilter(p) {
    const t = State.filterType;
    if (!t || t === 'todos') return true;
    if (t === 'listos') return evaluarAptoCirugia(p).listo;
    if (t === 'postop') return p.cirugia && p.cirugia.realizada;
    if (t === 'infeccion') return tieneInfeccion(p);
    if (t === 'hoy') {
      const programaHoy = (State.data.programas || []).find(prg => prg.fecha === todayISO());
      if (!programaHoy) return false;
      return programaHoy.pacientes.some(e => e.pacienteId === p.id);
    }
    if (t === 'sinprog') {
      if (!evaluarAptoCirugia(p).listo) return false;
      const enProg = (State.data.programas || []).some(prg =>
        prg.fecha >= todayISO() && prg.pacientes.some(e => e.pacienteId === p.id && e.operado === null));
      return !enProg;
    }
    if (t === 'misPacientes') {
      const yo = (getCurrentUser()||'').toLowerCase();
      if (!yo) return true;
      const cir = (p.cirujano||'').toLowerCase();
      if (!cir) return false;
      // Coincidencia por inclusión de palabras (apellido suele bastar)
      const palabrasYo = yo.split(' ').filter(w => w.length > 2);
      return palabrasYo.some(w => cir.includes(w));
    }
    return true;
  },

  // Sólo el contenido de la lista — sin la casilla de búsqueda. Se re-renderiza al filtrar
  // sin destruir el input y por lo tanto sin perder el foco del teclado.
  renderPatientListContent(incluirEgresados) {
    const pacientes = State.data.patients

        if (!isNaN(na) && !isNaN(nb) && na !== nb) return na - nb;
        return ca.localeCompare(cb, 'es');
      });

    if (pacientes.length === 0) {
      const sinFiltro = !State.search;
      return `<div class="empty">
        <div class="ico">${sinFiltro?'🛏️':'🔍'}</div>
        <div>${sinFiltro
          ? `No hay pacientes ${incluirEgresados?'':'activos'}.`
          : `Sin resultados para "${escapeHtml(State.search)}".`}</div>
        ${sinFiltro
          ? `<div style="margin-top:10px"><button class="btn" onclick="App.openNew()">+ Agregar primer paciente</button></div>`
          : ''}
      </div>`;
    }

    let html = `
      <div class="card print-only">
        <table>
          <thead><tr>
            <th>Cama</th><th>Nombre</th><th>Cédula</th><th>Edad</th>
            <th>Días</th><th>Diagnóstico</th><th>¿Operable?</th><th>Cirujano</th>
          </tr></thead>
          <tbody>
            ${pacientes.map(p => {
              const apto = evaluarAptoCirugia(p);

              return `<tr>
                <td><strong>${escapeHtml(p.cama||'—')}</strong></td>
                <td>${escapeHtml(p.nombre||'')}</td>
                <td>${escapeHtml(p.cedula||'')}</td>
                <td>${escapeHtml(p.edad||'')}</td>
                <td>${dias}</td>
                <td>${escapeHtml((p.diagnosticos||[]).join('; ') || '—')}</td>
                <td>${apto.listo ? 'SÍ' : 'No · '+apto.faltantes.slice(0,3).join(', ')+(apto.faltantes.length>3?'...':'')}</td>
                <td>${escapeHtml(p.cirujano||'—')}</td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>
    `;

    html += `<div class="no-print">${pacientes.map(p => this.renderPatientCard(p)).join('')}</div>`;
    return html;
  },

  renderPatientCard(p) {
    const dias = daysBetween(p.fechaIngreso);
    const apto = evaluarAptoCirugia(p);
    const alertas = calcularAlertasPaciente(p);
    const tieneRoja = alertas.some(a=>a.tipo==='red');
    const tieneAmarilla = alertas.some(a=>a.tipo==='yellow');
    const cirugiasArr = getCirugiasRealizadas(p);
    const ult = ultimaCirugia(p);
    const operado = !!ult;
    const dpostop = diasPostop(p);
    const requiereOtra = !!p.requiereOtraCirugia;
    let cls = 'patient-card';
    if ((operado || apto.listo) && !tieneRoja) cls += ' ready';
    if (tieneRoja) cls += ' alert';
    else if (tieneAmarilla || requiereOtra) cls += ' warn';
    if (p.fechaEgreso) cls += ' muted';

    const dxList = (p.diagnosticos || []).join(', ');
    let estadoTag = '';
    if (operado && requiereOtra) {
      estadoTag = `<span class="tag green">Operado · día ${dpostop} postop</span> <span class="tag yellow">Pendiente otra cirugía</span>`;
    } else if (operado) {
      estadoTag = `<span class="tag green">Operado · día ${dpostop} postop${cirugiasArr.length>1?` (${cirugiasArr.length} cirugías)`:''}</span>`;
    } else if (apto.listo) {
      estadoTag = '<span class="tag green">Listo cirugía</span>';
    } else {
      estadoTag = '<span class="tag red">Pendiente</span>';
    }
    const tagsHtml = [
      estadoTag,
      tieneInfeccion(p) ? '<span class="tag yellow">Infección</span>' : '',
      p.fechaEgreso ? '<span class="tag gray">Egresado</span>' : ''
    ].filter(Boolean).join(' ');

    return `
      <div class="${cls}" onclick="App.openPaciente('${p.id}')">
        <div class="pc-row">
          <div class="pc-bed">${escapeHtml(p.cama||'?')}</div>
          <div class="pc-info">
            <div class="pc-name">${escapeHtml(p.nombre || '(sin nombre)')}</div>
            <div class="pc-meta">
              ${escapeHtml(p.cedula||'—')} · ${escapeHtml(p.edad||'?')} años · ${dias} día(s) hosp.
              ${p.cirujano? ' · Cir: '+escapeHtml(p.cirujano):''}
            </div>
            <div class="pc-meta" style="margin-top:4px">
              <strong>Dx:</strong> ${escapeHtml(dxList || '—')}
            </div>
            ${operado?`<div class="pc-meta" style="margin-top:4px;color:#065f46">
              <strong>Última cirugía:</strong> ${escapeHtml(ult.procedimiento||'—')}
              ${ult.lateralidad?' ('+escapeHtml(ult.lateralidad)+')':''}
              · ${fmtDate(ult.fecha)} · ${dpostop} día(s) postop
              ${cirugiasArr.length>1?` · ${cirugiasArr.length} cirugías totales`:''}
            </div>`:''}
            <div class="pc-tags">${tagsHtml}</div>
            ${alertas.filter(a=>a.tipo==='red').slice(0,1).map(a=>`
              <div class="alert-box red" style="margin-top:6px;font-size:.78rem;padding:6px 8px">⚠ ${escapeHtml(a.texto)}</div>
            `).join('')}
          </div>
        </div>
      </div>
    `;
  },

  setSearch(v) {
    State.search = v;
    // Sólo actualizar la lista, no la casilla de búsqueda — así el input no
    // pierde el foco del teclado al escribir cada letra.
    if (State.currentTab === 'lista' || State.currentTab === 'todos') {
      const container = document.getElementById('patientListContainer');
      if (container) {
        container.innerHTML = this.renderPatientListContent(State.currentTab === 'todos');
        return;
      }
    }
    this.render();
  },

  matchesSearch(p) {
    const q = (State.search||'').toLowerCase().trim();
    if (!q) return true;
    const blob = [
      p.nombre, p.cedula, p.cama, p.cirujano,
      p.alergias, p.antecedentesPatologicos,
      ...(p.diagnosticos||[])
    ].join(' ').toLowerCase();
    return blob.includes(q);
  },

  /* ============================================================
     PROGRAMA QUIRÚRGICO — múltiples programas por día con historial
     ============================================================ */
  _currentProgramaId: null,

  renderPrograma() {
    // Si hay un programa abierto, mostrar su detalle
    if (this._currentProgramaId) {
      return this.renderProgramaDia(this._currentProgramaId);
    }

    const programas = (State.data.programas || []).slice()
      .sort((a,b) => (b.fecha||'').localeCompare(a.fecha||''));
    const pendientes = this.programasPendientesRevision();

    let html = '';
    // Banner de revisión pendiente
    if (pendientes.length > 0) {
      html += `<div class="alert-box red" style="margin-bottom:12px">
        <strong>⚠ ${pendientes.length} programa(s) pendientes de revisar</strong><br>
        Hay cirugías programadas en fechas pasadas que aún no tienen confirmado si se realizaron o no.
        ${pendientes.map(prg => `
          <div style="margin-top:8px">
            <button class="btn small" onclick="App.abrirRevisionPrograma('${prg.id}')">
              Revisar programa de ${fmtDateLong(prg.fecha)}
            </button>
          </div>
        `).join('')}
      </div>`;
    }

    html += `
      <div class="toolbar no-print">
        <h2 style="margin:0">Programas quirúrgicos (${programas.length})</h2>
        <div style="flex:1"></div>
        <button class="btn small" onclick="App.crearPrograma()">+ Nuevo programa</button>
      </div>
    `;

    if (programas.length === 0) {
      html += `<div class="empty">
        <div class="ico">📅</div>
        <div>No hay programas registrados.</div>
        <div style="margin-top:10px"><button class="btn" onclick="App.crearPrograma()">+ Crear primer programa</button></div>
      </div>`;
      return html;
    }

    // Tarjetas resumen de cada programa
    html += programas.map(prg => {
      const total = prg.pacientes.length;
      const operados = prg.pacientes.filter(e => e.operado === true).length;
      const noOperados = prg.pacientes.filter(e => e.operado === false).length;
      const pendientesRev = prg.pacientes.filter(e => e.operado === null).length;
      const esPasado = prg.fecha < todayISO();
      const esHoy = prg.fecha === todayISO();
      const necesitaRevision = esPasado && !prg.revisado && pendientesRev > 0;

      let cls = 'patient-card';
      let estadoTag = '';
      if (necesitaRevision) {
        cls += ' alert';
        estadoTag = '<span class="tag red">Pendiente revisión</span>';
      } else if (prg.revisado) {
        cls += ' ready';
        estadoTag = '<span class="tag green">Revisado</span>';
      } else if (esHoy) {
        estadoTag = '<span class="tag blue">Hoy</span>';
      } else if (prg.fecha > todayISO()) {
        estadoTag = '<span class="tag yellow">Próximo</span>';
      }

      // Conteo de quirófanos
      const { grupos: gprev, quirofanos: qprev } = agruparPorQuirofano(prg);
      const conQuirofano = qprev.filter(q => q).length;
      const sinQuirofano = (gprev[''] || []).length;

      // Lista compacta de los pacientes (agrupada por quirófano)
      const lineas = [];
      qprev.forEach(q => {
        gprev[q].forEach(e => {
          const p = State.data.patients.find(x => x.id === e.pacienteId);
          if (!p) return;
          const opTag = e.operado === true ? '<span class="tag green" style="font-size:.7rem">✓ Op</span>'
                      : e.operado === false ? '<span class="tag red" style="font-size:.7rem">✗ No op</span>'
                      : '';
          const qBadge = q ? `<span class="tag blue" style="font-size:.7rem">Q${escapeHtml(q)}#${e.orden||1}</span>` : '';
          lineas.push(`<div style="margin-top:4px;font-size:.85rem">
            ${opTag} ${qBadge} <strong>${escapeHtml(p.cama||'?')}</strong> ${escapeHtml(p.nombre||'')} —
            <em>${escapeHtml(e.procedimiento||'(sin procedimiento)')}</em>
            ${e.lateralidad?` (${escapeHtml(e.lateralidad)})`:''}
          </div>`);
        });
      });
      const previewPacientes = lineas.slice(0,5).join('');
      const masPacientes = lineas.length > 5 ? `<div class="muted" style="font-size:.8rem;margin-top:4px">+ ${lineas.length-5} más…</div>` : '';
      const resumenQ = (conQuirofano > 0 ? `${conQuirofano} quirófano(s)` : '') +
                       (sinQuirofano > 0 ? (conQuirofano>0?', ':'') + `${sinQuirofano} sin asignar` : '');

      return `
        <div class="${cls}" onclick="App.abrirPrograma('${prg.id}')">
          <div class="pc-row">
            <div class="pc-info">
              <div class="pc-name">
                Programa del ${fmtDateLong(prg.fecha)}
                ${estadoTag}
              </div>
              <div class="pc-meta">
                ${total} cirugía(s) ${resumenQ?'· '+resumenQ:''} ·
                ${operados>0?`${operados} operado(s) · `:''}
                ${noOperados>0?`${noOperados} no operado(s) · `:''}
                ${pendientesRev>0?`${pendientesRev} sin revisar`:''}
              </div>
              ${previewPacientes}
              ${masPacientes}
              ${prg.notas?`<div class="pc-meta" style="margin-top:4px"><em>"${escapeHtml(prg.notas)}"</em></div>`:''}
            </div>
          </div>
        </div>
      `;
    }).join('');

    return html;
  },

    const total = prg.pacientes.length;
    const operados = prg.pacientes.filter(e => e.operado === true).length;

            </tr></thead>

              ${ents.map((e,i) => {
                const p = State.data.patients.find(x => x.id === e.pacienteId) || {};
