const App = {
  _currentModalId: null,

  // v3.25 (C3): Tracking de pacientes editados localmente recientemente.
  // Cuando llega un snapshot remoto, los pacientes en este map conservan su versión local
  // (porque el usuario probablemente está editando o acaba de editar).
  _dirtyPatients: {},        // {patientId: timestampMs}
  _pendingRemoteRefresh: {}, // {patientId: snapshotPatientObj} — cambios remotos diferidos
  _deletedPatients: {},      // v3.27: {patientId: timestampMs} — IDs eliminados localmente,
                              // para que un snapshot concurrente no los resucite
  _markPatientDirty(id) {
    if (!id) return;
    this._dirtyPatients[id] = Date.now();
  },
  _markPatientDeleted(id) {
    if (!id) return;
    this._deletedPatients[id] = Date.now();
  },
  _isPatientRecentlyDeleted(id, windowMs = 30000) {
    if (!id) return false;
    const t = this._deletedPatients[id];
    return !!t && (Date.now() - t < windowMs);
  },
  _isPatientDirty(id, windowMs = 15000) {
    if (!id) return false;
    // El paciente abierto en modal SIEMPRE se considera dirty (usuario está mirándolo/editándolo)
    if (this._currentModalId === id) return true;
    const t = this._dirtyPatients[id];
    return !!t && (Date.now() - t < windowMs);
  },
  _cleanupDirty() {
    const now = Date.now();
    for (const id in this._dirtyPatients) {
      if (now - this._dirtyPatients[id] > 60000) delete this._dirtyPatients[id];
    }
    // v3.27: limpiar también las eliminaciones después de 5 min (tiempo más que suficiente
    // para que la eliminación se propague al resto del equipo)
    for (const id in this._deletedPatients) {
      if (now - this._deletedPatients[id] > 5 * 60 * 1000) delete this._deletedPatients[id];
    }
  },

  // v3.25 (C3): mostrar banner sutil cuando hay cambios remotos diferidos para el paciente abierto
  _showDeferredBanner(patientId) {
    const modal = document.querySelector('#modalRoot .modal-body');
    if (!modal) return;
    // Si ya hay un banner, no duplicar
    if (modal.querySelector('.deferred-banner')) return;
    const banner = document.createElement('div');
    banner.className = 'alert-box yellow deferred-banner';
    banner.style.cssText = 'margin-bottom:10px;position:sticky;top:0;z-index:5;cursor:default';
    banner.innerHTML =
      '<div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">' +
        '<span style="flex:1">🔔 <strong>Otro dispositivo actualizó este paciente.</strong> Tus cambios locales están a salvo. ¿Aplicar los del equipo?</span>' +
        '<button class="btn small" onclick="App._aplicarCambiosDiferidos(\'' + patientId + '\')">Aplicar</button>' +
        '<button class="btn ghost small" onclick="App._descartarCambiosDiferidos(\'' + patientId + '\')">Descartar</button>' +
      '</div>';
    modal.insertBefore(banner, modal.firstChild);
  },

  _aplicarCambiosDiferidos(patientId) {
    const remoto = this._pendingRemoteRefresh[patientId];
    if (!remoto) {
      this._descartarCambiosDiferidos(patientId);
      return;
    }
    // Reemplazar el paciente con la versión remota (descarta cambios locales no pusheados)
    const idx = State.data.patients.findIndex(p => p.id === patientId);
    if (idx >= 0) {
      State.data.patients[idx] = remoto;
      delete this._dirtyPatients[patientId];   // ya no está sucio
      delete this._pendingRemoteRefresh[patientId];
      State.save();
      this.renderModal(patientId);
    }
  },

  _descartarCambiosDiferidos(patientId) {
    delete this._pendingRemoteRefresh[patientId];
    const banner = document.querySelector('#modalRoot .deferred-banner');
    if (banner) banner.remove();
  },

  // v3.26 (C6): Registrar service worker para offline + persistencia en iOS.
  // Si sw.js no se encuentra (hosting sin ese archivo), falla silencioso.
  async _registrarServiceWorker() {
    if (!('serviceWorker' in navigator)) {
      console.log('[SW] Service Workers no soportados en este navegador');
      return;
    }
    try {
      // Comprobar si el sw.js existe antes de intentar registrar (evita logs de error feos)
      const test = await fetch('sw.js', { method: 'HEAD', cache: 'no-store' });
      if (!test.ok) {
        console.log('[SW] sw.js no encontrado en el servidor — la app funciona igual, pero sin cache offline.');
        return;
      }
      const reg = await navigator.serviceWorker.register('sw.js');
      console.log('[SW] Registrado:', reg.scope);
      // Auto-actualizar cuando hay nueva versión
      reg.addEventListener('updatefound', () => {
        const nuevo = reg.installing;
        if (!nuevo) return;
        nuevo.addEventListener('statechange', () => {
          if (nuevo.state === 'installed' && navigator.serviceWorker.controller) {
            console.log('[SW] Nueva versión instalada — se activará al recargar.');
          }
        });
      });
    } catch(e) {
      console.warn('[SW] Error registrando:', e.message || e);
    }
  },

  async _pedirPersistencia() {
    if (!navigator.storage || !navigator.storage.persist) return;
    try {
      const yaPersistido = await navigator.storage.persisted();
      if (yaPersistido) {
        console.log('[Storage] Almacenamiento ya es persistente.');
        return;
      }
      // Pedir persistencia. En iOS / Safari requiere que la app esté instalada como PWA.
      // En Chrome desktop se otorga automáticamente si la app tiene engagement alto.
      const otorgado = await navigator.storage.persist();
      console.log('[Storage] Persistencia ' + (otorgado ? 'OTORGADA' : 'no otorgada (aún)'));
    } catch(e) {
      console.warn('[Storage] persist() falló:', e.message || e);
    }
  },

  editarUsuario(idx, campo, valor) {
    const usuarios = listaUsuarios();
    const target = usuarios[idx];
    if (!target) return;
    const original = getConfig().usuarios.find(u => u.nombre === target.nombre);
    if (!original) return;
    const valorViejo = original.nombre;
    original[campo] = valor;
    // Si cambian nombre, mantener al usuario actual del dispositivo si era éste
    if (campo === 'nombre' && getCurrentUser() === valorViejo) {
      setCurrentUser(valor);
      this._refreshUserBadge();
    }
    State.save();

    const usuarios = listaUsuarios();
    const target = usuarios[idx];
    if (!target) return;
    if (!confirm(`¿Eliminar a ${target.nombre} de la lista de usuarios? El historial que ya generó se conserva.`)) return;
    getConfig().usuarios = getConfig().usuarios.filter(u => u.nombre !== target.nombre);
    if (getCurrentUser() === target.nombre) {
      setCurrentUser('');
      this._refreshUserBadge();
    }
    State.save();
    this.openIdentificarse(false);
  },

  _filtrarCatalogoPicker(q) {
    const grid = document.getElementById('catalogPickerGrid');
    if (!grid) return;
    q = (q||'').toLowerCase();
    Array.from(grid.children).forEach(child => {
      const name = child.dataset.name || '';
      child.style.display = (q === '' || name.includes(q)) ? '' : 'none';
    });
  },

  _toggleDxFromCatalog(pacienteId, el, valor) {
    const p = this._findP(pacienteId); if (!p) return;
    if (!p.diagnosticos) p.diagnosticos = [];
    valor = valor.replace(/&apos;/g, "'");
    const idx = p.diagnosticos.indexOf(valor);
    if (idx >= 0) {
      p.diagnosticos.splice(idx, 1);
      el.classList.remove('selected');
    } else {
      p.diagnosticos.push(valor);
      el.classList.add('selected');
    }
    logCambio(p, 'Edición', `Dx ${idx>=0?'quitado':'agregado'}: ${valor}`);
    State.save();
  },

  _aplicarProcEntrada(programaId, entradaId, valor) {
    valor = valor.replace(/&apos;/g, "'");

  editarItemCatalogo(catalogo, idx, campo, valor) {
    const items = getCatalogo(catalogo);
    if (!items[idx]) return;
    if (typeof items[idx] === 'string') {
      items[idx] = valor;
    } else {
      items[idx][campo] = valor;
    }
    State.save();
  },

  eliminarItemCatalogo(catalogo, idx) {
    if (!confirm('¿Eliminar este item del catálogo?')) return;
    const items = getCatalogo(catalogo);
    items.splice(idx, 1);
    State.save();
    this.openCatalogoAdmin(catalogo);
  },

  agregarSimpleCatalogo(catalogo) {
    const inp = document.getElementById('newSimpleItem');
    const v = (inp.value||'').trim();
    if (!v) return;
    const items = getCatalogo(catalogo);
    if (items.some(x => (typeof x === 'string' ? x : x.nombre || '').toLowerCase() === v.toLowerCase())) {
      alert('Ya existe.'); return;

    items.push(v);
    State.save();
    this.openCatalogoAdmin(catalogo);

    const nombre = (document.getElementById('newMedNombre').value || '').trim();

    });

  agregarEsqCatalogo() {

  _aplicarEsquema(egresoId, campo, idxEsquema) {
    const eg = State.data.egresos.find(x => x.id === egresoId);
    if (!eg) return;
    const esquema = getCatalogo('esquemasEgreso')[idxEsquema];
    if (!esquema) return;
    const previo = eg[campo] || '';
    eg[campo] = previo + (previo ? '\n\n' : '') + esquema.contenido;
    eg.modificado = new Date().toISOString();
    State.save();
    this._closeSecondary();
    this.render();

  copyText(t) {
    navigator.clipboard.writeText(t).then(()=> {
      alert('Copiado al portapapeles.');
    }).catch(()=>{
      const ta = document.createElement('textarea');
      ta.value = t; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); ta.remove();
      alert('Copiado.');
    });
  },

  saveFbConfig() {
    let txt = (document.getElementById('fbConfigInput').value||'').trim();
    if (!txt) { alert('Pega la configuración primero.'); return; }

    // Limpiar etiquetas <script>, comentarios HTML y comentarios JS por si pegaron el bloque completo
    txt = txt
      .replace(/<script[^>]*>/gi, '')
      .replace(/<\/script>/gi, '')
      .replace(/\/\/[^\n]*/g, '')        // // comentarios
      .replace(/\/\*[\s\S]*?\*\//g, ''); // /* comentarios */

    let cfg = null;
    let lastErr = '';

    // Intento 1: JSON puro
    try { cfg = JSON.parse(txt); } catch(e) { lastErr = e.message; }

    // Intento 2: parser manual con regex (sin eval, compatible con CSP estricta)
    if (!cfg) {
      const m = txt.match(/\{[\s\S]*\}/);
      if (m) {
        cfg = {};
        // Extraer pares clave: "valor" o clave: 'valor'
        const re = /(\w+)\s*:\s*(["'])((?:\\.|(?!\2).)*)\2/g;
        let match;
        while ((match = re.exec(m[0])) !== null) {
          cfg[match[1]] = match[3];
        }
        if (Object.keys(cfg).length === 0) {
          cfg = null;
          lastErr = 'No se encontraron pares "clave: \"valor\"" dentro de las llaves.';
        }
      } else {
        lastErr = 'No se encontraron las llaves { } en el texto pegado.';
      }
    }

    if (!cfg || typeof cfg !== 'object' || !cfg.apiKey || !cfg.projectId) {
      const faltan = [];
      if (cfg && !cfg.apiKey) faltan.push('apiKey');
      if (cfg && !cfg.projectId) faltan.push('projectId');
      alert('No se pudo leer la configuración.\n\n' +
        (faltan.length
          ? 'Falta(n): ' + faltan.join(', ')
          : 'Asegúrate de pegar el objeto firebaseConfig completo, desde la llave { hasta }, incluyendo apiKey y projectId.') +
        (lastErr ? '\n\nDetalle técnico: ' + lastErr : '') +
        '\n\nEjemplo válido:\n{\n  apiKey: "AIza...",\n  authDomain: "tu-proyecto.firebaseapp.com",\n  projectId: "tu-proyecto",\n  ...\n}');
      return;
    }

    // Limpiar a sólo los campos que necesita Firebase (quita ruido)
    const keep = ['apiKey','authDomain','projectId','storageBucket','messagingSenderId','appId','databaseURL','measurementId'];
    const clean = {};
    keep.forEach(k => { if (cfg[k] != null) clean[k] = cfg[k]; });

    Sync.setConfig(clean);
    this.closeModal();
    Sync.disconnect();
    Sync.connect().then(ok => {
      if (ok) alert('¡Conectado a la nube! Los cambios se sincronizarán automáticamente entre dispositivos.');
    });
  },

  clearFbConfig() {
    if (!confirm('¿Desconectar de la nube? Los datos en la nube no se borran, sólo dejarás de sincronizar en este dispositivo.')) return;
    Sync.disconnect();
    Sync.setConfig(null);
    this.closeModal();
  },

  refreshAlertCount() {
    let total = 0;
    State.data.patients.filter(p=>!p.fechaEgreso).forEach(p => {
      total += calcularAlertasPaciente(p).filter(a => a.tipo==='red' || a.tipo==='yellow').length;
    });
    const badge = document.getElementById('alertCount');
    if (badge) {
      if (total > 0) {
        badge.style.display = 'inline-block';
        badge.textContent = total;
      } else {
        badge.style.display = 'none';
      }
    }
    // Badge de IC pendientes
    const icPend = (State.data.interconsultasEntrantes || [])
      .filter(ic => ic.estado === 'pendiente' || ic.estado === 'en_evaluacion').length;
    const icBadge = document.getElementById('icRecCount');
    if (icBadge) {
      if (icPend > 0) {
        icBadge.style.display = 'inline-block';
        icBadge.textContent = icPend;
      } else {
        icBadge.style.display = 'none';
      }
    }
    // Badge de Resumen: cantidad de pacientes con pendientes
    const conPend = State.data.patients.filter(p => !p.fechaEgreso)
      .filter(p => calcularPendientesPaciente(p).length > 0).length;
    const resBadge = document.getElementById('resumenCount');
    if (resBadge) {
      if (conPend > 0) {
        resBadge.style.display = 'inline-block';
        resBadge.textContent = conPend;
      } else {
        resBadge.style.display = 'none';
      }
    }
  },

  switchTab(tab) {
    State.currentTab = tab;
    document.querySelectorAll('#tabs button').forEach(b => {
      b.classList.toggle('active', b.dataset.tab === tab);
    });
    this.render();

  render() {
    const view = document.getElementById('view');
    const t = State.currentTab;
    if (t === 'lista') view.innerHTML = this.renderLista(false);
    else if (t === 'resumen') view.innerHTML = this.renderResumen();
    else if (t === 'cirugia') view.innerHTML = this.renderCirugia();
    else if (t === 'programa') view.innerHTML = this.renderPrograma();
    else if (t === 'icrecibidas') view.innerHTML = this.renderICRecibidas();
    else if (t === 'salidas') view.innerHTML = this.renderSalidas();
    else if (t === 'reportes') view.innerHTML = this.renderReportes();
    else if (t === 'alertas') view.innerHTML = this.renderAlertas();
    this.refreshAlertCount();
  },

  /* ---------- Pase de visita / lista por cama ---------- */
  renderLista(incluirEgresados) {
    const cfg = getConfig();
    const titulo = incluirEgresados ? 'Todos los pacientes' : 'Pase de visita (por cama)';
    const hospName = cfg.hospitalNombre ? `${escapeHtml(cfg.hospitalNombre)} — ` : '';
    const dEx = diasDesdeUltimoExport();
    const banner = (dEx >= 7)
      ? `<div class="alert-box yellow no-print" style="margin-bottom:12px">
          <strong>⚠ Recordatorio de respaldo:</strong> ${dEx === Infinity ? 'todavía no has hecho ningún respaldo' : `hace ${dEx} día(s) que no exportas`}.
          Te recomendamos exportar un respaldo periódicamente para no perder información.
          <button class="btn small" style="margin-top:6px" onclick="App.exportData()">Exportar ahora</button>
        </div>`
      : '';
    // Banner de archivado de egresados antiguos
    const meses = (cfg.archivoMesesAntiguedad === undefined ? 6 : cfg.archivoMesesAntiguedad);
    const archivar = (meses > 0 && !archivoEstaSnoozed()) ? egresadosParaArchivar(meses) : [];
    const bannerArchivo = (archivar.length > 0)
      ? `<div class="alert-box blue no-print" style="margin-bottom:12px">
          <strong>📦 Archivado de egresados antiguos:</strong> hay <strong>${archivar.length}</strong> paciente(s) egresado(s) hace más de ${meses} mes(es).
          Considera archivar para liberar espacio en la base de datos.
          <div style="margin-top:8px;display:flex;gap:6px;flex-wrap:wrap">
            <button class="btn small" onclick="App.archivarEgresadosAntiguos()">📥 Exportar y eliminar</button>
            <button class="btn ghost small" onclick="App.snoozeArchivar(7)">Recordarme en 7 días</button>
            <button class="btn ghost small" onclick="App.snoozeArchivar(30)">Recordarme en 30 días</button>
          </div>
        </div>`
      : '';

    // Filtros rápidos (chips)
    const counts = this._countsPorFiltro(incluirEgresados);
    // Chips de ubicaciones (uno por cada ubicación del catálogo + "sin asignar" si hay)
    const ubicaciones = getCatalogo('ubicaciones').slice();
    const chipsUbic = ubicaciones.map(u =>
      this._chip('ubic:'+u, '🏥 '+u, counts['ubic:'+u] || 0)
    ).join('');
    // Chip "Sin ubicación" sólo si hay pacientes hospitalizados sin ubicación
    const chipSinUbic = counts['ubic:'] > 0
      ? this._chip('ubic:', '🏥 Sin ubicación', counts['ubic:'])
      : '';
    // Chip Ambulatorios (siempre presente, junto a las ubicaciones)
    const chipAmb = this._chip('amb', '🚶 Ambulatorios', counts.amb || 0);
    const chips = `
      <div class="filter-chips no-print">
        ${this._chip('todos','Todos',counts.todos)}
        ${chipsUbic}${chipSinUbic}${chipAmb}
        ${this._chip('listos','Listos cirugía',counts.listos)}
        ${this._chip('postop','Postoperatorios',counts.postop)}
        ${this._chip('infeccion','Con infección',counts.infeccion)}
        ${this._chip('preopPend','⏳ Preop con pendientes',counts.preopPend)}
        ${this._chip('hoy','Cirugía hoy',counts.hoy)}
        ${this._chip('sinprog','Sin programar',counts.sinprog)}
        ${this._chip('misPacientes','Mis pacientes',counts.misPacientes)}
      </div>
    `;

    return `
      ${banner}
      ${bannerArchivo}
      <div class="print-only" id="printHeader">
        <div class="print-title">${hospName}Servicio de ${escapeHtml(cfg.servicio||'Ortopedia')} — ${titulo}</div>
        <div class="print-sub" id="printSub"></div>
      </div>

      ${chips}

      <div class="toolbar no-print">
        <input type="search" id="searchInput" placeholder="Buscar por nombre, cédula, cama, dx, cirujano..." value="${escapeHtml(State.search)}"
               oninput="App.setSearch(this.value)">
        <button class="btn ${State.sortBy==='cama'?'':'ghost'} small" onclick="App.toggleSort('cama')"
          title="Ordenar por número de cama (click para alternar ↑↓)">
          Cama ${State.sortBy==='cama'?(State.sortDir==='asc'?'↑':'↓'):''}
        </button>
        <button class="btn ${State.sortBy==='dih'?'':'ghost'} small" onclick="App.toggleSort('dih')"
          title="Ordenar por días intra-hospitalarios (click para alternar ↑↓)">
          DIH ${State.sortBy==='dih'?(State.sortDir==='desc'?'↓ (más días arriba)':'↑ (menos días arriba)'):''}
        </button>
        <button class="btn ghost small" onclick="window.print()">🖨 Imprimir</button>
      </div>

      <div id="patientListContainer">${this.renderPatientListContent(incluirEgresados)}</div>
    `;
  },

  _chip(tipo, label, count) {
    return `<button class="chip ${State.filterType===tipo?'active':''}" onclick="App.setFilter('${tipo}')">${label}<span class="count">${count}</span></button>`;
  },

  _countsPorFiltro(incluirEgresados) {
    // base ahora incluye TODOS (hospitalizados + ambulatorios) activos
    const baseTotal = State.data.patients.filter(p => incluirEgresados || !p.fechaEgreso);
    // Para algunos chips (ubicación, listos, etc.) solo cuentan hospitalizados
    const base = baseTotal.filter(p => !p.enListaEspera);
    const hoy = todayISO();
    const programaHoy = (State.data.programas || []).find(prg => prg.fecha === hoy);
    const idsHoy = new Set(programaHoy ? programaHoy.pacientes.map(e => e.pacienteId) : []);
    const idsProgramados = new Set();
    (State.data.programas || []).forEach(prg => {
      if (prg.fecha >= hoy) prg.pacientes.forEach(e => {
        if (e.operado === null) idsProgramados.add(e.pacienteId);
      });
    });
    const yo = getCurrentUser();
    // Para "misPacientes" usamos una base ampliada que incluye ambulatorios
    const baseConAmbulatorios = State.data.patients
      .filter(p => incluirEgresados || !p.fechaEgreso);
    const matchesMisPac = (p) => {
      const cir = (p.cirujano||'').toLowerCase();
      if (!cir) return false;
      const prefijos = ['dr','dra','dr.','dra.','doctor','doctora','lic','lic.','sra','sra.','sr','sr.'];
      const palabrasYo = (yo||'').toLowerCase().split(/\s+/).filter(w => w.length > 2 && !prefijos.includes(w));
      if (palabrasYo.length === 0) return false;
      return palabrasYo.some(w => cir.includes(w));
    };
    const counts = {
      todos: baseTotal.length,
      amb: baseTotal.filter(p => p.enListaEspera).length,
      listos: base.filter(p => evaluarAptoCirugia(p).listo).length,
      postop: base.filter(p => p.cirugia && p.cirugia.realizada).length,
      infeccion: base.filter(p => tieneInfeccion(p)).length,
      preopPend: baseTotal.filter(p => {
        const ep = getEvalPreop(p);
        return ep && ep.estado === 'apto_condicional' && preopPendientesFaltan(ep) > 0;
      }).length,
      hoy: base.filter(p => idsHoy.has(p.id)).length,
      sinprog: base.filter(p => evaluarAptoCirugia(p).listo && !idsProgramados.has(p.id)).length,
      misPacientes: yo ? baseConAmbulatorios.filter(matchesMisPac).length : 0
    };
    // Conteos por ubicación (solo hospitalizados)
    base.forEach(p => {
      const u = p.ubicacion || '';
      const k = 'ubic:' + u;
      counts[k] = (counts[k] || 0) + 1;
    });
    return counts;
  },

  setFilter(tipo) {
    State.filterType = tipo;
    // Re-render: necesitamos recalcular los counts y la lista
    this.render();
  },

  matchesFilter(p) {
    const t = State.filterType;
    if (!t || t === 'todos') return true;
    // Ambulatorios: solo los enListaEspera
    if (t === 'amb') return !!p.enListaEspera;
    // Filtro por ubicación: solo hospitalizados con esa ubicación
    if (t.startsWith('ubic:')) {
      if (p.enListaEspera) return false;  // ambulatorios NO calzan con ubicaciones de hospital
      const objetivo = t.slice(5);
      return (p.ubicacion || '') === objetivo;
    }
    if (t === 'listos') return evaluarAptoCirugia(p).listo;
    if (t === 'postop') return p.cirugia && p.cirugia.realizada;
    if (t === 'infeccion') return tieneInfeccion(p);
    if (t === 'preopPend') {
      const ep = getEvalPreop(p);
      return !!ep && ep.estado === 'apto_condicional' && preopPendientesFaltan(ep) > 0;
    }
    if (t === 'hoy') {
      const programaHoy = (State.data.programas || []).find(prg => prg.fecha === todayISO());
      if (!programaHoy) return false;
      return programaHoy.pacientes.some(e => e.pacienteId === p.id);
    }
    if (t === 'sinprog') {
      if (!evaluarAptoCirugia(p).listo) return false;
      const enProg = (State.data.programas || []).some(prg =>
        prg.fecha >= todayISO() && prg.pacientes.some(e => e.pacienteId === p.id && e.operado === null));
      return !enProg;
    }
    if (t === 'misPacientes') {
      const yo = (getCurrentUser()||'').toLowerCase();
      if (!yo) return true;
      const cir = (p.cirujano||'').toLowerCase();
      if (!cir) return false;
      // Excluir prefijos para evitar falsos positivos
      const prefijos = ['dr','dra','dr.','dra.','doctor','doctora','lic','lic.','sra','sra.','sr','sr.'];
      const palabrasYo = yo.split(/\s+/).filter(w => w.length > 2 && !prefijos.includes(w));
      if (palabrasYo.length === 0) return false;
      return palabrasYo.some(w => cir.includes(w));
    }
    return true;
  },

  // Sólo el contenido de la lista — sin la casilla de búsqueda. Se re-renderiza al filtrar
  // sin destruir el input y por lo tanto sin perder el foco del teclado.
  renderPatientListContent(incluirEgresados) {
    // Pase de visita unificado: ahora incluye TODOS los pacientes activos
    // (hospitalizados + ambulatorios). Se diferencian visualmente y se filtran por chips.
    const pacientes = State.data.patients
      .filter(p => incluirEgresados || !p.fechaEgreso)
      .filter(p => this.matchesFilter(p))
      .filter(p => this.matchesSearch(p))
      .sort((a,b) => {
        // Si el filtro activo es "amb", ordenar por prioridad (alta primero) y antigüedad
        if (State.filterType === 'amb') {
          const pri = { alta:0, normal:1, baja:2 };
          const pa = pri[a.prioridadListaEspera||'normal'];
          const pb = pri[b.prioridadListaEspera||'normal'];
          if (pa !== pb) return pa - pb;
          return (a.fechaListaEspera||'').localeCompare(b.fechaListaEspera||'');
        }
        return this._compararPacientes(a,b);
      });

    if (pacientes.length === 0) {
      const sinFiltro = !State.search;
      return `<div class="empty">
        <div class="ico">${sinFiltro?'🛏️':'🔍'}</div>
        <div>${sinFiltro
          ? `No hay pacientes ${incluirEgresados?'':'activos'}.`
          : `Sin resultados para "${escapeHtml(State.search)}".`}</div>
        ${sinFiltro
          ? `<div style="margin-top:10px"><button class="btn" onclick="App.openNew()">+ Agregar primer paciente</button></div>`
          : ''}
      </div>`;
    }

    let html = `
      <div class="card print-only">
        <table>
          <thead><tr>
            <th>Cama</th><th>Nombre</th><th>Cédula</th><th>Edad</th>
            <th>Días</th><th>Diagnóstico</th><th>¿Operable?</th><th>Cirujano</th>
          </tr></thead>
          <tbody>
            ${pacientes.map(p => {
              const apto = evaluarAptoCirugia(p);
              const dias = daysBetween(p.fechaIngreso);
              return `<tr>
                <td><strong>${escapeHtml(p.cama||'—')}</strong></td>
                <td>${escapeHtml(p.nombre||'')}</td>
                <td>${escapeHtml(p.cedula||'')}</td>
                <td>${escapeHtml(p.edad||'')}</td>
                <td>${dias}</td>
                <td>${escapeHtml((p.diagnosticos||[]).join('; ') || '—')}</td>
                <td>${apto.listo ? 'SÍ' : 'No · '+apto.faltantes.slice(0,3).join(', ')+(apto.faltantes.length>3?'...':'')}</td>
                <td>${escapeHtml(p.cirujano||'—')}</td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>
    `;

    html += `<div class="no-print">${pacientes.map(p => this.renderPatientCard(p)).join('')}</div>`;
    return html;
  },

  renderPatientCard(p) {
    const dias = daysBetween(p.fechaIngreso);
    const apto = evaluarAptoCirugia(p);
    const alertas = calcularAlertasPaciente(p);
    const tieneRoja = alertas.some(a=>a.tipo==='red');
    const tieneAmarilla = alertas.some(a=>a.tipo==='yellow');
    const cirugiasArr = getCirugiasRealizadas(p);
    const ult = ultimaCirugia(p);
    const operado = !!ult;
    const dpostop = diasPostop(p);
    const requiereOtra = !!p.requiereOtraCirugia;
    let cls = 'patient-card';
    if ((operado || apto.listo) && !tieneRoja) cls += ' ready';
    if (tieneRoja) cls += ' alert';
    else if (tieneAmarilla || requiereOtra) cls += ' warn';
    if (p.fechaEgreso) cls += ' muted';

    const dxList = (p.diagnosticos || []).join(', ');
    const progPend = getProgramacionPendiente(p);
    let estadoTag = '';
    if (operado && requiereOtra) {
      estadoTag = `<span class="tag green">Operado · día ${dpostop} postop</span> <span class="tag yellow">Pendiente otra cirugía</span>`;
      if (progPend) estadoTag += ` <span class="tag blue">📅 Próx: ${fmtDate(progPend.programa.fecha)}${progPend.entrada.quirofano?' · Q'+escapeHtml(progPend.entrada.quirofano):''}</span>`;
    } else if (operado) {
      estadoTag = `<span class="tag green">Operado · día ${dpostop} postop${cirugiasArr.length>1?` (${cirugiasArr.length} cirugías)`:''}</span>`;
    } else if (progPend) {
      estadoTag = `<span class="tag blue">📅 Programado · ${fmtDate(progPend.programa.fecha)}${progPend.entrada.quirofano?' · Q'+escapeHtml(progPend.entrada.quirofano):''}${progPend.entrada.orden?' #'+progPend.entrada.orden:''}</span>`;
    } else if (apto.listo) {
      estadoTag = '<span class="tag green">Listo cirugía</span>';
    } else {
      // Estado más específico según evaluación preop
      const ep = getEvalPreop(p);
      const epEstado = ep ? ep.estado : 'pendiente';
      const faltanPP = preopPendientesFaltan(ep);
      if (epEstado === 'apto_condicional' && faltanPP > 0) {
        estadoTag = `<span class="tag yellow">Apto con ${faltanPP} pendiente(s)</span>`;
      } else if (epEstado === 'no_apto') {
        estadoTag = '<span class="tag red">No apto (preop)</span>';
      } else if (epEstado === 'no_apto_temporal') {
        estadoTag = '<span class="tag red">No apto temporal</span>';
      } else if (epEstado === 'solicitada') {
        const dSol = ep && ep.fechaSolicitud ? daysBetween(ep.fechaSolicitud) : 0;
        estadoTag = `<span class="tag yellow">Eval. solicitada${dSol>=3?' · '+dSol+'d':''}</span>`;
      } else {
        estadoTag = '<span class="tag red">Pendiente preop</span>';
      }
    }
    const tagsHtml = [
      p.enListaEspera ? '<span class="tag blue">🚶 Ambulatorio</span>' : '',
      estadoTag,
      tieneInfeccion(p) ? '<span class="tag yellow">Infección</span>' : '',
      p.fechaEgreso ? '<span class="tag gray">Egresado</span>' : ''
    ].filter(Boolean).join(' ');

    return `
      <div class="${cls}" onclick="App.openPaciente('${p.id}')">
        <div class="pc-row">
          <div class="pc-bed">${p.enListaEspera ? '🚶' : escapeHtml(p.cama||'?')}</div>
          <div class="pc-info">
            <div class="pc-name">${escapeHtml(p.nombre || '(sin nombre)')}</div>
            <div class="pc-meta">
              ${escapeHtml(p.cedula||'—')} · ${escapeHtml(p.edad||'?')} años
              ${p.enListaEspera
                ? (p.fechaListaEspera ? ' · En lista hace '+daysBetween(p.fechaListaEspera)+' día(s)' : '')
                : ' · '+dias+' día(s) hosp.'}
              ${p.cirujano? ' · Cir: '+escapeHtml(p.cirujano):''}
            </div>
            <div class="pc-meta" style="margin-top:4px">
              <strong>Dx:</strong> ${escapeHtml(dxList || '—')}
            </div>
            ${operado?`<div class="pc-meta" style="margin-top:4px;color:#065f46">
              <strong>Última cirugía:</strong> ${escapeHtml(ult.procedimiento||'—')}
              ${ult.lateralidad?' ('+escapeHtml(ult.lateralidad)+')':''}
              · ${fmtDate(ult.fecha)} · ${dpostop} día(s) postop
              ${cirugiasArr.length>1?` · ${cirugiasArr.length} cirugías totales`:''}
            </div>`:''}
            <div class="pc-tags">${tagsHtml}</div>
            ${alertas.filter(a=>a.tipo==='red').slice(0,1).map(a=>`
              <div class="alert-box red" style="margin-top:6px;font-size:.78rem;padding:6px 8px">⚠ ${escapeHtml(a.texto)}</div>
            `).join('')}
          </div>
        </div>
      </div>
    `;
  },

  // Comparación de pacientes según el orden actual del usuario
  _compararPacientes(a, b) {
    const dir = State.sortDir === 'desc' ? -1 : 1;
    if (State.sortBy === 'dih') {
      // DIH = días intra-hospitalarios desde fechaIngreso
      const da = a.fechaIngreso ? daysBetween(a.fechaIngreso, a.fechaEgreso) : -1;
      const db = b.fechaIngreso ? daysBetween(b.fechaIngreso, b.fechaEgreso) : -1;
      if (da !== db) return (da - db) * dir;
      // empate: ordenar por cama secundario
      const ca = (a.cama||'').toString(), cb = (b.cama||'').toString();
      return ca.localeCompare(cb, 'es', {numeric:true});
    }
    // Ordenar por cama (numérico-alfabético)
    const ca = (a.cama||'').toString();
    const cb = (b.cama||'').toString();
    return ca.localeCompare(cb, 'es', {numeric:true, sensitivity:'base'}) * dir;
  },

  toggleSort(campo) {
    if (State.sortBy === campo) {
      // Alternar dirección
      State.sortDir = State.sortDir === 'asc' ? 'desc' : 'asc';
    } else {
      State.sortBy = campo;
      // Default: cama asc, DIH desc (más útil clínicamente: ver primero los que llevan más días)
      State.sortDir = (campo === 'dih') ? 'desc' : 'asc';
    }
    this.render();
  },

  setSearch(v) {
    State.search = v;
    // Sólo actualizar la lista, no la casilla de búsqueda — así el input no
    // pierde el foco del teclado al escribir cada letra.
    if (State.currentTab === 'lista') {
      const container = document.getElementById('patientListContainer');
      if (container) {
        container.innerHTML = this.renderPatientListContent(false);
        return;
      }
    }
    this.render();
  },

  matchesSearch(p) {
    const q = (State.search||'').toLowerCase().trim();
    if (!q) return true;
    const blob = [
      p.nombre, p.cedula, p.cama, p.cirujano,
      p.alergias, p.antecedentesPatologicos,
      ...(p.diagnosticos||[])
    ].join(' ').toLowerCase();
    return blob.includes(q);
  },

  /* ---------- Lista de espera quirúrgica (ambulatorios) ---------- */
  renderListaEspera() {
    const lista = State.data.patients
      .filter(p => p.enListaEspera && !p.fechaEgreso)
      .filter(p => this.matchesSearch(p))
      .sort((a,b) => {
        // Prioridad: alta > normal > baja
        const pri = { alta:0, normal:1, baja:2 };
        const pa = pri[a.prioridadListaEspera||'normal'];
        const pb = pri[b.prioridadListaEspera||'normal'];
        if (pa !== pb) return pa - pb;
        // Fecha de inscripción (más antiguos primero)
        return (a.fechaListaEspera||'').localeCompare(b.fechaListaEspera||'');
      });

    let html = `
      <div class="toolbar no-print">
        <h2 style="margin:0">Pacientes ambulatorios (${lista.length})</h2>
        <div style="flex:1"></div>
        <button class="btn small" onclick="App.openNewAmbulatorio()">+ Nuevo ambulatorio</button>
        <button class="btn ghost small" onclick="window.print()">🖨</button>
      </div>
      <div class="alert-box blue no-print" style="font-size:.85rem">
        Pacientes ambulatorios pendientes de cirugía (no hospitalizados aún).
        Ordenados por <strong>prioridad</strong> (alta → baja) y fecha de inscripción.
        Cuando completen su preoperatorio se pueden agregar al programa quirúrgico
        igual que un paciente hospitalizado. Si requieren ingreso, usa "Ingresar al hospital".
      </div>

      <div class="toolbar no-print">
        <input type="search" placeholder="Buscar por nombre, cédula, dx..." value="${escapeHtml(State.search)}"
          oninput="App.setSearch(this.value)">
      </div>
    `;

    if (lista.length === 0) {
      html += `<div class="empty">
        <div class="ico">📅</div>
        <div>No hay pacientes en lista de espera.</div>
        <div style="margin-top:10px"><button class="btn" onclick="App.openNewAmbulatorio()">+ Agregar paciente ambulatorio</button></div>
      </div>`;
      return html;
    }

    html += lista.map(p => {
      const apto = evaluarAptoCirugia(p);
      const dias = p.fechaListaEspera ? daysBetween(p.fechaListaEspera) : 0;
      const priColor = p.prioridadListaEspera === 'alta' ? 'red' : (p.prioridadListaEspera === 'baja' ? 'gray' : 'yellow');
      const progPend = getProgramacionPendiente(p);
      let cls = 'patient-card';
      if (progPend) cls += ' ready';
      else if (apto.listo) cls += ' ready';
      if (p.prioridadListaEspera === 'alta' && !apto.listo && !progPend) cls += ' alert';
      let estadoTag;
      if (progPend) {
        estadoTag = `<span class="tag blue">📅 Programado · ${fmtDate(progPend.programa.fecha)}${progPend.entrada.quirofano?' · Q'+escapeHtml(progPend.entrada.quirofano):''}</span>`;
      } else if (apto.listo) {
        estadoTag = '<span class="tag green">✓ Listo cirugía</span>';
      } else {
        const ep = getEvalPreop(p);
        const epEstado = ep ? ep.estado : 'pendiente';
        const faltanPP = preopPendientesFaltan(ep);
        if (epEstado === 'apto_condicional' && faltanPP > 0) {
          estadoTag = `<span class="tag yellow">Apto con ${faltanPP} pendiente(s)</span>`;
        } else if (epEstado === 'no_apto') {
          estadoTag = '<span class="tag red">No apto (preop)</span>';
        } else if (epEstado === 'no_apto_temporal') {
          estadoTag = '<span class="tag red">No apto temporal</span>';
        } else if (epEstado === 'solicitada') {
          const dSol = ep && ep.fechaSolicitud ? daysBetween(ep.fechaSolicitud) : 0;
          estadoTag = `<span class="tag yellow">Eval. solicitada${dSol>=3?' · '+dSol+'d':''}</span>`;
        } else {
          estadoTag = '<span class="tag red">Pendiente preop</span>';
        }
      }
      return `
        <div class="${cls}" onclick="App.openPaciente('${p.id}')" style="margin-bottom:10px">
          <div class="pc-row">
            <div class="pc-info">
              <div class="pc-name">${escapeHtml(p.nombre || '(sin nombre)')}
                <span class="tag ${priColor}">Prioridad ${escapeHtml(p.prioridadListaEspera||'normal')}</span>
                ${estadoTag}
              </div>
              <div class="pc-meta">
                ${escapeHtml(p.cedula||'—')} · ${escapeHtml(p.edad||'?')} años · ${escapeHtml(p.cirujano||'sin cirujano')}
                ${dias > 0 ? ` · En lista hace ${dias} día(s)` : ''}
              </div>
              <div class="pc-meta" style="margin-top:4px">
                <strong>Dx:</strong> ${escapeHtml((p.diagnosticos||[]).join(', ') || '—')}
              </div>
              ${p.notasListaEspera ? `<div class="pc-meta" style="margin-top:4px"><em>${escapeHtml(p.notasListaEspera)}</em></div>` : ''}
              ${!apto.listo && apto.faltantes && apto.faltantes.length
                ? `<div class="pc-meta" style="color:#92400e;margin-top:4px">Faltan: ${escapeHtml(apto.faltantes.join(', '))}</div>`
                : ''}
            </div>
          </div>
        </div>
      `;
    }).join('');

    return html;
  },

  ingresarAlHospital(id) {
    const p = this._findP(id); if (!p) return;
    if (!p.enListaEspera) { alert('El paciente ya está hospitalizado.'); return; }
    if (!confirm('¿Ingresar este paciente al hospital? Saldrá de la lista de espera y aparecerá en el pase de visita. Necesitará asignación de cama.')) return;
    p.enListaEspera = false;
    if (!p.fechaIngreso) p.fechaIngreso = todayISO();
    logCambio(p, 'Hospitalización', 'Convertido de lista de espera a hospitalizado');
    State.save();
    this.renderModal(id);
  },

  moverAListaEspera(id) {
    const p = this._findP(id); if (!p) return;
    if (p.enListaEspera) { alert('Ya está en lista de espera.'); return; }
    if (!confirm('¿Mover este paciente a lista de espera? Saldrá del pase de visita.')) return;
    p.enListaEspera = true;
    if (!p.fechaListaEspera) p.fechaListaEspera = todayISO();
    p.cama = '';
    logCambio(p, 'Lista espera', 'Movido de hospitalizado a lista de espera');
    State.save();
    this.renderModal(id);
  },

  /* ---------- Listos para cirugía ---------- */
  renderCirugia() {
    const pacientes = State.data.patients
      .filter(p => !p.fechaEgreso)
      .filter(p => evaluarAptoCirugia(p).listo)
      .sort((a,b)=> {
        const ca = (a.cama||'').toString(), cb = (b.cama||'').toString();
        const na = parseInt(ca,10), nb = parseInt(cb,10);
        if (!isNaN(na) && !isNaN(nb) && na !== nb) return na - nb;
        return ca.localeCompare(cb, 'es');
      });

    let html = `
      <div class="print-only">
        <div class="print-title">Pacientes Listos para Cirugía</div>
        <div class="print-sub">${new Date().toLocaleString('es')} · ${pacientes.length} pacientes</div>
      </div>
      <div class="toolbar no-print">
        <h2 style="margin:0">Listos para cirugía: ${pacientes.length}</h2>
        <div style="flex:1"></div>
        <button class="btn ghost small" onclick="window.print()">🖨 Imprimir</button>
      </div>
    `;

    if (pacientes.length === 0) {
      html += `<div class="empty">
        <div class="ico">⏳</div>
        <div>Ningún paciente cumple actualmente los criterios para cirugía.</div>
      </div>`;
      return html;
    }

    html += `<div class="card print-only">
      <table>
        <thead><tr><th>Cama</th><th>Nombre</th><th>Cédula</th><th>Edad</th><th>Dx</th><th>Cirujano</th><th>Días hosp</th></tr></thead>
        <tbody>
          ${pacientes.map(p=>`<tr>
            <td><strong>${escapeHtml(p.cama||'—')}</strong></td>
            <td>${escapeHtml(p.nombre||'')}</td>
            <td>${escapeHtml(p.cedula||'')}</td>
            <td>${escapeHtml(p.edad||'')}</td>
            <td>${escapeHtml((p.diagnosticos||[]).join('; '))}</td>
            <td>${escapeHtml(p.cirujano||'—')}</td>
            <td>${daysBetween(p.fechaIngreso)}</td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>`;

    html += `<div class="no-print">${pacientes.map(p => this.renderPatientCard(p)).join('')}</div>`;
    return html;
  },

  /* ============================================================
     PROGRAMA QUIRÚRGICO — múltiples programas por día con historial
     ============================================================ */
  _currentProgramaId: null,

  renderPrograma() {
    // Si hay un programa abierto, mostrar su detalle
    if (this._currentProgramaId) {
      return this.renderProgramaDia(this._currentProgramaId);
    }

    const programas = (State.data.programas || []).slice()
      .sort((a,b) => (b.fecha||'').localeCompare(a.fecha||''));
    const pendientes = this.programasPendientesRevision();

    let html = '';
    // Banner de revisión pendiente
    if (pendientes.length > 0) {
      html += `<div class="alert-box red" style="margin-bottom:12px">
        <strong>⚠ ${pendientes.length} programa(s) pendientes de revisar</strong><br>
        Hay cirugías programadas en fechas pasadas que aún no tienen confirmado si se realizaron o no.
        ${pendientes.map(prg => `
          <div style="margin-top:8px">
            <button class="btn small" onclick="App.abrirRevisionPrograma('${prg.id}')">
              Revisar programa de ${fmtDateLong(prg.fecha)}
            </button>
          </div>
        `).join('')}
      </div>`;
    }

    html += `
      <div class="toolbar no-print">
        <h2 style="margin:0">Programas quirúrgicos (${programas.length})</h2>
        <div style="flex:1"></div>
        <button class="btn small" onclick="App.crearPrograma()">+ Nuevo programa</button>
      </div>
    `;

    if (programas.length === 0) {
      html += `<div class="empty">
        <div class="ico">📅</div>
        <div>No hay programas registrados.</div>
        <div style="margin-top:10px"><button class="btn" onclick="App.crearPrograma()">+ Crear primer programa</button></div>
      </div>`;
      return html;
    }

    // Tarjetas resumen de cada programa
    html += programas.map(prg => {
      const total = prg.pacientes.length;
      const operados = prg.pacientes.filter(e => e.operado === true).length;
      const noOperados = prg.pacientes.filter(e => e.operado === false).length;
      const pendientesRev = prg.pacientes.filter(e => e.operado === null).length;
      const esPasado = prg.fecha < todayISO();
      const esHoy = prg.fecha === todayISO();
      const necesitaRevision = esPasado && !prg.revisado && pendientesRev > 0;

      let cls = 'patient-card';
      let estadoTag = '';
      if (necesitaRevision) {
        cls += ' alert';
        estadoTag = '<span class="tag red">Pendiente revisión</span>';
      } else if (prg.revisado) {
        cls += ' ready';
        estadoTag = '<span class="tag green">Revisado</span>';
      } else if (esHoy) {
        estadoTag = '<span class="tag blue">Hoy</span>';
      } else if (prg.fecha > todayISO()) {
        estadoTag = '<span class="tag yellow">Próximo</span>';
      }

      // Conteo de quirófanos
      const { grupos: gprev, quirofanos: qprev } = agruparPorQuirofano(prg);
      const conQuirofano = qprev.filter(q => q).length;
      const sinQuirofano = (gprev[''] || []).length;

      // Lista compacta de los pacientes (agrupada por quirófano)
      const lineas = [];
      qprev.forEach(q => {
        gprev[q].forEach(e => {
          const p = State.data.patients.find(x => x.id === e.pacienteId);
          if (!p) return;
          const opTag = e.operado === true ? '<span class="tag green" style="font-size:.7rem">✓ Op</span>'
                      : e.operado === false ? '<span class="tag red" style="font-size:.7rem">✗ No op</span>'
                      : '';
          const qBadge = q ? `<span class="tag blue" style="font-size:.7rem">Q${escapeHtml(q)}#${e.orden||1}</span>` : '';
          lineas.push(`<div style="margin-top:4px;font-size:.85rem">
            ${opTag} ${qBadge} <strong>${escapeHtml(p.cama||'?')}</strong> ${escapeHtml(p.nombre||'')} —
            <em>${escapeHtml(e.procedimiento||'(sin procedimiento)')}</em>
            ${e.lateralidad?` (${escapeHtml(e.lateralidad)})`:''}
          </div>`);
        });
      });
      const previewPacientes = lineas.slice(0,5).join('');
      const masPacientes = lineas.length > 5 ? `<div class="muted" style="font-size:.8rem;margin-top:4px">+ ${lineas.length-5} más…</div>` : '';
      const resumenQ = (conQuirofano > 0 ? `${conQuirofano} quirófano(s)` : '') +
                       (sinQuirofano > 0 ? (conQuirofano>0?', ':'') + `${sinQuirofano} sin asignar` : '');

      return `
        <div class="${cls}" onclick="App.abrirPrograma('${prg.id}')">
          <div class="pc-row">
            <div class="pc-info">
              <div class="pc-name">
                Programa del ${fmtDateLong(prg.fecha)}
                ${estadoTag}
              </div>
              <div class="pc-meta">
                ${total} cirugía(s) ${resumenQ?'· '+resumenQ:''} ·
                ${operados>0?`${operados} operado(s) · `:''}
                ${noOperados>0?`${noOperados} no operado(s) · `:''}
                ${pendientesRev>0?`${pendientesRev} sin revisar`:''}
              </div>
              ${previewPacientes}
              ${masPacientes}
              ${prg.notas?`<div class="pc-meta" style="margin-top:4px"><em>"${escapeHtml(prg.notas)}"</em></div>`:''}
            </div>
          </div>
        </div>
      `;
    }).join('');

    return html;
  },

  /* ---------- Vista de un programa (un día) ---------- */
  renderProgramaDia(id) {
    const prg = (State.data.programas || []).find(x => x.id === id);
    if (!prg) {
      this._currentProgramaId = null;
      return this.renderPrograma();
    }
    const total = prg.pacientes.length;
    const operados = prg.pacientes.filter(e => e.operado === true).length;
    const pendientesRev = prg.pacientes.filter(e => e.operado === null).length;
    const esPasado = prg.fecha < todayISO();
    const necesitaRevision = esPasado && !prg.revisado && pendientesRev > 0;

    const cfgH = getConfig();
    const hospHeader = cfgH.hospitalNombre ? `${escapeHtml(cfgH.hospitalNombre)} · ` : '';
    let html = `
      <div class="print-only">
        <div class="print-title">${hospHeader}Programa Quirúrgico</div>

        ${necesitaRevision ? `<button class="btn small" onclick="App.abrirRevisionPrograma('${prg.id}')">Revisar cirugías</button>` : ''}

        </div>
      </div>

    // Agrupar por quirófano
    const { grupos, quirofanos } = agruparPorQuirofano(prg);

    // Tabla para impresión: una sección por quirófano
    html += `<div class="print-only">
      ${quirofanos.map(q => {
        const ents = grupos[q];
        return `
          <h3 style="margin-top:12px;margin-bottom:6px">

          <table>

              <th>Orden</th><th>Cama</th><th>Paciente</th><th>Cédula</th><th>Edad</th>
              <th>Diagnóstico</th><th>Procedimiento</th><th>Lat.</th>
              <th>Sangre</th><th>Insumos</th><th>Cirujano</th><th>Anestesia</th><th>Obs.</th>
            </tr></thead>
            <tbody>
              ${ents.map((e,i) => {
                const p = State.data.patients.find(x => x.id === e.pacienteId) || {};
                return `<tr>
                  <td><strong>${i+1}</strong></td>
                  <td><strong>${escapeHtml(p.cama||'—')}</strong></td>
                  <td>${escapeHtml(p.nombre||'')}</td>
                  <td>${escapeHtml(p.cedula||'')}</td>
                  <td>${escapeHtml(p.edad||'')}</td>
                  <td>${escapeHtml((p.diagnosticos||[]).join('; '))}</td>
                  <td>${escapeHtml(e.procedimiento||'')}</td>
                  <td>${escapeHtml(e.lateralidad||'')}</td>
                  <td>${escapeHtml(e.requerimientoSangre||'—')}</td>
                  <td>${escapeHtml(e.insumos||'—')}</td>
                  <td>${escapeHtml(e.medicoCargo||p.cirujano||'—')}</td>
                  <td>${escapeHtml(e.anestesia||'—')}</td>
                  <td>${escapeHtml(e.observaciones||'')}</td>
                </tr>`;
              }).join('')}
            </tbody>
          </table>
        `;
      }).join('')}
    </div>`;

    // Tarjetas interactivas: agrupadas por quirófano
    if (total === 0) {
      html += `<div class="empty no-print">
        <div class="ico">🩺</div>
        <div>Programa sin pacientes.</div>
        <div style="margin-top:10px"><button class="btn" onclick="App.agregarAPrograma('${prg.id}')">+ Agregar paciente</button></div>
      </div>`;
    } else {
      html += `<div class="no-print">${quirofanos.map(q => {
        const ents = grupos[q];
        return `
          <div class="card" style="border-left:4px solid #3282b8">
            <div class="row-between" style="margin-bottom:8px">
              <h3 style="margin:0">
                ${q ? '🏥 Quirófano ' + escapeHtml(q) : '⚠ Sin quirófano asignado'}
                <span class="muted" style="font-weight:400;font-size:.85rem">
                  · ${ents.length} cirugía${ents.length!==1?'s':''}
                </span>
              </h3>
            </div>
            ${ents.map((e, i) => this.renderEntradaPrograma(prg, e, i, ents.length)).join('')}
          </div>

    }

    return html;
  },

  renderEntradaPrograma(prg, e, idx, totalEnQuirofano) {
    const p = State.data.patients.find(x => x.id === e.pacienteId);
    if (!p) {
      return `<div class="card compact"><em class="muted">Paciente eliminado · </em><button class="btn ghost small" onclick="App.quitarDePrograma('${prg.id}','${e.id}')">Quitar entrada</button></div>`;
    }

    let cls = 'patient-card';
    let estadoTag = '';
    if (e.operado === true) { cls += ' ready'; estadoTag = '<span class="tag green">✓ Operado</span>'; }
    else if (e.operado === false) { cls += ' alert'; estadoTag = `<span class="tag red">✗ No operado</span>`; }

    const lateralidades = ['','Derecha','Izquierda','Bilateral','No aplica'];
    const sangreOpts = ['','No requiere','Tipo y RH','Tipo y cruce','1 unidad GRE','2 unidades GRE','3 unidades GRE','4 unidades GRE','Reservar GRE + plasma','Otro'];
    const anestesiaOpts = ['','General','Raquídea','Epidural','Bloqueo regional','Local + sedación','Combinada'];

    const ordenDisplay = e.orden ? e.orden : (idx+1);

    const puedeBajar = idx < (totalEnQuirofano - 1);

    return `
      <div class="${cls}" style="cursor:default">

          <div class="pc-bed">${escapeHtml(p.cama||'?')}</div>

            <div class="pc-name">
              <span class="tag blue">#${ordenDisplay}</span>
              ${escapeHtml(p.nombre||'(sin nombre)')}
              ${estadoTag}

            </div>
            <div class="pc-meta">
              ${escapeHtml(p.cedula||'—')} · ${escapeHtml(p.edad||'?')} años · Dx: ${escapeHtml((p.diagnosticos||[]).join(', ')||'—')}
              ${p.alergias?` · <span class="tag red" style="font-size:.7rem">Alergia: ${escapeHtml(p.alergias)}</span>`:''}

              <div class="field" style="margin-bottom:0">
                <label>Orden en quirófano (paciente ${ordenDisplay} de ${totalEnQuirofano})</label>

                    onclick="App.moverEnQuirofano('${prg.id}','${e.id}',-1)" title="Subir">↑ Subir</button>
                  <button class="btn ghost small" ${!puedeBajar?'disabled style="opacity:.4"':''}
                    onclick="App.moverEnQuirofano('${prg.id}','${e.id}',1)" title="Bajar">↓ Bajar</button>
                  <input type="number" min="1" value="${ordenDisplay}" style="width:60px"
                    onchange="App.setEntradaOrden('${prg.id}','${e.id}',this.value)" title="Asignar orden manualmente">
                </div>
              </div>
            </div>

            <div class="field" style="margin-top:8px;margin-bottom:8px">
              <div class="row-between" style="margin-bottom:4px">
                <label style="margin:0">Procedimiento</label>
                <button class="btn ghost small" style="padding:2px 8px;font-size:.75rem"
                  onclick="App.openCatalogoPickerEntrada('procedimientos','${prg.id}','${e.id}')">+ Desde catálogo</button>
              </div>
              <textarea rows="2" placeholder="Ej. RAFI con placa LCP de tibia distal"
                oninput="App.setEntrada('${prg.id}','${e.id}','procedimiento',this.value)">${escapeHtml(e.procedimiento||'')}</textarea>
            </div>

            <div class="field-row">
              <div class="field" style="margin-bottom:0">
                <label>Lateralidad</label>
                <select onchange="App.setEntrada('${prg.id}','${e.id}','lateralidad',this.value)">

                </select>

              <div class="field" style="margin-bottom:0">
                <label>Médico a cargo</label>
                <input list="cirujanosList" value="${escapeHtml(e.medicoCargo||p.cirujano||'')}" oninput="App.setEntrada('${prg.id}','${e.id}','medicoCargo',this.value)">
              </div>

            <div class="field-row" style="margin-top:8px">
              <div class="field" style="margin-bottom:0">

                  ${sangreOpts.map(s => `<option value="${s}" ${e.requerimientoSangre===s?'selected':''}>${s||'—'}</option>`).join('')}
                </select>
              </div>
              <div class="field" style="margin-bottom:0">
                <label>Anestesia</label>
                <select onchange="App.setEntrada('${prg.id}','${e.id}','anestesia',this.value)">
                  ${anestesiaOpts.map(a => `<option value="${a}" ${e.anestesia===a?'selected':''}>${a||'—'}</option>`).join('')}
                </select>
              </div>
            </div>

            <div class="field" style="margin-top:8px;margin-bottom:0">
              <label>Insumos necesarios</label>
              <textarea rows="2" oninput="App.setEntrada('${prg.id}','${e.id}','insumos',this.value)">${escapeHtml(e.insumos||'')}</textarea>
            </div>

            <div class="field" style="margin-top:8px;margin-bottom:0">
              <label>Observaciones</label>
              <textarea rows="2" oninput="App.setEntrada('${prg.id}','${e.id}','observaciones',this.value)">${escapeHtml(e.observaciones||'')}</textarea>

            <div style="margin-top:8px;text-align:right">
